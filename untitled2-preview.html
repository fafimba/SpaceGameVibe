let ac=null,masterGain=null,playing=false,startTime=0,offsetTime=0,timerInterval=null,schedInterval=null;
// Track scheduling progress per voice
let voiceIdx = [];

function initAudio(){ if(ac)return; ac=new AudioContext(); masterGain=ac.createGain(); masterGain.gain.value=0.5; masterGain.connect(ac.destination); }

function scheduleNote(voice, t, midi, dur, vel) {
    const freq = 440*Math.pow(2,(midi-69)/12);
    const v = vel/127, ds = Math.max(dur, 0.05);
    
    if (voice.name.toLowerCase().includes('drum')) {
        const osc=ac.createOscillator(),g=ac.createGain();
        osc.type='sine'; osc.frequency.setValueAtTime(120,t); osc.frequency.exponentialRampToValueAtTime(35,t+0.15);
        g.gain.setValueAtTime(v*0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
        osc.connect(g);g.connect(masterGain); osc.start(t);osc.stop(t+0.35); return;
    }
    
    const o=ac.createOscillator(),g=ac.createGain(); o.type='sine'; o.frequency.value=freq;
    const type = voice.type;
    
    if (type==='plucked') {
        o.connect(g);g.connect(masterGain);
        g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(v*0.35,t+0.005); g.gain.exponentialRampToValueAtTime(0.001,t+ds);
    } else if (type==='pad') {
        const o2=ac.createOscillator(),g2=ac.createGain(); o2.type='sine'; o2.frequency.value=freq*1.003;
        const fl=ac.createBiquadFilter(); fl.type='lowpass'; fl.frequency.value=1200; fl.Q.value=0.5;
        o2.connect(g2);g2.connect(fl);fl.connect(masterGain);
        const att=Math.min(0.4,ds*0.25);
        g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(v*0.07,t+att); g.gain.setValueAtTime(v*0.05,t+ds*0.7); g.gain.linearRampToValueAtTime(0,t+ds);
        g2.gain.setValueAtTime(0,t); g2.gain.linearRampToValueAtTime(v*0.025,t+att); g2.gain.linearRampToValueAtTime(0,t+ds);
        const fl2=ac.createBiquadFilter(); fl2.type='lowpass'; fl2.frequency.value=1200; fl2.Q.value=0.5;
        o.connect(g);g.connect(fl2);fl2.connect(masterGain);
        o2.start(t);o2.stop(t+ds+0.05);
    } else {
        o.connect(g);g.connect(masterGain);
        const att=Math.min(0.05,ds*0.1);
        g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(v*0.38,t+att); g.gain.setValueAtTime(v*0.3,t+ds*0.6); g.gain.linearRampToValueAtTime(0,t+ds);
    }
    o.start(t);o.stop(t+ds+0.05);
}

const LOOKAHEAD = 4; // schedule 4 seconds ahead

function scheduleBatch() {
    if (!playing) return;
    const now = ac.currentTime;
    const elapsed = now - offsetTime;
    const horizon = elapsed + LOOKAHEAD;
    
    for (let vi = 0; vi < SONG.length; vi++) {
        const voice = SONG[vi];
        const notes = voice.notes;
        while (voiceIdx[vi] < notes.length) {
            const n = notes[voiceIdx[vi]];
            if (n[0] > horizon) break;
            if (n[0] >= elapsed - 0.1) {
                scheduleNote(voice, offsetTime + n[0], n[1], n[2], n[3]);
            }
            voiceIdx[vi]++;
        }
    }
    
    // Check if all done
    let allDone = true;
    for (let vi = 0; vi < SONG.length; vi++) {
        if (voiceIdx[vi] < SONG[vi].notes.length) { allDone = false; break; }
    }
    if (allDone) {
        setTimeout(() => { if(playing) stopAll(); }, 3000);
    }
}

function togglePlay() {
    initAudio();
    if (playing) { stopAll(); return; }
    playing = true;
    voiceIdx = SONG.map(() => 0);
    offsetTime = ac.currentTime + 0.1;
    startTime = offsetTime;
    scheduleBatch();
    schedInterval = setInterval(scheduleBatch, 1000);
    timerInterval = setInterval(updateTime, 200);
}

function stopAll() {
    playing = false;
    if (timerInterval) clearInterval(timerInterval);
    if (schedInterval) clearInterval(schedInterval);
    document.getElementById('time').textContent = '0:00';
}

function updateTime() {
    if (!playing) return;
    const e = ac.currentTime - startTime;
    const m = Math.floor(e/60), s = Math.floor(e%60);
    document.getElementById('time').textContent = m+':'+String(s).padStart(2,'0');
}

const vDiv=document.getElementById('voices');
SONG.forEach(v=>{ const d=document.createElement('div'); d.className='voice'; d.textContent=v.name+' ('+v.type+(v.sub?', sub':'')+') - '+v.notes.length+' notes'; vDiv.appendChild(d); });
