<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>Stellar Swarm — Music Preview</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0a12;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.container {
    width: 500px;
    padding: 40px;
}
h1 {
    color: #00e5ff;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
}
.subtitle {
    color: #555;
    font-size: 13px;
    margin-bottom: 32px;
}
.sequence-btn {
    display: block;
    width: 100%;
    padding: 16px 20px;
    margin-bottom: 12px;
    background: #12121e;
    border: 1px solid #222;
    border-radius: 8px;
    color: #ccc;
    font-size: 14px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
}
.sequence-btn:hover {
    border-color: #00e5ff;
    color: #fff;
}
.sequence-btn.active {
    border-color: #00e5ff;
    background: #0d1a2a;
    color: #00e5ff;
}
.sequence-btn .name {
    font-weight: 600;
    font-size: 15px;
}
.sequence-btn .info {
    color: #666;
    font-size: 12px;
    margin-top: 4px;
}
.sequence-btn.active .info { color: #00e5ff88; }

.controls {
    margin-top: 24px;
    display: flex;
    gap: 12px;
    align-items: center;
}
.stop-btn {
    padding: 10px 24px;
    background: transparent;
    border: 1px solid #333;
    border-radius: 6px;
    color: #888;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
}
.stop-btn:hover { border-color: #ff4444; color: #ff4444; }

.volume-group {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
}
.volume-group label { color: #555; font-size: 12px; }
.volume-group input[type="range"] {
    flex: 1;
    accent-color: #00e5ff;
    height: 4px;
}

.status {
    margin-top: 20px;
    padding: 12px 16px;
    background: #0d0d18;
    border-radius: 6px;
    font-size: 12px;
    color: #444;
    font-family: 'SF Mono', 'Consolas', monospace;
    min-height: 40px;
    line-height: 1.6;
}

canvas {
    display: block;
    margin-top: 20px;
    border-radius: 6px;
    width: 100%;
    height: 60px;
}
</style>
</head>
<body>
<div class="container">
    <h1>Stellar Swarm</h1>
    <p class="subtitle">Music Sequence Preview — click a sequence to play</p>

    <div id="buttons"></div>

    <div class="controls">
        <button class="stop-btn" onclick="stopAll()">Stop</button>
        <div class="volume-group">
            <label>Vol</label>
            <input type="range" id="volume" min="0" max="100" value="70" oninput="setVolume(this.value)">
        </div>
    </div>

    <canvas id="viz"></canvas>
    <div class="status" id="status">Ready — click a sequence to start</div>
</div>

// ============================================================
// SYNTH ENGINE
// ============================================================
let audioCtx = null;
let masterGain = null;
let analyser = null;
let activeOscillators = [];
let loopTimer = null;
let currentSequence = null;
let isPlaying = false;
let currentBeat = 0;
let loopStartTime = 0;

function initAudio() {
    if (audioCtx) return;
    audioCtx = new AudioContext();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.7;
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    masterGain.connect(analyser);
    analyser.connect(audioCtx.destination);
}

function midiToFreq(midi) {
    return 440 * Math.pow(2, (midi - 69) / 12);
}

function playNote(voice, midiNote, durationBeats, beatDuration, time) {
    const freq = midiToFreq(midiNote);
    const duration = durationBeats * beatDuration;

    // Oscillator
    const osc = audioCtx.createOscillator();
    osc.type = voice.wave;
    osc.frequency.setValueAtTime(freq, time);

    // Gain with envelope
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0, time);
    gain.gain.linearRampToValueAtTime(voice.volume, time + 0.01); // fast attack
    gain.gain.setValueAtTime(voice.volume, time + duration - 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, time + duration); // smooth release

    // Optional filter
    if (voice.filter) {
        const filter = audioCtx.createBiquadFilter();
        filter.type = voice.filter.type;
        filter.frequency.value = voice.filter.freq;
        filter.Q.value = voice.filter.Q;
        osc.connect(filter);
        filter.connect(gain);
    } else {
        osc.connect(gain);
    }

    gain.connect(masterGain);

    osc.start(time);
    osc.stop(time + duration + 0.01);

    activeOscillators.push(osc);
    osc.onended = () => {
        const idx = activeOscillators.indexOf(osc);
        if (idx >= 0) activeOscillators.splice(idx, 1);
    };
}

function scheduleLoop(seq, startTime) {
    const beatDuration = 60 / seq.bpm;
    const loopDuration = seq.loopBeats * beatDuration;

    for (const voice of seq.voices) {
        for (const [midi, dur, beat] of voice.notes) {
            const noteTime = startTime + (beat * beatDuration);
            if (noteTime >= audioCtx.currentTime - 0.1) {
                playNote(voice, midi, dur, beatDuration, noteTime);
            }
        }
    }

    loopStartTime = startTime;

    // Schedule next loop
    const nextLoopTime = startTime + loopDuration;
    const msUntilReschedule = (nextLoopTime - audioCtx.currentTime - 0.5) * 1000;
    loopTimer = setTimeout(() => {
        if (isPlaying) scheduleLoop(seq, nextLoopTime);
    }, Math.max(msUntilReschedule, 100));
}

function playSequence(name) {
    initAudio();
    stopAll();

    const seq = MUSIC_SEQUENCES[name];
    if (!seq) return;

    currentSequence = name;
    isPlaying = true;

    // Update UI
    document.querySelectorAll('.sequence-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.name === name);
    });

    const beatDuration = 60 / seq.bpm;
    const loopDuration = seq.loopBeats * beatDuration;
    updateStatus(`Playing: ${name} | ${seq.bpm} BPM | ${seq.loopBeats} beats (${loopDuration.toFixed(1)}s loop) | ${seq.voices.length} voices`);

    scheduleLoop(seq, audioCtx.currentTime + 0.1);
    startVisualization();
}

function stopAll() {
    isPlaying = false;
    currentSequence = null;
    if (loopTimer) clearTimeout(loopTimer);

    activeOscillators.forEach(osc => {
        try { osc.stop(); } catch(e) {}
    });
    activeOscillators = [];

    document.querySelectorAll('.sequence-btn').forEach(btn => btn.classList.remove('active'));
    updateStatus('Stopped');
}

function setVolume(val) {
    if (masterGain) masterGain.gain.value = val / 100;
}

function updateStatus(text) {
    document.getElementById('status').textContent = text;
}

// ============================================================
// VISUALIZATION
// ============================================================
const canvas = document.getElementById('viz');
const ctx2d = canvas.getContext('2d');
let animFrame = null;

function startVisualization() {
    if (animFrame) cancelAnimationFrame(animFrame);
    canvas.width = canvas.offsetWidth * 2;
    canvas.height = canvas.offsetHeight * 2;

    function draw() {
        if (!isPlaying || !analyser) { ctx2d.clearRect(0, 0, canvas.width, canvas.height); return; }

        const bufLen = analyser.frequencyBinCount;
        const data = new Uint8Array(bufLen);
        analyser.getByteTimeDomainData(data);

        ctx2d.fillStyle = '#0a0a12';
        ctx2d.fillRect(0, 0, canvas.width, canvas.height);

        ctx2d.beginPath();
        ctx2d.strokeStyle = '#00e5ff';
        ctx2d.lineWidth = 2;

        const sliceWidth = canvas.width / bufLen;
        let x = 0;
        for (let i = 0; i < bufLen; i++) {
            const v = data[i] / 128.0;
            const y = v * canvas.height / 2;
            if (i === 0) ctx2d.moveTo(x, y);
            else ctx2d.lineTo(x, y);
            x += sliceWidth;
        }
        ctx2d.stroke();

        // Beat indicator
        if (currentSequence && loopStartTime) {
            const seq = MUSIC_SEQUENCES[currentSequence];
            const beatDuration = 60 / seq.bpm;
            const elapsed = audioCtx.currentTime - loopStartTime;
            const currentBeat = (elapsed / beatDuration) % seq.loopBeats;
            const progress = currentBeat / seq.loopBeats;

            ctx2d.fillStyle = '#00e5ff22';
            ctx2d.fillRect(0, canvas.height - 6, canvas.width * progress, 6);
            ctx2d.fillStyle = '#00e5ff';
            ctx2d.fillRect(canvas.width * progress - 2, canvas.height - 6, 4, 6);
        }

        animFrame = requestAnimationFrame(draw);
    }
    draw();
}

// ============================================================
// BUILD UI
// ============================================================
const btnContainer = document.getElementById('buttons');
for (const [name, seq] of Object.entries(MUSIC_SEQUENCES)) {
    const totalNotes = seq.voices.reduce((sum, v) => sum + v.notes.length, 0);
    const voiceNames = seq.voices.map(v => v.name).join(' + ');
    const loopSec = (seq.loopBeats * 60 / seq.bpm).toFixed(1);

    const btn = document.createElement('button');
    btn.className = 'sequence-btn';
    btn.dataset.name = name;
    btn.innerHTML = `<div class="name">${name}</div><div class="info">${seq.bpm} BPM | ${voiceNames} | ${totalNotes} notes | ${loopSec}s loop</div>`;
    btn.onclick = () => playSequence(name);
    btnContainer.appendChild(btn);
}
</script>
