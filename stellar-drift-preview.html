let ac = null, masterGain = null, scheduled = [], playing = false, startTime = 0, timerInterval = null;

function initAudio() {
    if (ac) return;
    ac = new AudioContext();
    masterGain = ac.createGain();
    masterGain.gain.value = 0.5;
    masterGain.connect(ac.destination);
}

function scheduleVoice(voice, offset) {
    const notes = voice.notes;
    const type = voice.type;
    const sub = voice.sub;
    
    for (const [t0, midi, dur, vel] of notes) {
        const t = offset + t0;
        const freq = 440 * Math.pow(2, (midi - 69) / 12);
        const v = vel / 127;
        const ds = Math.max(dur, 0.05);
        
        // Drum voice
        if (voice.name.toLowerCase().includes('drum')) {
            const osc = ac.createOscillator();
            const g = ac.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(120, t);
            osc.frequency.exponentialRampToValueAtTime(35, t + 0.15);
            g.gain.setValueAtTime(v * 0.5, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
            osc.connect(g); g.connect(masterGain);
            osc.start(t); osc.stop(t + 0.35);
            scheduled.push(osc);
            continue;
        }
        
        const o = ac.createOscillator();
        const g = ac.createGain();
        o.type = 'sine';
        o.frequency.value = freq;
        
        if (type === 'plucked') {
            o.connect(g); g.connect(masterGain);
            const att = 0.005;
            g.gain.setValueAtTime(0, t);
            g.gain.linearRampToValueAtTime(v * 0.35, t + att);
            g.gain.exponentialRampToValueAtTime(0.001, t + ds);

            o2.type = 'sine'; o2.frequency.value = freq * 1.003;
            const fl = ac.createBiquadFilter();
            fl.type = 'lowpass'; fl.frequency.value = 1200; fl.Q.value = 0.5;
            o2.connect(g2); g2.connect(fl); fl.connect(masterGain);
            const att = Math.min(0.4, ds * 0.25);
            g.gain.setValueAtTime(0, t);
            g.gain.linearRampToValueAtTime(v * 0.07, t + att);
            g.gain.setValueAtTime(v * 0.05, t + ds * 0.7);
            g.gain.linearRampToValueAtTime(0, t + ds);
            g2.gain.setValueAtTime(0, t);
            g2.gain.linearRampToValueAtTime(v * 0.025, t + att);
            g2.gain.linearRampToValueAtTime(0, t + ds);
            const fl2 = ac.createBiquadFilter();
            fl2.type = 'lowpass'; fl2.frequency.value = 1200; fl2.Q.value = 0.5;

function togglePlay() {
    initAudio();
    if (playing) { stopAll(); return; }
    playing = true;
    startTime = ac.currentTime;
    const offset = ac.currentTime + 0.1;
    SONG.forEach(v => scheduleVoice(v, offset));
    timerInterval = setInterval(updateTime, 200);
}

function stopAll() {
    playing = false;
    if (timerInterval) clearInterval(timerInterval);
    scheduled.forEach(o => { try { o.stop(); } catch(e) {} });
    scheduled = [];
    document.getElementById('time').textContent = '0:00';
}

function updateTime() {
    if (!playing) return;
    const elapsed = ac.currentTime - startTime;
    const m = Math.floor(elapsed / 60);
    const s = Math.floor(elapsed % 60);
    document.getElementById('time').textContent = m + ':' + String(s).padStart(2, '0');
}
