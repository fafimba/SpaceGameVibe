name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare site
        run: |
          mkdir -p _site/.well-known _site/icons
          cp index.html _site/
          cp .nojekyll _site/ 2>/dev/null || true
          cp -r www _site/www 2>/dev/null || true
          cp visual-catalog.html _site/ 2>/dev/null || true
          cp manifest.json _site/ 2>/dev/null || true
          cp sw.js _site/ 2>/dev/null || true
          cp cosmic-rite-60s.ogg _site/ 2>/dev/null || true
          cp icons/* _site/icons/ 2>/dev/null || true
          cp -r .well-known/* _site/.well-known/ 2>/dev/null || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
