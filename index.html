        // ============================================================
        // CANVAS-BASED UPGRADE OVERLAY
        // ============================================================

        // Easing functions
        function easeOutCubic(t) { return 1 - Math.pow(1 - Math.min(Math.max(t, 0), 1), 3); }
        function easeOutQuart(t) { return 1 - Math.pow(1 - Math.min(Math.max(t, 0), 1), 4); }

        // Show the upgrade selection overlay (canvas-based)
        function showUpgradePanel() {
            // Don't open if player is dead or dying
            if (!player || player._dead) return;

            upgradeOptions = generateUpgradeOptions();
            if (upgradeOptions.length === 0) return;

            upgradeSelectionActive = true;
            gameState = 'skilltree';

            // Capture blurred snapshot of game canvas for background
            upgradeOverlay.bgSnapshot = blurCanvas(canvas);

            // Hide game canvas, show overlay canvas on top
            canvas.style.opacity = '0';
            upgradeCanvas.style.display = 'block';

            // Reset joystick state (visibility handled by gameLoop)
            joystickActive = false;
            joystickMagnitude = 0;

            // Calculate card positions — vertical tall cards, capped width like HUD
            const numCards = upgradeOptions.length;
            const padding = 20;
            const cardGap = 14;
            const maxCardsWidth = 640;
            const availW = Math.min(CANVAS_WIDTH - padding * 2, maxCardsWidth);
            const cardW = Math.floor((availW - (numCards - 1) * cardGap) / numCards);
            const cardH = 380;
            const totalW = numCards * cardW + (numCards - 1) * cardGap;
            const startX = CANVAS_WIDTH / 2 - totalW / 2 + cardW / 2;
            const cardY = CANVAS_HEIGHT - 60 - cardH / 2;

            upgradeOverlay.cardPositions = [];
            for (let i = 0; i < numCards; i++) {
                upgradeOverlay.cardPositions.push({
                    x: startX + i * (cardW + cardGap),
                    y: cardY,
                    w: cardW,
                    h: cardH
                });
            }

            upgradeOverlay.active = true;
            upgradeOverlay.startTime = performance.now();
            upgradeOverlay.animTime = 0;
            upgradeOverlay.animDone = false;

        }

        // Render the upgrade overlay on the overlay canvas (uCtx)
        function renderUpgradeOverlay() {
            if (!upgradeOverlay.active) return;

            const t = upgradeOverlay.animTime;
            const cx = CANVAS_WIDTH / 2;

            // Draw blurred game snapshot as background
            uCtx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            if (upgradeOverlay.bgSnapshot) {
                uCtx.drawImage(upgradeOverlay.bgSnapshot, 0, 0);
            }

            // --- Ship: real position from game world ---
            const shipScreen = player ? worldToScreen(player.x, player.y) : { x: cx, y: CANVAS_HEIGHT / 3 };
            const shipX = shipScreen.x;
            const shipY = shipScreen.y;

            // --- Phase 2: Redraw player ship sharp on overlay ---
            const overlayAlpha = easeOutCubic(Math.min(t / 0.4, 1));
            if (overlayAlpha > 0.1 && player) {
                const shipAlpha = easeOutCubic(Math.min((t - 0.05) / 0.3, 1));

                // Subtle ring around ship
                uCtx.save();
                uCtx.globalAlpha = 0.1 * shipAlpha;
                uCtx.strokeStyle = COLORS.PLAYER;
                uCtx.lineWidth = 1;
                uCtx.beginPath();
                uCtx.arc(shipX, shipY, 50, 0, Math.PI * 2);
                uCtx.stroke();
                uCtx.restore();

                // Draw ship at real screen position
                uCtx.save();
                uCtx.globalAlpha = shipAlpha;
                uCtx.translate(shipX, shipY);
                uCtx.rotate(player.angle * Math.PI / 180);
                uCtx.translate(-PLAYER_PIVOT_OFFSET, 0);
                uCtx.strokeStyle = COLORS.PLAYER;
                uCtx.lineWidth = 3;
                drawShipPath(uCtx, selectedStartingWeapon);
                uCtx.stroke();
                uCtx.restore();
            }

            // --- Phase 3: "LEVEL UP" header just above ship ---
            const levelUpAlpha = easeOutCubic(Math.min(Math.max(0, t - 0.15) / 0.35, 1));
            const topY = shipY - 180;
            if (levelUpAlpha > 0) {
                uCtx.save();
                // "LEVEL UP" title
                uCtx.font = 'bold 44px "Segoe UI", system-ui, sans-serif';
                uCtx.textAlign = 'center';
                uCtx.textBaseline = 'middle';
                uCtx.fillStyle = COLORS.GOLD;
                uCtx.globalAlpha = levelUpAlpha * 0.3;
                uCtx.fillText('LEVEL UP', cx, topY);
                uCtx.globalAlpha = levelUpAlpha;
                uCtx.fillText('LEVEL UP', cx, topY);
                // Decorative lines
                const textW = uCtx.measureText('LEVEL UP').width / 2 + 20;
                uCtx.strokeStyle = COLORS.GOLD;
                uCtx.globalAlpha = levelUpAlpha * 0.4;
                uCtx.lineWidth = 1;
                uCtx.beginPath();
                uCtx.moveTo(cx - textW - 60, topY);
                uCtx.lineTo(cx - textW, topY);
                uCtx.stroke();
                uCtx.beginPath();
                uCtx.moveTo(cx + textW, topY);
                uCtx.lineTo(cx + textW + 60, topY);
                uCtx.stroke();

                // Subtitle
                uCtx.globalAlpha = levelUpAlpha * 0.5;
                uCtx.font = '18px "Segoe UI", system-ui, sans-serif';
                uCtx.fillStyle = COLORS.HUD_TEXT_SECONDARY;
                uCtx.fillText('Choose an upgrade', cx, topY + 30);

                uCtx.restore();
            }

            // --- Phase 4: Connection lines from ship to cards ---
            const lineStart = 0.25;
            const lineDuration = 0.7;
            const lineDelays = [0, 0.08, 0.16];
            const numCards = upgradeOverlay.cardPositions.length;

            const lineOrigins = [];
            for (let i = 0; i < numCards; i++) {
                const offsetX = (i - (numCards - 1) / 2) * 10;
                lineOrigins.push({ x: shipX + offsetX, y: shipY + 15 });
            }

            for (let i = 0; i < numCards; i++) {
                const lineT = Math.max(0, t - lineStart - lineDelays[i]);
                const lineProgress = Math.min(lineT / lineDuration, 1);
                if (lineProgress <= 0) continue;

                const card = upgradeOverlay.cardPositions[i];

                drawUpgradeConnectionLine(
                    lineOrigins[i].x, lineOrigins[i].y,
                    card.x, card.y - card.h / 2,
                    easeOutCubic(lineProgress),
                    COLORS.PLAYER, t
                );
            }

            // --- Phase 5: Weapon inventory bar ---
            const invStart = lineStart + lineDuration * 0.5;
            const invAlpha = easeOutQuart(Math.min(Math.max(0, t - invStart) / 0.4, 1));
            const invY = 150;
            if (invAlpha > 0) {
                renderWeaponInventoryBar(cx, invY, invAlpha);
            }

            // --- Phase 6: Cards fade-in ---
            const cardStart = lineStart + lineDuration * 0.55;
            const cardDelays = [0, 0.1, 0.2];

            for (let i = 0; i < numCards; i++) {
                const cardT = Math.max(0, t - cardStart - (cardDelays[i] || 0));
                const cardAlpha = easeOutQuart(Math.min(cardT / 0.4, 1));
                if (cardAlpha <= 0) continue;

                const slideOffset = (1 - cardAlpha) * 20;
                const card = upgradeOverlay.cardPositions[i];
                const option = upgradeOptions[i];

                renderUpgradeCard(
                    card.x, card.y + slideOffset,
                    card.w, card.h,
                    option, cardAlpha, i
                );
            }

            if (t >= 1.0) upgradeOverlay.animDone = true;
        }

        // Draw a connection line from ship to card top
        function drawUpgradeConnectionLine(fromX, fromY, toX, toY, progress, color, animTime) {
            if (progress <= 0) return;

            // Path: down from ship → horizontal to card X → down to card
            const midY = fromY + (toY - fromY) * 0.35;
            const points = [
                { x: fromX, y: fromY },
                { x: fromX, y: midY },
                { x: toX, y: midY },
                { x: toX, y: toY }
            ];

            // Calculate segment lengths
            let totalLen = 0;
            const segLens = [];
            for (let i = 1; i < points.length; i++) {
                const dx = points[i].x - points[i - 1].x;
                const dy = points[i].y - points[i - 1].y;
                const len = Math.sqrt(dx * dx + dy * dy);
                segLens.push(len);
                totalLen += len;
            }

            const drawLen = totalLen * progress;

            // Draw glow line
            uCtx.save();
            uCtx.strokeStyle = color;
            uCtx.globalAlpha = 0.12;
            uCtx.lineWidth = 8;
            uCtx.lineCap = 'round';
            uCtx.lineJoin = 'round';
            drawUpgradePartialPath(points, segLens, drawLen);
            uCtx.stroke();

            // Draw main thin line
            uCtx.strokeStyle = color;
            uCtx.globalAlpha = 0.8;
            uCtx.lineWidth = 1.8;
            drawUpgradePartialPath(points, segLens, drawLen);
            uCtx.stroke();

            // Pulsing dot at tip
            if (progress > 0.05 && progress < 1) {
                const tip = getUpgradePathPoint(points, segLens, drawLen);
                const pulse = 0.6 + 0.4 * Math.sin(animTime * 6);
                uCtx.beginPath();
                uCtx.arc(tip.x, tip.y, 4 * pulse, 0, Math.PI * 2);
                uCtx.fillStyle = color;
                uCtx.globalAlpha = 0.9;
                uCtx.fill();
            }

            // Small dot at origin
            uCtx.beginPath();
            uCtx.arc(fromX, fromY, 3, 0, Math.PI * 2);
            uCtx.fillStyle = color;
            uCtx.globalAlpha = 0.7;
            uCtx.fill();

            // Dot at card connection point
            if (progress >= 0.95) {
                uCtx.beginPath();
                uCtx.arc(toX, toY, 3, 0, Math.PI * 2);
                uCtx.fillStyle = color;
                uCtx.globalAlpha = 0.8;
                uCtx.fill();
            }

            uCtx.restore();
        }

        function drawUpgradePartialPath(points, segLens, drawLen) {
            uCtx.beginPath();
            uCtx.moveTo(points[0].x, points[0].y);
            let remaining = drawLen;
            for (let i = 0; i < segLens.length; i++) {
                if (remaining <= 0) break;
                if (remaining >= segLens[i]) {
                    uCtx.lineTo(points[i + 1].x, points[i + 1].y);
                    remaining -= segLens[i];
                } else {
                    const frac = remaining / segLens[i];
                    uCtx.lineTo(
                        points[i].x + (points[i + 1].x - points[i].x) * frac,
                        points[i].y + (points[i + 1].y - points[i].y) * frac
                    );
                    remaining = 0;
                }
            }
        }

        function getUpgradePathPoint(points, segLens, drawLen) {
            let remaining = drawLen;
            for (let i = 0; i < segLens.length; i++) {
                if (remaining <= segLens[i] || i === segLens.length - 1) {
                    const frac = Math.min(remaining / segLens[i], 1);
                    return {
                        x: points[i].x + (points[i + 1].x - points[i].x) * frac,
                        y: points[i].y + (points[i + 1].y - points[i].y) * frac
                    };
                }
                remaining -= segLens[i];
            }
            return points[points.length - 1];
        }

        // Render weapon inventory bar: ship slot on top (bigger), 3 weapon slots below
        function renderWeaponInventoryBar(cx, y, alpha) {
            uCtx.save();
            uCtx.globalAlpha = alpha;

            // Horizontal single row: all 4 weapon slots side by side
            const slotSize = 80;
            const slotGap = 16;
            const numSlots = MAX_ACTIVE_WEAPONS; // 4
            const totalW = numSlots * slotSize + (numSlots - 1) * slotGap;
            const startX = cx - totalW / 2;
            const slotY = y - slotSize / 2;

            for (let i = 0; i < numSlots; i++) {
                const sx = startX + i * (slotSize + slotGap);
                const weaponId = activeWeapons[i];
                const slotCx = sx + slotSize / 2;
                const slotCy = slotY + slotSize / 2;

                if (weaponId && WEAPONS[weaponId]) {
                    const weapon = WEAPONS[weaponId];
                    const lvl = upgradeLevels[weaponId] || 0;
                    const isShip = (i === 0);

                    // Slot border
                    uCtx.strokeStyle = weapon.color;
                    uCtx.lineWidth = 2;
                    uCtx.beginPath();
                    uCtx.roundRect(sx, slotY, slotSize, slotSize, 8);
                    uCtx.stroke();

                    // Icon (ship or weapon)
                    if (isShip) {
                        drawShipUpgradeIcon(uCtx, selectedStartingWeapon, slotCx, slotCy, 0.75, weapon.color);
                    } else {
                        uCtx.save();
                        uCtx.translate(slotCx, slotCy);
                        uCtx.scale(1.8, 1.8);
                        drawSkillIcon(uCtx, weapon.icon, 0, 0, weapon.color);
                        uCtx.restore();
                    }

                    // Level text below slot
                    const lvlText = lvl >= 10 ? 'MAX' : 'Lv.' + (lvl + 1);
                    const lvlColor = lvl >= 10 ? COLORS.GOLD : weapon.color;
                    uCtx.font = 'bold 13px "Segoe UI", system-ui, sans-serif';
                    uCtx.textAlign = 'center';
                    uCtx.textBaseline = 'top';
                    uCtx.fillStyle = lvlColor;
                    uCtx.fillText(lvlText, slotCx, slotY + slotSize + 4);
                } else {
                    // Empty slot
                    uCtx.strokeStyle = 'rgba(100, 100, 140, 0.25)';
                    uCtx.lineWidth = 1.5;
                    uCtx.setLineDash([5, 5]);
                    uCtx.beginPath();
                    uCtx.roundRect(sx, slotY, slotSize, slotSize, 8);
                    uCtx.stroke();
                    uCtx.setLineDash([]);

                    uCtx.fillStyle = 'rgba(100, 100, 140, 0.3)';
                    uCtx.font = '20px "Segoe UI", system-ui, sans-serif';
                    uCtx.textAlign = 'center';
                    uCtx.textBaseline = 'middle';
                    uCtx.fillText('+', slotCx, slotCy);
                }
            }

            uCtx.restore();
        }

        // Render a single upgrade card on canvas (vertical layout)
        function renderUpgradeCard(cx, cy, w, h, option, alpha, index) {
            if (alpha <= 0) return;

            const halfW = w / 2;
            const halfH = h / 2;
            const color = option.color || COLORS.PLAYER;
            const borderColor = option.isEvolution ? COLORS.GOLD : color;
            const nameColor = option.isEvolution ? COLORS.GOLD : color;

            uCtx.save();
            uCtx.globalAlpha = alpha;

            // Card border
            uCtx.strokeStyle = COLORS.PLAYER;
            uCtx.lineWidth = 1.5;
            uCtx.beginPath();
            uCtx.roundRect(cx - halfW, cy - halfH, w, h, 10);
            uCtx.stroke();

            const innerPad = 16;
            let curY = cy - halfH + innerPad;

            // Badge at top — only for evolution and bonus
            const badgeText = option.isEvolution ? 'EVOLUTION'
                : option.type === 'bonus' ? 'BONUS'
                : null;
            if (badgeText) {
                uCtx.font = 'bold 16px "Segoe UI", system-ui, sans-serif';
                uCtx.textAlign = 'center';
                uCtx.textBaseline = 'top';
                uCtx.fillStyle = COLORS.GOLD;
                uCtx.fillText(badgeText, cx, curY);
            }
            curY += 24;

            // Icon centered (rounded rectangle)
            const isStartingWeaponUpgrade = option.type === 'upgrade' && !option.isEvolution && WEAPONS[option.id]?.isStartingWeapon;
            const iconSize = 84;
            const iconBoxX = cx - iconSize / 2;
            const iconBoxY = curY + 4;
            const iconCenterY = iconBoxY + iconSize / 2;
            uCtx.beginPath();
            uCtx.roundRect(iconBoxX, iconBoxY, iconSize, iconSize, 12);
            uCtx.fillStyle = color + '10';
            uCtx.fill();
            uCtx.strokeStyle = borderColor;
            uCtx.lineWidth = 1.5;
            uCtx.stroke();

            if (isStartingWeaponUpgrade) {
                drawShipUpgradeIcon(uCtx, selectedStartingWeapon, cx, iconCenterY + 2, 0.85, color);
            } else {
                uCtx.save();
                uCtx.translate(cx, iconCenterY);
                uCtx.scale(2.0, 2.0);
                drawSkillIcon(uCtx, option.icon, 0, 0, color);
                uCtx.restore();
            }
            curY = iconBoxY + iconSize + 12;

            // Weapon name (centered)
            uCtx.textAlign = 'center';
            uCtx.textBaseline = 'top';
            uCtx.fillStyle = nameColor;
            let displayName = isStartingWeaponUpgrade ? 'Upgrade Ship' : option.name;
            const maxNameW = w - innerPad * 2;
            // Try 30px first, shrink if needed to fit
            let nameFontSize = 30;
            uCtx.font = 'bold ' + nameFontSize + 'px "Segoe UI", system-ui, sans-serif';
            while (uCtx.measureText(displayName).width > maxNameW && nameFontSize > 18) {
                nameFontSize -= 2;
                uCtx.font = 'bold ' + nameFontSize + 'px "Segoe UI", system-ui, sans-serif';
            }
            uCtx.fillText(displayName, cx, curY);
            curY += nameFontSize + 8;

            // Thin accent line
            const lineW = Math.min(w * 0.6, 120);
            uCtx.strokeStyle = color + '33';
            uCtx.lineWidth = 1;
            uCtx.beginPath();
            uCtx.moveTo(cx - lineW / 2, curY);
            uCtx.lineTo(cx + lineW / 2, curY);
            uCtx.stroke();
            curY += 10;

            // --- Bottom section: laid out from bottom upward ---
            const btnText = option.isEvolution ? 'EVOLVE'
                : option.type === 'weapon_activation' ? 'INSTALL'
                : option.type === 'upgrade' ? 'UPGRADE'
                : 'APPLY';
            const btnColor = option.isEvolution ? COLORS.GOLD : color;
            const btnW = w - innerPad * 2;
            const btnH = 44;
            const btnX = cx - btnW / 2;
            const btnY = cy + halfH - innerPad - btnH;

            // Action button
            uCtx.beginPath();
            uCtx.roundRect(btnX, btnY, btnW, btnH, 8);
            const isInstall = option.type === 'weapon_activation';
            const btnLabel = !isMobile() ? btnText + '  [' + (index + 1) + ']' : btnText;
            if (isInstall) {
                // Inverted: filled background, dark text
                uCtx.fillStyle = btnColor;
                uCtx.fill();
                uCtx.font = 'bold 20px "Segoe UI", system-ui, sans-serif';
                uCtx.textAlign = 'center';
                uCtx.textBaseline = 'middle';
                uCtx.fillStyle = '#0a0e1a';
                uCtx.fillText(btnLabel, cx, btnY + btnH / 2);
            } else {
                // Outline style
                uCtx.fillStyle = btnColor + '20';
                uCtx.fill();
                uCtx.strokeStyle = btnColor;
                uCtx.lineWidth = 1.5;
                uCtx.stroke();
                uCtx.font = 'bold 20px "Segoe UI", system-ui, sans-serif';
                uCtx.textAlign = 'center';
                uCtx.textBaseline = 'middle';
                uCtx.fillStyle = btnColor;
                uCtx.fillText(btnLabel, cx, btnY + btnH / 2);
            }

            // Level progress bar above button
            let bottomLimit = btnY - 8; // space above button where description must stop
            if (option.type === 'weapon_activation' || option.type === 'upgrade') {
                // filledSegs = how many progress bar segments to fill
                // displayLv = the level shown to the user (activation counts as level 1)
                // weapon_activation: 0 filled, display "Lv. 1" (installing gives level 1)
                // upgrade: option.level = upgradeLevels + 1 (target level)
                //   upgradeLevels = option.level - 1, displayLv = upgradeLevels + 1 (activation) = option.level
                const filledSegs = option.type === 'weapon_activation' ? 0 : option.level;
                const displayLv = option.type === 'weapon_activation' ? 1 : (option.level + 1);
                const barPad = innerPad;
                const barW = w - barPad * 2;
                const segGap = 3;
                const numSegs = 10;
                const segW = (barW - (numSegs - 1) * segGap) / numSegs;
                const segH = 14;
                const barY = btnY - 12 - segH;
                const barX = cx - barW / 2;

                // "Lv. X" label above bar
                uCtx.font = 'bold 14px "Segoe UI", system-ui, sans-serif';
                uCtx.textAlign = 'center';
                uCtx.textBaseline = 'bottom';
                uCtx.fillStyle = COLORS.GOLD;
                uCtx.fillText('Lv. ' + displayLv, cx, barY - 4);

                for (let d = 0; d < numSegs; d++) {
                    const sx = barX + d * (segW + segGap);
                    uCtx.beginPath();
                    uCtx.roundRect(sx, barY, segW, segH, 3);

                    if (option.isEvolution && d === 9) {
                        uCtx.fillStyle = COLORS.GOLD;
                        uCtx.fill();
                        uCtx.strokeStyle = COLORS.GOLD;
                        uCtx.lineWidth = 0.5;
                        uCtx.stroke();
                    } else if (d < filledSegs) {
                        uCtx.fillStyle = COLORS.GOLD;
                        uCtx.globalAlpha = alpha * 0.8;
                        uCtx.fill();
                        uCtx.globalAlpha = alpha;
                    } else if (d === filledSegs) {
                        uCtx.fillStyle = COLORS.GOLD;
                        uCtx.fill();
                        uCtx.strokeStyle = COLORS.GOLD;
                        uCtx.lineWidth = 1.5;
                        uCtx.stroke();
                    } else {
                        uCtx.fillStyle = 'rgba(100, 100, 140, 0.12)';
                        uCtx.fill();
                        uCtx.strokeStyle = 'rgba(100, 100, 140, 0.25)';
                        uCtx.lineWidth = 0.5;
                        uCtx.stroke();
                    }
                }
                bottomLimit = barY - 22; // account for "Lv. X" label
            }

            // Description (centered, word-wrapped, adaptive font to fit available space)
            uCtx.fillStyle = COLORS.HUD_TEXT_SECONDARY;
            uCtx.textAlign = 'center';
            uCtx.textBaseline = 'top';
            const descMaxW = w - innerPad * 2 - 4;
            const availDescH = bottomLimit - curY;

            // Try font sizes from 26 down, pick largest that fits
            let descFontSize = 26;
            let descLineH = 32;
            let lines;
            while (descFontSize >= 16) {
                uCtx.font = descFontSize + 'px "Segoe UI", system-ui, sans-serif';
                descLineH = descFontSize + 6;
                lines = [];
                let currentLine = '';
                const words = option.description.split(' ');
                for (const word of words) {
                    const testLine = currentLine ? currentLine + ' ' + word : word;
                    if (uCtx.measureText(testLine).width > descMaxW && currentLine) {
                        lines.push(currentLine);
                        currentLine = word;
                    } else {
                        currentLine = testLine;
                    }
                }
                if (currentLine) lines.push(currentLine);
                if (lines.length * descLineH <= availDescH) break;
                descFontSize -= 2;
            }
            uCtx.font = descFontSize + 'px "Segoe UI", system-ui, sans-serif';
            for (const line of lines) {
                uCtx.fillText(line, cx, curY);
                curY += descLineH;
            }

            uCtx.restore();
        }

        // Handle click/tap on upgrade cards
        function handleUpgradeClick(screenX, screenY) {
            if (!upgradeOverlay.active || !upgradeOverlay.animDone) return;

            for (let i = 0; i < upgradeOverlay.cardPositions.length; i++) {
                const c = upgradeOverlay.cardPositions[i];
                if (screenX > c.x - c.w / 2 && screenX < c.x + c.w / 2 &&
                    screenY > c.y - c.h / 2 && screenY < c.y + c.h / 2) {
                    if (upgradeOptions[i]) {
                        selectUpgrade(upgradeOptions[i]);
                    }
                    return;
                }
            }
        }

        // Select an upgrade option
        function selectUpgrade(option) {
            if (!upgradeSelectionActive) return;
            invalidateStatsCache();

            if (option.type === 'weapon_activation') {
                if (activeWeapons.length >= MAX_ACTIVE_WEAPONS) return;
                activeWeapons.push(option.id);
                if (option.id === 'sentry_turret' && player) {
                    lastTurretX = player.x;
                    lastTurretY = player.y;
                }
            } else if (option.type === 'upgrade') {
                upgradeLevels[option.id] = (upgradeLevels[option.id] || 0) + 1;
            } else if (option.type === 'bonus') {
                if (option.id === 'bonus_crystals') {
                    crystalsThisRun += 50;
                } else if (option.id === 'bonus_heal') {
                    player.hp = playerMaxHP;
                } else if (option.id === 'bonus_damage') {
                    tempDamageMultiplier = 1.5;
                    tempDamageTimer = 30;
                }
            }

            skillPoints--;
            AudioManager.play('upgradeSelect');
            spawnFloatingText(player.x, player.y - 40, option.name + '!', option.color || '#FFFFFF');

            // Celebration particles
            for (let i = 0; i < 15; i++) {
                const angle = Math.random() * Math.PI * 2;
                particles.push({
                    x: player.x, y: player.y,
                    vx: Math.cos(angle) * (80 + Math.random() * 60),
                    vy: Math.sin(angle) * (80 + Math.random() * 60),
                    life: 0.5, maxLife: 0.5,
                    size: 4 + Math.random() * 4,
                    color: option.color || '#FFFFFF',
                    type: 'levelup'
                });
            }

            hideUpgradePanel();

            // Show again if more skill points remain
            if (skillPoints > 0 && !allSkillsUnlocked()) {
                setTimeout(() => showUpgradePanel(), 300);
            }
        }

        // Hide upgrade overlay and resume game
        function hideUpgradePanel() {
            upgradeSelectionActive = false;
            upgradeOverlay.active = false;
            upgradeOverlay.animDone = false;

            // Restore game canvas and hide overlay canvas
            canvas.style.opacity = '1';
            upgradeCanvas.style.display = 'none';
            upgradeOverlay.bgSnapshot = null;

            gameState = 'playing';
        }
        
        // ============================================================
        // WEAPON SYSTEMS
        // ============================================================
        
        function updateWeapons() {
            const stats = getWeaponStats();
            // Orbital shields
            if (activeWeapons.includes('orbital_shield')) {
                updateOrbitals();
            }
            // Plasma Field
            if (activeWeapons.includes('plasma_field')) {
                updateAura();
            }
            // Void Blade
            if (activeWeapons.includes('void_blade')) {
                updateVoidBlade();
            }
            // Warp Snares
            if (activeWeapons.includes('warp_snare')) {
                updateWarpSnares();
            }
            // Fusion Beam
            if (activeWeapons.includes('fusion_beam')) {
                updateFusionBeam();
            }
            // Gravity Mines
            if (activeWeapons.includes('gravity_mines')) {
                updateGravityMines();
            }
            // Sentry Turrets
            if (activeWeapons.includes('sentry_turret')) {
                updateSentryTurrets();
            }
            // Visual effects
            updateLightningEffects();
            updateNovaBeamEffects();
            updateSlashEffects();
            updateRiftZones();
        }

        function updateLightningEffects() {
            for (let i = lightningEffects.length - 1; i >= 0; i--) {
                const effect = lightningEffects[i];
                effect.life -= deltaTime;

                if (effect.life <= 0) {
                    lightningEffects.splice(i, 1);
                }
            }
        }

        function updateNovaBeamEffects() {
            for (let i = novaBeamEffects.length - 1; i >= 0; i--) {
                novaBeamEffects[i].life -= deltaTime;
                if (novaBeamEffects[i].life <= 0) {
                    novaBeamEffects.splice(i, 1);
                }
            }
        }

        // TODO: EVOLUTION - Singularity Core: continuous gravitational field pulling enemies
        function updateOrbitals() {
            const stats = getWeaponStats();
            let orbitalCount = stats.orbCount;
            const orbitalRadius = ORBITAL_RADIUS;
            let orbitalSpeed = ORBITAL_SPEED;

            // Handle orbital count changes with equidistant positioning
            if (orbitals.length !== orbitalCount) {
                const baseAngle = orbitals.length > 0 ? orbitals[0].angle : 0;
                const angleIncrement = Math.PI * 2 / orbitalCount;
                orbitals = [];
                for (let i = 0; i < orbitalCount; i++) {
                    orbitals.push({
                        angle: baseAngle + angleIncrement * i,
                        hitCooldown: 0
                    });
                }
            }

            const orbitalSizeForCollision = ORBITAL_SIZE * stats.orbSizeMulti;

            // Update orbital positions and check collisions
            for (let i = 0; i < orbitals.length; i++) {
                const orb = orbitals[i];
                orb.angle += orbitalSpeed * deltaTime;
                if (!orb.hitEnemies) orb.hitEnemies = {};

                const orbX = player.x + Math.cos(orb.angle) * orbitalRadius;
                const orbY = player.y + Math.sin(orb.angle) * orbitalRadius;

                const nearbyEnemies = spatialGrid.queryRadius(orbX, orbY, orbitalSizeForCollision + 30);
                for (const e of nearbyEnemies) {
                    if (orb.hitEnemies[e.id] && orb.hitEnemies[e.id] > 0) {
                        orb.hitEnemies[e.id] -= deltaTime;
                        continue;
                    }

                    const config = ENEMY_TYPES[e.type];
                    const dx = orbX - e.x;
                    const dy = orbY - e.y;
                    const distSq = dx * dx + dy * dy;
                    const collisionDist = config.radius + orbitalSizeForCollision;

                    if (distSq < collisionDist * collisionDist) {
                        e.hp -= stats.orbDamage;
                        AudioManager.play('orbitalHit', e.x, e.y);
                        orb.hitEnemies[e.id] = 0.15;

                        spawnFloatingText(e.x, e.y - config.radius, stats.orbDamage.toString(), WEAPONS['orbital_shield'].color);
                        spawnRing(e.x, e.y, config.color);

                        // Knockback
                        if (stats.orbKnockback > 0) {
                            const dist = Math.sqrt(distSq) || 1;
                            const kbForce = stats.orbKnockback * 80;
                            e.vx += (dx / dist) * kbForce;
                            e.vy += (dy / dist) * kbForce;
                        }

                        if (e.hp <= 0) killEnemy(e);
                    }
                }
            }
        }

        function updateAura() {
            const stats = getWeaponStats();
            if (!stats.hasAura || !player) return;

            // Update pulse animation
            auraState.pulseAnimation += deltaTime * 3;

            // Update tick timer
            auraState.tickTimer += deltaTime;

            // Only deal damage on tick intervals
            if (auraState.tickTimer < stats.auraTickRate) return;
            auraState.tickTimer = 0;

            // Find all enemies within aura radius
            const nearbyEnemies = spatialGrid.queryRadius(player.x, player.y, stats.auraRadius);
            const auraColor = WEAPONS['plasma_field'].color;

            // Annihilation: prepare chain tracking
            const hasAnnihilation = stats.hasAnnihilation;
            const processedSet = hasAnnihilation ? new Set() : null;
            const explosionCount = hasAnnihilation ? { count: 0 } : null;
            const annihilationDamage = hasAnnihilation
                ? Math.round(stats.auraDamage * ANNIHILATION_DAMAGE_MULT) : 0;

            for (const e of nearbyEnemies) {
                // Skip enemies already killed by a chain explosion this tick
                if (e.hp <= 0) continue;

                const config = ENEMY_TYPES[e.type];
                const dx = e.x - player.x;
                const dy = e.y - player.y;
                const distSq = dx * dx + dy * dy;
                const effectiveRadius = stats.auraRadius + config.radius;

                if (distSq < effectiveRadius * effectiveRadius) {
                    // Apply damage
                    e.hp -= stats.auraDamage;
                    AudioManager.play('auraHit', e.x, e.y);

                    // Visual feedback
                    spawnFloatingText(e.x, e.y - config.radius, stats.auraDamage.toString(), auraColor);
                    spawnRing(e.x, e.y, auraColor);

                    // Check for death
                    if (e.hp <= 0) {
                        const deadX = e.x;
                        const deadY = e.y;
                        if (hasAnnihilation) processedSet.add(e);
                        killEnemy(e);

                        // Annihilation: chain explosion at death site
                        if (hasAnnihilation) {
                            triggerAnnihilationExplosion(
                                deadX, deadY, annihilationDamage,
                                ANNIHILATION_EXPLOSION_RADIUS,
                                0, processedSet, explosionCount
                            );
                        }
                    }
                }
            }
        }

        function triggerAnnihilationExplosion(x, y, baseDamage, baseRadius, depth, processedSet, explosionCount) {
            if (depth >= ANNIHILATION_MAX_DEPTH || explosionCount.count >= ANNIHILATION_MAX_EXPLOSIONS) return;
            if (depth === 0) AudioManager.play('annihilationPulse');

            const decayFactor = Math.pow(ANNIHILATION_CHAIN_DECAY, depth);
            const explosionRadius = baseRadius * decayFactor;
            const explosionDamage = Math.round(baseDamage * decayFactor);

            if (explosionDamage < 1 || explosionRadius < 20) return;

            explosionCount.count++;
            const auraColor = WEAPONS['plasma_field'].color;

            // Visual: expanding ring
            spawnRing(x, y, auraColor, explosionRadius * 1.2);

            // Visual: shockwave particle
            const shockwave = pools.particle.acquire();
            shockwave.x = x;
            shockwave.y = y;
            shockwave.vx = 0;
            shockwave.vy = 0;
            shockwave.type = 'shockwave';
            shockwave.color = auraColor;
            shockwave.size = 5;
            shockwave.maxSize = explosionRadius;
            shockwave.life = 0.3;
            shockwave.maxLife = 0.3;
            particles.push(shockwave);

            // Damage enemies in blast radius
            const nearby = spatialGrid.queryRadius(x, y, explosionRadius);

            for (const e of nearby) {
                if (processedSet.has(e) || e.hp <= 0) continue;

                const config = ENEMY_TYPES[e.type];
                const dx = e.x - x;
                const dy = e.y - y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const hitRadius = explosionRadius + config.radius;

                if (dist > hitRadius) continue;

                // Distance falloff: 100% center → 50% edge
                const falloff = 1 - (dist / hitRadius) * 0.5;
                const dmg = Math.ceil(explosionDamage * falloff);

                processedSet.add(e);
                e.hp -= dmg;
                spawnFloatingText(e.x, e.y - config.radius, dmg.toString(), auraColor);

                if (e.hp <= 0) {
                    const deadX = e.x;
                    const deadY = e.y;
                    killEnemy(e);
                    // Chain: recurse at death site
                    triggerAnnihilationExplosion(
                        deadX, deadY, baseDamage, baseRadius,
                        depth + 1, processedSet, explosionCount
                    );
                }
            }
        }


        // ============================================================
        // VOID BLADE SYSTEM
        // ============================================================

        function updateVoidBlade() {
            const stats = getWeaponStats();
            if (!stats.hasBlade) return;

            // Update rift timer for evolution
            if (stats.hasDimensionalRift) {
                riftTimer -= deltaTime;
            }

            bladeTimer -= deltaTime;
            if (bladeTimer > 0) return;

            const playerRad = player.angle * Math.PI / 180;

            // Detect enemies within 80% of blast range AND within forward arc
            const detectRadius = stats.bladeRadius * 0.8;
            const halfArc = (stats.bladeArc / 2) * Math.PI / 180;
            const candidates = spatialGrid.queryRadius(player.x, player.y, detectRadius);
            let hasForwardEnemy = false;
            for (const e of candidates) {
                const dx = e.x - player.x;
                const dy = e.y - player.y;
                const angleToEnemy = Math.atan2(dy, dx);
                let angleDiff = angleToEnemy - playerRad;
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                if (Math.abs(angleDiff) <= halfArc) { hasForwardEnemy = true; break; }
            }
            if (!hasForwardEnemy) return;

            bladeTimer = stats.bladeInterval;
            AudioManager.play('voidSlash');

            // Simultaneous fan blast (all slashes fire at once)
            for (let s = 0; s < stats.bladeMultiSlash; s++) {
                const rotOffset = stats.bladeSlashRotation > 0
                    ? (s - (stats.bladeMultiSlash - 1) / 2) * (stats.bladeSlashRotation * Math.PI / 180)
                    : 0;
                const slashAngle = playerRad + rotOffset;

                // Create blast visual from player position (inherits player velocity)
                slashEffects.push({
                    x: player.x, y: player.y,
                    angle: slashAngle,
                    radius: stats.bladeRadius,
                    arc: halfArc,
                    life: 0.22,
                    maxLife: 0.22,
                    color: COLORS.PLAYER,
                    vx: player.vx || 0,
                    vy: player.vy || 0
                });

                // Spawn rift zone on evolution trigger
                if (stats.hasDimensionalRift && riftTimer <= 0 && s === 0) {
                    riftTimer = 6;
                    const riftDist = stats.bladeRadius * 0.6;
                    riftZones.push({
                        x: player.x + Math.cos(slashAngle) * riftDist,
                        y: player.y + Math.sin(slashAngle) * riftDist,
                        angle: slashAngle,
                        radius: stats.bladeRadius * 0.5,
                        arc: halfArc,
                        life: 3.0,
                        maxLife: 3.0,
                        dps: 15,
                        tickTimer: 0,
                        color: COLORS.PLAYER
                    });
                }

                // Instant damage from player position
                performBlastDamage(stats, player.x, player.y, slashAngle, halfArc);
            }
        }

        function performBlastDamage(stats, blastX, blastY, slashAngle, halfArc) {
            const damageRadius = stats.bladeRadius * 0.9;
            const knockbackRadius = stats.bladeRadius * 1.1;
            const nearbyEnemies = spatialGrid.queryRadius(blastX, blastY, knockbackRadius + 30);

            for (const e of nearbyEnemies) {
                const dx = e.x - blastX;
                const dy = e.y - blastY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > knockbackRadius) continue;

                // Arc angle check from blast origin
                const angleToEnemy = Math.atan2(dy, dx);
                let angleDiff = angleToEnemy - slashAngle;
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                if (Math.abs(angleDiff) > halfArc) continue;

                // INNER ZONE: damage + knockback
                if (dist <= damageRadius) {
                    let dmg = stats.bladeDamage;
                    if (stats.bladeFalloff < 1.0) {
                        const distRatio = dist / damageRadius;
                        if (distRatio > 0.6) {
                            dmg = Math.round(dmg * (stats.bladeFalloff + (1 - stats.bladeFalloff) * (1 - (distRatio - 0.6) / 0.4)));
                        }
                    }
                    const vulnMult = e.vulnerability || 0;
                    const totalDmg = Math.round(dmg * (1 + vulnMult));
                    e.hp -= totalDmg;
                    spawnFloatingText(e.x, e.y - 15, totalDmg.toString(), COLORS.PLAYER);
                    spawnRing(e.x, e.y, COLORS.PLAYER);

                    if (stats.bladeVulnerability > 0) {
                        e.vulnerability = stats.bladeVulnerability;
                        e.vulnerabilityTimer = stats.bladeVulnDuration;
                    }
                }

                // BOTH ZONES: knockback (linear falloff in outer zone)
                if (stats.bladeKnockback > 0 && dist > 0) {
                    let pushForce = stats.bladeKnockback;
                    if (dist > damageRadius) {
                        // Outer zone: linear falloff from 100% to 0%
                        const outerProgress = (dist - damageRadius) / (knockbackRadius - damageRadius);
                        pushForce *= (1 - outerProgress);
                    }
                    e.vx += (dx / dist) * pushForce;
                    e.vy += (dy / dist) * pushForce;
                }

                // Kill check (only inner zone gets damage)
                if (dist <= damageRadius && e.hp <= 0) {
                    if (stats.bladeKillShockwave) {
                        const nearby = spatialGrid.queryRadius(e.x, e.y, 80);
                        for (const n of nearby) {
                            if (n !== e && n.hp > 0 && !n.dead) {
                                n.hp -= 20;
                                spawnFloatingText(n.x, n.y - 10, '20', COLORS.PLAYER);
                                if (n.hp <= 0) killEnemy(n);
                            }
                        }
                        spawnRing(e.x, e.y, COLORS.PLAYER, 80);
                    }
                    killEnemy(e);
                }
            }
        }

        function updateRiftZones() {
            for (let i = riftZones.length - 1; i >= 0; i--) {
                const rift = riftZones[i];
                rift.life -= deltaTime;
                if (rift.life <= 0) {
                    fastRemove(riftZones, i);
                    continue;
                }

                // Damage tick
                rift.tickTimer -= deltaTime;
                if (rift.tickTimer <= 0) {
                    rift.tickTimer = 0.5;
                    const nearby = spatialGrid.queryRadius(rift.x, rift.y, rift.radius);
                    for (const e of nearby) {
                        const dx = e.x - rift.x;
                        const dy = e.y - rift.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist > rift.radius) continue;
                        const dmg = Math.round(rift.dps * 0.5);
                        e.hp -= dmg;
                        if (e.hp <= 0) killEnemy(e);
                        // Pull toward center
                        if (dist > 10) {
                            e.vx -= (dx / dist) * 30;
                            e.vy -= (dy / dist) * 30;
                        }
                    }
                }
            }
        }

        function updateSlashEffects() {
            for (let i = slashEffects.length - 1; i >= 0; i--) {
                const s = slashEffects[i];
                s.life -= deltaTime;
                if (s.life <= 0) {
                    fastRemove(slashEffects, i);
                    continue;
                }
                // Move with captured velocity (player momentum at cast time)
                s.x += s.vx * deltaTime;
                s.y += s.vy * deltaTime;
            }
        }

        // ============================================================
        // WARP SNARE SYSTEM
        // ============================================================

        function updateWarpSnares() {
            const stats = getWeaponStats();
            if (!stats.hasSnare) return;

            // Deploy new snares in pairs around the player
            const SNARE_SPAWN_RADIUS = 250;
            snareDeployTimer -= deltaTime;
            if (snareDeployTimer <= 0) {
                snareDeployTimer = stats.snareDeployInterval;

                // Deploy snares at equidistant angles
                const count = stats.snarePerDeploy;
                const angleStep = (Math.PI * 2) / count;
                for (let p = 0; p < count; p++) {
                    const angle = snareDeployAngle + p * angleStep;
                    const s = pools.snare.acquire();
                    s.x = player.x + Math.cos(angle) * SNARE_SPAWN_RADIUS;
                    s.y = player.y + Math.sin(angle) * SNARE_SPAWN_RADIUS;
                    s.life = stats.snareLifetime;
                    s.maxLife = stats.snareLifetime;
                    s.radius = stats.snareRadius;
                    s.dps = stats.snareDPS;
                    s.slow = stats.snareSlow;
                    s.tickTimer = 0;
                    s.tickRate = stats.snareTickRate;
                    s.vulnerability = stats.snareVulnerability;
                    s.rootDuration = stats.snareRootDuration;
                    s.permaSlow = stats.snarePermaSlow;
                    s.killRefresh = stats.snareKillRefresh;
                    s.deathBurst = stats.snareDeathBurst;
                    s.stackSlow = stats.snareStackSlow;
                    snares.push(s);
                }
                // Rotate by one snare diameter (in radians at spawn radius)
                snareDeployAngle += (2 * stats.snareRadius) / SNARE_SPAWN_RADIUS;
            }

            // Temporal Cage evolution — spawn trap hexes around snares
            if (stats.hasTemporalCage) {
                temporalCageTimer -= deltaTime;
                if (temporalCageTimer <= 0 && snares.length > 0) {
                    temporalCageTimer = 3;
                    const MAX_TRAP_HEXES = 30;
                    // Pick a random snare and place trap hexes within its grid
                    const s = snares[Math.floor(Math.random() * snares.length)];
                    const hexSize = s.radius * 0.18;
                    const colStep = hexSize * 1.5;
                    const rowStep = hexSize * 1.732050808;
                    const count = 3 + Math.floor(Math.random() * 3); // 3-5 traps per burst
                    for (let t = 0; t < count && trapHexes.length < MAX_TRAP_HEXES; t++) {
                        // Pick a random hex cell within snare radius
                        const angle = Math.random() * Math.PI * 2;
                        const dist = Math.random() * s.radius * 0.8;
                        const rawX = s.x + Math.cos(angle) * dist;
                        const rawY = s.y + Math.sin(angle) * dist;
                        // Snap to hex grid
                        const ci = Math.round(rawX / colStep);
                        const yOff = (ci & 1) ? rowStep * 0.5 : 0;
                        const ri = Math.round((rawY - yOff) / rowStep);
                        const wx = ci * colStep;
                        const wy = ri * rowStep + yOff;
                        // Don't duplicate positions
                        let dupe = false;
                        for (const th of trapHexes) {
                            if (Math.abs(th.x - wx) < 1 && Math.abs(th.y - wy) < 1) { dupe = true; break; }
                        }
                        if (!dupe) {
                            trapHexes.push({ x: wx, y: wy, size: hexSize, life: 8 });
                        }
                    }
                }
            }

            // Update trap hexes — check enemy collisions, expire
            for (let i = trapHexes.length - 1; i >= 0; i--) {
                const th = trapHexes[i];
                th.life -= deltaTime;
                if (th.life <= 0) {
                    fastRemove(trapHexes, i);
                    continue;
                }
                // Check if any enemy is on this hex
                const nearby = spatialGrid.queryRadius(th.x, th.y, th.size * 1.2);
                let triggered = false;
                for (const e of nearby) {
                    const dx = e.x - th.x;
                    const dy = e.y - th.y;
                    if (dx * dx + dy * dy < th.size * th.size) {
                        e.rootTimer = Math.max(e.rootTimer || 0, 0.5);
                        triggered = true;
                    }
                }
                if (triggered) {
                    spawnRing(th.x, th.y, COLORS.PLAYER, th.size * 2);
                    fastRemove(trapHexes, i);
                }
            }

            // Update snares
            for (let i = snares.length - 1; i >= 0; i--) {
                const s = snares[i];
                s.life -= deltaTime;
                if (s.life <= 0) {
                    pools.snare.release(s);
                    fastRemove(snares, i);
                    continue;
                }

                // Damage tick
                s.tickTimer -= deltaTime;
                if (s.tickTimer <= 0) {
                    s.tickTimer = s.tickRate;
                    const nearby = spatialGrid.queryRadius(s.x, s.y, s.radius);
                    for (const e of nearby) {
                        const dx = e.x - s.x;
                        const dy = e.y - s.y;
                        const distSq = dx * dx + dy * dy;
                        if (distSq > s.radius * s.radius) continue;

                        // DPS damage (per tick)
                        const dmg = Math.round(s.dps * s.tickRate);
                        const vulnMult = e.vulnerability || 0;
                        const totalDmg = Math.round(dmg * (1 + vulnMult));
                        e.hp -= totalDmg;
                        spawnFloatingText(e.x, e.y, totalDmg, COLORS.PLAYER);

                        // Apply slow
                        e.snareSlow = s.slow;
                        e.snareSlowTimer = s.tickRate + 0.1;

                        // Stacking slow from overlapping snares
                        if (s.stackSlow) {
                            e.snareSlow = Math.min(0.60, (e.snareSlow || 0) + s.slow * 0.3);
                        }

                        // Apply vulnerability
                        if (s.vulnerability > 0) {
                            e.vulnerability = Math.max(e.vulnerability || 0, s.vulnerability);
                            e.vulnerabilityTimer = s.tickRate + 0.5;
                        }

                        // Root on entry (cage or spatial distortion lvl 3)
                        if (s.rootDuration > 0 && !e.wasInSnare) {
                            e.rootTimer = s.rootDuration;
                        }
                        e.wasInSnare = true;

                        // Permanent slow
                        if (s.permaSlow > 0) {
                            e.permaSlowAmount = Math.min(0.20, (e.permaSlowAmount || 0) + s.permaSlow * 0.05);
                        }

                        if (e.hp <= 0) {
                            // Kill refresh
                            if (s.killRefresh) {
                                s.life = s.maxLife;
                            }
                            // Death burst
                            if (s.deathBurst) {
                                spawnRing(e.x, e.y, COLORS.PLAYER, 60);
                                const burstNearby = spatialGrid.queryRadius(e.x, e.y, 60);
                                for (const n of burstNearby) {
                                    if (n !== e && n.hp > 0 && !n.dead) {
                                        n.hp -= 15;
                                        if (n.hp <= 0) killEnemy(n);
                                    }
                                }
                            }
                            killEnemy(e);
                        }
                    }
                }
            }
        }

        function detonateMine(mine, index, stats) {
            AudioManager.play('mineExplode', mine.x, mine.y);
            // Deal damage to enemies in explosion radius
            const nearby = spatialGrid.queryRadius(mine.x, mine.y, stats.mineExplosionRadius);
            for (const e of nearby) {
                const dx = e.x - mine.x;
                const dy = e.y - mine.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist <= stats.mineExplosionRadius) {
                    e.hp -= stats.mineDamage;
                    spawnFloatingText(e.x, e.y, stats.mineDamage, COLORS.PLAYER);
                    if (e.hp <= 0) killEnemy(e);
                }
            }

            // Visual explosion
            spawnRing(mine.x, mine.y, COLORS.PLAYER, stats.mineExplosionRadius);
            // Radial particles
            for (let i = 0; i < 8; i++) {
                if (particles.length >= MAX_PARTICLES) break;
                const angle = (i / 8) * Math.PI * 2;
                const speed = 60 + Math.random() * 40;
                const p = pools.particle.acquire();
                p.x = mine.x; p.y = mine.y;
                p.vx = Math.cos(angle) * speed;
                p.vy = Math.sin(angle) * speed;
                p.life = 0.4; p.maxLife = 0.4;
                p.size = 3 + Math.random() * 2;
                p.color = COLORS.PLAYER;
                p.type = 'spark';
                particles.push(p);
            }

            // Radiation field
            if (stats.mineRadiationDPS > 0) {
                radiationFields.push({
                    x: mine.x, y: mine.y,
                    radius: stats.mineExplosionRadius * 0.7,
                    dps: stats.mineRadiationDPS,
                    duration: stats.mineRadiationDuration,
                    timer: stats.mineRadiationDuration,
                    tickTimer: 0,
                    slow: stats.mineExitSlow
                });
            }

            // Chain detonation
            if (stats.mineChainDetonate > 0) {
                for (const m of mines) {
                    if (m === mine || m.detonating) continue;
                    const cdx = m.x - mine.x;
                    const cdy = m.y - mine.y;
                    if (Math.sqrt(cdx * cdx + cdy * cdy) <= stats.mineChainDetonate) {
                        m.detonating = true;
                        m.detonateDelay = 0.15;
                    }
                }
            }

            // Release mine
            pools.mine.release(mine);
            mines.splice(index, 1);
        }

        function updateGravityMines() {
            const stats = getWeaponStats();
            if (!stats.hasMines || !player) return;

            // Auto-deploy mines — speed-dependent trail spawning
            const playerSpeed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
            const effectiveMaxSpeed = MAX_SPEED * permSpeedMulti;
            const speedRatio = Math.min(playerSpeed / effectiveMaxSpeed, 1);

            if (speedRatio > 0.01) {
                const effectiveInterval = 0.4 / speedRatio;
                mineDeployTimer += deltaTime;
                if (mineDeployTimer >= effectiveInterval) {
                    mineDeployTimer = 0;
                    // If at max count, remove oldest mine
                    if (mines.length >= stats.mineMaxCount) {
                        pools.mine.release(mines[0]);
                        mines.splice(0, 1);
                    }
                    // Spawn behind player: 100px back, random ±30° cone
                    const behindRad = (player.angle + 180) * Math.PI / 180;
                    const randOffset = (Math.random() - 0.5) * (60 * Math.PI / 180); // ±30°
                    const spawnAngle = behindRad + randOffset;
                    const m = pools.mine.acquire();
                    m.x = player.x + Math.cos(spawnAngle) * 100;
                    m.y = player.y + Math.sin(spawnAngle) * 100;
                    m.life = stats.mineLifetime;
                    m.maxLife = stats.mineLifetime;
                    m.armed = false;
                    m.armTimer = stats.mineArmingDelay;
                    m.pulsePhase = 0;
                    m.detonating = false;
                    m.detonateDelay = 0;
                    m.isBlackHole = false;
                    m.blackHoleTimer = 0;

                    // Black Hole evolution: every 12s, a mine becomes a black hole
                    if (stats.hasBlackHole) {
                        blackHoleCooldown -= effectiveInterval;
                        if (blackHoleCooldown <= 0) {
                            m.isBlackHole = true;
                            blackHoleCooldown = 12;
                        }
                    }

                    mines.push(m);
                }
            } else {
                // Not moving — don't spawn, but keep timer ready
                mineDeployTimer = 0;
            }

            // Update each mine (reverse iterate for safe removal)
            for (let i = mines.length - 1; i >= 0; i--) {
                const mine = mines[i];
                mine.life -= deltaTime;
                mine.pulsePhase += deltaTime * 4;

                // Arming timer
                if (mine.armTimer > 0) {
                    mine.armTimer -= deltaTime;
                    if (mine.armTimer <= 0) {
                        mine.armed = true;
                        mine.armTimer = 0;
                    }
                }

                // Chain detonation delay
                if (mine.detonating) {
                    mine.detonateDelay -= deltaTime;
                    if (mine.detonateDelay <= 0) {
                        detonateMine(mine, i, stats);
                        continue;
                    }
                }

                // Gravity field (always active, even before armed)
                const gravRadius = mine.isBlackHole ? 500 : stats.mineGravityRadius;
                const gravForce = mine.isBlackHole ? 300 : stats.mineGravityForce;
                const nearbyEnemies = spatialGrid.queryRadius(mine.x, mine.y, gravRadius);
                for (const e of nearbyEnemies) {
                    const dx = mine.x - e.x;
                    const dy = mine.y - e.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > 5) {
                        const nx = dx / dist;
                        const ny = dy / dist;
                        // Proximity factor: stronger pull when closer (1.0 at center, 0.3 at edge)
                        const proxFactor = 0.3 + 0.7 * (1 - dist / gravRadius);
                        // Dampen enemy steering velocity toward mine
                        const dampStr = proxFactor * 0.6;
                        e.vx *= (1 - dampStr * deltaTime * 3);
                        e.vy *= (1 - dampStr * deltaTime * 3);
                        e.vx += nx * gravForce * proxFactor * deltaTime;
                        e.vy += ny * gravForce * proxFactor * deltaTime;

                        // Event horizon: irresistible pull
                        if (stats.mineEventHorizon > 0 && dist < stats.mineEventHorizon) {
                            e.vx += nx * 500 * deltaTime;
                            e.vy += ny * 500 * deltaTime;
                        }

                        // Black hole instant kill at center
                        if (mine.isBlackHole && mine.armed && dist < 30) {
                            e.hp = 0;
                            killEnemy(e);
                        }
                    }
                }

                // Detonation check
                if (mine.armed && !mine.detonating) {
                    // Check for enemy contact
                    let shouldDetonate = false;
                    const contactRadius = stats.mineExplosionRadius * 0.5;
                    for (const e of nearbyEnemies) {
                        const dx = e.x - mine.x;
                        const dy = e.y - mine.y;
                        if (dx * dx + dy * dy <= contactRadius * contactRadius) {
                            shouldDetonate = true;
                            break;
                        }
                    }
                    if (shouldDetonate) {
                        detonateMine(mine, i, stats);
                        continue;
                    }
                }

                // Timeout detonation
                if (mine.life <= 0) {
                    detonateMine(mine, i, stats);
                    continue;
                }
            }

            // Update radiation fields
            for (let i = radiationFields.length - 1; i >= 0; i--) {
                const field = radiationFields[i];
                field.timer -= deltaTime;
                field.tickTimer += deltaTime;
                if (field.tickTimer >= 0.5) {
                    field.tickTimer = 0;
                    const nearby = spatialGrid.queryRadius(field.x, field.y, field.radius);
                    for (const e of nearby) {
                        const dx = e.x - field.x;
                        const dy = e.y - field.y;
                        if (dx * dx + dy * dy <= field.radius * field.radius) {
                            const dmg = Math.round(field.dps * 0.5);
                            e.hp -= dmg;
                            spawnFloatingText(e.x, e.y, dmg, COLORS.PLAYER);
                            if (field.slow > 0) {
                                e.vx *= (1 - field.slow);
                                e.vy *= (1 - field.slow);
                            }
                            if (e.hp <= 0) killEnemy(e);
                        }
                    }
                }
                if (field.timer <= 0) {
                    fastRemove(radiationFields, i);
                }
            }
        }

        // ============================================================
        // SENTRY TURRET SYSTEM
        // ============================================================

        function updateSentryTurrets() {
            const stats = getWeaponStats();
            if (!stats.hasTurrets || !player) return;

            // Distance-based deployment: deploy when player moves far enough from last turret
            const ddx = player.x - lastTurretX;
            const ddy = player.y - lastTurretY;
            if (ddx * ddx + ddy * ddy >= stats.turretDeployDistance * stats.turretDeployDistance) {
                // Deploy new turret at player position (lifetime handles expiry, no max cap)
                const t = pools.turret.acquire();
                t.x = player.x;
                t.y = player.y;
                t.life = stats.turretLifetime;
                t.maxLife = stats.turretLifetime;
                t.fireTimer = 0;
                t.angle = player.angle * Math.PI / 180;
                t.shotCount = 0;
                turrets.push(t);
                spawnRing(player.x, player.y, COLORS.PLAYER, 30);
                lastTurretX = player.x;
                lastTurretY = player.y;
            }

            // Update each turret (reverse iterate for safe removal)
            for (let i = turrets.length - 1; i >= 0; i--) {
                const t = turrets[i];

                // Lifetime expiry
                t.life -= deltaTime;
                if (t.life <= 0) {
                    spawnRing(t.x, t.y, COLORS.PLAYER, 20);
                    pools.turret.release(t);
                    turrets.splice(i, 1);
                    continue;
                }

                // Find target enemy
                const nearbyEnemies = spatialGrid.queryRadius(t.x, t.y, stats.turretRange);
                let closestEnemy = null;
                let closestDist = Infinity;
                for (const e of nearbyEnemies) {
                    const dx = e.x - t.x;
                    const dy = e.y - t.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < closestDist && dist <= stats.turretRange) {
                        closestDist = dist;
                        closestEnemy = e;
                    }
                }
                t.targetEnemy = closestEnemy;

                // Rotate towards target
                if (closestEnemy) {
                    const targetAngle = Math.atan2(closestEnemy.y - t.y, closestEnemy.x - t.x);
                    let angleDiff = targetAngle - t.angle;
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                    const turnRate = Math.PI * 4 * deltaTime; // 720°/sec — fast tracking for machine gun
                    if (Math.abs(angleDiff) < turnRate) {
                        t.angle = targetAngle;
                    } else {
                        t.angle += Math.sign(angleDiff) * turnRate;
                    }
                }

                // Fire
                t.fireTimer -= deltaTime;
                if (t.fireTimer <= 0 && closestEnemy) {
                    let fireInterval = stats.turretFireRate;

                    // Combat Station fire rate bonus
                    if (stats.hasCombatStation) {
                        let nearbyTurrets = 0;
                        for (const other of turrets) {
                            if (other === t) continue;
                            const tdx = other.x - t.x;
                            const tdy = other.y - t.y;
                            if (tdx * tdx + tdy * tdy < 500 * 500) nearbyTurrets++;
                        }
                        fireInterval = stats.turretFireRate / (1 + nearbyTurrets * 0.30);
                    }

                    t.fireTimer = fireInterval;
                    t.shotCount++;
                    AudioManager.play('turretFire', t.x, t.y);

                    const angleToTarget = Math.atan2(closestEnemy.y - t.y, closestEnemy.x - t.x);
                    const spread = (Math.random() - 0.5) * 0.12; // ±3.4° machine gun spread
                    const fireAngle = angleToTarget + spread;

                    // Decide: mini-rocket or normal bullet
                    if (stats.turretRocketEvery > 0 && t.shotCount % stats.turretRocketEvery === 0) {
                        // Fire mini-rocket
                        const rocket = pools.bullet.acquire();
                        rocket.x = t.x;
                        rocket.y = t.y;
                        rocket.vx = Math.cos(fireAngle) * 800;
                        rocket.vy = Math.sin(fireAngle) * 800;
                        rocket.life = stats.turretRange / 800 + 0.2;
                        rocket.damage = stats.turretRocketDamage;
                        rocket.type = 'turret_rocket';
                        rocket.color = COLORS.PLAYER;
                        rocket.piercing = false;
                        rocket.pierceCount = 0;
                        rocket.hitEnemies = null;
                        rocket.turnRate = 0;
                        rocket.ricochetCount = 0;
                        rocket.critChance = 0;
                        rocket.explosionRadius = stats.turretRocketRadius;
                        rocket.explosionDamage = stats.turretRocketDamage;
                        bullets.push(rocket);
                    } else {
                        // Fire normal turret bullet
                        const bullet = pools.bullet.acquire();
                        bullet.x = t.x;
                        bullet.y = t.y;
                        bullet.vx = Math.cos(fireAngle) * stats.turretBulletSpeed;
                        bullet.vy = Math.sin(fireAngle) * stats.turretBulletSpeed;
                        bullet.life = stats.turretRange / stats.turretBulletSpeed + 0.1;
                        bullet.damage = stats.turretDamage;
                        bullet.type = 'turret';
                        bullet.color = COLORS.PLAYER;
                        bullet.piercing = stats.turretPierce > 0;
                        bullet.pierceCount = stats.turretPierce;
                        bullet.hitEnemies = stats.turretPierce > 0 ? new Set() : null;
                        bullet.turnRate = 0;
                        bullet.ricochetCount = 0;
                        bullet.critChance = 0;
                        bullets.push(bullet);
                    }
                }

                // Slow aura (Fortress level 3)
                if (stats.turretSlow > 0) {
                    for (const e of nearbyEnemies) {
                        const slowFactor = 1 - stats.turretSlow * deltaTime;
                        e.vx *= slowFactor;
                        e.vy *= slowFactor;
                    }
                }
            }

            // Combat Station evolution: laser beams between turrets
            if (stats.hasCombatStation && turrets.length >= 2) {
                combatStationDmgTimer += deltaTime;
                const showText = combatStationDmgTimer >= 0.5;
                if (showText) combatStationDmgTimer = 0;

                for (let a = 0; a < turrets.length - 1; a++) {
                    for (let b = a + 1; b < turrets.length; b++) {
                        const tA = turrets[a];
                        const tB = turrets[b];
                        const dx = tB.x - tA.x;
                        const dy = tB.y - tA.y;
                        const distSq = dx * dx + dy * dy;
                        if (distSq > 500 * 500) continue;

                        const dist = Math.sqrt(distSq);
                        // Check enemies intersecting the line between turrets
                        const midX = (tA.x + tB.x) / 2;
                        const midY = (tA.y + tB.y) / 2;
                        const searchRadius = dist / 2 + 30;
                        const nearbyForBeam = spatialGrid.queryRadius(midX, midY, searchRadius);

                        for (const e of nearbyForBeam) {
                            // Point-to-line distance
                            const ex = e.x - tA.x;
                            const ey = e.y - tA.y;
                            const t_proj = Math.max(0, Math.min(1, (ex * dx + ey * dy) / distSq));
                            const projX = tA.x + t_proj * dx;
                            const projY = tA.y + t_proj * dy;
                            const hitDx = e.x - projX;
                            const hitDy = e.y - projY;
                            const hitDist = Math.sqrt(hitDx * hitDx + hitDy * hitDy);
                            const config = ENEMY_TYPES[e.type];

                            if (hitDist < config.radius + 8) {
                                const dmg = 12 * deltaTime;
                                e.hp -= dmg;
                                if (showText) {
                                    spawnFloatingText(e.x, e.y - config.radius, Math.round(12 * 0.5).toString(), COLORS.PLAYER);
                                }
                                if (e.hp <= 0) killEnemy(e);
                            }
                        }
                    }
                }
            }
        }

        // ============================================================
        // FUSION BEAM SYSTEM
        // ============================================================

        function updateFusionBeam() {
            const stats = getWeaponStats();
            if (!stats.hasFusionBeam || !player) return;

            // Find N closest enemies within range
            const nearby = spatialGrid.queryRadius(player.x, player.y, stats.beamRange);
            const rangeSq = stats.beamRange * stats.beamRange;
            const candidates = [];
            for (const e of nearby) {
                const dx = e.x - player.x;
                const dy = e.y - player.y;
                const distSq = dx * dx + dy * dy;
                if (distSq <= rangeSq) {
                    candidates.push({ enemy: e, distSq });
                }
            }
            candidates.sort((a, b) => a.distSq - b.distSq);
            const currentTargets = candidates.slice(0, stats.beamTargets);

            // Looping beam sound: start when targets exist, stop when none
            if (currentTargets.length > 0) {
                AudioManager.startLoop('fusionBeamLoop');
            } else {
                AudioManager.stopLoop('fusionBeamLoop');
            }

            // Build new targets list, preserving ramp for existing targets
            const newTargets = [];
            for (const ct of currentTargets) {
                const existing = beamState.targets.find(t => t.enemy === ct.enemy);
                if (existing) {
                    existing.rampCurrent = Math.min(existing.rampCurrent + stats.beamRampRate * deltaTime, stats.beamRampMax);
                    newTargets.push(existing);
                } else {
                    newTargets.push({ enemy: ct.enemy, rampCurrent: 0, tickTimer: 0 });
                }
            }

            // Disconnected targets: apply burn if applicable
            for (const old of beamState.targets) {
                if (!newTargets.find(t => t.enemy === old.enemy)) {
                    if (stats.beamBurnDamage > 0 && old.enemy.hp > 0) {
                        beamState.burnEffects.push({
                            enemy: old.enemy,
                            damagePerTick: stats.beamBurnDamage * stats.damageMultiplier,
                            tickTimer: 0,
                            duration: stats.beamBurnDuration
                        });
                    }
                }
            }

            beamState.targets = newTargets;

            // Damage ticks + chain targeting
            for (const t of beamState.targets) {
                t.tickTimer += deltaTime;
                const tickFired = t.tickTimer >= stats.beamTickRate;
                if (tickFired) {
                    t.tickTimer -= stats.beamTickRate;
                    const baseDamage = stats.beamDPS * stats.beamTickRate * (1 + t.rampCurrent);

                    // Primary target damage
                    t.enemy.hp -= baseDamage;
                    spawnFloatingText(t.enemy.x, t.enemy.y - 15, Math.round(baseDamage).toString(), '#00FFCC');
                    if (t.enemy.hp <= 0) {
                        handleBeamKill(t.enemy, stats);
                    }
                    t._lastChainDmg = baseDamage * stats.beamChainDamage;
                }

                // Rebuild chain targets every frame (like lightning: sequential nearest-enemy chain)
                // Store {x, y, enemy} snapshots so render doesn't depend on pool-recycled objects
                if (stats.beamChainCount > 0 && t.enemy.hp > 0 && !t.enemy.dead) {
                    const chainRangeSq = stats.beamChainRange * stats.beamChainRange;
                    const hitSet = new Set();
                    hitSet.add(t.enemy);
                    const newChainTargets = [];
                    let currentX = t.enemy.x, currentY = t.enemy.y;

                    for (let ci = 0; ci < stats.beamChainCount; ci++) {
                        // Find closest enemy to current chain point (like lightning does)
                        let bestEnemy = null;
                        let bestDistSq = Infinity;
                        const chainNearby = spatialGrid.queryRadius(currentX, currentY, stats.beamChainRange);
                        for (const e of chainNearby) {
                            if (hitSet.has(e) || e.hp <= 0 || e.dead) continue;
                            const cdx = e.x - currentX, cdy = e.y - currentY;
                            const distSq = cdx * cdx + cdy * cdy;
                            if (distSq <= chainRangeSq && distSq < bestDistSq) {
                                bestDistSq = distSq;
                                bestEnemy = e;
                            }
                        }
                        if (!bestEnemy) break;
                        // Snapshot coordinates at selection time (immune to pool reset)
                        newChainTargets.push({ x: bestEnemy.x, y: bestEnemy.y, enemy: bestEnemy });
                        hitSet.add(bestEnemy);
                        currentX = bestEnemy.x;
                        currentY = bestEnemy.y;

                        // Apply chain damage only on tick
                        if (tickFired && t._lastChainDmg > 0) {
                            bestEnemy.hp -= t._lastChainDmg;
                            if (bestEnemy.hp <= 0) killEnemy(bestEnemy);
