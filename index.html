        function hasEnemyInAimCone() {
            const playerRad = player.angle * Math.PI / 180;
            const aimCone = AUTO_AIM_CONE_DEGREES * Math.PI / 180;

            for (const enemy of enemies) {
                const dx = enemy.x - player.x;
                const dy = enemy.y - player.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > AUTO_AIM_MAX_DISTANCE) continue;

                const angleToEnemy = Math.atan2(dy, dx);
                const angleDiff = Math.abs(normalizeAngle((angleToEnemy - playerRad) * 180 / Math.PI) * Math.PI / 180);

                if (angleDiff <= aimCone) {
                    return true;
                }
            }

            return false;
        }

        function fireBullet() {
            AudioManager.play('playerShoot');
            const playerRad = player.angle * Math.PI / 180;
            const noseOffset = PLAYER_SIZE / 2 - PLAYER_PIVOT_OFFSET;
            const noseX = player.x + Math.cos(playerRad) * noseOffset;
            const noseY = player.y + Math.sin(playerRad) * noseOffset;

            // Get computed stats from skill tree
            const stats = getWeaponStats();
            const bulletSpeed = BULLET_SPEED;

            // Auto-aim: find enemy within frontal cone and predict intercept point
            let targetRad = playerRad;
            let closestDist = Infinity;
            let closestEnemy = null;
            const aimCone = AUTO_AIM_CONE_DEGREES * Math.PI / 180;

            for (const enemy of enemies) {
                const dx = enemy.x - player.x;
                const dy = enemy.y - player.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const angleToEnemy = Math.atan2(dy, dx);
                const angleDiff = Math.abs(normalizeAngle((angleToEnemy - playerRad) * 180 / Math.PI) * Math.PI / 180);

                if (angleDiff <= aimCone && dist < closestDist && dist <= AUTO_AIM_MAX_DISTANCE) {
                    closestDist = dist;
                    closestEnemy = enemy;
                }
            }


            // Calculate intercept point (lead the target)
            if (closestEnemy) {
                const evx = closestEnemy.vx || 0;
                const evy = closestEnemy.vy || 0;

                // Iterative approximation for intercept point (2 iterations for accuracy)
                let predictedX = closestEnemy.x;
                let predictedY = closestEnemy.y;

                for (let i = 0; i < 2; i++) {
                    const dx = predictedX - noseX;
                    const dy = predictedY - noseY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const timeToTarget = dist / bulletSpeed;

                    predictedX = closestEnemy.x + evx * timeToTarget;
                    predictedY = closestEnemy.y + evy * timeToTarget;
                }

                targetRad = Math.atan2(predictedY - noseY, predictedX - noseX);
            }

            // When Nova Beam is active, all shots fire in player direction (matches beam direction)
            if (getWeaponStats().hasNovaBeam) {
                targetRad = playerRad;
            }

            // NOVA BEAM EVOLUTION: heat-based system
            if (stats.hasNovaBeam) {
                novaBeamHeat += 0.15; // ~7 rapid shots to reach 1.0
                if (novaBeamHeat >= 1.0) {
                    novaBeamHeat = 0;
                    fireNovaBeam(noseX, noseY, playerRad, stats);
                    return; // Nova replaces normal shot
                }
            }

            // Compute bullet color (lerp laser→nova based on heat)
            const laserBaseColor = COLORS.BULLET;
            const heatColor = stats.hasNovaBeam ? lerpColor(laserBaseColor, '#FFE4B5', novaBeamHeat) : laserBaseColor;

            // Fire main weapon (LASER or BEAM if pierce unlocked)
            const hasPierce = stats.pierce > 0 || stats.pierceInfinite;
            const hasSpread = stats.spreadCount > 0;
            if (hasPierce) {
                // Pierce/Beam shot
                const pierceSpeedMult = hasSpread ? 1 : 1.2;
                const pierceLifeMult = hasSpread ? 1 : 1.5;
                const bullet = pools.bullet.acquire();
                bullet.x = noseX;
                bullet.y = noseY;
                bullet.vx = Math.cos(targetRad) * (bulletSpeed * pierceSpeedMult);
                bullet.vy = Math.sin(targetRad) * (bulletSpeed * pierceSpeedMult);
                bullet.life = BULLET_LIFETIME * pierceLifeMult;
                bullet.damage = stats.damage;
                bullet.type = 'beam';
                bullet.color = heatColor;
                bullet.piercing = true;
                bullet.pierceCount = stats.pierceInfinite ? 9999 : stats.pierce;
                bullet.hitEnemies = new Set();
                bullets.push(bullet);
            } else {
                // Normal laser shot
                const bullet = pools.bullet.acquire();
                bullet.x = noseX;
                bullet.y = noseY;
                bullet.vx = Math.cos(targetRad) * bulletSpeed;
                bullet.vy = Math.sin(targetRad) * bulletSpeed;
                bullet.life = BULLET_LIFETIME;
                bullet.damage = stats.damage;
                bullet.type = 'laser';
                bullet.color = heatColor;
                bullet.piercing = false;
                bullets.push(bullet);
            }

            // Fire SPREAD if unlocked (additional bullets in cone, excluding center)
            if (stats.spreadCount > 0) {
                const sAngle = stats.spreadAngle;

                for (let i = 0; i < stats.spreadCount; i++) {
                    const middleIndex = (stats.spreadCount - 1) / 2;
                    if (i === middleIndex) continue;

                    const offset = ((i / (stats.spreadCount - 1)) - 0.5) * 2 * (sAngle * Math.PI / 180);
                    const angle = targetRad + offset;
                    const spreadBullet = pools.bullet.acquire();
                    spreadBullet.x = noseX;
                    spreadBullet.y = noseY;
                    spreadBullet.vx = Math.cos(angle) * bulletSpeed;
                    spreadBullet.vy = Math.sin(angle) * bulletSpeed;
                    spreadBullet.life = BULLET_LIFETIME;
                    spreadBullet.damage = stats.damage;
                    spreadBullet.type = 'laser';
                    spreadBullet.color = heatColor;
                    spreadBullet.piercing = hasPierce;
                    if (hasPierce) {
                        spreadBullet.pierceCount = stats.pierceInfinite ? 9999 : stats.pierce;
                        spreadBullet.hitEnemies = new Set();
                    }

                    bullets.push(spreadBullet);
                }
            }
        }

        // NOVA BEAM: instant hitscan laser (laser cannon evolution)
        function fireNovaBeam(noseX, noseY, targetRad, stats) {
            AudioManager.play('novaBeamFire');
            const beamRange = 4000;
            const novaDamage = Math.round(stats.damage * 3);
            const endX = noseX + Math.cos(targetRad) * beamRange;
            const endY = noseY + Math.sin(targetRad) * beamRange;

            // Instant damage to all enemies in the beam line
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                const config = ENEMY_TYPES[e.type];
                const hitRadius = config.radius + 10; // slightly wider than enemy

                if (lineCircleCollision(noseX, noseY, endX, endY, e.x, e.y, hitRadius)) {
                    e.hp -= novaDamage;
                    spawnFloatingText(e.x, e.y - config.radius, novaDamage.toString(), '#FFE4B5');
                    spawnRing(e.x, e.y, '#FFD700', 30);

                    if (e.hp <= 0) killEnemy(e);
                }
            }

            // Visual beam effect (fades over time)
            novaBeamEffects.push({
                x1: noseX, y1: noseY,
                x2: endX, y2: endY,
                life: 0.4, maxLife: 0.4
            });

            // Juice
            triggerShake(6, 200);
            triggerSlowmo(30);

            // Particles along the beam
            const beamLen = Math.min(beamRange, 2500);
            for (let d = 0; d < beamLen; d += 60) {
                const px = noseX + Math.cos(targetRad) * d;
                const py = noseY + Math.sin(targetRad) * d;
                const perpAngle = targetRad + Math.PI / 2;
                const p = pools.particle.acquire();
                p.x = px + (Math.random() - 0.5) * 16;
                p.y = py + (Math.random() - 0.5) * 16;
                p.vx = Math.cos(perpAngle) * (40 + Math.random() * 60) * (Math.random() > 0.5 ? 1 : -1);
                p.vy = Math.sin(perpAngle) * (40 + Math.random() * 60) * (Math.random() > 0.5 ? 1 : -1);
                p.life = 0.3 + Math.random() * 0.2;
                p.maxLife = p.life;
                p.size = 2 + Math.random() * 3;
                p.color = Math.random() > 0.4 ? '#FFE4B5' : '#FFD700';
                p.type = 'piercing_trail';
                particles.push(p);
            }
        }

        // Fire rockets in burst (360º enemy detection)
        // TODO: EVOLUTION - Armageddon Protocol: every 8s, fire a mega-missile with massive explosion
        function fireRocket(nearbyEnemies, stats) {
            // Find closest enemy to aim at
            let closestEnemy = null;
            let closestDist = Infinity;
            for (const e of nearbyEnemies) {
                const dx = e.x - player.x;
                const dy = e.y - player.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < closestDist) {
                    closestDist = dist;
                    closestEnemy = e;
                }
            }
            if (!closestEnemy) return;
            AudioManager.play('rocketFire');

            // Disparar ráfaga de misiles con delays
            const burstCount = stats.rocketBurstCount; // 3 normal, 6 con habilidad
            const delayBetweenRockets = 50; // ms entre cada misil de la ráfaga
            const angleSpread = 0.4; // Dispersión angular total de la ráfaga (radianes)

            for (let i = 0; i < burstCount; i++) {
                setTimeout(() => {
                    // Recalcular posición del enemigo para cada misil (puede haberse movido)
                    const currentDx = closestEnemy.x - player.x;
                    const currentDy = closestEnemy.y - player.y;
                    const currentDist = Math.sqrt(currentDx * currentDx + currentDy * currentDy);

                    // Predict enemy position based on velocity
                    const rocketSpeed = 600;
                    const timeToTarget = currentDist / rocketSpeed;
                    const predictedX = closestEnemy.x + (closestEnemy.vx || 0) * timeToTarget * 0.5;
                    const predictedY = closestEnemy.y + (closestEnemy.vy || 0) * timeToTarget * 0.5;

                    // Ángulo base hacia el objetivo
                    const baseAngle = Math.atan2(predictedY - player.y, predictedX - player.x);

                    // Calcular offset angular para efecto de ráfaga
                    // Distribuye los misiles en un abanico
                    const angleOffset = (i / (burstCount - 1) - 0.5) * angleSpread + (Math.random() - 0.5) * 0.1;
                    const angleToTarget = baseAngle + (burstCount > 1 ? angleOffset : 0);

                    const rocket = pools.bullet.acquire();
                    rocket.x = player.x;
                    rocket.y = player.y;

                    // === COMPORTAMIENTO DE MISIL REALISTA ===
                    // Fase 1: Impulso inicial
                    const initialSpeed = 1000;
                    const boostDuration = 0.3;

                    // Fase 2: Navegación (girando)
                    const cruiseSpeed = 150;

                    // Fase 3: Aproximación final
                    const finalSpeed = 1200;
                    const angleThreshold = 10.2;

                    // Configuración del misil
                    rocket.currentSpeed = initialSpeed;
                    rocket.targetSpeed = initialSpeed;
                    rocket.initialSpeed = initialSpeed;
                    rocket.cruiseSpeed = cruiseSpeed;
                    rocket.finalSpeed = finalSpeed;
                    rocket.boostTimer = boostDuration;
                    rocket.angleThreshold = angleThreshold;
                    rocket.targetAngle = angleToTarget;
                    rocket.hasCompletedBoostPhase = false;

                    // Spawn perpendicular al objetivo con variación por misil
                    const spawnAngle = angleToTarget - Math.PI;
                    rocket.vx = Math.cos(spawnAngle) * initialSpeed;
                    rocket.vy = Math.sin(spawnAngle) * initialSpeed;

                    // Propiedades estándar
                    rocket.life = 2;
                    rocket.damage = stats.rocketDamage;
                    rocket.explosionDamage = stats.rocketExplosionDamage;
                    rocket.explosionRadius = stats.rocketExplosionRadius;
                    rocket.ricochetCount = stats.rocketRicochetCount;
                    rocket.critChance = stats.rocketCritChance;
                    rocket.type = 'rocket';
                    rocket.color = COLORS.PLAYER;
                    rocket.piercing = false;
                    rocket.turnRate = 300;
                    rocket.trail = [];
                    bullets.push(rocket);
                }, i * delayBetweenRockets);
            }
        }

        // TODO: EVOLUTION - Storm Nexus: residual electric field between hit enemies
        function fireLightning(nearbyEnemies, stats) {
            AudioManager.play('lightningZap');
            // Find closest enemy to start the chain
            let closestEnemy = null;
            let closestDist = Infinity;

            for (const e of nearbyEnemies) {
                const dx = e.x - player.x;
                const dy = e.y - player.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < closestDist) {
                    closestDist = dist;
                    closestEnemy = e;
                }
            }
            if (!closestEnemy) return;

            // Build the lightning chain - collect all targets first, then apply damage
            const chainPoints = [{ x: player.x, y: player.y }];
            const chainTargets = [];
            const hitEnemies = new Set();
            let currentTarget = closestEnemy;
            let bounceCount = 0;

            // Phase 1: Build the chain (find all targets)
            while (currentTarget && bounceCount < stats.lightningBounces) {
                chainPoints.push({ x: currentTarget.x, y: currentTarget.y });
                chainTargets.push(currentTarget);
                hitEnemies.add(currentTarget);
                bounceCount++;

                // Find next closest enemy within chain range from current target
                const lastHitX = currentTarget.x;
                const lastHitY = currentTarget.y;

                let nextTarget = null;
                let nextDist = Infinity;

                for (const candidate of enemies) {
                    if (hitEnemies.has(candidate)) continue;
                    if (candidate.hp <= 0) continue;

                    const dx = candidate.x - lastHitX;
                    const dy = candidate.y - lastHitY;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist <= stats.lightningChainRange && dist < nextDist) {
                        nextDist = dist;
                        nextTarget = candidate;
                    }
                }

                currentTarget = nextTarget;
            }

            // Phase 2: Apply damage to all targets and kill dead enemies
            const enemiesToKill = [];
            for (const target of chainTargets) {
                {
                    const config = ENEMY_TYPES[target.type];
                    target.hp -= stats.lightningDamage;

                    // Visual feedback
                    spawnFloatingText(target.x, target.y - config.radius,
                        stats.lightningDamage.toString(), WEAPONS['lightning_ray'].color);
                    spawnRing(target.x, target.y, WEAPONS['lightning_ray'].color);

                    if (target.hp <= 0) {
                        enemiesToKill.push(target);
                    }
                }
            }

            // Phase 3: Kill dead enemies (after chain is complete)
            for (const target of enemiesToKill) {
                killEnemy(target);
            }


            // Create lightning visual effect with pre-computed zigzag
            if (chainPoints.length > 1) {
                // Generate zigzag path between each pair of points
                const zigzagPoints = [];
                for (let i = 0; i < chainPoints.length - 1; i++) {
                    const start = chainPoints[i];
                    const end = chainPoints[i + 1];

                    // Add start point
                    if (i === 0) zigzagPoints.push({ x: start.x, y: start.y });

                    // Calculate distance and direction
                    const dx = end.x - start.x;
                    const dy = end.y - start.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    // Number of zigzag segments based on distance
                    const segments = Math.max(3, Math.floor(dist / 30));
                    const perpX = -dy / dist;
                    const perpY = dx / dist;

                    // Generate zigzag points
                    for (let s = 1; s < segments; s++) {
                        const t = s / segments;
                        const baseX = start.x + dx * t;
                        const baseY = start.y + dy * t;

                        // Alternating zigzag with random offset (narrower)
                        const zigzagAmount = (Math.random() * 12 + 6) * (s % 2 === 0 ? 1 : -1);
                        zigzagPoints.push({
                            x: baseX + perpX * zigzagAmount,
                            y: baseY + perpY * zigzagAmount
                        });
                    }

                    // Add end point
                    zigzagPoints.push({ x: end.x, y: end.y });
                }

                lightningEffects.push({
                    points: zigzagPoints,
                    life: 0.2,
                    maxLife: 0.2,
                    color: WEAPONS['lightning_ray'].color
                });
            }
        }

        function spawnAlienDrone(x, y) {
            const stats = getWeaponStats();
            if (!stats.hasDrones) return;
            AudioManager.play('hiveMindSpawn');

            // Calculate actual drone count (base + extra chance)
            let count = stats.droneBaseCount;
            if (Math.random() < stats.droneExtraChance) count += stats.droneExtraCount;

            for (let i = 0; i < count; i++) {
                // Hive Mind: enforce max drone cap
                if (stats.hasHiveMind && drones.length >= HIVE_MAX_DRONES) break;

                const drone = pools.drone.acquire();

                const angleOffset = count > 1 ? (i / count) * Math.PI * 2 : 0;
                drone.isHive = stats.hasHiveMind;
                drone.x = x + Math.cos(angleOffset) * 10;
                drone.y = y + Math.sin(angleOffset) * 10;
                drone.vx = Math.cos(angleOffset) * 100;
                drone.vy = Math.sin(angleOffset) * 100;
                drone.angle = angleOffset * 180 / Math.PI;
                drone.life = stats.hasHiveMind ? HIVE_DRONE_LIFETIME : stats.droneLifetime;
                drone.damage = stats.droneDamage;
                drone.explosionChance = stats.droneExplosionChance;
                drone.explosionRadius = stats.droneExplosionRadius;
                drone.explosionDamage = stats.droneExplosionDamage;
                drone.speedMulti = stats.droneSpeedMulti;
                drone.trail = [];
                drone.color = COLORS.PLAYER;
                drone.hitCooldown = 0;

                drones.push(drone);
            }
        }

        function spawnThrusterParticle() {
            const angleRad = player.angle * Math.PI / 180;
            const backRad = angleRad + Math.PI;
            const perpX = -Math.sin(angleRad);
            const perpY = Math.cos(angleRad);

            if (selectedStartingWeapon === 'void_blade') {
                // Two particles from wing thrusters at (-15, ±16) in local space
                for (let sign = -1; sign <= 1; sign += 2) {
                    const localX = -15, localY = sign * 16;
                    const wx = player.x + Math.cos(angleRad) * localX + perpX * localY;
                    const wy = player.y + Math.sin(angleRad) * localX + perpY * localY;
                    const spread = (Math.random() - 0.5) * 0.15;
                    const p = pools.particle.acquire();
                    p.x = wx;
                    p.y = wy;
                    p.vx = Math.cos(backRad + spread) * (350 + Math.random() * 5);
                    p.vy = Math.sin(backRad + spread) * (350 + Math.random() * 5);
                    p.life = 0.15 + Math.random() * 0.15;
                    p.maxLife = 0.5;
                    p.size = 8 + Math.random() * 10;
                    p.color = COLORS.PLAYER;
                    p.type = 'thruster';
                    p.thrusterShape = 'square';
                    p.rotation = Math.random() * Math.PI * 2;
                    p.rotationSpeed = (Math.random() - 0.5) * 2;
                    particles.push(p);
                }
            } else if (selectedStartingWeapon === 'fusion_beam') {
                // Four particles from thrusters at (-12, -10), (-12, -3), (-12, 3), (-12, 10)
                const offsets = [-10, -3, 3, 10];
                const idx = Math.floor(Math.random() * 4);
                const localY = offsets[idx];
                const localX = -12;
                const wx = player.x + Math.cos(angleRad) * localX + perpX * localY;
                const wy = player.y + Math.sin(angleRad) * localX + perpY * localY;
                const spread = (Math.random() - 0.5) * 0.1;
                const isInner = (idx === 1 || idx === 2);
                const p = pools.particle.acquire();
                p.x = wx;
                p.y = wy;
                p.vx = Math.cos(backRad + spread) * (350 + Math.random() * 5);
                p.vy = Math.sin(backRad + spread) * (350 + Math.random() * 5);
                p.life = 0.15 + Math.random() * 0.15;
                p.maxLife = 0.5;
                p.size = isInner ? (8 + Math.random() * 10) : (5 + Math.random() * 7);
                p.color = COLORS.PLAYER;
                p.type = 'thruster';
                p.thrusterShape = 'circle';
                p.rotation = Math.random() * Math.PI * 2;
                p.rotationSpeed = (Math.random() - 0.5) * 2;
                particles.push(p);
            } else {
                const rad = backRad;
                const spread = (Math.random() - 0.5) * 0.1;
                const tailOffset = 20 + PLAYER_PIVOT_OFFSET;
                const p = pools.particle.acquire();
                p.x = player.x + Math.cos(rad) * tailOffset;
                p.y = player.y + Math.sin(rad) * tailOffset;
                p.vx = Math.cos(rad + spread) * (400 + Math.random() * 5);
                p.vy = Math.sin(rad + spread) * (400 + Math.random() * 5);
                p.life = 0.2 + Math.random() * 0.2;
                p.maxLife = 0.6;
                p.size = 12 + Math.random() * 15;
                p.color = COLORS.PLAYER;
                p.type = 'thruster';
                p.rotation = Math.random() * Math.PI * 2;
                p.rotationSpeed = (Math.random() - 0.5) * 2;
                particles.push(p);
            }
        }
        
        // ============================================================
        // BULLETS
        // ============================================================
        
        function updateBullets() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                
                // Rocket and mini-rocket homing behavior
                if (b.type === 'rocket' || b.type === 'mini_rocket' || b.type === 'armageddon_rocket') {
                    // Find nearest enemy using spatial grid
                    let nearestDist = Infinity;
                    let nearestEnemy = null;
                    const nearbyEnemies = spatialGrid.queryRadius(b.x, b.y, 600);
                    for (const e of nearbyEnemies) {
                        const dx = e.x - b.x;
                        const dy = e.y - b.y;
                        const distSq = dx * dx + dy * dy;
                        if (distSq < nearestDist * nearestDist) {
                            nearestDist = Math.sqrt(distSq);
                            nearestEnemy = e;
                        }
                    }
                    if (nearestEnemy) {
                        // Predict enemy position based on velocity
                        const speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
                        const timeToTarget = nearestDist / Math.max(speed, 100);
                        const predictedX = nearestEnemy.x + (nearestEnemy.vx || 0) * timeToTarget * 0.7;
                        const predictedY = nearestEnemy.y + (nearestEnemy.vy || 0) * timeToTarget * 0.7;

                        const dx = predictedX - b.x;
                        const dy = predictedY - b.y;
                        const targetAngle = Math.atan2(dy, dx);
                        const currentAngle = Math.atan2(b.vy, b.vx);
                        let angleDiff = targetAngle - currentAngle;
                        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

                        // === LÓGICA DE MISIL CON 3 FASES (SIN REINICIAR EN NUEVOS OBJETIVOS) ===
                        
                        // Actualizar timer del impulso inicial (SOLO la primera vez)
                        if (b.boostTimer > 0) {
                            b.boostTimer -= deltaTime;
                            if (b.boostTimer <= 0) {
                                // 👈 Cambiar a velocidad de navegación (fase 2) - SOLO UNA VEZ
                                b.currentSpeed = b.cruiseSpeed;
                                b.hasCompletedBoostPhase = true; // 👈 MARCAR QUE COMPLETÓ FASE DE FRENADO
                            }
                        }
                        
                        // SOLO aplicar lógica de aceleración si está fuera del boost inicial
                        // Esto evita que se reinicie el frenado con nuevos objetivos
                        if (b.hasCompletedBoostPhase) {
                            const angleToTargetRad = Math.abs(angleDiff);
                            
                            // Fase 3: Aceleración final si apunta al objetivo
                            if (angleToTargetRad < b.angleThreshold) {
                                b.targetSpeed = b.finalSpeed; // 👈 VELOCIDAD FINAL
                            } else {
                                b.targetSpeed = b.cruiseSpeed; // 👈 VELOCIDAD DE NAVEGACIÓN
                            }
                            
                            // Transición suave de velocidad
                            const speedTransitionRate = 5.0; // 👈 VELOCIDAD DE TRANSICIÓN (más rápido = más abrupto)
                            if (Math.abs(b.currentSpeed - b.targetSpeed) > 1) {
                                const speedChange = (b.targetSpeed - b.currentSpeed) * speedTransitionRate * deltaTime;
                                b.currentSpeed += speedChange;
                            }
                        }
                        
                        // Aplicar giro
                        const maxTurn = (b.turnRate * Math.PI / 180) * deltaTime;
                        const turn = Math.max(-maxTurn, Math.min(maxTurn, angleDiff));
                        const newAngle = currentAngle + turn;
                        
                        // Aplicar velocidad actual
                        b.vx = Math.cos(newAngle) * b.currentSpeed;
                        b.vy = Math.sin(newAngle) * b.currentSpeed;
                    }

                    // Store trail positions for line rendering (push + reuse oldest for O(1))
                    if (!b.trail) b.trail = [];
                    const isMini = b.type === 'mini_rocket';
                    const maxTrailLength = b.type === 'armageddon_rocket' ? 70 : (isMini ? 25 : 50);
                    if (b.trail.length >= maxTrailLength) {
                        const old = b.trail.shift();
                        old.x = b.x; old.y = b.y;
                        b.trail.push(old);
                    } else {
                        b.trail.push({ x: b.x, y: b.y });
                    }
                }

                // Piercing laser sonic rings (beam or laser with piercing)
                if ((b.type === 'beam' || (b.type === 'laser' && b.piercing))) {
                    if (!b.sonicTimer) b.sonicTimer = 0;
                    b.sonicTimer -= deltaTime;
                    if (b.sonicTimer <= 0) {
                        b.sonicTimer = 0.02;
                        const bAngle = Math.atan2(b.vy, b.vx);
                        const p = pools.particle.acquire();
                        p.x = b.x + Math.cos(bAngle) * 20;
                        p.y = b.y + Math.sin(bAngle) * 20;
                        p.vx = 0;
                        p.vy = 0;
                        p.angle = bAngle;
                        p.life = 0.35;
                        p.maxLife = 0.35;
                        p.size = 4;
                        p.maxSize = 15;
                        p.color = b.color || COLORS.BULLET;
                        p.type = 'sonic_ring';
                        particles.push(p);
                    }
                }

                // Store previous position for swept collision detection
                b.prevX = b.x;
                b.prevY = b.y;

                b.x += b.vx * deltaTime;
                b.y += b.vy * deltaTime;
                b.life -= deltaTime;

                // Remove bullets that are too far from camera or expired
                // Allow bullets to travel across adjacent sectors
                const distFromCamera = Math.sqrt(
                    Math.pow(b.x - camera.x, 2) +
                    Math.pow(b.y - camera.y, 2)
                );
                const maxDistance = Math.max(CANVAS_WIDTH, CANVAS_HEIGHT) * 3; // 5760px

                if (b.life <= 0 || distFromCamera > maxDistance) {
                    if (b.life <= 0) explodePlayerRocket(b);
                    pools.bullet.release(b);
                    fastRemove(bullets, i);
                }
            }
        }

        // ============================================================
        // ALIEN DRONES
        // ============================================================

        function updateDrones() {
            const droneColor = COLORS.PLAYER;

            for (let i = drones.length - 1; i >= 0; i--) {
                const d = drones[i];

                // Hit cooldown (hive drones: prevents multi-hit same enemy per frame)
                if (d.hitCooldown > 0) d.hitCooldown -= deltaTime;

                // Find nearest enemy — homing behavior (spatial grid)
                let nearestEnemy = null;
                let nearestDist = Infinity;

                const droneNearby = spatialGrid.queryRadius(d.x, d.y, 600);
                for (const e of droneNearby) {
                    const dx = e.x - d.x;
                    const dy = e.y - d.y;
                    const distSq = dx * dx + dy * dy;
                    if (distSq < nearestDist) {
                        nearestDist = distSq;
                        nearestEnemy = e;
                    }
                }
                if (nearestEnemy) {
                    const dx = nearestEnemy.x - d.x;
                    const dy = nearestEnemy.y - d.y;
                    const targetAngle = Math.atan2(dy, dx);
                    const currentAngle = Math.atan2(d.vy, d.vx);

                    let angleDiff = targetAngle - currentAngle;
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

                    const maxTurn = (DRONE_TURN_RATE * Math.PI / 180) * deltaTime;
                    const turn = Math.max(-maxTurn, Math.min(maxTurn, angleDiff));
                    const newAngle = currentAngle + turn;

                    const droneSpeed = DRONE_SPEED * (d.speedMulti || 1);
                    d.vx = Math.cos(newAngle) * droneSpeed;
                    d.vy = Math.sin(newAngle) * droneSpeed;
                    d.angle = newAngle * 180 / Math.PI;
                }

                // Store trail for visual effect
                if (d.trail.length >= 8) {
                    const old = d.trail.shift();
                    old.x = d.x; old.y = d.y;
                    d.trail.push(old);
                } else {
                    d.trail.push({ x: d.x, y: d.y });
                }

                // Update position
                d.x += d.vx * deltaTime;
                d.y += d.vy * deltaTime;
                d.life -= deltaTime;

                // Check collision with enemies (skip if cooling down)
                if (d.hitCooldown <= 0) {
                    let hitEnemy = null;
                    const droneSize = d.isHive ? HIVE_DRONE_SIZE : DRONE_SIZE;
                    const droneHitNearby = spatialGrid.queryRadius(d.x, d.y, droneSize + 40);
                    for (const e of droneHitNearby) {
                        const config = ENEMY_TYPES[e.type];
                        const dx = e.x - d.x;
                        const dy = e.y - d.y;
                        const distSq = dx * dx + dy * dy;
                        const hitDist = config.radius + droneSize;

                        if (distSq < hitDist * hitDist) {
                            hitEnemy = e;
                            break;
                        }
                    }
                    if (hitEnemy) {
                        const hitConfig = ENEMY_TYPES[hitEnemy.type];

                        if (d.isHive) {
                            // HIVE MIND: deal damage but keep going
                            hitEnemy.hp -= d.damage;
                            spawnFloatingText(hitEnemy.x, hitEnemy.y - hitConfig.radius, d.damage.toString(), droneColor);
                            spawnRing(d.x, d.y, droneColor);

                            if (hitEnemy.hp <= 0) killEnemy(hitEnemy);

                            // AoE splash (probability-based from volatile core)
                            if (d.explosionChance > 0 && Math.random() < d.explosionChance) {
                                const splashNearby = spatialGrid.queryRadius(d.x, d.y, d.explosionRadius);
                                for (const e of splashNearby) {
                                    if (e === hitEnemy || e.hp <= 0 || e.dead) continue;
                                    const eConfig = ENEMY_TYPES[e.type];
                                    e.hp -= d.explosionDamage;
                                    spawnFloatingText(e.x, e.y - eConfig.radius, d.explosionDamage.toString(), droneColor);
                                    if (e.hp <= 0) killEnemy(e);
                                }
                            }

                            d.hitCooldown = 0.3;
                        } else {
                            // KAMIKAZE: deal damage, explode and die
                            hitEnemy.hp -= d.damage;
                            spawnFloatingText(hitEnemy.x, hitEnemy.y - hitConfig.radius, d.damage.toString(), droneColor);
                            if (hitEnemy.hp <= 0) killEnemy(hitEnemy);

                            if (d.explosionChance > 0 && Math.random() < d.explosionChance) {
                                spawnRing(d.x, d.y, droneColor, 30);
                                const kamiSplash = spatialGrid.queryRadius(d.x, d.y, d.explosionRadius);
                                for (const e of kamiSplash) {
                                    if (e === hitEnemy || e.dead) continue;
                                    const eConfig = ENEMY_TYPES[e.type];
                                    e.hp -= d.explosionDamage;
                                    spawnFloatingText(e.x, e.y - eConfig.radius, d.explosionDamage.toString(), droneColor);
                                    if (e.hp <= 0) killEnemy(e);
                                }
                            } else {
                                spawnRing(d.x, d.y, droneColor);
                            }
                            pools.drone.release(d);
                            fastRemove(drones, i);
                            continue;
                        }
                    }
                }

                // Remove expired drones or too far from camera
                const distFromCamera = Math.sqrt(
                    Math.pow(d.x - camera.x, 2) +
                    Math.pow(d.y - camera.y, 2)
                );

                if (d.life <= 0 || distFromCamera > CULLING_DISTANCES.drones) {
                    // Hive drones: guaranteed explosion on expiry
                    if (d.isHive && d.life <= 0 && d.explosionRadius > 0) {
                        spawnRing(d.x, d.y, droneColor, d.explosionRadius * 0.4);
                        const nearby = spatialGrid.queryRadius(d.x, d.y, d.explosionRadius);
                        for (const e of nearby) {
                            const config = ENEMY_TYPES[e.type];
                            const edx = e.x - d.x;
                            const edy = e.y - d.y;
                            const eDist = Math.sqrt(edx * edx + edy * edy);
                            if (eDist < d.explosionRadius + config.radius) {
                                e.hp -= d.explosionDamage;
                                spawnFloatingText(e.x, e.y - config.radius, d.explosionDamage.toString(), droneColor);
                                if (e.hp <= 0) killEnemy(e);
                            }
                        }
                    }
                    pools.drone.release(d);
                    fastRemove(drones, i);
                }
            }
        }

        // ============================================================
        // ENEMIES
        // ============================================================
        // ============================================================

        function updateOverwhelmCheck() {
            if (Math.floor(gameTime) % 10 === 0 && Math.floor(gameTime) !== lastOverwhelmCheck) {
                lastOverwhelmCheck = Math.floor(gameTime);
                if (recentDamageEvents >= 3 && enemies.length > 40) {
                    overwhelmReduction = Math.min(overwhelmReduction + 0.15, 0.5);
                    waveCalm = Math.max(waveCalm, 3.0);
                } else if (recentDamageEvents <= 1) {
                    overwhelmReduction = Math.max(overwhelmReduction - 0.1, 0);
                }
                recentDamageEvents = 0;
            }
        }

        function updateSpawnSystem() {
            // Update kill rate tracker
            while (recentKillTimestamps.length > 0
                   && recentKillTimestamps[0] < gameTime - KILL_WINDOW) {
                recentKillTimestamps.shift();
            }
            killRate = recentKillTimestamps.length / KILL_WINDOW;
            const expectedKillRate = enemies.length > 0
                ? Math.min(enemies.length / 8, 15) : 1;
            killEfficiency = killRate / expectedKillRate;

            // Update record progress & adaptive multipliers
            recordProgress = totalKills / effectiveBestKills;
            const adaptive = getAdaptiveMultipliers();

            // Decay spawn interval over time
            if (gameTime - lastSpawnDecayTime > SPAWN_DECAY_INTERVAL) {
                spawnInterval *= (1 - SPAWN_DECAY_RATE);
                spawnInterval = Math.max(MIN_SPAWN_INTERVAL, spawnInterval);
                lastSpawnDecayTime = gameTime;
                waveNumber++;
            }

            // Breathing room: decrement calm timer after waves
            if (waveCalm > 0) waveCalm -= deltaTime;

            // Spawn enemies (skip during wave calm)
            spawnTimer -= deltaTime;
            // Scale max enemies with wave number (+5 enemies per wave)
            const baseMaxEnemies = lowPerfMode ? MAX_ENEMIES_LOW_PERF : MAX_ENEMIES;
            const maxEnemies = Math.min(baseMaxEnemies + (waveNumber * 5), HARD_MAX_ENEMIES);

            if (spawnTimer <= 0 && enemies.length < maxEnemies && waveCalm <= 0) {
                spawnEnemy();
                const spawnRateMult = getDiffMultipliers().spawnRate;
                spawnTimer = (spawnInterval + Math.random() * (spawnInterval * 0.5)) / (spawnRateMult * (1 - overwhelmReduction) * adaptive.spawnMult);
            }

            // Wave system - adaptive start level based on skill
            const waveStartLevel = playerSkillFactor < 0.9 ? 4 : (playerSkillFactor > 1.1 ? 2 : 3);
            const dualWaveLevel = playerSkillFactor < 0.9 ? 10 : (playerSkillFactor > 1.1 ? 6 : 8);
            const dualWaveChance = playerSkillFactor < 0.9 ? 0.2 : (playerSkillFactor > 1.1 ? 0.4 : 0.3);
            if (playerLevel >= waveStartLevel) {
                waveTimer -= deltaTime;
                if (waveTimer <= 0) {
                    // Spawn 1-2 waves simultaneously at higher levels
                    const simultaneousWaves = playerLevel >= dualWaveLevel ? (Math.random() < dualWaveChance ? 2 : 1) : 1;
                    for (let w = 0; w < simultaneousWaves; w++) {
                        spawnWave();
                    }
                    // Faster waves as level increases (minimum 2.0 seconds between waves)
                    const levelSpeedBonus = Math.min((playerLevel - waveStartLevel) * 0.25, 1.2);
                    waveTimer = Math.max(2.0, WAVE_INTERVAL_BASE - levelSpeedBonus) + Math.random() * WAVE_INTERVAL_VARIANCE;
                }
            }
        }

        function spawnWave() {
            if (!player) return;

            // Trigger wave alert
            AudioManager.play('waveAlert');
            waveAlertActive = true;
            waveAlertTimer = 0;
            waveAlertNumber = waveNumber;
            waveAlertSubtitle = 'HOSTILES INCOMING';

            // Scale wave size with level, amplified by adaptive spawn mult
            const adaptive = getAdaptiveMultipliers();
            const baseCount = Math.floor((15 + Math.floor(playerLevel * 3)) * adaptive.spawnMult);
            const count = Math.min(baseCount, WAVE_SIZE_CAP);

            // HP scaling for wave enemies
            const waveDiffMult = getDiffMultipliers();
            const hpMultiplier = Math.pow(1.09, playerLevel - 1) * waveDiffMult.enemyHP * adaptive.hpMult;

            // Generate 3-6 clusters around the player, just outside screen
            const numClusters = 3 + Math.floor(Math.random() * 4);
            const enemiesPerCluster = Math.floor(count / numClusters);
            const remainder = count - enemiesPerCluster * numClusters;

            const spawnPositions = [];

            for (let c = 0; c < numClusters; c++) {
                const clusterAngle = Math.random() * Math.PI * 2;
                const clusterDist = WAVE_SPAWN_DIST_MIN + Math.random() * (WAVE_SPAWN_DIST_MAX - WAVE_SPAWN_DIST_MIN);

                const cx = player.x + Math.cos(clusterAngle) * clusterDist;
                const cy = player.y + Math.sin(clusterAngle) * clusterDist;

                // Extra enemies from remainder go to first clusters
                const clusterCount = enemiesPerCluster + (c < remainder ? 1 : 0);

                for (let i = 0; i < clusterCount; i++) {
                    const offsetAngle = Math.random() * Math.PI * 2;
                    const offsetDist = Math.random() * WAVE_CLUSTER_RADIUS;
                    spawnPositions.push({
                        x: cx + Math.cos(offsetAngle) * offsetDist,
                        y: cy + Math.sin(offsetAngle) * offsetDist
                    });
                }
            }

            // Respect hard enemy cap
            const spawnRoom = HARD_MAX_ENEMIES - enemies.length;
            if (spawnRoom <= 0) return;
            if (spawnPositions.length > spawnRoom) spawnPositions.length = spawnRoom;

            // Spawn all enemies in the wave with mixed types
            for (const pos of spawnPositions) {
                const angleToPlayer = Math.atan2(player.y - pos.y, player.x - pos.x);
                const enemyType = getSpawnType();
                const typeConfig = ENEMY_TYPES[enemyType];
                const scaledHp = Math.ceil(typeConfig.hp * hpMultiplier);

                const enemy = pools.enemy.acquire();
                enemy.x = pos.x;
                enemy.y = pos.y;
                enemy.vx = Math.cos(angleToPlayer) * typeConfig.speed * waveDiffMult.enemySpeed;
                enemy.vy = Math.sin(angleToPlayer) * typeConfig.speed * waveDiffMult.enemySpeed;
                enemy.angle = angleToPlayer * 180 / Math.PI;
                enemy.type = enemyType;
                enemy.hp = scaledHp;
                enemy.maxHp = scaledHp;
                enemy.fireTimer = typeConfig.fireRate || 0;
                enemy.burstCooldown = 0;
                enemy.spawnTime = gameTime;
                enemy.offScreenTime = 0;
                enemies.push(enemy);
            }

            // Breathing room: bigger waves = longer calm, struggling players get more calm
            waveCalm = (1.5 + count / 40) * (2 - playerSkillFactor);
        }

        function getSpawnType() {
            let type = 'SCOUT';
            const r = Math.random();
            const t = gameTime;

            if (t < 30) {
                // First 30s: scouts only
                type = 'SCOUT';
            } else if (t < 90) {
                // 30s-90s: kamikazes appear (15%)
                if (r < 0.15) type = 'KAMIKAZE';
            } else if (t < 180) {
                // 90s-3min: kamikazes (20%) + tanks start (8%)
                if (r < 0.08) type = 'TANK';
                else if (r < 0.28) type = 'KAMIKAZE';
            } else if (t < 300) {
                // 3min-5min: more tanks (20%) + kamikazes (25%)
                if (r < 0.20) type = 'TANK';
                else if (r < 0.45) type = 'KAMIKAZE';
            } else if (t < 480) {
                // 5min-8min: tanks dominate (27%) + first aliens (5%) + kamikazes (20%)
                if (r < 0.05) type = 'ALIEN';
                else if (r < 0.32) type = 'TANK';
                else if (r < 0.52) type = 'KAMIKAZE';
            } else if (t < 720) {
                // 8-12min: berserkers start appearing (3%)
                if (r < 0.03) type = 'BERSERKER';
                else if (r < 0.13) type = 'ALIEN';
                else if (r < 0.41) type = 'TANK';
                else if (r < 0.61) type = 'KAMIKAZE';
            } else if (t < 960) {
                // 12-16min: leviathans appear (2%), berserkers grow (5%)
                if (r < 0.02) type = 'LEVIATHAN';
                else if (r < 0.07) type = 'BERSERKER';
                else if (r < 0.19) type = 'ALIEN';
                else if (r < 0.44) type = 'TANK';
                else if (r < 0.62) type = 'KAMIKAZE';
            } else {
                // 16min+: endgame, leviathans (4%), berserkers (8%)
                if (r < 0.04) type = 'LEVIATHAN';
                else if (r < 0.12) type = 'BERSERKER';
                else if (r < 0.26) type = 'ALIEN';
                else if (r < 0.48) type = 'TANK';
                else if (r < 0.63) type = 'KAMIKAZE';
            }
            return type;
        }

        function spawnEnemy() {
            if (!player) return;

            // Spawn a mini-group of 2-4 enemies from the same direction
            const groupSize = 2 + Math.floor(Math.random() * 3);
            const angle = Math.random() * Math.PI * 2;
            const spawnDistance = CANVAS_WIDTH / 2 + ENEMY_SPAWN_OFFSET_MIN + Math.random() * ENEMY_SPAWN_OFFSET_RANGE;

            // Cluster center
            const cx = player.x + Math.cos(angle) * spawnDistance;
            const cy = player.y + Math.sin(angle) * spawnDistance;

            const diffMult = getDiffMultipliers();
            const adaptiveMult = getAdaptiveMultipliers();
            const hpMultiplier = Math.pow(1.09, playerLevel - 1) * diffMult.enemyHP * adaptiveMult.hpMult;
            const speedMult = diffMult.enemySpeed;

            for (let i = 0; i < groupSize; i++) {
                if (enemies.length >= HARD_MAX_ENEMIES) break;

                const type = getSpawnType();
                const config = ENEMY_TYPES[type];

                // Position within the group (tight 40px radius)
                const offsetAngle = Math.random() * Math.PI * 2;
                const offsetDist = Math.random() * 40;
                const x = cx + Math.cos(offsetAngle) * offsetDist;
                const y = cy + Math.sin(offsetAngle) * offsetDist;

                const angleToPlayer = Math.atan2(player.y - y, player.x - x);
                const scaledHp = Math.ceil(config.hp * hpMultiplier);

                const enemy = pools.enemy.acquire();
                enemy.x = x;
                enemy.y = y;
                enemy.vx = Math.cos(angleToPlayer) * config.speed * speedMult;
                enemy.vy = Math.sin(angleToPlayer) * config.speed * speedMult;
                enemy.angle = angleToPlayer * 180 / Math.PI;
                enemy.type = type;
                enemy.hp = scaledHp;
                enemy.maxHp = scaledHp;
                enemy.fireTimer = config.fireRate || 0;
                enemy.burstCooldown = 0;
                enemy.spawnTime = gameTime;
                enemy.offScreenTime = 0;
                enemy.dead = false;
                enemy.snareSlow = 0;
                enemy.snareSlowTimer = 0;
                enemy.permaSlowAmount = 0;
                enemy.rootTimer = 0;
                enemy.wasInSnare = false;
                enemy.vulnerability = 0;
                enemy.vulnerabilityTimer = 0;
                if (type === 'LEVIATHAN') AudioManager.play('leviathanSpawn', x, y);
                enemies.push(enemy);
            }
        }
        
        function updateEnemies() {
            if (!player) return; // Safety check

            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                const config = ENEMY_TYPES[e.type];
                const timeSpeedBonus = 1 + Math.min(gameTime / 600, 0.3); // +30% max over 10 min
                const speed = config.speed * getDiffMultipliers().enemySpeed * timeSpeedBonus;

                // Seek player with limited turn rate
                const dx = player.x - e.x;
                const dy = player.y - e.y;
                const targetAngle = Math.atan2(dy, dx) * 180 / Math.PI;
                const angleDiff = normalizeAngle(targetAngle - e.angle);
                
                const maxTurn = config.turnRate * deltaTime;
                if (Math.abs(angleDiff) > maxTurn) {
                    e.angle += Math.sign(angleDiff) * maxTurn;
                } else {
                    e.angle = targetAngle;
                }
                
                // Apply velocity toward facing direction
                const rad = e.angle * Math.PI / 180;

                // Calculate slow multiplier from debuffs
                let speedMultiplier = 1;
                if (e.snareSlowTimer > 0) {
                    e.snareSlowTimer -= deltaTime;
                    const rawSlow = (e.snareSlow || 0) + (e.permaSlowAmount || 0);
                    const isCharger = e.type === 'KAMIKAZE' || e.type === 'BERSERKER';
                    const slowAmount = isCharger ? rawSlow * 0.25 : rawSlow;
                    speedMultiplier = Math.max(isCharger ? 0.75 : 0.40, 1 - slowAmount);
                    if (e.snareSlowTimer <= 0) { e.snareSlow = 0; e.wasInSnare = false; }
                } else if (e.permaSlowAmount > 0) {
                    speedMultiplier = Math.max(0.50, 1 - e.permaSlowAmount);
                }

                const targetVx = Math.cos(rad) * speed * speedMultiplier;
                const targetVy = Math.sin(rad) * speed * speedMultiplier;

                // Smooth acceleration
                e.vx += (targetVx - e.vx) * deltaTime * 2;
                e.vy += (targetVy - e.vy) * deltaTime * 2;
                
                // Tank burst
                if (e.type === 'TANK') {
                    e.burstCooldown -= deltaTime;
                    const distToPlayer = Math.sqrt(dx * dx + dy * dy);
                    if (e.burstCooldown <= 0 && distToPlayer < 200) {
                        e.vx = Math.cos(rad) * 280;
                        e.vy = Math.sin(rad) * 280;
                        e.burstCooldown = 6;
                    }
                }
                
                
                // Separation from other enemies (staggered — half per frame)
                if ((i + separationFrame) & 1) {
                    const nearbyEnemies = spatialGrid.queryRadius(e.x, e.y, config.radius * 3);
                    for (const other of nearbyEnemies) {
                        if (other === e) continue;

                        const sepDx = e.x - other.x;
                        const sepDy = e.y - other.y;
                        const sepDistSq = sepDx * sepDx + sepDy * sepDy;
                        const minDist = config.radius + ENEMY_TYPES[other.type].radius + ENEMY_SEPARATION_PADDING;
                        const minDistSq = minDist * minDist;

                        if (sepDistSq < minDistSq && sepDistSq > 0) {
                            const sepDist = Math.sqrt(sepDistSq);
                            const push = (minDist - sepDist) * 0.5;
                            const pushX = (sepDx / sepDist) * push;
                            const pushY = (sepDy / sepDist) * push;

                            const eIsK = e.type === 'KAMIKAZE' || e.type === 'BERSERKER';
                            const oIsK = other.type === 'KAMIKAZE' || other.type === 'BERSERKER';

                            if (eIsK && oIsK) {
                                // Kamikazes push each other normally
                                e.vx += pushX;
                                e.vy += pushY;
                                other.vx -= pushX;
                                other.vy -= pushY;
                            } else {
                                // Kamikazes immune to push from others, bulldoze 2.5x
                                if (!eIsK) {
                                    const mult = oIsK ? 2.5 : 1;
                                    e.vx += pushX * mult;
                                    e.vy += pushY * mult;
                                }
                                if (!oIsK) {
                                    const mult = eIsK ? 2.5 : 1;
                                    other.vx -= pushX * mult;
                                    other.vy -= pushY * mult;
                                }
                            }
                        }
                    }
                }
                
                // Root effect (freeze on snare entry)
                if (e.rootTimer > 0) {
                    e.rootTimer -= deltaTime;
                    e.vx = 0;
                    e.vy = 0;
                }
                if (e.vulnerabilityTimer > 0) {
                    e.vulnerabilityTimer -= deltaTime;
                    if (e.vulnerabilityTimer <= 0) e.vulnerability = 0;
                }

                // Kamikaze/Berserker trail (push + reuse oldest for O(1))
                if (e.type === 'KAMIKAZE' || e.type === 'BERSERKER') {
                    if (!e.trail) e.trail = [];
                    const maxTrail = e.type === 'BERSERKER' ? 70 : 50;
                    if (e.trail.length >= maxTrail) {
                        const old = e.trail.shift();
                        old.x = e.x; old.y = e.y;
                        e.trail.push(old);
                    } else {
                        e.trail.push({ x: e.x, y: e.y });
                    }
                }

                // Update position
                e.x += e.vx * deltaTime;
                e.y += e.vy * deltaTime;

                // Transport enemy if too far from player (wrap around world)
                const relX = e.x - player.x;
                const relY = e.y - player.y;
                const wrapX = SECTOR_WIDTH * ENEMY_WRAP_THRESHOLD;
                const wrapY = SECTOR_HEIGHT * ENEMY_WRAP_THRESHOLD;
                let wrapped = false;

                if (relX > wrapX) {
                    e.x -= wrapX * 2; wrapped = true;
                } else if (relX < -wrapX) {
                    e.x += wrapX * 2; wrapped = true;
                }

                if (relY > wrapY) {
                    e.y -= wrapY * 2; wrapped = true;
                } else if (relY < -wrapY) {
                    e.y += wrapY * 2; wrapped = true;
                }

                // Re-orient toward player after wrapping
                if (wrapped) {
                    const toPlayerX = player.x - e.x;
                    const toPlayerY = player.y - e.y;
                    e.angle = Math.atan2(toPlayerY, toPlayerX) * 180 / Math.PI;
                    const rad = e.angle * Math.PI / 180;
                    const spd = Math.sqrt(e.vx * e.vx + e.vy * e.vy);
                    e.vx = Math.cos(rad) * spd;
                    e.vy = Math.sin(rad) * spd;
                    if (e.trail) e.trail.length = 0;
                }
            }
        }
        
        function updateEnemyBullets() {
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const b = enemyBullets[i];
                b.x += b.vx * deltaTime;
                b.y += b.vy * deltaTime;
                b.life -= deltaTime;

                // Remove enemy bullets that are too far from camera or expired
                // Allow bullets to travel across adjacent sectors
                const distFromCamera = Math.sqrt(
                    Math.pow(b.x - camera.x, 2) +
                    Math.pow(b.y - camera.y, 2)
                );
                const maxDistance = Math.max(CANVAS_WIDTH, CANVAS_HEIGHT) * 3; // 5760px

                if (b.life <= 0 || distFromCamera > maxDistance) {
                    pools.enemyBullet.release(b);
                    fastRemove(enemyBullets, i);
                }
            }
        }
        
        function killEnemy(enemy) {
            // Guard: don't kill already-dead enemies twice
            if (enemy.dead) return;
            enemy.dead = true;
            AudioManager.play('enemyDeath', enemy.x, enemy.y);

            const config = ENEMY_TYPES[enemy.type];

            // Increment kill counter
            totalKills++;
            recentKillTimestamps.push(gameTime);

            // Spawn explosion ring (bigger for bigger enemies)
            const ringSize = enemy.type === 'LEVIATHAN' ? 80 : (enemy.type === 'BERSERKER' ? 60 : 40);
            spawnRing(enemy.x, enemy.y, config.color, ringSize);

            // Direct XP gain
            if (!enemy.noXP) {
                const xpValue = enemy.type === 'BERSERKER' ? 8 : (enemy.type === 'TANK' ? 5 : (enemy.type === 'KAMIKAZE' ? 2 : ((enemy.type === 'ALIEN' || enemy.type === 'LEVIATHAN') ? 0 : 1)));
                if (xpValue > 0) collectXP(xpValue);
            }

            // Leviathan splits into 4 aliens on death
            if (enemy.type === 'LEVIATHAN' && enemies.length < HARD_MAX_ENEMIES) {
                AudioManager.play('leviathanSpawn', enemy.x, enemy.y);
                const hpMultiplier = 1 + (playerLevel - 1) * 0.40;
                const alienConfig = ENEMY_TYPES['ALIEN'];
                const scaledAlienHp = Math.ceil(alienConfig.hp * hpMultiplier);
                for (let i = 0; i < 4; i++) {
                    const angle = (Math.PI * 2 / 4) * i + Math.random() * 0.3;
                    const alien = pools.enemy.acquire();
                    alien.x = enemy.x + Math.cos(angle) * 50;
                    alien.y = enemy.y + Math.sin(angle) * 50;
                    alien.vx = Math.cos(angle) * 60;
                    alien.vy = Math.sin(angle) * 60;
                    alien.angle = angle * 180 / Math.PI;
                    alien.type = 'ALIEN';
                    alien.hp = scaledAlienHp;
                    alien.maxHp = scaledAlienHp;
                    alien.fireTimer = 0;
                    alien.burstCooldown = 0;
                    alien.spawnTime = gameTime;
                    alien.offScreenTime = 0;
                    alien.noXP = enemy.noXP || false;
                    alien.dead = false;
                    alien.snareSlow = 0;
                    alien.snareSlowTimer = 0;
                    alien.permaSlowAmount = 0;
                    alien.rootTimer = 0;
                    alien.wasInSnare = false;
                    alien.vulnerability = 0;
                    alien.vulnerabilityTimer = 0;
                    enemies.push(alien);
                }
            }

            // Alien splits into 5 tanks on death
            if (enemy.type === 'ALIEN' && enemies.length < HARD_MAX_ENEMIES) {
                AudioManager.play('tankSplit', enemy.x, enemy.y);
                const hpMultiplier = 1 + (playerLevel - 1) * 0.40;
                const tankConfig = ENEMY_TYPES['TANK'];
                const scaledTankHp = Math.ceil(tankConfig.hp * hpMultiplier);
                for (let i = 0; i < 5; i++) {
                    const angle = (Math.PI * 2 / 5) * i + Math.random() * 0.3;
                    const tank = pools.enemy.acquire();
                    tank.x = enemy.x + Math.cos(angle) * 40;
                    tank.y = enemy.y + Math.sin(angle) * 40;
                    tank.vx = Math.cos(angle) * 80;
                    tank.vy = Math.sin(angle) * 80;
                    tank.angle = angle * 180 / Math.PI;
                    tank.type = 'TANK';
                    tank.hp = scaledTankHp;
                    tank.maxHp = scaledTankHp;
                    tank.fireTimer = 0;
                    tank.burstCooldown = 0;
                    tank.spawnTime = gameTime;
                    tank.offScreenTime = 0;
                    tank.noXP = enemy.noXP || false;
                    tank.dead = false;
                    tank.snareSlow = 0;
                    tank.snareSlowTimer = 0;
                    tank.permaSlowAmount = 0;
                    tank.rootTimer = 0;
                    tank.wasInSnare = false;
                    tank.vulnerability = 0;
                    tank.vulnerabilityTimer = 0;
                    enemies.push(tank);
                }
            }

            // Tank splits into scouts
            if (enemy.type === 'TANK' && enemies.length < HARD_MAX_ENEMIES) {
                AudioManager.play('tankSplit', enemy.x, enemy.y);
                for (let i = 0; i < 2; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const scout = pools.enemy.acquire();
                    scout.x = enemy.x + Math.cos(angle) * 30;
                    scout.y = enemy.y + Math.sin(angle) * 30;
                    scout.vx = Math.cos(angle) * 60;
                    scout.vy = Math.sin(angle) * 60;
                    scout.angle = angle * 180 / Math.PI;
                    scout.type = 'SCOUT';
                    scout.hp = 1;
                    scout.maxHp = 1;
                    scout.fireTimer = 0;
                    scout.burstCooldown = 0;
                    scout.spawnTime = gameTime;
                    scout.offScreenTime = 0;
                    scout.noXP = enemy.noXP || false;
                    scout.dead = false;
                    scout.snareSlow = 0;
                    scout.snareSlowTimer = 0;
                    scout.permaSlowAmount = 0;
                    scout.rootTimer = 0;
                    scout.wasInSnare = false;
                    scout.vulnerability = 0;

            // Maybe spawn pickup
            if (Math.random() < 0.01) {

            // Spawn alien drones if skill unlocked
            spawnAlienDrone(enemy.x, enemy.y);
        }

        // Single-pass removal of all dead enemies (called once per frame)
        function sweepDeadEnemies() {
            for (let i = enemies.length - 1; i >= 0; i--) {
                if (enemies[i].dead) {
                    pools.enemy.release(enemies[i]);
                    fastRemove(enemies, i);
                }
            }
        }

        // ============================================================
        // PICKUPS
        // ============================================================
        
        function spawnPickup(x, y) {
            // Always try to spawn a pickup, but the type determines if we actually do it
            const rand = Math.random();
            let type = null;

            // 20% Health
            // 80% Nothing

            if (rand < 0.20) {
                type = 'health';
            } else {
                return; // 80% chance of no pickup
            }
            
            const pickup = pools.pickup.acquire();
            pickup.x = x;
            pickup.y = y;
            pickup.type = type;
            pickup.life = 10;
            pickup.bobTimer = Math.random() * Math.PI * 2;
            pickups.push(pickup);
        }
        
        function updatePickups() {
            if (!player) return; // Safety check

            for (let i = pickups.length - 1; i >= 0; i--) {
                const p = pickups[i];
                p.life -= deltaTime;
                p.bobTimer += deltaTime;

                if (p.life <= 0) {
                    pools.pickup.release(p);
                    fastRemove(pickups, i);
                    continue;
                }

                // Transport pickup if too far from player (wrap around world)
                const relX = p.x - player.x;
                const relY = p.y - player.y;

                if (relX > SECTOR_WIDTH * 1.5) {
                    p.x -= 3 * SECTOR_WIDTH;
                } else if (relX < -SECTOR_WIDTH * 1.5) {
                    p.x += 3 * SECTOR_WIDTH;
                }

                if (relY > SECTOR_HEIGHT * 1.5) {
                    p.y -= 3 * SECTOR_HEIGHT;
                } else if (relY < -SECTOR_HEIGHT * 1.5) {
                    p.y += 3 * SECTOR_HEIGHT;
                }

                // Check collision with player
                const dx = player.x - p.x;
                const dy = player.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                // Magnet effect - attract pickups within range with acceleration
                if (dist < PICKUP_MAGNET_RADIUS && dist > 0) {
                    // Lerp factor increases as pickup gets closer (faster pull when near)
                    const pullStrength = 1 - (dist / PICKUP_MAGNET_RADIUS);
                    const lerpFactor = 8 * pullStrength * pullStrength * deltaTime;
                    p.x += dx * lerpFactor;
                    p.y += dy * lerpFactor;
                }
                
                if (dist < PLAYER_COLLISION_RADIUS + 15) {
                    AudioManager.play(p.type === 'health' ? 'healthPickup' : 'xpPickup');
                    if (p.type === 'health') {
                        if (player.hp < playerMaxHP) {
                            player.hp++;
                            triggerLifeGain();
                            spawnFloatingText(p.x, p.y, '+1 Hull', COLORS.POWERUP);
                        } else {
                            spawnFloatingText(p.x, p.y, '+1 XP', COLORS.GOLD);
                            collectXP(1);
                        }
                    } else {
                        spawnFloatingText(p.x, p.y, '+1 XP', COLORS.GOLD);
                        collectXP(1);
                    }

                    // Pickup effect
                    for (let j = 0; j < 8; j++) {
                        const angle = (Math.PI * 2 / 8) * j;
                        particles.push({
                            x: p.x,
                            y: p.y,
                            vx: Math.cos(angle) * 80,
                            vy: Math.sin(angle) * 80,
                            life: 0.4,
                            maxLife: 0.4,
                            size: 4,
                            color: p.type === 'health' ? COLORS.POWERUP : COLORS.GOLD,
                            type: 'pickup'
                        });
                    }

                    pools.pickup.release(p);
                    fastRemove(pickups, i);
                }
            }
        }


        // ============================================================
        // XP & LEVEL SYSTEM
        // ============================================================

        function collectXP(amount) {
            // Demo: stop XP gain at level cap
            if (!isFullVersion && playerLevel >= DEMO_MAX_LEVEL) return;

            playerXP += Math.round(amount * permXPMulti * getDiffMultipliers().xp);

            let levelsGained = 0;
            while (playerXP >= xpToNextLevel) {
                playerXP -= xpToNextLevel;
                playerLevel++;
                xpToNextLevel = Math.floor(XP_PER_LEVEL_BASE * Math.pow(XP_PER_LEVEL_GROWTH, playerLevel - 1));
                skillPoints++;
                levelsGained++;

                // Demo limit: cap at DEMO_MAX_LEVEL
                if (!isFullVersion && playerLevel >= DEMO_MAX_LEVEL) {
                    playerXP = 0;
                    break;
                }
            }

            // Only trigger effects and open skill tree once if leveled up
            if (levelsGained > 0) {
                AudioManager.play('levelUp');
                // Demo: trigger demoEnd screen at level cap
                if (!isFullVersion && playerLevel >= DEMO_MAX_LEVEL) {
                    triggerFlash(COLORS.UI_PRIMARY, 0.3, 300);
                    triggerSlowmo(200);
                    gameState = 'demoEnd';
                    return;
                }
                levelUp(levelsGained);
            }
        }

        function levelUp(levelsGained = 1) {
            // Only show upgrade panel if there are still skills to unlock
            if (!allSkillsUnlocked()) {
                showUpgradePanel();
            }

            // Slow-mo effect (more intense if multiple levels)
            const intensity = Math.min(levelsGained, 3);
            triggerSlowmo(100 * intensity);

            // Show floating text for multiple levels
            if (levelsGained > 1 && player) {
                spawnFloatingText(player.x, player.y - 40, 'LEVEL UP x' + levelsGained + '!', COLORS.XP);
            }
        }
        
        // Get all available upgrade options for the level-up panel
        function getAvailableUpgrades() {
            const available = [];
            const prog = cachedProgression || loadProgression();

            for (const [weaponId, weapon] of Object.entries(WEAPONS)) {
                // Weapon must be unlocked in shop
                if (!prog.unlockedWeapons[weaponId]) continue;

                // Starting weapons are mutually exclusive — only the chosen one is available
                if (weapon.isStartingWeapon && !activeWeapons.includes(weaponId)) continue;

                // Option: Activate the weapon (if not yet active this run)
                if (!activeWeapons.includes(weaponId)) {
                    if (activeWeapons.length < MAX_ACTIVE_WEAPONS) {
                        available.push({
                            type: 'weapon_activation',
                            id: weaponId,
                            name: weapon.name,
                            description: weapon.description,
                            color: weapon.color,
                            icon: weapon.icon
                        });
                    }
                    continue; // Don't offer upgrades for inactive weapons
                }

                // Option: Next level (1-10, where 10 = evolution)
                const currentLevel = upgradeLevels[weaponId] || 0;
                if (currentLevel < 10) {
                    const nextLevelDef = weapon.levels[currentLevel];
                    const isEvo = nextLevelDef.isEvolution || false;
                    available.push({
                        type: 'upgrade',
                        id: weaponId,
                        weaponId: weaponId,
                        name: isEvo ? nextLevelDef.description.split(':')[0] : weapon.name,
                        description: isEvo ? nextLevelDef.description.split(': ').slice(1).join(': ') : nextLevelDef.description,
                        color: weapon.color,
                        icon: isEvo ? (nextLevelDef.icon || weapon.icon) : weapon.icon,
                        level: currentLevel + 1,
                        isEvolution: isEvo
                    });
                }
            }

            // If no upgrades left, offer bonuses
            if (available.length === 0) {
                available.push(
                    { type: 'bonus', id: 'bonus_crystals', name: '+50 Crystals', description: 'Bonus persistent currency', color: '#E0F0FF', icon: 'crystal' },
                    { type: 'bonus', id: 'bonus_heal', name: 'Full Heal', description: 'Restore all HP', color: '#39FF14', icon: 'heal' },
                    { type: 'bonus', id: 'bonus_damage', name: 'Damage x1.5', description: 'Increased damage for 30 seconds', color: '#FF6B5B', icon: 'damage' }
                );
            }

            return available;
        }

        // Check if all upgrades have been obtained
        function allSkillsUnlocked() {
            // Check all active weapons are at max level
            for (const weaponId of activeWeapons) {
                if ((upgradeLevels[weaponId] || 0) < 10) return false;
            }
            // Check if there are still weapons that could be activated
            if (activeWeapons.length < MAX_ACTIVE_WEAPONS) {
                const prog = cachedProgression || loadProgression();
                for (const [weaponId, weapon] of Object.entries(WEAPONS)) {
                    if (!prog.unlockedWeapons[weaponId]) continue;
                    if (activeWeapons.includes(weaponId)) continue;
                    if (weapon.isStartingWeapon && !activeWeapons.includes(weaponId)) continue;
                    return false;
                }
            }
            return true;
        }

        // Generate 3 random upgrade options
        function generateUpgradeOptions() {
            const available = getAvailableUpgrades();
            if (available.length <= 3) return [...available];
            const shuffled = [...available].sort(() => Math.random() - 0.5);
            return shuffled.slice(0, 3);
        }

        // Draw a skill icon on a canvas context
        function drawSkillIcon(ctx, icon, cx, cy, color) {
            ctx.fillStyle = color;
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;

            if (icon === 'arsenal') {
                ctx.beginPath();
                ctx.arc(cx, cy, 8, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx, cy, 3, 0, Math.PI * 2);
                ctx.fill();
            } else if (icon === 'laser') {
                ctx.beginPath();
                ctx.moveTo(cx + 10, cy);
                ctx.lineTo(cx - 6, cy - 7);
                ctx.lineTo(cx - 3, cy);
                ctx.lineTo(cx - 6, cy + 7);
                ctx.closePath();
                ctx.fill();
            } else if (icon === 'rocket') {
                ctx.beginPath();
                ctx.moveTo(cx, cy - 10);
                ctx.lineTo(cx + 3, cy - 4);
                ctx.lineTo(cx + 3, cy + 3);
                ctx.lineTo(cx + 6, cy + 8);
                ctx.lineTo(cx + 2, cy + 5);
                ctx.lineTo(cx + 2, cy + 7);
                ctx.lineTo(cx - 2, cy + 7);
                ctx.lineTo(cx - 2, cy + 5);
                ctx.lineTo(cx - 6, cy + 8);
                ctx.lineTo(cx - 3, cy + 3);
                ctx.lineTo(cx - 3, cy - 4);
                ctx.closePath();
                ctx.fill();
            } else if (icon === 'orbital') {
                ctx.beginPath();
                ctx.arc(cx, cy, 9, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx, cy, 4, 0, Math.PI * 2);
                ctx.fill();
            } else if (icon === 'lightning') {
                ctx.beginPath();
                ctx.moveTo(cx + 2, cy - 9);
                ctx.lineTo(cx - 3, cy);
                ctx.lineTo(cx + 1, cy);
                ctx.lineTo(cx - 2, cy + 9);
                ctx.lineTo(cx + 4, cy - 2);
                ctx.lineTo(cx, cy - 2);
                ctx.closePath();
                ctx.fill();
            } else if (icon === 'rate') {
                ctx.beginPath();
                ctx.moveTo(cx - 5, cy - 5);
                ctx.lineTo(cx + 2, cy);
                ctx.lineTo(cx - 5, cy + 5);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx + 1, cy - 5);
                ctx.lineTo(cx + 8, cy);
                ctx.lineTo(cx + 1, cy + 5);
                ctx.stroke();
            } else if (icon === 'beam') {
                ctx.beginPath();
                ctx.arc(cx, cy, 7, 0, Math.PI * 2);
                ctx.stroke();
                ctx.fillRect(cx - 10, cy - 1, 20, 2);
            } else if (icon === 'spread') {
                ctx.beginPath();
                ctx.moveTo(cx - 7, cy);

            } else if (icon === 'target') {

            } else if (icon === 'annihilation') {
