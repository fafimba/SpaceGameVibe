            if (shakeDuration > 0) {
                shakeTimer += deltaTime * 1000;
                if (shakeTimer >= shakeDuration) {
                    shakeDuration = 0;
                    shakeIntensity = 0;
                }
            }
            
            // Flash
            if (flashDuration > 0) {
                flashDuration -= deltaTime * 1000;
                if (flashDuration <= 0) {
                    flashColor = null;
                    flashOpacity = 0;
                }
            }
            
        }
        
        function triggerShake(intensity, duration) {
            shakeIntensity = intensity;
            shakeDuration = duration;
            shakeTimer = 0;
        }
        
        function triggerFlash(color, opacity, duration) {
            flashColor = color;
            flashOpacity = opacity;
            flashDuration = duration;
            flashMaxDuration = duration;
        }
        
        function triggerSlowmo(duration) {
            slowmoTimer = duration;
            slowmoDuration = duration;
        }
        


        // ============================================================
        // RENDERING
        // ============================================================

        function render() {
            // Apply shake
            ctx.save();
            if (shakeDuration > 0) {
                const progress = shakeTimer / shakeDuration;
                const currentIntensity = shakeIntensity * (1 - progress);
                ctx.translate(
                    (Math.random() - 0.5) * currentIntensity * 2,
                    (Math.random() - 0.5) * currentIntensity * 2
                );
            }

            // During skilltree, skip game rendering — CSS blur on canvas freezes last frame,
            // overlay draws on separate uCtx canvas
            if (gameState === 'skilltree') {
                ctx.restore(); // Restore shake transform
                renderUpgradeOverlay(); // draws on uCtx (overlay canvas)
                return;
            }

            // Background (rendered without camera offset)
            renderBackground();

            // *** APPLY CAMERA TRANSFORM FOR ALL GAME ENTITIES ***
            ctx.save();
            const cameraOffset = worldToScreen(0, 0);
            ctx.translate(cameraOffset.x, cameraOffset.y);

            // Game entities (all rendered in world coordinates)
            if (gameState === 'playing' || gameState === 'paused' || gameState === 'gameOver' || gameState === 'demoEnd') {
                renderMines();
                renderSnares();
                renderRiftZones();
                renderPickups();
                renderTurrets();
                renderEnemies();
                renderBullets();
                renderDrones();
                renderEnemyBullets();
                if (player && gameState !== 'gameOver') {
                    renderAura();
                    renderFusionBeam();
                    renderPlayer();
                    renderShieldArc();
                    renderShieldBreakEffects();
                    renderOrbitals();
                    renderLightning();
                    renderNovaBeam();
                    renderSlashEffects();
                }
                renderParticles();
                renderFloatingTexts();
            }


            ctx.restore(); // Restore camera transform

            ctx.restore(); // Restore shake transform

            // Flash overlay (screen space)
            if (flashColor && flashOpacity > 0) {
                ctx.fillStyle = flashColor;
                ctx.globalAlpha = flashOpacity * (flashDuration / flashMaxDuration);
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                ctx.globalAlpha = 1;
            }

            // UI
            renderUI();

            // Debug overlay (toggle with B key)
            if (showDebugOverlay) {
                perfMonitor.renderDebug();
            }
        }

        function renderBackground() {
            // 1. Base gradient (cached in initBackgroundCache)
            ctx.fillStyle = cachedBgGradient;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // 2. Skip fancy effects in low performance mode
            if (lowPerfMode) return;

            const isMenu = gameState === 'menu';

            // 4. Parallax grid (2 layers)
            // Helper to handle negative modulo correctly
            const mod = (n, m) => ((n % m) + m) % m;

            // Use menu virtual camera when on menu screen, apply offset for seamless transition
            const camX = isMenu ? 0 : camera.x + bgOffsetX;
            const camY = isMenu ? menuCameraY : camera.y + bgOffsetY;

            // Far layer: sparse grid, slow parallax (distant feel)
            const farSpacing = 120;
            const farSpeed = 0.15;
            const farOpacity = 0.06;
            const farLineWidth = 1;
            const farOffsetX = mod(camX * farSpeed, farSpacing);
            const farOffsetY = mod(camY * farSpeed, farSpacing);
            ctx.strokeStyle = `rgba(127, 219, 255, ${farOpacity})`;
            ctx.lineWidth = farLineWidth;
            ctx.beginPath();
            for (let x = -farOffsetX; x <= CANVAS_WIDTH + farSpacing; x += farSpacing) {
                ctx.moveTo(x, 0);
                ctx.lineTo(x, CANVAS_HEIGHT);
            }
            for (let y = -farOffsetY; y <= CANVAS_HEIGHT + farSpacing; y += farSpacing) {
                ctx.moveTo(0, y);
                ctx.lineTo(CANVAS_WIDTH, y);
            }
            ctx.stroke();

            // Near layer: larger grid, faster parallax (closer feel)
            const nearSpacing = 400;
            const nearSpeed = 0.4;
            const nearOpacity = 0.08;
            const nearLineWidth = 1.5;
            const nearOffsetX = mod(camX * nearSpeed, nearSpacing);
            const nearOffsetY = mod(camY * nearSpeed, nearSpacing);
            ctx.strokeStyle = `rgba(127, 219, 255, ${nearOpacity})`;
            ctx.lineWidth = nearLineWidth;
            ctx.beginPath();
            for (let x = -nearOffsetX; x <= CANVAS_WIDTH + nearSpacing; x += nearSpacing) {
                ctx.moveTo(x, 0);
                ctx.lineTo(x, CANVAS_HEIGHT);
            }
            for (let y = -nearOffsetY; y <= CANVAS_HEIGHT + nearSpacing; y += nearSpacing) {
                ctx.moveTo(0, y);
                ctx.lineTo(CANVAS_WIDTH, y);
            }
            ctx.stroke();

            // 5. CRT Scanlines (cached pattern)
            ctx.globalAlpha = 0.3;
            ctx.fillStyle = cachedScanlinePattern;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            ctx.globalAlpha = 1;

            // 6. Vignette (cached gradient)
            ctx.globalAlpha = 1;
            ctx.fillStyle = cachedVignetteGradient;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            ctx.globalAlpha = 1;
        }

        // ============================================================
        // SHIELD ARC (around player in world space)
        // ============================================================

        function renderShieldArc() {
            if (!player || (player.shield <= 0 && shieldRechargeTimer <= 0)) return;
            // Hide arc during shockwave phase (the shockwave IS the visual)
            if (shieldBreakState && shieldBreakState.phase === 'shockwave') return;

            const shieldPercent = player.shield / PLAYER_MAX_SHIELD;
            const filledCount = Math.ceil(shieldPercent * SHIELD_SEGMENT_COUNT);
            const isLow = shieldPercent <= SHIELD_ARC_LOW_THRESHOLD && shieldPercent > 0;
            const isRegenerating = player.shieldRegenTimer >= SHIELD_REGEN_DELAY &&
                                   player.shield < PLAYER_MAX_SHIELD;

            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.globalAlpha = player.shieldArcOpacity;

            // Determine segment color based on state
            let arcColor = COLORS.HUD_SHIELD;

            if (player.shieldArcFlashColor) {
                arcColor = player.shieldArcFlashColor;
            } else if (isLow) {
                const pulse = Math.sin(player.shieldArcPulsePhase * 2) * 0.3 + 0.7;
                ctx.globalAlpha = player.shieldArcOpacity * pulse;
                arcColor = COLORS.HUD_WARNING;
            } else if (isRegenerating) {
                const pulse = Math.sin(player.shieldArcPulsePhase) * 0.2 + 0.8;
                ctx.globalAlpha = player.shieldArcOpacity * pulse;
                arcColor = COLORS.HUD_SHIELD_REGEN;
            }

            const stepRad = (Math.PI * 2) / SHIELD_SEGMENT_COUNT;

            // Draw empty (dim track) bars
            ctx.lineWidth = SHIELD_BAR_WIDTH;
            ctx.lineCap = 'butt';
            ctx.strokeStyle = hexToRGBA(COLORS.HUD_SHIELD, 0.08);
            for (let i = 0; i < SHIELD_SEGMENT_COUNT; i++) {
                const angle = -Math.PI / 2 + i * stepRad;
                const cos = Math.cos(angle);
                const sin = Math.sin(angle);
                ctx.beginPath();
                ctx.moveTo(cos * SHIELD_BAR_INNER_R, sin * SHIELD_BAR_INNER_R);
                ctx.lineTo(cos * SHIELD_BAR_OUTER_R, sin * SHIELD_BAR_OUTER_R);
                ctx.stroke();
            }

            // Draw filled (lit) bars
            ctx.strokeStyle = arcColor;
            for (let i = 0; i < filledCount; i++) {
                const angle = -Math.PI / 2 + i * stepRad;
                const cos = Math.cos(angle);
                const sin = Math.sin(angle);
                ctx.beginPath();
                ctx.moveTo(cos * SHIELD_BAR_INNER_R, sin * SHIELD_BAR_INNER_R);
                ctx.lineTo(cos * SHIELD_BAR_OUTER_R, sin * SHIELD_BAR_OUTER_R);
                ctx.stroke();
            }

            ctx.globalAlpha = 1;
            ctx.restore();
        }

        function renderShieldBreakEffects() {
            if (!shieldBreakState || !player) return;
            const s = shieldBreakState;

            // ── SHOCKWAVE RING ──
            if (s.shockwaveActive) {
                const progress = s.shockwaveRadius / SHOCKWAVE_MAX_RADIUS;
                const ringAlpha = (1 - progress) * 0.9 + 0.1;
                const strokeWidth = SHOCKWAVE_RING_STROKE * (1 - progress * 0.5);

                ctx.save();
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = strokeWidth;
                ctx.globalAlpha = ringAlpha;
                ctx.beginPath();
                ctx.arc(player.x, player.y, s.shockwaveRadius, 0, Math.PI * 2);
                ctx.stroke();

                // Secondary cyan inner ring
                ctx.strokeStyle = COLORS.PLAYER;
                ctx.lineWidth = strokeWidth * 0.5;
                ctx.globalAlpha = ringAlpha * 0.6;
                ctx.beginPath();
                ctx.arc(player.x, player.y, s.shockwaveRadius * 0.88, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }

            // ── LIFE SLOTS OVERLAY ──
            if (s.phase === 'lifeslots' && s.lifeSlotAlpha > 0) {
                const totalWidth = (playerMaxHP - 1) * LIFE_SLOT_SPACING;
                const startX = player.x - totalWidth / 2;
                const slotY = player.y + LIFE_SLOT_OFFSET_Y;

                ctx.save();
                ctx.lineCap = 'round';

                for (let i = 0; i < playerMaxHP; i++) {
                    const slotX = startX + i * LIFE_SLOT_SPACING;
                    const isLost = (i === s.lostSlotIndex);
                    const isActive = (i < player.hp);

                    let alpha = s.lifeSlotAlpha;
                    let scale = LIFE_SLOT_SCALE;

                    if (isLost) {
                        const p = s.lostSlotProgress;
                        if (p < 0.35) {
                            // Pop up — scale 1.0 → 1.6, white flash
                            const popT = easeOutCubic(p / 0.35);
                            scale *= (1.0 + 0.6 * popT);
                            ctx.strokeStyle = '#FFFFFF';
                        } else {
                            // Shrink away — scale 1.6 → 0, fade out, white → red
                            const shrinkT = easeOutCubic((p - 0.35) / 0.65);
                            scale *= 1.6 * (1 - shrinkT);
                            alpha *= (1 - shrinkT);
                            ctx.strokeStyle = lerpColor('#FFFFFF', COLORS.HUD_RED, shrinkT);
                        }
                    } else if (isActive) {
                        ctx.strokeStyle = COLORS.PLAYER;
                    } else {
                        ctx.strokeStyle = COLORS.HUD_CYAN_DIM;
                        alpha *= 0.3;
                    }

                    ctx.globalAlpha = alpha;
                    ctx.save();
                    ctx.translate(slotX, slotY);
                    ctx.scale(scale, scale);
                    ctx.rotate(-Math.PI / 2);

                    ctx.lineWidth = 3;
                    drawShipPath(ctx, selectedStartingWeapon);
                    ctx.stroke();

                    ctx.restore();
                }

                ctx.globalAlpha = 1;
                ctx.restore();
            }
        }


        function renderPlayer() {
            const p = player;
            ctx.save();
            ctx.translate(p.x, p.y + p.bobOffset);
            ctx.rotate(p.angle * Math.PI / 180);
            ctx.translate(-PLAYER_PIVOT_OFFSET, 0);  // Aplica el offset del pivote

            
            // Thruster flame
            if (p.thrusterScale > 0) {
                ctx.fillStyle = COLORS.PLAYER;
                ctx.globalAlpha = 0.8;
                const flameLength = 10 + p.thrusterScale * (5 + p.thrustEffort * 25);
                if (selectedStartingWeapon === 'void_blade') {
                    const fl = flameLength * 0.8;
                    ctx.beginPath();
                    ctx.moveTo(-10, -19);
                    ctx.lineTo(-18 - fl, -16);
                    ctx.lineTo(-20, -12);
                    ctx.closePath();
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(-20, 12);
                    ctx.lineTo(-18 - fl, 16);
                    ctx.lineTo(-10, 19);
                    ctx.closePath();
                    ctx.fill();
                } else if (selectedStartingWeapon === 'fusion_beam') {
                    const fl = flameLength * 0.7;
                    const fls = flameLength * 0.4;
                    // Outer top
                    ctx.beginPath();
                    ctx.moveTo(-12, -12);
                    ctx.lineTo(-12 - fls, -10);
                    ctx.lineTo(-12, -8);
                    ctx.closePath();
                    ctx.fill();
                    // Inner top
                    ctx.beginPath();
                    ctx.moveTo(-12, -6);
                    ctx.lineTo(-12 - fl, -3);
                    ctx.lineTo(-12, 0);
                    ctx.closePath();
                    ctx.fill();
                    // Inner bottom
                    ctx.beginPath();
                    ctx.moveTo(-12, 0);
                    ctx.lineTo(-12 - fl, 3);
                    ctx.lineTo(-12, 6);
                    ctx.closePath();
                    ctx.fill();
                    // Outer bottom
                    ctx.beginPath();
                    ctx.moveTo(-12, 8);
                    ctx.lineTo(-12 - fls, 10);
                    ctx.lineTo(-12, 12);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.moveTo(-12, -6);
                    ctx.lineTo(-12 - flameLength, 0);
                    ctx.lineTo(-12, 6);
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }
            
            // Ship body - outline only style (shape varies by starting weapon)
            ctx.strokeStyle = COLORS.PLAYER;
            ctx.lineWidth = 3;
            ctx.shadowColor = COLORS.PLAYER;
            ctx.shadowBlur = 20;

            drawShipPath(ctx, selectedStartingWeapon);
            ctx.stroke();
            
            ctx.shadowBlur = 0;
            ctx.restore();
        }

        function renderAura() {
            if (!activeWeapons.includes('plasma_field') || !player) return;

            const stats = getWeaponStats();
            const auraColor = WEAPONS['plasma_field'].color;
            const currentRadius = stats.auraRadius;
            const isEvolved = stats.hasAnnihilation;

            ctx.save();

            // Outer glow ring
            ctx.strokeStyle = auraColor;
            ctx.lineWidth = isEvolved ? 4 : 3;
            ctx.globalAlpha = isEvolved ? 0.7 : 0.6;
            ctx.shadowColor = auraColor;
            ctx.shadowBlur = ENABLE_GLOW_EFFECTS ? 15 : 0;
            ctx.beginPath();
            ctx.arc(player.x, player.y, currentRadius, 0, Math.PI * 2);
            ctx.stroke();

            // Semi-transparent fill
            ctx.globalAlpha = isEvolved ? 0.12 : 0.1;
            ctx.fillStyle = auraColor;
            ctx.fill();

            // Inner ring
            ctx.globalAlpha = 0.3;
            ctx.lineWidth = 1.5;
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(player.x, player.y, currentRadius * 0.7, 0, Math.PI * 2);
            ctx.stroke();

            // Evolution: additional rings showing instability
            if (isEvolved) {
                // Second inner ring at 40% radius
                ctx.globalAlpha = 0.25;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(player.x, player.y, currentRadius * 0.4, 0, Math.PI * 2);
                ctx.stroke();

                // Rotating dashed outer ring
                ctx.globalAlpha = 0.35;
                ctx.lineWidth = 2;
                ctx.setLineDash([8, 12]);
                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.rotate(auraState.pulseAnimation * 0.3);
                ctx.beginPath();
                ctx.arc(0, 0, currentRadius + 4, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
                ctx.setLineDash([]);
            }

            ctx.restore();
        }

        function renderFusionBeam() {
            if (!activeWeapons.includes('fusion_beam') || !player) return;

            const stats = getWeaponStats();
            const hasTargets = beamState.targets.length > 0 || beamState.siphonBeams.length > 0 || beamState.burnEffects.length > 0;

            ctx.save();
            ctx.lineCap = 'round';

            // Origin circle around player (always visible when fusion beam equipped)
            const circlePulse = 0.25 + Math.sin(Date.now() / 600) * 0.1;
            ctx.strokeStyle = COLORS.PLAYER;
            ctx.lineWidth = stats.beamWidth;
            ctx.globalAlpha = hasTargets ? 0.6 : circlePulse;
            ctx.beginPath();
            ctx.arc(player.x, player.y, BEAM_ORIGIN_RADIUS, 0, Math.PI * 2);
            ctx.stroke();
            // Inner white core (matches beam visual)
            if (hasTargets) {
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = stats.beamWidth * 0.4;
                ctx.globalAlpha = 0.8;
                ctx.beginPath();
                ctx.arc(player.x, player.y, BEAM_ORIGIN_RADIUS, 0, Math.PI * 2);
                ctx.stroke();
            }

            if (!hasTargets) { ctx.restore(); return; }

            for (let i = 0; i < beamState.targets.length; i++) {
                const t = beamState.targets[i];
                if (!t.enemy || t.enemy.hp <= 0) continue;

                // Calculate beam origin on circle edge
                const dx = t.enemy.x - player.x;
                const dy = t.enemy.y - player.y;
                const angle = Math.atan2(dy, dx);
                const originX = player.x + Math.cos(angle) * BEAM_ORIGIN_RADIUS;
                const originY = player.y + Math.sin(angle) * BEAM_ORIGIN_RADIUS;

                const rampFactor = 1 + t.rampCurrent * 0.3;
                const width = stats.beamWidth * rampFactor;
                const alpha = 0.6;

                // Main beam line
                ctx.strokeStyle = COLORS.PLAYER;
                ctx.lineWidth = width;
                ctx.globalAlpha = alpha;
                ctx.beginPath();
                ctx.moveTo(originX, originY);
                ctx.lineTo(t.enemy.x, t.enemy.y);
                ctx.stroke();

                // Inner white core
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = width * 0.4;
                ctx.globalAlpha = 0.8;
                ctx.beginPath();
                ctx.moveTo(originX, originY);
                ctx.lineTo(t.enemy.x, t.enemy.y);
                ctx.stroke();

                // Impact point flash
                const flashSize = 4 + Math.sin(Date.now() / 80) * 2;
                ctx.globalAlpha = 0.7;
                ctx.fillStyle = COLORS.PLAYER;
                ctx.beginPath();
                ctx.arc(t.enemy.x, t.enemy.y, flashSize, 0, Math.PI * 2);
                ctx.fill();

                // Chain beams from target to nearby enemies
                if (t.chainTargets && t.chainTargets.length > 0) {
                    for (const ce of t.chainTargets) {
                        if (!ce || ce.hp <= 0 || ce.dead) continue;
                        // Chain beam line (thinner, slightly dimmer)
                        ctx.strokeStyle = COLORS.PLAYER;
                        ctx.lineWidth = 3;
                        ctx.globalAlpha = 0.4;
                        ctx.beginPath();
                        ctx.moveTo(t.enemy.x, t.enemy.y);
                        ctx.lineTo(ce.x, ce.y);
                        ctx.stroke();

                        // Chain beam white core
                        ctx.strokeStyle = '#FFFFFF';
                        ctx.lineWidth = 1.2;
                        ctx.globalAlpha = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(t.enemy.x, t.enemy.y);
                        ctx.lineTo(ce.x, ce.y);
                        ctx.stroke();
                    }
                }
            }

            // Burn effects: pulsing orange glow
            for (const burn of beamState.burnEffects) {
                if (!burn.enemy || burn.enemy.hp <= 0 || burn.enemy.dead) continue;
                const pulse = 0.3 + Math.sin(Date.now() / 100) * 0.15;
                ctx.globalAlpha = pulse;
                ctx.strokeStyle = '#FF8800';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(burn.enemy.x, burn.enemy.y, 18, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Siphon Nexus beams (evolution)
            for (const sb of beamState.siphonBeams) {
                const lifeRatio = sb.duration / 2.0;
                for (const st of sb.targets) {
                    if (!st.enemy || st.enemy.hp <= 0) continue;
                    ctx.strokeStyle = COLORS.PLAYER;
                    ctx.lineWidth = 3;
                    ctx.globalAlpha = 0.4 * lifeRatio;
                    ctx.beginPath();
                    ctx.moveTo(sb.x, sb.y);
                    ctx.lineTo(st.enemy.x, st.enemy.y);
                    ctx.stroke();

                    ctx.strokeStyle = '#FFFFFF';
                    ctx.lineWidth = 1.2;
                    ctx.globalAlpha = 0.5 * lifeRatio;
                    ctx.beginPath();
                    ctx.moveTo(sb.x, sb.y);
                    ctx.lineTo(st.enemy.x, st.enemy.y);
                    ctx.stroke();
                }
            }

            ctx.globalAlpha = 1;
            ctx.restore();
        }

        function renderOrbitals() {
            if (!activeWeapons.includes('orbital_shield') || !player) return;

            const stats = getWeaponStats();
            const orbitalRadius = ORBITAL_RADIUS;
            let orbitalSize = ORBITAL_SIZE * stats.orbSizeMulti;

            // Outline style for orbitals (no glow for performance)
            ctx.strokeStyle = COLORS.PLAYER;
            ctx.lineWidth = 2.5;

            for (const orb of orbitals) {
                const orbX = player.x + Math.cos(orb.angle) * orbitalRadius;
                const orbY = player.y + Math.sin(orb.angle) * orbitalRadius;

                ctx.beginPath();
                ctx.arc(orbX, orbY, orbitalSize, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        function renderLightning() {
            if (lightningEffects.length === 0) return;

            for (const effect of lightningEffects) {
                if (effect.points.length < 2) continue;

                const alpha = effect.life / effect.maxLife;

                // Render 3 layers: outer glow, mid glow, core
                for (let layer = 2; layer >= 0; layer--) {
                    ctx.beginPath();
                    ctx.moveTo(effect.points[0].x, effect.points[0].y);

                    // Draw through all pre-computed zigzag points
                    for (let i = 1; i < effect.points.length; i++) {
                        ctx.lineTo(effect.points[i].x, effect.points[i].y);
                    }

                    // Layer styling (narrow lightning)
                    if (layer === 0) {
                        // Core: bright white
                        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                        ctx.lineWidth = 1.5;
                    } else if (layer === 1) {
                        // Mid: purple
                        ctx.strokeStyle = hexToRGBA(COLORS.PLAYER, alpha * 0.8);
                        ctx.lineWidth = 3;
                    } else {
                        // Outer: blue glow
                        ctx.strokeStyle = hexToRGBA(COLORS.PLAYER, alpha * 0.5);
                        ctx.lineWidth = 6;
                    }

                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.stroke();
                }
            }
        }

        function renderNovaBeam() {
            if (novaBeamEffects.length === 0) return;

            for (const beam of novaBeamEffects) {
                const alpha = beam.life / beam.maxLife;

                // 3 layers: outer glow → mid → core
                for (let layer = 2; layer >= 0; layer--) {
                    ctx.beginPath();
                    ctx.moveTo(beam.x1, beam.y1);
                    ctx.lineTo(beam.x2, beam.y2);

                    if (layer === 0) {
                        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                        ctx.lineWidth = 4;
                    } else if (layer === 1) {
                        ctx.strokeStyle = `rgba(255, 228, 181, ${alpha * 0.7})`;
                        ctx.lineWidth = 12;
                    } else {
                        ctx.strokeStyle = `rgba(255, 215, 0, ${alpha * 0.3})`;
                        ctx.lineWidth = 24;
                    }

                    ctx.lineCap = 'round';
                    ctx.shadowColor = '#FFD700';
                    ctx.shadowBlur = ENABLE_GLOW_EFFECTS ? 20 * alpha : 0;
                    ctx.stroke();
                }
            }
            ctx.shadowBlur = 0;
        }

        function renderBullets() {
            // Sort bullets by type for batched rendering
            const byType = { laser: [], beam: [], rocket: [], spread: [], mini_rocket: [], armageddon_rocket: [], turret: [], turret_rocket: [] };

            for (const b of bullets) {
                if (shouldRenderEntity(b, CULLING_DISTANCES.bullets)) {
                    const type = b.type || 'laser';
                    if (byType[type]) byType[type].push(b);
                    else byType.laser.push(b);
                }
            }

            // Batch render lasers
            if (byType.laser.length > 0) {
                ctx.shadowBlur = ENABLE_GLOW_EFFECTS ? 8 : 0;

                for (const b of byType.laser) {
                    const color = b.color || COLORS.BULLET;
                    ctx.strokeStyle = color;
                    ctx.shadowColor = color;
                    const angle = Math.atan2(b.vy, b.vx);
                    ctx.lineWidth = 5;
                    const len = 24;
                    ctx.beginPath();
                    ctx.moveTo(b.x - Math.cos(angle) * len, b.y - Math.sin(angle) * len);
                    ctx.lineTo(b.x, b.y);
                    ctx.stroke();
                }
            }

            // Batch render beams
            if (byType.beam.length > 0) {
                ctx.shadowBlur = ENABLE_GLOW_EFFECTS ? 8 : 0;

                for (const b of byType.beam) {
                    const angle = Math.atan2(b.vy, b.vx);
                    ctx.strokeStyle = b.color || COLORS.BULLET;
                    ctx.shadowColor = b.color || COLORS.BULLET;
                    ctx.lineWidth = 5;

                    const len = 24;
                    ctx.beginPath();
                    ctx.moveTo(b.x - Math.cos(angle) * len, b.y - Math.sin(angle) * len);
                    ctx.lineTo(b.x, b.y);
                    ctx.stroke();
                }
            }

            // Batch render spread shots
            if (byType.spread.length > 0) {
                ctx.strokeStyle = COLORS.GOLD;
                ctx.shadowColor = COLORS.GOLD;
                ctx.shadowBlur = ENABLE_GLOW_EFFECTS ? 6 : 0;
                ctx.lineWidth = 2;

                for (const b of byType.spread) {
                    const angle = Math.atan2(b.vy, b.vx);
                    const len = 10;
                    ctx.beginPath();
                    ctx.moveTo(b.x - Math.cos(angle) * len, b.y - Math.sin(angle) * len);
                    ctx.lineTo(b.x, b.y);
                    ctx.stroke();
                }
            }


            // Batch render rockets with trail
            if (byType.rocket.length > 0) {
                ctx.shadowColor = COLORS.PLAYER;
                ctx.shadowBlur = ENABLE_GLOW_EFFECTS ? 10 : 0;

                for (const b of byType.rocket) {
                    // Draw trail with gap and width ramp
                    if (b.trail && b.trail.length > 1) {
                        const gap = 4, ramp = 6, maxW = 2.5, alphaMax = 0.6;
                        const lastDrawn = b.trail.length - 1 - gap;
                        if (lastDrawn >= 1) {
                            for (let t = 0; t < lastDrawn; t++) {
                                const baseFade = (t + 1) / lastDrawn;
                                const pointsFromEnd = lastDrawn - 1 - t;
                                const rampFactor = pointsFromEnd < ramp ? pointsFromEnd / ramp : 1.0;
                                const alpha = alphaMax * baseFade * rampFactor;
                                const width = maxW * baseFade * rampFactor;
                                if (alpha < 0.02) continue;
                                ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                                ctx.lineWidth = width;
                                ctx.beginPath();
                                ctx.moveTo(b.trail[t].x, b.trail[t].y);
                                ctx.lineTo(b.trail[t + 1].x, b.trail[t + 1].y);
                                ctx.stroke();
                            }
                        }
                    }

                    // Draw rocket — narrow capsule shape (rounded nose, flat back)
                    ctx.strokeStyle = COLORS.PLAYER;
                    ctx.lineWidth = 2;
                    const angle = Math.atan2(b.vy, b.vx);
                    ctx.save();
                    ctx.translate(b.x, b.y);
                    ctx.rotate(angle);
                    ctx.beginPath();
                    ctx.moveTo(-8, -1.8);
                    ctx.lineTo(6.2, -1.8);
                    ctx.arc(6.2, 0, 1.8, -Math.PI / 2, Math.PI / 2, false);
                    ctx.lineTo(-8, 1.8);
                    ctx.closePath();
                    ctx.stroke();
                    ctx.restore();
                }
            }

            // Batch render mini rockets with trail (same player color)
            if (byType.mini_rocket.length > 0) {
                ctx.shadowColor = COLORS.PLAYER;
                ctx.shadowBlur = ENABLE_GLOW_EFFECTS ? 6 : 0;

                for (const b of byType.mini_rocket) {
                    // Draw trail with gap and width ramp
                    if (b.trail && b.trail.length > 1) {
                        const gap = 3, ramp = 4, maxW = 1.8, alphaMax = 0.5;
                        const lastDrawn = b.trail.length - 1 - gap;
                        if (lastDrawn >= 1) {
                            for (let t = 0; t < lastDrawn; t++) {
                                const baseFade = (t + 1) / lastDrawn;
                                const pointsFromEnd = lastDrawn - 1 - t;
                                const rampFactor = pointsFromEnd < ramp ? pointsFromEnd / ramp : 1.0;
                                const alpha = alphaMax * baseFade * rampFactor;
                                const width = maxW * baseFade * rampFactor;
                                if (alpha < 0.02) continue;
                                ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                                ctx.lineWidth = width;
                                ctx.beginPath();
                                ctx.moveTo(b.trail[t].x, b.trail[t].y);
                                ctx.lineTo(b.trail[t + 1].x, b.trail[t + 1].y);
                                ctx.stroke();
                            }
                        }
                    }

                    // Draw mini rocket — narrow capsule shape
                    ctx.strokeStyle = COLORS.PLAYER;
                    ctx.lineWidth = 1.5;
                    const angle = Math.atan2(b.vy, b.vx);
                    const scale = b.size || 0.6;
                    ctx.save();
                    ctx.translate(b.x, b.y);
                    ctx.rotate(angle);
                    ctx.scale(scale, scale);
                    ctx.beginPath();
                    ctx.moveTo(-6.5, -1.5);
                    ctx.lineTo(5, -1.5);
                    ctx.arc(5, 0, 1.5, -Math.PI / 2, Math.PI / 2, false);
                    ctx.lineTo(-6.5, 1.5);
                    ctx.closePath();
                    ctx.stroke();
                    ctx.restore();
                }
            }

            // Batch render armageddon rockets with thick orange trail
            if (byType.armageddon_rocket.length > 0) {
                for (const b of byType.armageddon_rocket) {
                    // Draw thick orange trail with gap and width ramp
                    if (b.trail && b.trail.length > 1) {
                        const gap = 5, ramp = 8, maxW = 5, alphaMax = 0.7;
                        const lastDrawn = b.trail.length - 1 - gap;
                        if (lastDrawn >= 1) {
                            for (let t = 0; t < lastDrawn; t++) {
                                const baseFade = (t + 1) / lastDrawn;
                                const pointsFromEnd = lastDrawn - 1 - t;
                                const rampFactor = pointsFromEnd < ramp ? pointsFromEnd / ramp : 1.0;
                                const alpha = alphaMax * baseFade * rampFactor;
                                const width = maxW * baseFade * rampFactor;
                                if (alpha < 0.02) continue;
                                ctx.strokeStyle = `rgba(255, 107, 0, ${alpha})`;
                                ctx.lineWidth = width;
                                ctx.beginPath();
                                ctx.moveTo(b.trail[t].x, b.trail[t].y);
                                ctx.lineTo(b.trail[t + 1].x, b.trail[t + 1].y);
                                ctx.stroke();
                            }
                        }
                    }

                    // Draw mega rocket (2x scale) — narrow capsule shape
                    ctx.strokeStyle = '#FF6B00';
                    ctx.lineWidth = 3;
                    const angle = Math.atan2(b.vy, b.vx);
                    ctx.save();
                    ctx.translate(b.x, b.y);
                    ctx.rotate(angle);
                    ctx.scale(2, 2);
                    ctx.beginPath();
                    ctx.moveTo(-8, -1.8);
                    ctx.lineTo(6.2, -1.8);
                    ctx.arc(6.2, 0, 1.8, -Math.PI / 2, Math.PI / 2, false);
                    ctx.lineTo(-8, 1.8);
                    ctx.closePath();
                    ctx.stroke();
                    // Inner detail capsule
                    ctx.lineWidth = 1.5;
                    ctx.strokeStyle = '#FFD700';
                    ctx.beginPath();
                    ctx.moveTo(-5, -1);
                    ctx.lineTo(5.2, -1);
                    ctx.arc(5.2, 0, 1, -Math.PI / 2, Math.PI / 2, false);
                    ctx.lineTo(-5, 1);
                    ctx.closePath();
                    ctx.stroke();
                    ctx.restore();
                }
            }

            // Batch render turret bullets (small cyan circles, no glow)
            if (byType.turret.length > 0) {
                ctx.shadowBlur = 0;
                ctx.fillStyle = COLORS.PLAYER;
                for (const b of byType.turret) {
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Batch render turret rockets — capsule shape, no trail
            if (byType.turret_rocket.length > 0) {
                ctx.shadowBlur = 0;
                ctx.strokeStyle = COLORS.PLAYER;
                ctx.lineWidth = 2;
                for (const b of byType.turret_rocket) {
                    const angle = Math.atan2(b.vy, b.vx);
                    ctx.save();
                    ctx.translate(b.x, b.y);
                    ctx.rotate(angle);
                    ctx.beginPath();
                    ctx.moveTo(-6.5, -1.5);
                    ctx.lineTo(5, -1.5);
                    ctx.arc(5, 0, 1.5, -Math.PI / 2, Math.PI / 2, false);
                    ctx.lineTo(-6.5, 1.5);
                    ctx.closePath();
                    ctx.stroke();
                    ctx.restore();
                }
            }

            ctx.shadowBlur = 0;
        }

        function renderEnemyBullets() {
            ctx.strokeStyle = COLORS.ENEMY_BULLET;
            ctx.lineWidth = 2;
            ctx.shadowColor = COLORS.ENEMY_BULLET;
            ctx.shadowBlur = ENABLE_GLOW_EFFECTS ? 8 : 0;

            for (const b of enemyBullets) {
                // Skip rendering if too far from camera
                if (!shouldRenderEntity(b, CULLING_DISTANCES.enemyBullets)) continue;

                ctx.beginPath();
                ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
                ctx.stroke();
            }

            ctx.shadowBlur = 0;
        }

        function renderDrones() {
            if (drones.length === 0) return;

            const droneColor = COLORS.PLAYER;

            for (const d of drones) {
                // Skip rendering if too far from camera
                if (!shouldRenderEntity(d, CULLING_DISTANCES.drones)) continue;

                // Draw trail (trail[0]=oldest, trail[end]=newest)
                if (d.trail.length > 1) {
                    ctx.strokeStyle = droneColor;
                    ctx.lineWidth = 1;
                    ctx.globalAlpha = 0.4;
                    ctx.beginPath();
                    ctx.moveTo(d.trail[0].x, d.trail[0].y);
                    for (let i = 1; i < d.trail.length; i++) {
                        ctx.lineTo(d.trail[i].x, d.trail[i].y);
                    }
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }

                // Draw drone body
                ctx.save();
                ctx.translate(d.x, d.y);
                ctx.rotate(d.angle * Math.PI / 180);

                if (d.isHive) {
                    // === HIVE DRONE: outline-only with inner detail ===
                    const size = HIVE_DRONE_SIZE;
                    ctx.strokeStyle = droneColor;
                    ctx.lineWidth = 1.5;

                    // Outer hexagon (outline only)
                    ctx.beginPath();
                    for (let j = 0; j < 6; j++) {
                        const a = (j / 6) * Math.PI * 2 - Math.PI / 2;
                        const px = Math.cos(a) * size;
                        const py = Math.sin(a) * size;
                        if (j === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.stroke();

                    // Inner hexagon detail stroke
                    ctx.lineWidth = 1;
                    ctx.globalAlpha = 0.5;
                    const innerSize = size * 0.5;
                    ctx.beginPath();
                    for (let j = 0; j < 6; j++) {
                        const a = (j / 6) * Math.PI * 2 - Math.PI / 2;
                        const px = Math.cos(a) * innerSize;
                        const py = Math.sin(a) * innerSize;
                        if (j === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    ctx.globalAlpha = 1;

                    // Center dot
                    ctx.fillStyle = '#FFFFFF';
                    ctx.beginPath();
                    ctx.arc(0, 0, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // === KAMIKAZE DRONE: filled hexagon ===
                    ctx.strokeStyle = droneColor;
                    ctx.fillStyle = droneColor;
                    ctx.lineWidth = 1.5;
                    ctx.globalAlpha = 0.4;
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
                        const x = Math.cos(angle) * DRONE_SIZE;
                        const y = Math.sin(angle) * DRONE_SIZE;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    ctx.stroke();

                    // Inner glow dot
                    ctx.fillStyle = '#FFFFFF';
                    ctx.beginPath();
                    ctx.arc(0, 0, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            }
        }

        function renderEnemies() {
            // Sort enemies by type for batched rendering
            const byType = { SCOUT: [], KAMIKAZE: [], TANK: [], ALIEN: [] };

            for (const e of enemies) {
                if (shouldRenderEntity(e, CULLING_DISTANCES.enemies)) {
                    byType[e.type].push(e);
                }
            }

            // Batch render scouts (no shadowBlur for performance)
            if (byType.SCOUT.length > 0) {
                const config = ENEMY_TYPES['SCOUT'];
                ctx.strokeStyle = config.color;
                ctx.lineWidth = 3;

                for (const e of byType.SCOUT) {
                    ctx.save();
                    ctx.translate(e.x, e.y);
                    ctx.rotate(e.angle * Math.PI / 180);

                    ctx.beginPath();
                    ctx.arc(0, 0, config.radius, 0, Math.PI * 2);
                    ctx.stroke();

                    ctx.globalAlpha = 0.4;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(0, 0, config.radius * 0.6, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.globalAlpha = 1;

                    ctx.restore();
                }
            }

            // Batch render kamikazes with trail (no shadowBlur for performance)
            if (byType.KAMIKAZE.length > 0) {
                const config = ENEMY_TYPES['KAMIKAZE'];

                for (const e of byType.KAMIKAZE) {
                    // Draw trail as fading line (same as rocket trail)
                    if (e.trail && e.trail.length > 1) {
                        for (let t = 0; t < e.trail.length - 1; t++) {
                            const alpha = (t + 1) / e.trail.length;
                            const width = 2 * alpha;
                            ctx.strokeStyle = `rgba(255, 154, 107, ${alpha * 0.6})`;
                            ctx.lineWidth = width;
                            ctx.beginPath();
                            ctx.moveTo(e.trail[t].x, e.trail[t].y);
                            ctx.lineTo(e.trail[t + 1].x, e.trail[t + 1].y);
                            ctx.stroke();
                        }
                    }

                    // Draw kamikaze shape
                    ctx.strokeStyle = config.color;
                    ctx.lineWidth = 3;
                    ctx.save();
                    ctx.translate(e.x, e.y);
                    ctx.rotate(e.angle * Math.PI / 180);

                    ctx.beginPath();
                    ctx.moveTo(config.radius, 0);
                    ctx.lineTo(-config.radius, -config.radius * 0.7);
                    ctx.lineTo(-config.radius * 0.5, 0);
                    ctx.lineTo(-config.radius, config.radius * 0.7);
                    ctx.closePath();
                    ctx.stroke();

                    ctx.restore();
                }
            }

            // Batch render tanks (no shadowBlur for performance)
            if (byType.TANK.length > 0) {
                const config = ENEMY_TYPES['TANK'];
                ctx.strokeStyle = config.color;
                ctx.lineWidth = 3;

                for (const e of byType.TANK) {
                    ctx.save();
                    ctx.translate(e.x, e.y);
                    ctx.rotate(e.angle * Math.PI / 180);

                    ctx.beginPath();
                    ctx.arc(0, 0, config.radius, 0, Math.PI * 2);
                    ctx.stroke();

                    ctx.globalAlpha = 0.4;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(0, 0, config.radius * 0.6, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.globalAlpha = 1;

                    ctx.restore();
                }
            }

            // Batch render aliens (large green enemies)
            if (byType.ALIEN.length > 0) {
                const config = ENEMY_TYPES['ALIEN'];

                for (const e of byType.ALIEN) {
                    ctx.save();
                    ctx.translate(e.x, e.y);
                    ctx.rotate(e.angle * Math.PI / 180);

                    // Outer circle
                    ctx.strokeStyle = config.color;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(0, 0, config.radius, 0, Math.PI * 2);
                    ctx.stroke();

                    // Inner hexagon
                    ctx.strokeStyle = config.outline;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const angle = (Math.PI / 3) * i + gameTime * 2;
                        const x = Math.cos(angle) * config.radius * 0.6;
                        const y = Math.sin(angle) * config.radius * 0.6;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.stroke();

                    // Pulsing core
                    ctx.fillStyle = config.color;
                    ctx.globalAlpha = 0.3 + Math.sin(gameTime * 5) * 0.15;
                    ctx.beginPath();
                    ctx.arc(0, 0, config.radius * 0.3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;

                    ctx.restore();
                }
            }

            ctx.shadowBlur = 0;
        }

        function renderPickups() {
            for (const p of pickups) {
                // Skip rendering if too far from camera
                if (!shouldRenderEntity(p, CULLING_DISTANCES.pickups)) continue;

                const bob = Math.sin(p.bobTimer * 4) * 3;
                const pulse = 1 + Math.sin(p.bobTimer * 6) * 0.1;
                
                ctx.save();
                ctx.translate(p.x, p.y + bob);
                ctx.scale(pulse, pulse);
                
                // Outline style
                if (p.type === 'health') {
                    ctx.strokeStyle = COLORS.POWERUP;
                    ctx.shadowColor = COLORS.POWERUP;
                } else {
                    ctx.strokeStyle = COLORS.GOLD;
                    ctx.shadowColor = COLORS.GOLD;
                }
                ctx.lineWidth = 2.5;
                ctx.shadowBlur = ENABLE_GLOW_EFFECTS ? 12 : 0;

                // Fade when about to expire
                if (p.life < 2) {
                    ctx.globalAlpha = p.life / 2;
                }

                if (p.type === 'health') {
                    // Diamond shape - outline only
                    ctx.beginPath();
                    ctx.moveTo(0, -10);
                    ctx.lineTo(8, 0);
                    ctx.lineTo(0, 10);
                    ctx.lineTo(-8, 0);
                    ctx.closePath();
                    ctx.stroke();
                }
                
                ctx.shadowBlur = 0;
                ctx.restore();
            }
        }
        
        function renderParticles() {
            for (const p of particles) {
                // Skip rendering if too far from camera
                if (!shouldRenderEntity(p, CULLING_DISTANCES.particles)) continue;

                const alpha = p.life / p.maxLife;
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = ENABLE_GLOW_EFFECTS ? 6 : 0;
                ctx.lineWidth = 2;

                if (p.type === 'shockwave') {
                    // Expanding ring effect
                    const progress = 1 - (p.life / p.maxLife);
                    const currentSize = p.size + (p.maxSize - p.size) * progress;
                    ctx.lineWidth = 3 * alpha;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, currentSize, 0, Math.PI * 2);
                    ctx.stroke();
                } else if (p.type === 'spark') {
                    // Line spark style
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle * Math.PI / 180);
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(p.size * 1.5, 0);
                    ctx.stroke();
                    ctx.restore();
                } else if (p.type === 'thruster') {
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation || 0);
                    ctx.fillStyle = p.color;
                    const s = p.size;
                    if (p.thrusterShape === 'square') {
                        const hs = s * 0.4;
                        ctx.fillRect(-hs, -hs, hs * 2, hs * 2);
                    } else if (p.thrusterShape === 'circle') {
                        ctx.beginPath();
                        ctx.arc(0, 0, s * 0.4, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.beginPath();
                        ctx.moveTo(0, -s * 0.6);
                        ctx.lineTo(s * 0.5, s * 0.4);
                        ctx.lineTo(-s * 0.5, s * 0.4);
                        ctx.closePath();
                        ctx.fill();
                    }
                    ctx.restore();
                } else if (p.type === 'ring') {
                    // Expanding ring for drone explosions (efficient)
                    const progress = 1 - (p.life / p.maxLife);
                    const radius = p.size + (p.maxSize - p.size) * progress;
                    ctx.lineWidth = 3 * alpha;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
                    ctx.stroke();
                } else if (p.type === 'sonic_ring') {
                    // Sonic shockwave ring for piercing bullets (ellipse = circle seen from side)
                    const progress = 1 - (p.life / p.maxLife);
                    const radius = p.size + (p.maxSize - p.size) * progress;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle);
                    ctx.scale(0.25, 1);
                    ctx.lineWidth = (2.5 - progress * 2) * alpha;
                    ctx.beginPath();
                    ctx.arc(0, 0, radius, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                } else {
                    // Small line spark
                    const angle = Math.atan2(p.vy || 0, p.vx || 0);
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x + Math.cos(angle) * p.size * 2, p.y + Math.sin(angle) * p.size * 2);
                    ctx.stroke();
                }
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }
        
        function renderFloatingTexts() {
            ctx.textAlign = 'center';
            ctx.font = 'bold 16px "Segoe UI", sans-serif';

            for (const t of floatingTexts) {
                // Skip rendering if too far from camera
                if (!shouldRenderEntity(t, CULLING_DISTANCES.floatingTexts)) continue;

                const alpha = t.life / t.maxLife;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = t.color;
                ctx.shadowColor = t.color;
                ctx.shadowBlur = ENABLE_GLOW_EFFECTS ? 4 : 0;
                ctx.fillText(t.text, t.x, t.y);
            }
            
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }
        
        // ============================================================
        // GRAVITY MINES RENDERING
        // ============================================================

        function renderTurrets() {
            if (turrets.length === 0) return;
            const stats = getWeaponStats();

            for (const t of turrets) {
                if (!shouldRenderEntity(t, CULLING_DISTANCES.enemies)) continue;

                const lifeRatio = t.life / t.maxLife;
                const baseAlpha = 0.4 + lifeRatio * 0.6;

                // Range circle
                ctx.beginPath();
                ctx.arc(t.x, t.y, stats.turretRange, 0, Math.PI * 2);
                ctx.strokeStyle = COLORS.PLAYER;
                ctx.globalAlpha = 0.08;
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.globalAlpha = 1;

                // Hexagonal base
                ctx.save();
                ctx.translate(t.x, t.y);

                ctx.beginPath();
                for (let j = 0; j < 6; j++) {
                    const a = (j / 6) * Math.PI * 2 - Math.PI / 2;
                    const hx = Math.cos(a) * 24;
                    const hy = Math.sin(a) * 24;
                    if (j === 0) ctx.moveTo(hx, hy);
                    else ctx.lineTo(hx, hy);
                }
                ctx.closePath();
                ctx.fillStyle = '#1a1a2e';
                ctx.fill();
                ctx.strokeStyle = COLORS.PLAYER;
                ctx.globalAlpha = baseAlpha;
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.globalAlpha = 1;

                // Cannon (rotated rectangle)
                ctx.save();
                ctx.rotate(t.angle);
                ctx.fillStyle = COLORS.PLAYER;
                ctx.globalAlpha = baseAlpha;
                ctx.fillRect(4, -3, 20, 6);

                // Muzzle flash — pre-rendered glow sprite at cannon tip
                const flashProgress = t.fireTimer / stats.turretFireRate;
                if (flashProgress > 0.7) {
                    const flashAlpha = (flashProgress - 0.7) / 0.3; // 1→0 fade
                    const flashSize = 10 + flashAlpha * 8; // 18→10 shrink
                    ctx.globalAlpha = flashAlpha * 0.9;
                    ctx.drawImage(turretMuzzleSprite, 26 - flashSize, -flashSize, flashSize * 2, flashSize * 2);
                }
                ctx.globalAlpha = 1;
                ctx.restore();

                // Center dot
                ctx.beginPath();
                ctx.arc(0, 0, 6, 0, Math.PI * 2);
                ctx.fillStyle = COLORS.PLAYER;
                ctx.globalAlpha = baseAlpha;
                ctx.fill();
                ctx.globalAlpha = 1;

                ctx.restore(); // Restore from translate
            }

            // Combat Station beams between turrets
            if (stats.hasCombatStation && turrets.length >= 2) {
                const pulseAlpha = 0.2 + 0.1 * Math.sin(gameTime * 4);
                ctx.strokeStyle = COLORS.PLAYER;
                ctx.lineWidth = 2;

                for (let a = 0; a < turrets.length - 1; a++) {
                    for (let b = a + 1; b < turrets.length; b++) {
                        const tA = turrets[a];
                        const tB = turrets[b];
                        const dx = tB.x - tA.x;
                        const dy = tB.y - tA.y;
                        if (dx * dx + dy * dy > 500 * 500) continue;

                        ctx.globalAlpha = pulseAlpha;
                        ctx.beginPath();
                        ctx.moveTo(tA.x, tA.y);
                        ctx.lineTo(tB.x, tB.y);
                        ctx.stroke();
                    }
                }
                ctx.globalAlpha = 1;
            }
        }

        function renderMines() {
            if (mines.length === 0 && radiationFields.length === 0) return;
            const stats = getWeaponStats();

            // Render radiation fields first (underneath everything)
            for (const field of radiationFields) {
                if (!shouldRenderEntity(field, CULLING_DISTANCES.particles)) continue;
                const fieldAlpha = Math.min(1, field.timer / 0.5) * 0.12;
                const pulse = 1 + Math.sin(gameTime * 3) * 0.05;
                ctx.save();
                ctx.globalAlpha = fieldAlpha;
                ctx.fillStyle = COLORS.PLAYER;
                ctx.beginPath();
                ctx.arc(field.x, field.y, field.radius * pulse, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            // Render mines
            for (const mine of mines) {
                if (!shouldRenderEntity(mine, CULLING_DISTANCES.particles)) continue;

                // Gravity field boundary (always visible dashed circle)
                const gravRadius = mine.isBlackHole ? 500 : stats.mineGravityRadius;
                const ringColor = mine.isBlackHole ? '#8B00FF' : COLORS.PLAYER;
                ctx.save();
                ctx.globalAlpha = mine.isBlackHole ? 0.15 : 0.08;
                ctx.strokeStyle = ringColor;
                ctx.setLineDash([6, 8]);
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(mine.x, mine.y, gravRadius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);

                // Gravity pull rings — slow shrink from edge to center
                const ringCount = 3;
                const ringSpeed = 3.0; // seconds per full cycle
                ctx.lineWidth = 1;
                ctx.strokeStyle = ringColor;
                for (let r = 0; r < ringCount; r++) {
                    const phase = ((mine.pulsePhase / 4 / ringSpeed) + r / ringCount) % 1; // 0→1 loop
                    const radius = gravRadius * (1 - phase);
                    // Smooth fade: peak opacity at mid-travel, fade at edges
                    const alpha = Math.sin(phase * Math.PI) * 0.12;
                    if (radius > 14) {
                        ctx.globalAlpha = alpha;
                        ctx.beginPath();
                        ctx.arc(mine.x, mine.y, radius, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                }

                // Event horizon ring
                if (stats.mineEventHorizon > 0) {
                    ctx.globalAlpha = 0.2;
                    ctx.strokeStyle = COLORS.PLAYER;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(mine.x, mine.y, stats.mineEventHorizon, 0, Math.PI * 2);
                    ctx.stroke();
                }
                ctx.restore();

                // Mine body
                const pulseR = mine.armed ? 14 + Math.sin(mine.pulsePhase) * 4 : 14;
                const mineColor = mine.isBlackHole ? '#8B00FF' : COLORS.PLAYER;
                ctx.save();
                ctx.globalAlpha = mine.armed ? 1.0 : 0.4;
                ctx.strokeStyle = mineColor;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(mine.x, mine.y, pulseR, 0, Math.PI * 2);
                ctx.stroke();

                // Inner detail: spikes
                for (let j = 0; j < 6; j++) {
                    const a = (j / 6) * Math.PI * 2 + mine.pulsePhase * 0.3;
                    ctx.beginPath();
                    ctx.moveTo(mine.x + Math.cos(a) * pulseR, mine.y + Math.sin(a) * pulseR);
                    ctx.lineTo(mine.x + Math.cos(a) * (pulseR + 6), mine.y + Math.sin(a) * (pulseR + 6));
                    ctx.stroke();
                }

                // Center dot
                ctx.globalAlpha = mine.armed ? 0.9 : 0.3;
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(mine.x, mine.y, 4, 0, Math.PI * 2);
                ctx.fill();

                // Arming progress arc
                if (mine.armTimer > 0 && mine.maxLife > 0) {
                    const armingDelay = stats.mineArmingDelay;
                    const progress = 1 - (mine.armTimer / armingDelay);
                    ctx.globalAlpha = 0.6;
                    ctx.strokeStyle = '#FFFFFF';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(mine.x, mine.y, pulseR + 4, -Math.PI / 2, -Math.PI / 2 + progress * Math.PI * 2);
                    ctx.stroke();
                }

                // Black hole indicator
                if (mine.isBlackHole && mine.armed) {
                    ctx.globalAlpha = 0.3 + Math.sin(mine.pulsePhase * 2) * 0.15;
                    ctx.strokeStyle = '#8B00FF';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(mine.x, mine.y, pulseR + 10 + Math.sin(mine.pulsePhase) * 4, 0, Math.PI * 2);
                    ctx.stroke();
                }

                ctx.restore();
            }
        }

        // ============================================================
        // NEW WEAPON RENDERING
        // ============================================================

        function renderSnares() {
            if (snares.length === 0) return;
            for (const s of snares) {
                if (!shouldRenderEntity(s, CULLING_DISTANCES.particles)) continue;
                const alpha = Math.min(1, s.life / Math.min(2, s.maxLife));

                ctx.save();
                ctx.globalAlpha = alpha;

                if (s.isCage) {
                    // Temporal Cage: hexagonal outline
                    ctx.strokeStyle = COLORS.PLAYER;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const angle = (i / 6) * Math.PI * 2 + gameTime * 0.3;
                        const hx = s.x + Math.cos(angle) * s.radius;
                        const hy = s.y + Math.sin(angle) * s.radius;
                        if (i === 0) ctx.moveTo(hx, hy);
                        else ctx.lineTo(hx, hy);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    // Inner rotating hex
                    ctx.globalAlpha = alpha * 0.3;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const angle = (i / 6) * Math.PI * 2 - gameTime * 0.5;
                        const hx = s.x + Math.cos(angle) * s.radius * 0.5;
                        const hy = s.y + Math.sin(angle) * s.radius * 0.5;
                        if (i === 0) ctx.moveTo(hx, hy);
                        else ctx.lineTo(hx, hy);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    // Fill
                    ctx.globalAlpha = alpha * 0.08;
                    ctx.fillStyle = COLORS.PLAYER;
                    ctx.fill();
                } else {
                    // Normal snare: dashed circle
                    ctx.strokeStyle = COLORS.PLAYER;
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([6, 8]);
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                    ctx.stroke();
                    // Inner circle
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.radius * 0.6, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    // Subtle fill
                    ctx.globalAlpha = alpha * 0.04 + Math.sin(gameTime * 3) * 0.02;
                    ctx.fillStyle = COLORS.PLAYER;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        function renderSlashEffects() {
            if (slashEffects.length === 0) return;
            for (const s of slashEffects) {
                const progress = 1 - (s.life / s.maxLife); // 0 at start, 1 at end
                if (progress < 0 || progress > 1) continue;

                // easeOutQuart: fast start, decelerates at the end
                const eased = 1 - Math.pow(1 - progress, 4);
                const currentR = s.radius * (0.05 + eased * 0.95);
                const alpha = 1 - progress * progress;
                if (alpha <= 0) continue;

                ctx.save();

                // Continuous gradient trail — filled sector fading from center outward
                const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, currentR);
                grad.addColorStop(0, hexToRGBA(COLORS.PLAYER, 0));
                grad.addColorStop(0.5, hexToRGBA(COLORS.PLAYER, alpha * 0.06));
                grad.addColorStop(0.85, hexToRGBA(COLORS.PLAYER, alpha * 0.18));
                grad.addColorStop(1, hexToRGBA(COLORS.PLAYER, alpha * 0.3));
                ctx.globalAlpha = 1;
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.moveTo(s.x, s.y);
                ctx.arc(s.x, s.y, currentR, s.angle - s.arc, s.angle + s.arc);
                ctx.closePath();
                ctx.fill();

                // Leading arc wavefront — thick with glow
                ctx.globalAlpha = alpha * 0.9;
                ctx.strokeStyle = s.color;
                ctx.lineWidth = 8 + (1 - progress) * 3;
                ctx.shadowColor = s.color;
                ctx.shadowBlur = 18;
                ctx.beginPath();
                ctx.arc(s.x, s.y, currentR, s.angle - s.arc, s.angle + s.arc);
                ctx.stroke();
                ctx.shadowBlur = 0;

                // Inner white flash
                ctx.globalAlpha = alpha * 0.5 * (1 - progress);
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(s.x, s.y, currentR * 0.92, s.angle - s.arc * 0.85, s.angle + s.arc * 0.85);
                ctx.stroke();

                ctx.restore();
            }
        }

        function renderRiftZones() {
            if (riftZones.length === 0) return;
            for (const rift of riftZones) {
                if (!shouldRenderEntity(rift, CULLING_DISTANCES.particles)) continue;
                const alpha = Math.min(1, rift.life / 0.5) * 0.5;

                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = COLORS.PLAYER;
                ctx.setLineDash([8, 6]);
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(rift.x, rift.y, rift.radius, rift.angle - rift.arc, rift.angle + rift.arc);
                ctx.stroke();
                ctx.setLineDash([]);

                // Fill area
                ctx.globalAlpha = alpha * 0.08;
                ctx.fillStyle = COLORS.PLAYER;
                ctx.beginPath();
                ctx.moveTo(rift.x, rift.y);
                ctx.arc(rift.x, rift.y, rift.radius, rift.angle - rift.arc, rift.angle + rift.arc);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        function drawUpgradeIcon(ctx, upgradeKey, cx, cy, color, size) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.save();
            ctx.translate(cx, cy);
            const s = size;
            if (upgradeKey === 'powerCore') {
                // Lightning bolt
                ctx.beginPath();
                ctx.moveTo(s * 0.15, -s);
                ctx.lineTo(-s * 0.25, -s * 0.1);
                ctx.lineTo(s * 0.15, s * 0.1);
                ctx.lineTo(-s * 0.15, s);
                ctx.stroke();
            } else if (upgradeKey === 'hullPlating') {
                // Double hexagon (shield)
                for (let ring = 0; ring < 2; ring++) {
                    const r = ring === 0 ? s * 0.9 : s * 0.5;
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const a = (i / 6) * Math.PI * 2 - Math.PI / 2;
                        if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
                        else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
                    }
                    ctx.closePath();
                    ctx.stroke();
                }
            } else if (upgradeKey === 'engineBoost') {
                // Double chevron pointing up
                for (let j = 0; j < 2; j++) {
                    const oy = j * s * 0.55 - s * 0.2;
                    ctx.beginPath();
                    ctx.moveTo(-s * 0.5, oy + s * 0.4);
                    ctx.lineTo(0, oy);
                    ctx.lineTo(s * 0.5, oy + s * 0.4);
                    ctx.stroke();
                }
            } else if (upgradeKey === 'xpAmplifier') {
                // 4-pointed star
                ctx.beginPath();
                for (let i = 0; i < 8; i++) {
                    const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
                    const r = i % 2 === 0 ? s * 0.9 : s * 0.35;
                    if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
                    else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
                }
                ctx.closePath();
                ctx.stroke();
            } else if (upgradeKey === 'crystalAttractor') {
                // Double diamond
                for (let ring = 0; ring < 2; ring++) {
                    const r = ring === 0 ? s * 0.9 : s * 0.45;
                    ctx.beginPath();
                    ctx.moveTo(0, -r);
                    ctx.lineTo(r * 0.6, 0);
                    ctx.lineTo(0, r);
                    ctx.lineTo(-r * 0.6, 0);
                    ctx.closePath();
                    ctx.stroke();
                }
            }
            ctx.restore();
        }

        function drawVerticalProgressBars(ctx, x, y, width, height, level, maxLevel, color) {
            const gap = 2;
            const barW = (width - (maxLevel - 1) * gap) / maxLevel;
            for (let i = 0; i < maxLevel; i++) {
                ctx.fillStyle = i < level ? color : 'rgba(255,255,255,0.1)';
                ctx.fillRect(x + i * (barW + gap), y, barW, height);
            }
        }

        function drawWeaponIconAt(cx, cy, icon, color, size) {
            ctx.fillStyle = color;
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.save();
            ctx.translate(cx, cy);
            const s = size;
            switch (icon) {
                case 'laser':
                    ctx.beginPath();
                    ctx.moveTo(-s, 0);
                    ctx.lineTo(s, 0);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.3, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                case 'rocket':
                    ctx.beginPath();
                    ctx.moveTo(0, -s);
                    ctx.lineTo(s * 0.3, -s * 0.4);
                    ctx.lineTo(s * 0.3, s * 0.3);
                    ctx.lineTo(s * 0.65, s * 0.8);
                    ctx.lineTo(s * 0.2, s * 0.5);
                    ctx.lineTo(s * 0.2, s * 0.7);
                    ctx.lineTo(-s * 0.2, s * 0.7);
                    ctx.lineTo(-s * 0.2, s * 0.5);
                    ctx.lineTo(-s * 0.65, s * 0.8);
                    ctx.lineTo(-s * 0.3, s * 0.3);
                    ctx.lineTo(-s * 0.3, -s * 0.4);
                    ctx.closePath();
                    ctx.fill();
                    break;
                case 'orbital':
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.6, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(s * 0.6, 0, s * 0.2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(-s * 0.6, 0, s * 0.2, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                case 'lightning':
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(s * 0.3, -s);
                    ctx.lineTo(-s * 0.2, -s * 0.1);
                    ctx.lineTo(s * 0.3, s * 0.1);
                    ctx.lineTo(-s * 0.3, s);
                    ctx.stroke();
                    break;
                case 'aura':
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.35, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.7, 0, Math.PI * 2);
                    ctx.stroke();
                    break;
                case 'drone':
                    ctx.beginPath();
                    ctx.moveTo(0, -s * 0.8);
                    ctx.lineTo(s * 0.6, 0);
                    ctx.lineTo(0, s * 0.8);
                    ctx.lineTo(-s * 0.6, 0);
                    ctx.closePath();
                    ctx.fill();
                    break;
                case 'shard':
                    // Diamond shape
                    ctx.beginPath();
                    ctx.moveTo(0, -s * 0.9);
                    ctx.lineTo(s * 0.6, 0);
                    ctx.lineTo(0, s * 0.9);
                    ctx.lineTo(-s * 0.6, 0);
                    ctx.closePath();
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, -s * 0.4);
                    ctx.lineTo(s * 0.25, 0);
                    ctx.lineTo(0, s * 0.4);
                    ctx.lineTo(-s * 0.25, 0);
                    ctx.closePath();
                    ctx.stroke();
                    break;
                case 'blade':
                    // Crescent arc
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.8, -Math.PI * 0.7, Math.PI * 0.7);
                    ctx.stroke();
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.5, -Math.PI * 0.5, Math.PI * 0.5);
                    ctx.stroke();
                    break;
                case 'snare':
                    // Dashed circles
                    ctx.setLineDash([3, 3]);
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.8, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.4, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.15, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                case 'fusionbeam':
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(-s, 0);
                    ctx.lineTo(s, 0);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(s, 0, s * 0.25, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(-s, 0, s * 0.2, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                case 'mine':
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.4, 0, Math.PI * 2);
                    ctx.stroke();
                    for (let i = 0; i < 6; i++) {
                        const a = (i / 6) * Math.PI * 2;
                        ctx.beginPath();
                        ctx.moveTo(Math.cos(a) * s * 0.4, Math.sin(a) * s * 0.4);
                        ctx.lineTo(Math.cos(a) * s * 0.8, Math.sin(a) * s * 0.8);
                        ctx.stroke();
                    }
                    break;
                case 'turret':
                    // Hexagon base (outline, like in-game)
                    ctx.beginPath();
                    for (let j = 0; j < 6; j++) {
                        const a = (j / 6) * Math.PI * 2 - Math.PI / 2;
                        ctx.lineTo(Math.cos(a) * s * 0.7, Math.sin(a) * s * 0.7);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    // Barrel pointing up-right
                    ctx.save();
                    ctx.rotate(-Math.PI / 4);
                    ctx.fillRect(s * 0.1, -s * 0.12, s * 0.6, s * 0.24);
                    ctx.restore();
                    // Center dot
                    ctx.beginPath();
