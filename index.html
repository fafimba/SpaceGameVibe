        function updateDrones() {
            const droneColor = COLORS.PLAYER;

            for (let i = drones.length - 1; i >= 0; i--) {
                const d = drones[i];

                // Hit cooldown (hive drones: prevents multi-hit same enemy per frame)
                if (d.hitCooldown > 0) d.hitCooldown -= deltaTime;

                // Find nearest enemy — homing behavior (spatial grid)
                let nearestEnemy = null;
                let nearestDist = Infinity;

                const droneNearby = spatialGrid.queryRadius(d.x, d.y, 600);
                for (const e of droneNearby) {
                    const dx = e.x - d.x;
                    const dy = e.y - d.y;
                    const distSq = dx * dx + dy * dy;
                    if (distSq < nearestDist) {
                        nearestDist = distSq;
                        nearestEnemy = e;
                    }
                }
                if (nearestEnemy) {
                    const dx = nearestEnemy.x - d.x;
                    const dy = nearestEnemy.y - d.y;
                    const targetAngle = Math.atan2(dy, dx);
                    const currentAngle = Math.atan2(d.vy, d.vx);

                    let angleDiff = targetAngle - currentAngle;
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

                    const maxTurn = (DRONE_TURN_RATE * Math.PI / 180) * deltaTime;
                    const turn = Math.max(-maxTurn, Math.min(maxTurn, angleDiff));
                    const newAngle = currentAngle + turn;

                    const droneSpeed = DRONE_SPEED * (d.speedMulti || 1);
                    d.vx = Math.cos(newAngle) * droneSpeed;
                    d.vy = Math.sin(newAngle) * droneSpeed;
                    d.angle = newAngle * 180 / Math.PI;
                }

                // Store trail for visual effect
                if (d.trail.length >= 8) {
                    const old = d.trail.shift();
                    old.x = d.x; old.y = d.y;
                    d.trail.push(old);
                } else {
                    d.trail.push({ x: d.x, y: d.y });
                }

                // Update position
                d.x += d.vx * deltaTime;
                d.y += d.vy * deltaTime;
                d.life -= deltaTime;

                // Check collision with enemies (skip if cooling down)
                if (d.hitCooldown <= 0) {
                    let hitEnemy = null;
                    const droneSize = d.isHive ? HIVE_DRONE_SIZE : DRONE_SIZE;
                    const droneHitNearby = spatialGrid.queryRadius(d.x, d.y, droneSize + 40);
                    for (const e of droneHitNearby) {
                        const config = ENEMY_TYPES[e.type];
                        const dx = e.x - d.x;
                        const dy = e.y - d.y;
                        const distSq = dx * dx + dy * dy;
                        const hitDist = config.radius + droneSize;

                        if (distSq < hitDist * hitDist) {
                            hitEnemy = e;
                            break;
                        }
                    }
                    if (hitEnemy) {
                        const hitConfig = ENEMY_TYPES[hitEnemy.type];

                        if (d.isHive) {
                            // HIVE MIND: deal damage but keep going
                            hitEnemy.hp -= d.damage;
                            spawnFloatingText(hitEnemy.x, hitEnemy.y - hitConfig.radius, d.damage.toString(), droneColor);
                            spawnRing(d.x, d.y, droneColor);

                            if (hitEnemy.hp <= 0) killEnemy(hitEnemy);

                            // AoE splash (probability-based from volatile core)
                            if (d.explosionChance > 0 && Math.random() < d.explosionChance) {
                                const splashNearby = spatialGrid.queryRadius(d.x, d.y, d.explosionRadius);
                                for (const e of splashNearby) {
                                    if (e === hitEnemy || e.hp <= 0 || e.dead) continue;
                                    const eConfig = ENEMY_TYPES[e.type];
                                    e.hp -= d.explosionDamage;
                                    spawnFloatingText(e.x, e.y - eConfig.radius, d.explosionDamage.toString(), droneColor);
                                    if (e.hp <= 0) killEnemy(e);
                                }
                            }

                            d.hitCooldown = 0.3;
                        } else {
                            // KAMIKAZE: deal damage, explode and die
                            hitEnemy.hp -= d.damage;
                            spawnFloatingText(hitEnemy.x, hitEnemy.y - hitConfig.radius, d.damage.toString(), droneColor);
                            if (hitEnemy.hp <= 0) killEnemy(hitEnemy);

                            if (d.explosionChance > 0 && Math.random() < d.explosionChance) {
                                spawnRing(d.x, d.y, droneColor, 30);
                                const kamiSplash = spatialGrid.queryRadius(d.x, d.y, d.explosionRadius);
                                for (const e of kamiSplash) {
                                    if (e === hitEnemy || e.dead) continue;
                                    const eConfig = ENEMY_TYPES[e.type];
                                    e.hp -= d.explosionDamage;
                                    spawnFloatingText(e.x, e.y - eConfig.radius, d.explosionDamage.toString(), droneColor);
                                    if (e.hp <= 0) killEnemy(e);
                                }
                            } else {
                                spawnRing(d.x, d.y, droneColor);
                            }
                            pools.drone.release(d);
                            fastRemove(drones, i);
                            continue;
                        }
                    }
                }

                // Remove expired drones or too far from camera
                const distFromCamera = Math.sqrt(
                    Math.pow(d.x - camera.x, 2) +
                    Math.pow(d.y - camera.y, 2)
                );

                if (d.life <= 0 || distFromCamera > CULLING_DISTANCES.drones) {
                    // Hive drones: guaranteed explosion on expiry
                    if (d.isHive && d.life <= 0 && d.explosionRadius > 0) {
                        spawnRing(d.x, d.y, droneColor, d.explosionRadius * 0.4);
                        const nearby = spatialGrid.queryRadius(d.x, d.y, d.explosionRadius);
                        for (const e of nearby) {
                            const config = ENEMY_TYPES[e.type];
                            const edx = e.x - d.x;
                            const edy = e.y - d.y;
                            const eDist = Math.sqrt(edx * edx + edy * edy);
                            if (eDist < d.explosionRadius + config.radius) {
                                e.hp -= d.explosionDamage;
                                spawnFloatingText(e.x, e.y - config.radius, d.explosionDamage.toString(), droneColor);
                                if (e.hp <= 0) killEnemy(e);
                            }
                        }
                    }
                    pools.drone.release(d);
                    fastRemove(drones, i);
                }
            }
        }

        // ============================================================
        // ENEMIES
        // ============================================================
        // ============================================================

        function updateSpawnSystem() {
            // Decay spawn interval over time
            if (gameTime - lastSpawnDecayTime > SPAWN_DECAY_INTERVAL) {
                spawnInterval *= (1 - SPAWN_DECAY_RATE);
                spawnInterval = Math.max(MIN_SPAWN_INTERVAL, spawnInterval);
                lastSpawnDecayTime = gameTime;
                waveNumber++;
            }

            // Spawn enemies
            spawnTimer -= deltaTime;
            // Scale max enemies with wave number (+5 enemies per wave)
            const baseMaxEnemies = lowPerfMode ? MAX_ENEMIES_LOW_PERF : MAX_ENEMIES;
            const maxEnemies = Math.min(baseMaxEnemies + (waveNumber * 5), HARD_MAX_ENEMIES);

            if (spawnTimer <= 0 && enemies.length < maxEnemies) {
                spawnEnemy();
                const spawnRateMult = getDiffMultipliers().spawnRate;
                spawnTimer = (spawnInterval + Math.random() * (spawnInterval * 0.5)) / spawnRateMult;
            }

            // Wave system - starts aggressively from level 2
            if (playerLevel >= 2) {
                waveTimer -= deltaTime;
                if (waveTimer <= 0) {
                    // Spawn 1-3 waves simultaneously at higher levels
                    const simultaneousWaves = playerLevel >= 5 ? (Math.random() < 0.4 ? 2 : 1) : 1;
                    for (let w = 0; w < simultaneousWaves; w++) {
                        spawnWave();
                    }
                    // Faster waves as level increases (minimum 1.2 seconds between waves)
                    const levelSpeedBonus = Math.min((playerLevel - 2) * 0.25, 1.8);
                    waveTimer = Math.max(1.2, WAVE_INTERVAL_BASE - levelSpeedBonus) + Math.random() * WAVE_INTERVAL_VARIANCE;
                }
            }
        }

        function spawnWave() {
            if (!player) return;

            // Trigger wave alert
            waveAlertActive = true;
            waveAlertTimer = 0;
            waveAlertNumber = waveNumber;
            waveAlertSubtitle = 'HOSTILES INCOMING';

            // Scale wave size with level (more enemies at higher levels)
            const baseCount = 20 + Math.floor(playerLevel * 4);
            const count = Math.min(baseCount, 80);

            // HP scaling for wave enemies
            const waveDiffMult = getDiffMultipliers();
            const hpMultiplier = Math.pow(1.12, playerLevel - 1) * waveDiffMult.enemyHP;

            // Generate 3-6 clusters around the player, just outside screen
            const numClusters = 3 + Math.floor(Math.random() * 4);
            const enemiesPerCluster = Math.floor(count / numClusters);
            const remainder = count - enemiesPerCluster * numClusters;

            const spawnPositions = [];

            for (let c = 0; c < numClusters; c++) {
                const clusterAngle = Math.random() * Math.PI * 2;
                const clusterDist = WAVE_SPAWN_DIST_MIN + Math.random() * (WAVE_SPAWN_DIST_MAX - WAVE_SPAWN_DIST_MIN);

                const cx = player.x + Math.cos(clusterAngle) * clusterDist;
                const cy = player.y + Math.sin(clusterAngle) * clusterDist;

                // Extra enemies from remainder go to first clusters
                const clusterCount = enemiesPerCluster + (c < remainder ? 1 : 0);

                for (let i = 0; i < clusterCount; i++) {
                    const offsetAngle = Math.random() * Math.PI * 2;
                    const offsetDist = Math.random() * WAVE_CLUSTER_RADIUS;
                    spawnPositions.push({
                        x: cx + Math.cos(offsetAngle) * offsetDist,
                        y: cy + Math.sin(offsetAngle) * offsetDist
                    });
                }
            }

            // Respect hard enemy cap
            const spawnRoom = HARD_MAX_ENEMIES - enemies.length;
            if (spawnRoom <= 0) return;
            if (spawnPositions.length > spawnRoom) spawnPositions.length = spawnRoom;

            // Spawn all enemies in the wave with mixed types
            for (const pos of spawnPositions) {
                const angleToPlayer = Math.atan2(player.y - pos.y, player.x - pos.x);
                const enemyType = getSpawnType();
                const typeConfig = ENEMY_TYPES[enemyType];
                const scaledHp = Math.ceil(typeConfig.hp * hpMultiplier);

                const enemy = pools.enemy.acquire();
                enemy.x = pos.x;
                enemy.y = pos.y;
                enemy.vx = Math.cos(angleToPlayer) * typeConfig.speed * waveDiffMult.enemySpeed;
                enemy.vy = Math.sin(angleToPlayer) * typeConfig.speed * waveDiffMult.enemySpeed;
                enemy.angle = angleToPlayer * 180 / Math.PI;
                enemy.type = enemyType;
                enemy.hp = scaledHp;
                enemy.maxHp = scaledHp;
                enemy.fireTimer = typeConfig.fireRate || 0;
                enemy.burstCooldown = 0;
                enemy.spawnTime = gameTime;
                enemy.offScreenTime = 0;
                enemies.push(enemy);
            }
        }
        
        function getSpawnType() {
            let type = 'SCOUT';
            const r = Math.random();
            const t = gameTime;

            if (t < 30) {
                // First 30s: scouts only
                type = 'SCOUT';
            } else if (t < 90) {
                // 30s-90s: kamikazes appear (15%)
                if (r < 0.15) type = 'KAMIKAZE';
            } else if (t < 180) {
                // 90s-3min: kamikazes (20%) + tanks start (8%)
                if (r < 0.08) type = 'TANK';
                else if (r < 0.28) type = 'KAMIKAZE';
            } else if (t < 300) {
                // 3min-5min: more tanks (20%) + kamikazes (25%)
                if (r < 0.20) type = 'TANK';
                else if (r < 0.45) type = 'KAMIKAZE';
            } else if (t < 480) {
                // 5min-8min: tanks dominate (27%) + first aliens (5%) + kamikazes (20%)
                if (r < 0.05) type = 'ALIEN';
                else if (r < 0.32) type = 'TANK';
                else if (r < 0.52) type = 'KAMIKAZE';
            } else {
                // 8min+: late game, aliens grow (10%), tanks abundant (28%), kamikazes (20%)
                if (r < 0.10) type = 'ALIEN';
                else if (r < 0.38) type = 'TANK';
                else if (r < 0.58) type = 'KAMIKAZE';
            }
            return type;
        }

        function spawnEnemy() {
            if (!player) return;

            // Spawn a mini-group of 3-5 enemies from the same direction
            const groupSize = 3 + Math.floor(Math.random() * 3);
            const angle = Math.random() * Math.PI * 2;
            const spawnDistance = CANVAS_WIDTH / 2 + ENEMY_SPAWN_OFFSET_MIN + Math.random() * ENEMY_SPAWN_OFFSET_RANGE;

            // Cluster center
            const cx = player.x + Math.cos(angle) * spawnDistance;
            const cy = player.y + Math.sin(angle) * spawnDistance;

            const diffMult = getDiffMultipliers();
            const hpMultiplier = Math.pow(1.12, playerLevel - 1) * diffMult.enemyHP;
            const speedMult = diffMult.enemySpeed;

            for (let i = 0; i < groupSize; i++) {
                if (enemies.length >= HARD_MAX_ENEMIES) break;

                const type = getSpawnType();
                const config = ENEMY_TYPES[type];

                // Position within the group (tight 40px radius)
                const offsetAngle = Math.random() * Math.PI * 2;
                const offsetDist = Math.random() * 40;
                const x = cx + Math.cos(offsetAngle) * offsetDist;
                const y = cy + Math.sin(offsetAngle) * offsetDist;

                const angleToPlayer = Math.atan2(player.y - y, player.x - x);
                const scaledHp = Math.ceil(config.hp * hpMultiplier);

                const enemy = pools.enemy.acquire();
                enemy.x = x;
                enemy.y = y;
                enemy.vx = Math.cos(angleToPlayer) * config.speed * speedMult;
                enemy.vy = Math.sin(angleToPlayer) * config.speed * speedMult;
                enemy.angle = angleToPlayer * 180 / Math.PI;
                enemy.type = type;
                enemy.hp = scaledHp;
                enemy.maxHp = scaledHp;
                enemy.fireTimer = config.fireRate || 0;
                enemy.burstCooldown = 0;
                enemy.spawnTime = gameTime;
                enemy.offScreenTime = 0;
                enemies.push(enemy);
            }
        }
        
        function updateEnemies() {
            if (!player) return; // Safety check

            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                const config = ENEMY_TYPES[e.type];
                const timeSpeedBonus = 1 + Math.min(gameTime / 600, 0.3); // +30% max over 10 min
                const speed = config.speed * getDiffMultipliers().enemySpeed * timeSpeedBonus;

                // Seek player with limited turn rate
                const dx = player.x - e.x;
                const dy = player.y - e.y;
                const targetAngle = Math.atan2(dy, dx) * 180 / Math.PI;
                const angleDiff = normalizeAngle(targetAngle - e.angle);
                
                const maxTurn = config.turnRate * deltaTime;
                if (Math.abs(angleDiff) > maxTurn) {
                    e.angle += Math.sign(angleDiff) * maxTurn;
                } else {
                    e.angle = targetAngle;
                }
                
                // Apply velocity toward facing direction
                const rad = e.angle * Math.PI / 180;
                const targetVx = Math.cos(rad) * speed;
                const targetVy = Math.sin(rad) * speed;
                
                // Smooth acceleration
                e.vx += (targetVx - e.vx) * deltaTime * 2;
                e.vy += (targetVy - e.vy) * deltaTime * 2;
                
                // Tank burst
                if (e.type === 'TANK') {
                    e.burstCooldown -= deltaTime;
                    const distToPlayer = Math.sqrt(dx * dx + dy * dy);
                    if (e.burstCooldown <= 0 && distToPlayer < 200) {
                        e.vx = Math.cos(rad) * 280;
                        e.vy = Math.sin(rad) * 280;
                        e.burstCooldown = 6;
                    }
                }
                
                
                // Separation from other enemies (staggered — half per frame)
                if ((i + separationFrame) & 1) {
                    const nearbyEnemies = spatialGrid.queryRadius(e.x, e.y, config.radius * 3);
                    for (const other of nearbyEnemies) {
                        if (other === e) continue;

                        const sepDx = e.x - other.x;
                        const sepDy = e.y - other.y;
                        const sepDistSq = sepDx * sepDx + sepDy * sepDy;
                        const minDist = config.radius + ENEMY_TYPES[other.type].radius + ENEMY_SEPARATION_PADDING;
                        const minDistSq = minDist * minDist;

                        if (sepDistSq < minDistSq && sepDistSq > 0) {
                            const sepDist = Math.sqrt(sepDistSq);
                            const push = (minDist - sepDist) * 0.5;
                            const pushX = (sepDx / sepDist) * push;
                            const pushY = (sepDy / sepDist) * push;

                            const eIsK = e.type === 'KAMIKAZE';
                            const oIsK = other.type === 'KAMIKAZE';

                            if (eIsK && oIsK) {
                                // Kamikazes push each other normally
                                e.vx += pushX;
                                e.vy += pushY;
                                other.vx -= pushX;
                                other.vy -= pushY;
                            } else {
                                // Kamikazes immune to push from others, bulldoze 2.5x
                                if (!eIsK) {
                                    const mult = oIsK ? 2.5 : 1;
                                    e.vx += pushX * mult;
                                    e.vy += pushY * mult;
                                }
                                if (!oIsK) {
                                    const mult = eIsK ? 2.5 : 1;
                                    other.vx -= pushX * mult;
                                    other.vy -= pushY * mult;
                                }
                            }
                        }
                    }
                }
                
                // Snare/Blade debuff timers
                if (e.snareSlowTimer > 0) {
                    e.snareSlowTimer -= deltaTime;
                    const slowFactor = 1 - (e.snareSlow || 0) - (e.permaSlowAmount || 0);
                    e.vx *= Math.max(0.1, slowFactor);
                    e.vy *= Math.max(0.1, slowFactor);
                    if (e.snareSlowTimer <= 0) { e.snareSlow = 0; e.wasInSnare = false; }
                } else if (e.permaSlowAmount > 0) {
                    e.vx *= Math.max(0.3, 1 - e.permaSlowAmount);
                    e.vy *= Math.max(0.3, 1 - e.permaSlowAmount);
                }
                if (e.rootTimer > 0) {
                    e.rootTimer -= deltaTime;
                    e.vx = 0;
                    e.vy = 0;
                }
                if (e.vulnerabilityTimer > 0) {
                    e.vulnerabilityTimer -= deltaTime;
                    if (e.vulnerabilityTimer <= 0) e.vulnerability = 0;
                }

                // Kamikaze trail (push + reuse oldest for O(1))
                if (e.type === 'KAMIKAZE') {
                    if (!e.trail) e.trail = [];
                    if (e.trail.length >= 50) {
                        const old = e.trail.shift();
                        old.x = e.x; old.y = e.y;
                        e.trail.push(old);
                    } else {
                        e.trail.push({ x: e.x, y: e.y });
                    }
                }

                // Update position
                e.x += e.vx * deltaTime;
                e.y += e.vy * deltaTime;

                // Transport enemy if too far from player (wrap around world)
                const relX = e.x - player.x;
                const relY = e.y - player.y;
                const wrapX = SECTOR_WIDTH * ENEMY_WRAP_THRESHOLD;
                const wrapY = SECTOR_HEIGHT * ENEMY_WRAP_THRESHOLD;
                let wrapped = false;

                if (relX > wrapX) {
                    e.x -= wrapX * 2; wrapped = true;
                } else if (relX < -wrapX) {
                    e.x += wrapX * 2; wrapped = true;
                }

                if (relY > wrapY) {
                    e.y -= wrapY * 2; wrapped = true;
                } else if (relY < -wrapY) {
                    e.y += wrapY * 2; wrapped = true;
                }

                // Re-orient toward player after wrapping
                if (wrapped) {
                    const toPlayerX = player.x - e.x;
                    const toPlayerY = player.y - e.y;
                    e.angle = Math.atan2(toPlayerY, toPlayerX) * 180 / Math.PI;
                    const rad = e.angle * Math.PI / 180;
                    const spd = Math.sqrt(e.vx * e.vx + e.vy * e.vy);
                    e.vx = Math.cos(rad) * spd;
                    e.vy = Math.sin(rad) * spd;
                    if (e.trail) e.trail.length = 0;
                }
            }
        }
        
        function updateEnemyBullets() {
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const b = enemyBullets[i];
                b.x += b.vx * deltaTime;
                b.y += b.vy * deltaTime;
                b.life -= deltaTime;

                // Remove enemy bullets that are too far from camera or expired
                // Allow bullets to travel across adjacent sectors
                const distFromCamera = Math.sqrt(
                    Math.pow(b.x - camera.x, 2) +
                    Math.pow(b.y - camera.y, 2)
                );
                const maxDistance = Math.max(CANVAS_WIDTH, CANVAS_HEIGHT) * 3; // 5760px

                if (b.life <= 0 || distFromCamera > maxDistance) {
                    pools.enemyBullet.release(b);
                    fastRemove(enemyBullets, i);
                }
            }
        }
        
        function killEnemy(enemy) {
            // Guard: don't kill already-dead enemies twice
            if (enemy.dead) return;
            enemy.dead = true;

            const config = ENEMY_TYPES[enemy.type];

            // Increment kill counter
            totalKills++;

            // Spawn explosion ring
            spawnRing(enemy.x, enemy.y, config.color, 40);

            // Direct XP gain
            if (!enemy.noXP) {
                const xpValue = enemy.type === 'TANK' ? 5 : (enemy.type === 'KAMIKAZE' ? 2 : 1);
                collectXP(xpValue);
            }

            // Alien splits into 5 tanks on death
            if (enemy.type === 'ALIEN' && enemies.length < HARD_MAX_ENEMIES) {
                const hpMultiplier = 1 + (playerLevel - 1) * 0.40;
                const tankConfig = ENEMY_TYPES['TANK'];
                const scaledTankHp = Math.ceil(tankConfig.hp * hpMultiplier);
                for (let i = 0; i < 5; i++) {
                    const angle = (Math.PI * 2 / 5) * i + Math.random() * 0.3;
                    const tank = pools.enemy.acquire();
                    tank.x = enemy.x + Math.cos(angle) * 40;
                    tank.y = enemy.y + Math.sin(angle) * 40;
                    tank.vx = Math.cos(angle) * 80;
                    tank.vy = Math.sin(angle) * 80;
                    tank.angle = angle * 180 / Math.PI;
                    tank.type = 'TANK';
                    tank.hp = scaledTankHp;
                    tank.maxHp = scaledTankHp;
                    tank.fireTimer = 0;
                    tank.burstCooldown = 0;
                    tank.spawnTime = gameTime;
                    tank.offScreenTime = 0;
                    tank.noXP = enemy.noXP || false;
                    tank.dead = false;
                    enemies.push(tank);
                }
            }

            // Tank splits into scouts
            if (enemy.type === 'TANK' && enemies.length < HARD_MAX_ENEMIES) {
                for (let i = 0; i < 2; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const scout = pools.enemy.acquire();
                    scout.x = enemy.x + Math.cos(angle) * 30;
                    scout.y = enemy.y + Math.sin(angle) * 30;
                    scout.vx = Math.cos(angle) * 60;
                    scout.vy = Math.sin(angle) * 60;
                    scout.angle = angle * 180 / Math.PI;
                    scout.type = 'SCOUT';
                    scout.hp = 1;
                    scout.maxHp = 1;
                    scout.fireTimer = 0;
                    scout.burstCooldown = 0;
                    scout.spawnTime = gameTime;
                    scout.offScreenTime = 0;
                    scout.noXP = enemy.noXP || false;
                    scout.dead = false;
                    enemies.push(scout);
                }
            }

            // Maybe spawn pickup
            if (Math.random() < 0.01) {
                spawnPickup(enemy.x, enemy.y);
            }

            // Spawn alien drones if skill unlocked
            spawnAlienDrone(enemy.x, enemy.y);
        }

        // Single-pass removal of all dead enemies (called once per frame)
        function sweepDeadEnemies() {
            for (let i = enemies.length - 1; i >= 0; i--) {
                if (enemies[i].dead) {
                    pools.enemy.release(enemies[i]);
                    fastRemove(enemies, i);
                }
            }
        }

        // ============================================================
        // PICKUPS
        // ============================================================
        
        function spawnPickup(x, y) {
            // Always try to spawn a pickup, but the type determines if we actually do it
            const rand = Math.random();
            let type = null;

            // 20% Health
            // 80% Nothing

            if (rand < 0.20) {
                type = 'health';
            } else {
                return; // 80% chance of no pickup
            }
            
            const pickup = pools.pickup.acquire();
            pickup.x = x;
            pickup.y = y;
            pickup.type = type;
            pickup.life = 10;
            pickup.bobTimer = Math.random() * Math.PI * 2;
            pickups.push(pickup);
        }
        
        function updatePickups() {
            if (!player) return; // Safety check

            for (let i = pickups.length - 1; i >= 0; i--) {
                const p = pickups[i];
                p.life -= deltaTime;
                p.bobTimer += deltaTime;

                if (p.life <= 0) {
                    pools.pickup.release(p);
                    fastRemove(pickups, i);
                    continue;
                }

                // Transport pickup if too far from player (wrap around world)
                const relX = p.x - player.x;
                const relY = p.y - player.y;

                if (relX > SECTOR_WIDTH * 1.5) {
                    p.x -= 3 * SECTOR_WIDTH;
                } else if (relX < -SECTOR_WIDTH * 1.5) {
                    p.x += 3 * SECTOR_WIDTH;
                }

                if (relY > SECTOR_HEIGHT * 1.5) {
                    p.y -= 3 * SECTOR_HEIGHT;
                } else if (relY < -SECTOR_HEIGHT * 1.5) {
                    p.y += 3 * SECTOR_HEIGHT;
                }

                // Check collision with player
                const dx = player.x - p.x;
                const dy = player.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                // Magnet effect - attract pickups within range with acceleration
                if (dist < PICKUP_MAGNET_RADIUS && dist > 0) {
                    // Lerp factor increases as pickup gets closer (faster pull when near)
                    const pullStrength = 1 - (dist / PICKUP_MAGNET_RADIUS);
                    const lerpFactor = 8 * pullStrength * pullStrength * deltaTime;
                    p.x += dx * lerpFactor;
                    p.y += dy * lerpFactor;
                }
                
                if (dist < PLAYER_COLLISION_RADIUS + 15) {
                    if (p.type === 'health') {
                        if (player.hp < playerMaxHP) {
                            player.hp++;
                            spawnFloatingText(p.x, p.y, '+1 Hull', COLORS.POWERUP);
                        } else {
                            spawnFloatingText(p.x, p.y, '+1 XP', COLORS.GOLD);
                            collectXP(1);
                        }
                    } else {
                        spawnFloatingText(p.x, p.y, '+1 XP', COLORS.GOLD);
                        collectXP(1);
                    }

                    // Pickup effect
                    for (let j = 0; j < 8; j++) {
                        const angle = (Math.PI * 2 / 8) * j;
                        particles.push({
                            x: p.x,
                            y: p.y,
                            vx: Math.cos(angle) * 80,
                            vy: Math.sin(angle) * 80,
                            life: 0.4,
                            maxLife: 0.4,
                            size: 4,
                            color: p.type === 'health' ? COLORS.POWERUP : COLORS.GOLD,
                            type: 'pickup'
                        });
                    }

                    pools.pickup.release(p);
                    fastRemove(pickups, i);
                }
            }
        }


        // ============================================================
        // XP & LEVEL SYSTEM
        // ============================================================

        function collectXP(amount) {
            // Demo: stop XP gain at level cap
            if (!isFullVersion && playerLevel >= DEMO_MAX_LEVEL) return;

            playerXP += Math.round(amount * permXPMulti * getDiffMultipliers().xp);

            let levelsGained = 0;
            while (playerXP >= xpToNextLevel) {
                playerXP -= xpToNextLevel;
                playerLevel++;
                xpToNextLevel = Math.floor(XP_PER_LEVEL_BASE * Math.pow(XP_PER_LEVEL_GROWTH, playerLevel - 1));
                skillPoints++;
                levelsGained++;

                // Demo limit: cap at DEMO_MAX_LEVEL
                if (!isFullVersion && playerLevel >= DEMO_MAX_LEVEL) {
                    playerXP = 0;
                    break;
                }
            }

            // Only trigger effects and open skill tree once if leveled up
            if (levelsGained > 0) {
                // Demo: trigger demoEnd screen at level cap
                if (!isFullVersion && playerLevel >= DEMO_MAX_LEVEL) {
                    triggerFlash(COLORS.UI_PRIMARY, 0.3, 300);
                    triggerSlowmo(200);
                    gameState = 'demoEnd';
                    return;
                }
                levelUp(levelsGained);
            }
        }

        function levelUp(levelsGained = 1) {
            // Only show upgrade panel if there are still skills to unlock
            if (!allSkillsUnlocked()) {
                showUpgradePanel();
            }

            // Slow-mo effect (more intense if multiple levels)
            const intensity = Math.min(levelsGained, 3);
            triggerSlowmo(100 * intensity);

            // Show floating text for multiple levels
            if (levelsGained > 1 && player) {
                spawnFloatingText(player.x, player.y - 40, 'LEVEL UP x' + levelsGained + '!', COLORS.XP);
            }
        }
        
        // Get all available upgrade options for the level-up panel
        function getAvailableUpgrades() {
            const available = [];
            const prog = cachedProgression || loadProgression();

            for (const [weaponId, weapon] of Object.entries(WEAPONS)) {
                // Weapon must be unlocked in shop
                if (!prog.unlockedWeapons[weaponId]) continue;

                // Starting weapons are mutually exclusive — only the chosen one is available
                if (weapon.isStartingWeapon && !activeWeapons.includes(weaponId)) continue;

                // Option: Activate the weapon (if not yet active this run)
                if (!activeWeapons.includes(weaponId)) {
                    if (activeWeapons.length < MAX_ACTIVE_WEAPONS) {
                        available.push({
                            type: 'weapon_activation',
                            id: weaponId,
                            name: weapon.name,
                            description: weapon.description,
                            color: weapon.color,
                            icon: weapon.icon
                        });
                    }
                    continue; // Don't offer upgrades for inactive weapons
                }

                // Option: Next level (1-10, where 10 = evolution)
                const currentLevel = upgradeLevels[weaponId] || 0;
                if (currentLevel < 10) {
                    const nextLevelDef = weapon.levels[currentLevel];
                    const isEvo = nextLevelDef.isEvolution || false;
                    available.push({
                        type: 'upgrade',
                        id: weaponId,
                        weaponId: weaponId,
                        name: isEvo ? nextLevelDef.description.split(':')[0] : weapon.name,
                        description: isEvo ? nextLevelDef.description.split(': ').slice(1).join(': ') : nextLevelDef.description,
                        color: weapon.color,
                        icon: isEvo ? (nextLevelDef.icon || weapon.icon) : weapon.icon,
                        level: currentLevel + 1,
                        isEvolution: isEvo
                    });
                }
            }

            // If no upgrades left, offer bonuses
            if (available.length === 0) {
                available.push(
                    { type: 'bonus', id: 'bonus_crystals', name: '+50 Crystals', description: 'Bonus persistent currency', color: '#E0F0FF', icon: 'crystal' },
                    { type: 'bonus', id: 'bonus_heal', name: 'Full Heal', description: 'Restore all HP', color: '#39FF14', icon: 'heal' },
                    { type: 'bonus', id: 'bonus_damage', name: 'Damage x1.5', description: 'Increased damage for 30 seconds', color: '#FF6B5B', icon: 'damage' }
                );
            }

            return available;
        }

        // Check if all upgrades have been obtained
        function allSkillsUnlocked() {
            // Check all active weapons are at max level
            for (const weaponId of activeWeapons) {
                if ((upgradeLevels[weaponId] || 0) < 10) return false;
            }
            // Check if there are still weapons that could be activated
            if (activeWeapons.length < MAX_ACTIVE_WEAPONS) {
                const prog = cachedProgression || loadProgression();
                for (const [weaponId, weapon] of Object.entries(WEAPONS)) {
                    if (!prog.unlockedWeapons[weaponId]) continue;
                    if (activeWeapons.includes(weaponId)) continue;
                    if (weapon.isStartingWeapon && !activeWeapons.includes(weaponId)) continue;
                    return false;
                }
            }
            return true;
        }

        // Generate 3 random upgrade options
        function generateUpgradeOptions() {
            const available = getAvailableUpgrades();
            if (available.length <= 3) return [...available];
            const shuffled = [...available].sort(() => Math.random() - 0.5);
            return shuffled.slice(0, 3);
        }

        // Draw a skill icon on a canvas context
        function drawSkillIcon(ctx, icon, cx, cy, color) {
            ctx.fillStyle = color;
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;

            if (icon === 'arsenal') {
                ctx.beginPath();
                ctx.arc(cx, cy, 8, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx, cy, 3, 0, Math.PI * 2);
                ctx.fill();
            } else if (icon === 'laser') {
                ctx.beginPath();
                ctx.moveTo(cx + 10, cy);
                ctx.lineTo(cx - 6, cy - 7);
                ctx.lineTo(cx - 3, cy);
                ctx.lineTo(cx - 6, cy + 7);
                ctx.closePath();
                ctx.fill();
            } else if (icon === 'rocket') {
                ctx.beginPath();
                ctx.moveTo(cx, cy - 10);
                ctx.lineTo(cx + 3, cy - 4);
                ctx.lineTo(cx + 3, cy + 3);
                ctx.lineTo(cx + 6, cy + 8);
                ctx.lineTo(cx + 2, cy + 5);
                ctx.lineTo(cx + 2, cy + 7);
                ctx.lineTo(cx - 2, cy + 7);
                ctx.lineTo(cx - 2, cy + 5);
                ctx.lineTo(cx - 6, cy + 8);
                ctx.lineTo(cx - 3, cy + 3);
                ctx.lineTo(cx - 3, cy - 4);
                ctx.closePath();
                ctx.fill();
            } else if (icon === 'orbital') {
                ctx.beginPath();
                ctx.arc(cx, cy, 9, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx, cy, 4, 0, Math.PI * 2);
                ctx.fill();
            } else if (icon === 'lightning') {
                ctx.beginPath();
                ctx.moveTo(cx + 2, cy - 9);
                ctx.lineTo(cx - 3, cy);
                ctx.lineTo(cx + 1, cy);
                ctx.lineTo(cx - 2, cy + 9);
                ctx.lineTo(cx + 4, cy - 2);
                ctx.lineTo(cx, cy - 2);
                ctx.closePath();
                ctx.fill();
            } else if (icon === 'rate') {
                ctx.beginPath();
                ctx.moveTo(cx - 5, cy - 5);
                ctx.lineTo(cx + 2, cy);
                ctx.lineTo(cx - 5, cy + 5);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx + 1, cy - 5);
                ctx.lineTo(cx + 8, cy);
                ctx.lineTo(cx + 1, cy + 5);
                ctx.stroke();
            } else if (icon === 'beam') {
                ctx.beginPath();
                ctx.arc(cx, cy, 7, 0, Math.PI * 2);
                ctx.stroke();
                ctx.fillRect(cx - 10, cy - 1, 20, 2);
            } else if (icon === 'spread') {
                ctx.beginPath();
                ctx.moveTo(cx - 7, cy);
                ctx.lineTo(cx + 7, cy - 7);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx - 7, cy);
                ctx.lineTo(cx + 7, cy);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx - 7, cy);
                ctx.lineTo(cx + 7, cy + 7);
                ctx.stroke();
            } else if (icon === 'target') {
                ctx.beginPath();
                ctx.arc(cx, cy, 7, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx, cy, 3, 0, Math.PI * 2);
                ctx.fill();
            } else if (icon === 'cluster') {
                for (let i = 0; i < 4; i++) {
                    const angle = (i / 4) * Math.PI * 2 - Math.PI / 4;
                    ctx.beginPath();
                    ctx.arc(cx + Math.cos(angle) * 6, cy + Math.sin(angle) * 6, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else if (icon === 'damage') {
                ctx.beginPath();
                ctx.moveTo(cx, cy - 8);
                ctx.lineTo(cx + 6, cy + 2);
                ctx.lineTo(cx + 2, cy + 2);
                ctx.lineTo(cx + 2, cy + 8);
                ctx.lineTo(cx - 2, cy + 8);
                ctx.lineTo(cx - 2, cy + 2);
                ctx.lineTo(cx - 6, cy + 2);
                ctx.closePath();
                ctx.fill();
            } else if (icon === 'regen') {
                ctx.beginPath();
                ctx.arc(cx, cy, 5, 0, Math.PI * 1.5);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx + 5, cy);
                ctx.lineTo(cx + 9, cy - 3);
                ctx.lineTo(cx + 9, cy + 3);
                ctx.closePath();
                ctx.fill();
            } else if (icon === 'shockwave') {
                ctx.beginPath();
                ctx.arc(cx, cy, 3, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx, cy, 8, Math.PI * 0.2, Math.PI * 0.8);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx, cy, 8, Math.PI * 1.2, Math.PI * 1.8);
                ctx.stroke();
            } else if (icon === 'absorb') {
                ctx.beginPath();
                ctx.arc(cx, cy, 7, 0, Math.PI * 2);
                ctx.stroke();
                ctx.fillRect(cx - 4, cy - 1, 8, 2);
                ctx.fillRect(cx - 1, cy - 4, 2, 8);
            } else if (icon === 'chain') {
                ctx.beginPath();
                ctx.arc(cx - 3, cy - 1, 4, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx + 3, cy + 1, 4, 0, Math.PI * 2);
                ctx.stroke();
            } else if (icon === 'discharge') {
                for (let i = 0; i < 3; i++) {
                    const ox = (i - 1) * 5;
                    ctx.beginPath();
                    ctx.moveTo(cx + ox + 1, cy - 5);
                    ctx.lineTo(cx + ox - 1, cy);
                    ctx.lineTo(cx + ox, cy);
                    ctx.lineTo(cx + ox - 1, cy + 5);
                    ctx.stroke();
                }
            } else if (icon === 'arc') {
                ctx.beginPath();
                ctx.arc(cx, cy, 8, -Math.PI * 0.6, Math.PI * 0.6);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx, cy, 5, -Math.PI * 0.6, Math.PI * 0.6);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx, cy, 2, 0, Math.PI * 2);
                ctx.fill();
            } else if (icon === 'aura') {
                // Aura rings
                ctx.beginPath();
                ctx.arc(cx, cy, 9, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx, cy, 5, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx, cy, 2, 0, Math.PI * 2);
                ctx.fill();
            } else if (icon === 'expand') {
                // Expanding arrows
                ctx.beginPath();
                ctx.moveTo(cx - 8, cy);
                ctx.lineTo(cx - 4, cy);
                ctx.moveTo(cx + 4, cy);
                ctx.lineTo(cx + 8, cy);
                ctx.moveTo(cx, cy - 8);
                ctx.lineTo(cx, cy - 4);
                ctx.moveTo(cx, cy + 4);
                ctx.lineTo(cx, cy + 8);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx, cy, 3, 0, Math.PI * 2);
                ctx.stroke();
            } else if (icon === 'pulse') {
                // Pulsing rings
                ctx.beginPath();
                ctx.arc(cx, cy, 8, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([3, 3]);
                ctx.beginPath();
                ctx.arc(cx, cy, 5, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.beginPath();
                ctx.arc(cx, cy, 2, 0, Math.PI * 2);
                ctx.fill();
            } else if (icon === 'drone') {
                // Hexagon drone shape
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
                    const x = cx + Math.cos(angle) * 8;
                    const y = cy + Math.sin(angle) * 8;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx, cy, 3, 0, Math.PI * 2);
                ctx.fill();
            } else if (icon === 'swarm') {
                // Two small drones
                [-5, 5].forEach(ox => {
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
                        const x = cx + ox + Math.cos(angle) * 5;
                        const y = cy + Math.sin(angle) * 5;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.stroke();
                });
            } else if (icon === 'explosion') {
                // Explosion burst
                ctx.beginPath();
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const innerR = 3;
                    const outerR = 9;
                    const r = i % 2 === 0 ? outerR : innerR;
                    const x = cx + Math.cos(angle) * r;
                    const y = cy + Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();
            } else if (icon === 'annihilation') {
                // Chain-reaction burst: circle + radiating lines
                ctx.beginPath();
                ctx.arc(cx, cy, 7, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx, cy, 3, 0, Math.PI * 2);
                ctx.fill();
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2;
                    ctx.beginPath();
                    ctx.moveTo(cx + Math.cos(angle) * 8, cy + Math.sin(angle) * 8);
                    ctx.lineTo(cx + Math.cos(angle) * 12, cy + Math.sin(angle) * 12);
                    ctx.stroke();
                }
            } else if (icon === 'crystal') {
                // Diamond shape for crystal bonus
                ctx.beginPath();
                ctx.moveTo(cx, cy - 8);
                ctx.lineTo(cx + 6, cy);
                ctx.lineTo(cx, cy + 8);
                ctx.lineTo(cx - 6, cy);
                ctx.closePath();
                ctx.fill();
            } else if (icon === 'heal') {
                // Plus/cross for heal
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(cx, cy - 7);
                ctx.lineTo(cx, cy + 7);
                ctx.moveTo(cx - 7, cy);
                ctx.lineTo(cx + 7, cy);
                ctx.stroke();
            } else if (icon === 'armageddon') {
                // Nuclear explosion — circle with radiating lines
                ctx.beginPath();
                ctx.arc(cx, cy, 5, 0, Math.PI * 2);
                ctx.stroke();
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2;
                    ctx.beginPath();
                    ctx.moveTo(cx + Math.cos(angle) * 6, cy + Math.sin(angle) * 6);
                    ctx.lineTo(cx + Math.cos(angle) * 10, cy + Math.sin(angle) * 10);
                    ctx.stroke();
                }
            } else if (icon === 'hive') {
                // Central hexagon with orbiting dots
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
                    const hx = cx + Math.cos(angle) * 6;
                    const hy = cy + Math.sin(angle) * 6;
                    if (i === 0) ctx.moveTo(hx, hy);
                    else ctx.lineTo(hx, hy);
                }
                ctx.closePath();
                ctx.stroke();
                for (let i = 0; i < 3; i++) {
                    const angle = (i / 3) * Math.PI * 2;
                    ctx.beginPath();
                    ctx.arc(cx + Math.cos(angle) * 10, cy + Math.sin(angle) * 10, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else if (icon === 'volley') {
                // Three small diamonds in a fan
                for (let i = -1; i <= 1; i++) {
                    const ox = i * 6;
                    const oy = Math.abs(i) * 3;
                    ctx.beginPath();
                    ctx.moveTo(cx + ox, cy - 5 + oy);
                    ctx.lineTo(cx + ox + 3, cy + oy);
                    ctx.lineTo(cx + ox, cy + 5 + oy);
                    ctx.lineTo(cx + ox - 3, cy + oy);
                    ctx.closePath();
                    ctx.stroke();
                }
            } else if (icon === 'blade') {
                // Crescent/arc slash
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(cx, cy, 8, -Math.PI * 0.7, Math.PI * 0.7);
                ctx.stroke();
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(cx, cy, 5, -Math.PI * 0.5, Math.PI * 0.5);
                ctx.stroke();
            } else if (icon === 'snare') {
                // Dashed circle with inner circle
                ctx.setLineDash([3, 3]);
                ctx.beginPath();
                ctx.arc(cx, cy, 8, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx, cy, 4, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.beginPath();
                ctx.arc(cx, cy, 1.5, 0, Math.PI * 2);
                ctx.fill();
            } else if (icon === 'gravity') {
                // Arrows pointing inward
                ctx.beginPath();
                ctx.arc(cx, cy, 7, 0, Math.PI * 2);
                ctx.stroke();
                for (let i = 0; i < 4; i++) {
                    const angle = (i / 4) * Math.PI * 2;
                    ctx.beginPath();
                    ctx.moveTo(cx + Math.cos(angle) * 9, cy + Math.sin(angle) * 9);
                    ctx.lineTo(cx + Math.cos(angle) * 4, cy + Math.sin(angle) * 4);
                    ctx.stroke();
                }
            } else if (icon === 'rift') {
                // Crescent with dashed inner
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.arc(cx, cy, 8, -Math.PI * 0.6, Math.PI * 0.6);
                ctx.stroke();
                ctx.setLineDash([3, 3]);
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(cx, cy, 5, -Math.PI * 0.5, Math.PI * 0.5);
                ctx.stroke();
                ctx.setLineDash([]);
            } else if (icon === 'cage') {
                // Hexagon with inner hex
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
                    const x = cx + Math.cos(angle) * 9;
                    const y = cy + Math.sin(angle) * 9;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }

                ctx.stroke();
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2;
                    const x = cx + Math.cos(angle) * 4;
                    const y = cy + Math.sin(angle) * 4;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();
            } else if (icon === 'duration') {
                // Clock/timer
                ctx.beginPath();
                ctx.arc(cx, cy, 7, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx, cy - 5);
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + 3, cy + 1);

            } else if (icon === 'fusionbeam') {
                // Continuous ray: thick line with endpoint dots
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(cx - 8, cy);
                ctx.lineTo(cx + 8, cy);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx + 8, cy, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx - 8, cy, 2, 0, Math.PI * 2);
                ctx.fill();
            } else if (icon === 'fork') {
                // Bifurcating line
                ctx.beginPath();
                ctx.moveTo(cx - 8, cy);
                ctx.lineTo(cx, cy);
                ctx.lineTo(cx + 7, cy - 6);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + 7, cy + 6);
                ctx.stroke();
            } else if (icon === 'ramp') {
                // Ascending arrow (damage ramp)
                ctx.beginPath();
                ctx.moveTo(cx - 7, cy + 6);
                ctx.lineTo(cx + 7, cy - 6);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx + 2, cy - 6);
                ctx.lineTo(cx + 7, cy - 6);
                ctx.lineTo(cx + 7, cy - 1);

            } else if (icon === 'siphon') {

                ctx.beginPath();
                ctx.arc(cx, cy, 3, 0, Math.PI * 2);

                for (let i = 0; i < 3; i++) {

                    ctx.moveTo(cx + Math.cos(angle) * 4, cy + Math.sin(angle) * 4);
                    ctx.lineTo(cx + Math.cos(angle) * 9, cy + Math.sin(angle) * 9);

                    ctx.arc(cx + Math.cos(angle) * 9, cy + Math.sin(angle) * 9, 1.5, 0, Math.PI * 2);

                }

                // Central dot with branching lines
                ctx.beginPath();
                ctx.arc(cx - 5, cy, 2, 0, Math.PI * 2);

                ctx.moveTo(cx - 5, cy);
                ctx.lineTo(cx + 2, cy);

                ctx.beginPath();
                ctx.moveTo(cx + 2, cy);
                ctx.lineTo(cx + 8, cy - 5);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx + 2, cy);
                ctx.lineTo(cx + 8, cy + 5);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx + 8, cy - 5, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx + 8, cy + 5, 1.5, 0, Math.PI * 2);

            } else if (icon === 'mine') {
                // Circle with spikes (mine)
                ctx.beginPath();
                ctx.arc(cx, cy, 5, 0, Math.PI * 2);
                ctx.stroke();
                for (let i = 0; i < 6; i++) {
                    const a = (i / 6) * Math.PI * 2;
                    ctx.beginPath();
                    ctx.moveTo(cx + Math.cos(a) * 5, cy + Math.sin(a) * 5);
                    ctx.lineTo(cx + Math.cos(a) * 9, cy + Math.sin(a) * 9);

                }
            } else if (icon === 'minefield') {
                // Three small mines
                for (let i = -1; i <= 1; i++) {
                    ctx.beginPath();
                    ctx.arc(cx + i * 7, cy + (i === 0 ? -3 : 3), 3, 0, Math.PI * 2);

                }
            } else if (icon === 'blackhole') {
                // Concentric circles with fill
                ctx.beginPath();
                ctx.arc(cx, cy, 8, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx, cy, 5, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx, cy, 2, 0, Math.PI * 2);
                ctx.fill();
            } else if (icon === 'turret') {
                // Hexagon base (outline, like in-game)
                ctx.beginPath();
                for (let j = 0; j < 6; j++) {
                    const a = (j / 6) * Math.PI * 2 - Math.PI / 2;
                    const hx = cx + Math.cos(a) * 8;

                    if (j === 0) ctx.moveTo(hx, hy);
                    else ctx.lineTo(hx, hy);
                }
                ctx.closePath();
                ctx.stroke();
                // Barrel pointing up-right
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(-Math.PI / 4);
                ctx.fillRect(2, -1.5, 9, 3);

                // Center dot
                ctx.beginPath();
                ctx.arc(cx, cy, 3, 0, Math.PI * 2);

            } else if (icon === 'production') {
                // Multiple small turrets (mass production)
                for (let i = -1; i <= 1; i++) {

            } else if (icon === 'station') {
                // Two turrets connected by a beam
                ctx.fillRect(cx - 8, cy + 1, 5, 4);

                ctx.beginPath();
                ctx.moveTo(cx - 3, cy + 3);
                ctx.lineTo(cx + 3, cy + 3);
                ctx.stroke();
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(cx - 6, cy - 4);
                ctx.lineTo(cx - 6, cy + 1);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx + 6, cy - 4);
                ctx.lineTo(cx + 6, cy + 1);
                ctx.stroke();
            } else {
                // Fallback: simple circle
                ctx.beginPath();
                ctx.arc(cx, cy, 6, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        // ============================================================
        // CANVAS-BASED UPGRADE OVERLAY
        // ============================================================

        // Easing functions
        function easeOutCubic(t) { return 1 - Math.pow(1 - Math.min(Math.max(t, 0), 1), 3); }
        function easeOutQuart(t) { return 1 - Math.pow(1 - Math.min(Math.max(t, 0), 1), 4); }

        // Show the upgrade selection overlay (canvas-based)
        function showUpgradePanel() {
            // Don't open if player is dead or dying
            if (!player || player._dead) return;

            upgradeOptions = generateUpgradeOptions();
            if (upgradeOptions.length === 0) return;

            upgradeSelectionActive = true;
            gameState = 'skilltree';

            // CSS blur on game canvas, show overlay canvas on top
            canvas.style.filter = 'blur(5px)';
            upgradeCanvas.style.display = 'block';

            // Reset joystick state (visibility handled by gameLoop)
            joystickActive = false;
            joystickMagnitude = 0;

            // Calculate card positions — vertical tall cards
            const numCards = upgradeOptions.length;
            const padding = 20;
            const cardGap = 14;
            const availW = CANVAS_WIDTH - padding * 2;
            const cardW = Math.floor((availW - (numCards - 1) * cardGap) / numCards);
            const cardH = 420;
            const totalW = numCards * cardW + (numCards - 1) * cardGap;
            const startX = CANVAS_WIDTH / 2 - totalW / 2 + cardW / 2;
            const cardY = CANVAS_HEIGHT - 60 - cardH / 2;

            upgradeOverlay.cardPositions = [];
            for (let i = 0; i < numCards; i++) {
                upgradeOverlay.cardPositions.push({
                    x: startX + i * (cardW + cardGap),
                    y: cardY,
                    w: cardW,
                    h: cardH
                });
            }

            upgradeOverlay.active = true;
            upgradeOverlay.startTime = performance.now();
            upgradeOverlay.animTime = 0;
            upgradeOverlay.animDone = false;

        }

        // Render the upgrade overlay on the overlay canvas (uCtx)
        function renderUpgradeOverlay() {
            if (!upgradeOverlay.active) return;

            const t = upgradeOverlay.animTime;
            const cx = CANVAS_WIDTH / 2;

            // Clear overlay canvas each frame
            uCtx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // --- Ship: real position from game world ---
            const shipScreen = player ? worldToScreen(player.x, player.y) : { x: cx, y: CANVAS_HEIGHT / 3 };
            const shipX = shipScreen.x;
            const shipY = shipScreen.y;

            // --- Phase 2: Redraw player ship sharp on overlay ---
            const overlayAlpha = easeOutCubic(Math.min(t / 0.4, 1));
            if (overlayAlpha > 0.1 && player) {
                const shipAlpha = easeOutCubic(Math.min((t - 0.05) / 0.3, 1));

                // Subtle ring around ship
                uCtx.save();
                uCtx.globalAlpha = 0.1 * shipAlpha;
                uCtx.strokeStyle = COLORS.PLAYER;
                uCtx.lineWidth = 1;
                uCtx.beginPath();
                uCtx.arc(shipX, shipY, 50, 0, Math.PI * 2);
                uCtx.stroke();
                uCtx.restore();

                // Draw ship at real screen position
                uCtx.save();
                uCtx.globalAlpha = shipAlpha;
                uCtx.translate(shipX, shipY);
                uCtx.rotate(player.angle * Math.PI / 180);
                uCtx.translate(-PLAYER_PIVOT_OFFSET, 0);
                uCtx.strokeStyle = COLORS.PLAYER;
                uCtx.lineWidth = 3;
                drawShipPath(uCtx, selectedStartingWeapon);
                uCtx.stroke();
                uCtx.restore();
            }

            // --- Phase 3: "LEVEL UP" header + ship icon + level ---
            const levelUpAlpha = easeOutCubic(Math.min(Math.max(0, t - 0.15) / 0.35, 1));
            const topY = 90;
            if (levelUpAlpha > 0) {
                uCtx.save();
                // "LEVEL UP" title
                uCtx.font = 'bold 44px "Segoe UI", system-ui, sans-serif';
                uCtx.textAlign = 'center';
                uCtx.textBaseline = 'middle';
                uCtx.fillStyle = COLORS.GOLD;
                uCtx.globalAlpha = levelUpAlpha * 0.3;
                uCtx.fillText('LEVEL UP', cx, topY);
                uCtx.globalAlpha = levelUpAlpha;
                uCtx.fillText('LEVEL UP', cx, topY);
                // Decorative lines
                const textW = uCtx.measureText('LEVEL UP').width / 2 + 20;
                uCtx.strokeStyle = COLORS.GOLD;
                uCtx.globalAlpha = levelUpAlpha * 0.4;
                uCtx.lineWidth = 1;
                uCtx.beginPath();
                uCtx.moveTo(cx - textW - 60, topY);
                uCtx.lineTo(cx - textW, topY);
                uCtx.stroke();
                uCtx.beginPath();
                uCtx.moveTo(cx + textW, topY);
                uCtx.lineTo(cx + textW + 60, topY);
                uCtx.stroke();

                uCtx.restore();
            }

            // --- Phase 4: Connection lines from ship to cards ---
            const lineStart = 0.25;
            const lineDuration = 0.7;
            const lineDelays = [0, 0.08, 0.16];
            const numCards = upgradeOverlay.cardPositions.length;

            const lineOrigins = [];
            for (let i = 0; i < numCards; i++) {
                const offsetX = (i - (numCards - 1) / 2) * 10;
                lineOrigins.push({ x: shipX + offsetX, y: shipY + 15 });
            }

            for (let i = 0; i < numCards; i++) {
                const lineT = Math.max(0, t - lineStart - lineDelays[i]);
                const lineProgress = Math.min(lineT / lineDuration, 1);
                if (lineProgress <= 0) continue;

                const card = upgradeOverlay.cardPositions[i];

                drawUpgradeConnectionLine(
                    lineOrigins[i].x, lineOrigins[i].y,
                    card.x, card.y - card.h / 2,
                    easeOutCubic(lineProgress),
                    COLORS.PLAYER, t
                );
            }

            // --- Phase 5: Weapon inventory bar ---
            const invStart = lineStart + lineDuration * 0.5;
            const invAlpha = easeOutQuart(Math.min(Math.max(0, t - invStart) / 0.4, 1));
            const invY = 150;
            if (invAlpha > 0) {
                renderWeaponInventoryBar(cx, invY, invAlpha);
            }

            // --- Phase 6: Cards fade-in ---
            const cardStart = lineStart + lineDuration * 0.55;
            const cardDelays = [0, 0.1, 0.2];

            for (let i = 0; i < numCards; i++) {
                const cardT = Math.max(0, t - cardStart - (cardDelays[i] || 0));
                const cardAlpha = easeOutQuart(Math.min(cardT / 0.4, 1));
                if (cardAlpha <= 0) continue;

                const slideOffset = (1 - cardAlpha) * 20;
                const card = upgradeOverlay.cardPositions[i];
                const option = upgradeOptions[i];

                renderUpgradeCard(
                    card.x, card.y + slideOffset,
                    card.w, card.h,
                    option, cardAlpha, i
                );
            }

            if (t >= 1.0) upgradeOverlay.animDone = true;
        }

        // Draw a connection line from ship to card top
        function drawUpgradeConnectionLine(fromX, fromY, toX, toY, progress, color, animTime) {
            if (progress <= 0) return;

            // Path: down from ship → horizontal to card X → down to card
            const midY = fromY + (toY - fromY) * 0.35;
            const points = [
                { x: fromX, y: fromY },
                { x: fromX, y: midY },
                { x: toX, y: midY },
                { x: toX, y: toY }
            ];

            // Calculate segment lengths
            let totalLen = 0;
            const segLens = [];
            for (let i = 1; i < points.length; i++) {
                const dx = points[i].x - points[i - 1].x;
                const dy = points[i].y - points[i - 1].y;
                const len = Math.sqrt(dx * dx + dy * dy);
                segLens.push(len);
                totalLen += len;
            }

            const drawLen = totalLen * progress;

            // Draw glow line
            uCtx.save();
            uCtx.strokeStyle = color;
            uCtx.globalAlpha = 0.12;
            uCtx.lineWidth = 8;
            uCtx.lineCap = 'round';
            uCtx.lineJoin = 'round';
            drawUpgradePartialPath(points, segLens, drawLen);
            uCtx.stroke();

            // Draw main thin line
            uCtx.strokeStyle = color;
            uCtx.globalAlpha = 0.8;
            uCtx.lineWidth = 1.8;
            drawUpgradePartialPath(points, segLens, drawLen);
            uCtx.stroke();

            // Pulsing dot at tip
            if (progress > 0.05 && progress < 1) {
                const tip = getUpgradePathPoint(points, segLens, drawLen);
                const pulse = 0.6 + 0.4 * Math.sin(animTime * 6);
                uCtx.beginPath();
                uCtx.arc(tip.x, tip.y, 4 * pulse, 0, Math.PI * 2);
                uCtx.fillStyle = color;
                uCtx.globalAlpha = 0.9;
                uCtx.fill();
            }

            // Small dot at origin
            uCtx.beginPath();
            uCtx.arc(fromX, fromY, 3, 0, Math.PI * 2);
            uCtx.fillStyle = color;
            uCtx.globalAlpha = 0.7;
            uCtx.fill();

            // Dot at card connection point
            if (progress >= 0.95) {
                uCtx.beginPath();
                uCtx.arc(toX, toY, 3, 0, Math.PI * 2);
                uCtx.fillStyle = color;
                uCtx.globalAlpha = 0.8;
                uCtx.fill();
            }

            uCtx.restore();
        }

        function drawUpgradePartialPath(points, segLens, drawLen) {
            uCtx.beginPath();
            uCtx.moveTo(points[0].x, points[0].y);
            let remaining = drawLen;
            for (let i = 0; i < segLens.length; i++) {
                if (remaining <= 0) break;
                if (remaining >= segLens[i]) {
                    uCtx.lineTo(points[i + 1].x, points[i + 1].y);
                    remaining -= segLens[i];
                } else {
                    const frac = remaining / segLens[i];
                    uCtx.lineTo(
                        points[i].x + (points[i + 1].x - points[i].x) * frac,
                        points[i].y + (points[i + 1].y - points[i].y) * frac
                    );
                    remaining = 0;
                }
            }
        }

        function getUpgradePathPoint(points, segLens, drawLen) {
            let remaining = drawLen;
            for (let i = 0; i < segLens.length; i++) {
                if (remaining <= segLens[i] || i === segLens.length - 1) {
                    const frac = Math.min(remaining / segLens[i], 1);
                    return {
                        x: points[i].x + (points[i + 1].x - points[i].x) * frac,
                        y: points[i].y + (points[i + 1].y - points[i].y) * frac
                    };
                }
                remaining -= segLens[i];
            }
            return points[points.length - 1];
        }

        // Render weapon inventory bar: ship slot on top (bigger), 3 weapon slots below
        function renderWeaponInventoryBar(cx, y, alpha) {
            uCtx.save();
            uCtx.globalAlpha = alpha;

            // Horizontal single row: all 4 weapon slots side by side
            const slotSize = 50;
            const slotGap = 12;
            const numSlots = MAX_ACTIVE_WEAPONS; // 4
            const totalW = numSlots * slotSize + (numSlots - 1) * slotGap;
            const startX = cx - totalW / 2;
            const slotY = y - slotSize / 2;

            for (let i = 0; i < numSlots; i++) {
                const sx = startX + i * (slotSize + slotGap);
                const weaponId = activeWeapons[i];
                const slotCx = sx + slotSize / 2;
                const slotCy = slotY + slotSize / 2;

                if (weaponId && WEAPONS[weaponId]) {
                    const weapon = WEAPONS[weaponId];
                    const lvl = upgradeLevels[weaponId] || 0;
                    const isShip = (i === 0);

                    // Slot background
                    uCtx.fillStyle = 'rgba(15, 20, 35, 0.8)';
                    uCtx.beginPath();
                    uCtx.roundRect(sx, slotY, slotSize, slotSize, 8);
                    uCtx.fill();

                    // Slot border
                    uCtx.strokeStyle = weapon.color;
                    uCtx.lineWidth = 2;
                    uCtx.beginPath();
                    uCtx.roundRect(sx, slotY, slotSize, slotSize, 8);
                    uCtx.stroke();

                    // Icon (ship or weapon)
                    if (isShip) {
                        drawShipUpgradeIcon(uCtx, selectedStartingWeapon, slotCx, slotCy - 2, 0.95, weapon.color);
                    } else {
                        uCtx.save();
                        uCtx.translate(slotCx, slotCy - 2);
                        uCtx.scale(1.0, 1.0);
                        drawSkillIcon(uCtx, weapon.icon, 0, 0, weapon.color);
                        uCtx.restore();
                    }

                    // Level text below slot
                    const lvlText = lvl >= 10 ? 'MAX' : 'Lv.' + lvl;
                    const lvlColor = lvl >= 10 ? COLORS.GOLD : weapon.color;
                    uCtx.font = 'bold 13px "Segoe UI", system-ui, sans-serif';
                    uCtx.textAlign = 'center';
                    uCtx.textBaseline = 'top';
                    uCtx.fillStyle = lvlColor;
                    uCtx.fillText(lvlText, slotCx, slotY + slotSize + 4);
                } else {
                    // Empty slot
                    uCtx.strokeStyle = 'rgba(100, 100, 140, 0.25)';
                    uCtx.lineWidth = 1.5;
                    uCtx.setLineDash([5, 5]);
                    uCtx.beginPath();
                    uCtx.roundRect(sx, slotY, slotSize, slotSize, 8);
                    uCtx.stroke();
                    uCtx.setLineDash([]);

                    uCtx.fillStyle = 'rgba(100, 100, 140, 0.3)';
                    uCtx.font = '20px "Segoe UI", system-ui, sans-serif';
                    uCtx.textAlign = 'center';
                    uCtx.textBaseline = 'middle';
                    uCtx.fillText('+', slotCx, slotCy);
                }
            }

            uCtx.restore();
        }

        // Render a single upgrade card on canvas (vertical layout)
        function renderUpgradeCard(cx, cy, w, h, option, alpha, index) {
            if (alpha <= 0) return;

            const halfW = w / 2;
            const halfH = h / 2;
            const color = option.color || COLORS.PLAYER;
            const borderColor = option.isEvolution ? COLORS.GOLD : color;
            const nameColor = option.isEvolution ? COLORS.GOLD : color;

            uCtx.save();
            uCtx.globalAlpha = alpha;

            // Card border
            uCtx.strokeStyle = COLORS.PLAYER;
            uCtx.lineWidth = 1.5;
            uCtx.beginPath();
            uCtx.roundRect(cx - halfW, cy - halfH, w, h, 10);
            uCtx.stroke();

            const innerPad = 16;
            let curY = cy - halfH + innerPad;

            // Badge at top — every card gets a type label
            const badgeText = option.isEvolution ? 'EVOLUTION'
                : option.type === 'weapon_activation' ? 'NEW'
                : option.type === 'upgrade' ? 'UPGRADE'
                : 'BONUS';
            uCtx.font = 'bold 16px "Segoe UI", system-ui, sans-serif';
            uCtx.textAlign = 'center';
            uCtx.textBaseline = 'top';
            uCtx.fillStyle = COLORS.GOLD;
            uCtx.fillText(badgeText, cx, curY);
            curY += 24;

            // Icon centered
            const isStartingWeaponUpgrade = option.type === 'upgrade' && !option.isEvolution && WEAPONS[option.id]?.isStartingWeapon;
            const iconR = 42;
            const iconY = curY + iconR + 4;
            uCtx.beginPath();
            uCtx.arc(cx, iconY, iconR, 0, Math.PI * 2);
            uCtx.fillStyle = color + '10';
            uCtx.fill();
            uCtx.strokeStyle = borderColor;
            uCtx.lineWidth = 1.5;
            uCtx.stroke();

            if (isStartingWeaponUpgrade) {
                drawShipUpgradeIcon(uCtx, selectedStartingWeapon, cx, iconY + 2, 0.85, color);
            } else {
                uCtx.save();
                uCtx.translate(cx, iconY);
                uCtx.scale(2.0, 2.0);
                drawSkillIcon(uCtx, option.icon, 0, 0, color);
                uCtx.restore();
            }
            curY = iconY + iconR + 12;

            // Weapon name (centered)
            uCtx.textAlign = 'center';
            uCtx.textBaseline = 'top';
            uCtx.font = 'bold 22px "Segoe UI", system-ui, sans-serif';
            uCtx.fillStyle = nameColor;
            let displayName = isStartingWeaponUpgrade ? 'Upgrade Ship' : option.name;
            const maxNameW = w - innerPad * 2;
            while (uCtx.measureText(displayName).width > maxNameW && displayName.length > 5) {
                displayName = displayName.slice(0, -1);
            }
            uCtx.fillText(displayName, cx, curY);
            curY += 30;

            // Thin accent line
            const lineW = Math.min(w * 0.6, 120);
            uCtx.strokeStyle = color + '33';
            uCtx.lineWidth = 1;
            uCtx.beginPath();
            uCtx.moveTo(cx - lineW / 2, curY);
            uCtx.lineTo(cx + lineW / 2, curY);
            uCtx.stroke();
            curY += 10;

            // Description (centered, word-wrapped)
            uCtx.font = '18px "Segoe UI", system-ui, sans-serif';
            uCtx.fillStyle = COLORS.HUD_TEXT_SECONDARY;
            uCtx.textAlign = 'center';
            uCtx.textBaseline = 'top';
            const descMaxW = w - innerPad * 2 - 4;
            const words = option.description.split(' ');
            let lines = [];
            let currentLine = '';
            for (const word of words) {
                const testLine = currentLine ? currentLine + ' ' + word : word;
                if (uCtx.measureText(testLine).width > descMaxW && currentLine) {
                    lines.push(currentLine);
                    currentLine = word;
                } else {
                    currentLine = testLine;
                }
            }
            if (currentLine) lines.push(currentLine);
            for (const line of lines) {
                uCtx.fillText(line, cx, curY);
                curY += 24;
            }

            // Level progress bar at bottom (10 segments, single row, full width)
            if (option.type === 'weapon_activation' || option.type === 'upgrade') {
                const currentLevel = option.type === 'weapon_activation' ? 0 : (option.level - 1);
                const barPad = innerPad;
                const barW = w - barPad * 2;
                const segGap = 3;
                const numSegs = 10;
                const segW = (barW - (numSegs - 1) * segGap) / numSegs;
                const segH = 14;
                const barY = cy + halfH - 50;
                const barX = cx - barW / 2;

                // "Lv. X" label above bar
                uCtx.font = 'bold 14px "Segoe UI", system-ui, sans-serif';
                uCtx.textAlign = 'center';
                uCtx.textBaseline = 'bottom';
                uCtx.fillStyle = color;
