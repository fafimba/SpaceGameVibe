                            ctx.fillText('MAX', ccx, puY + puCardH - 16);
                        } else {
                            ctx.font = 'bold 24px "Segoe UI", sans-serif';
                            ctx.fillStyle = canAfford ? '#E0F0FF' : 'rgba(224, 240, 255, 0.4)';
                            ctx.fillText('\u25C6 ' + cost, ccx, puY + puCardH - 16);
                            if (canAfford) {
                                menuBtns.push({ type: 'upgrade', id: key, x: x, y: puY, w: puCardW, h: puCardH });
                            }
                        }
                    }

                    // BACK button (desktop) — aligned to same Y as gem button in main menu
                    const backW = 200;
                    const backH = 40;
                    const backX = cx - backW / 2;
                    const backY = CANVAS_HEIGHT - backH - 20;
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.roundRect(backX, backY, backW, backH, 8);
                    ctx.fill();
                    ctx.stroke();
                    ctx.font = 'bold 16px "Segoe UI", sans-serif';
                    ctx.fillStyle = COLORS.UI_SECONDARY;
                    ctx.fillText('BACK  (S)', cx, backY + 27);
                    menuBtns.push({ type: 'back', x: backX, y: backY, w: backW, h: backH });
                }
            }

            ctx.globalAlpha = 1;
            currentMenuButtons = menuBtns;
        }

        function renderArsenalGallery() {
            const mobile = isMobile();

            const ARSENAL_WEAPONS = [
                'laser_cannon', 'orbital_shield', 'missile_launcher', 'lightning_ray',
                'plasma_field', 'alien_drone', 'fusion_beam', 'gravity_mines', 'sentry_turret'
            ].map(id => ({ id, name: WEAPONS[id].name, icon: WEAPONS[id].icon, color: WEAPONS[id].color }));

            const cols = mobile ? 2 : 3;
            const rows = mobile ? 5 : 3;
            const cardW = mobile ? 140 : 200;
            const cardH = mobile ? 100 : 120;
            const gap = mobile ? 12 : 16;

            const gridW = cols * cardW + (cols - 1) * gap;
            const gridX = (CANVAS_WIDTH - gridW) / 2;
            const titleY = mobile ? 680 : 560;
            const gridStartY = titleY + 30;

            // Title
            ctx.save();
            ctx.textAlign = 'center';
            ctx.font = 'bold 18px "Segoe UI", sans-serif';
            ctx.fillStyle = COLORS.HUD_CYAN;
            ctx.fillText('ARSENAL', CANVAS_WIDTH / 2, titleY);

            // Underline
            const lineW = 60;
            ctx.strokeStyle = 'rgba(127, 219, 255, 0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(CANVAS_WIDTH / 2 - lineW, titleY + 8);
            ctx.lineTo(CANVAS_WIDTH / 2 + lineW, titleY + 8);
            ctx.stroke();

            const now = Date.now();

            for (let i = 0; i < ARSENAL_WEAPONS.length; i++) {
                const weapon = ARSENAL_WEAPONS[i];
                const col = i % cols;
                const row = Math.floor(i / cols);
                const cx = gridX + col * (cardW + gap);
                const cy = gridStartY + row * (cardH + gap);
                // Card background
                ctx.fillStyle = 'rgba(10, 20, 40, 0.7)';
                ctx.beginPath();
                ctx.roundRect(cx, cy, cardW, cardH, 6);
                ctx.fill();

                // Card border
                const pulse = Math.sin(now / 800 + i * 1.2) * 0.25 + 0.75;
                ctx.strokeStyle = weapon.color;
                ctx.globalAlpha = pulse;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(cx, cy, cardW, cardH, 6);
                ctx.stroke();
                ctx.globalAlpha = 1;

                // Icon area
                const iconX = cx + cardW / 2;
                const iconY = cy + (mobile ? 30 : 36);

                // Draw weapon icon scaled up
                ctx.save();
                ctx.translate(iconX, iconY);
                ctx.scale(1.8, 1.8);
                drawSkillIcon(ctx, weapon.icon, 0, 0, weapon.color);
                ctx.restore();

                // Weapon name
                ctx.textAlign = 'center';
                const nameY = cy + (mobile ? 62 : 76);
                ctx.font = `bold ${mobile ? 9 : 11}px "Segoe UI", sans-serif`;
                ctx.fillStyle = weapon.color;
                ctx.fillText(weapon.name, cx + cardW / 2, nameY);
            }

            ctx.restore();
        }

        function renderHUD() {
            if (!player) return;

            // ═══════════════════════════════════════
            // BAR GEOMETRY — full mobile width, capped on desktop
            // ═══════════════════════════════════════
            const barMaxWidth = 640;
            const barWidth = Math.min(CANVAS_WIDTH - 32, barMaxWidth);
            const barX = (CANVAS_WIDTH - barWidth) / 2;
            const infoY = 36;   // row for kills, level hex, lives
            const xpBarY = 64;  // XP bar below info row

            // ═══════════════════════════════════════
            // HAMBURGER MENU BUTTON (above bar, left-aligned)
            // ═══════════════════════════════════════
            const hbW = 46;
            const hbH = 38;
            const hbX = barX;
            const hbY = infoY - hbH / 2 - 4;
            // Update hit area to match rendered position
            HAMBURGER_BTN.x = hbX - 6;
            HAMBURGER_BTN.y = hbY - 6;
            HAMBURGER_BTN.w = hbW + 12;
            HAMBURGER_BTN.h = hbH + 12;

            // Button background
            ctx.fillStyle = 'rgba(255, 255, 255, 0.04)';
            ctx.strokeStyle = COLORS.HUD_PANEL_BORDER;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(hbX, hbY, hbW, hbH, 7);
            ctx.fill();
            ctx.stroke();

            // Three lines
            const lineW = 22;
            const lineGap = 7;
            const linesStartX = hbX + (hbW - lineW) / 2;
            const linesStartY = hbY + hbH / 2 - lineGap;
            ctx.strokeStyle = COLORS.HUD_TEXT_SECONDARY;
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            for (let i = 0; i < 3; i++) {
                const ly = linesStartY + i * lineGap;
                ctx.beginPath();
                ctx.moveTo(linesStartX, ly);
                ctx.lineTo(linesStartX + lineW, ly);
                ctx.stroke();
            }

            // ═══════════════════════════════════════
            // MUTE INDICATOR (next to hamburger, only when muted)
            // ═══════════════════════════════════════
            if (AudioManager.isMuted()) {
                const muteIconX = hbX + hbW + 10;
                const muteIconY = hbY + hbH / 2;
                ctx.strokeStyle = COLORS.HUD_RED;
                ctx.lineWidth = 1.5;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(muteIconX, muteIconY - 3);
                ctx.lineTo(muteIconX + 4, muteIconY - 3);
                ctx.lineTo(muteIconX + 7, muteIconY - 6);
                ctx.lineTo(muteIconX + 7, muteIconY + 6);
                ctx.lineTo(muteIconX + 4, muteIconY + 3);
                ctx.lineTo(muteIconX, muteIconY + 3);
                ctx.closePath();
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(muteIconX + 10, muteIconY - 3);
                ctx.lineTo(muteIconX + 15, muteIconY + 3);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(muteIconX + 15, muteIconY - 3);
                ctx.lineTo(muteIconX + 10, muteIconY + 3);
                ctx.stroke();
            }

            // ═══════════════════════════════════════
            // KILLS (centered above bar, prominent)
            // ═══════════════════════════════════════
            ctx.textAlign = 'center';
            ctx.font = 'bold 34px "Segoe UI", sans-serif';
            ctx.fillStyle = COLORS.HUD_TEXT_PRIMARY;
            if (ENABLE_GLOW_EFFECTS) {
                ctx.shadowColor = COLORS.HUD_CYAN_GLOW;
                ctx.shadowBlur = 20;
            }
            const killsStr = totalKills.toLocaleString();
            const killsNumW = ctx.measureText(killsStr).width;
            ctx.fillText(killsStr, CANVAS_WIDTH / 2, infoY);
            ctx.shadowBlur = 0;

            // "KILLS" label to the left of the number
            ctx.font = '12px "Segoe UI", sans-serif';
            ctx.fillStyle = COLORS.HUD_TEXT_SECONDARY;
            ctx.textAlign = 'right';
            ctx.fillText('KILLS', CANVAS_WIDTH / 2 - killsNumW / 2 - 6, infoY);

            // Crystal counter (right of kills)
            if (crystalsThisRun > 0) {
                const killsW = ctx.measureText(killsStr).width;
                ctx.fillStyle = '#E0F0FF';
                ctx.font = 'bold 15px "Segoe UI", sans-serif';
                ctx.fillText('\u25C6 ' + crystalsThisRun, CANVAS_WIDTH / 2 + killsW / 2 + 22, infoY);
            }

            // ═══════════════════════════════════════
            // LIVES (right-aligned above bar)
            // ═══════════════════════════════════════
            const shipScale = LIFE_SLOT_SCALE;
            const shipSpacing = LIFE_SLOT_SPACING;
            const hullEndX = barX + barWidth;
            const hullStartX = hullEndX - (playerMaxHP * shipSpacing) + 10;

            ctx.lineCap = 'round';
            for (let i = 0; i < playerMaxHP; i++) {
                const shipX = hullStartX + i * shipSpacing;
                const shipY = infoY - 4;
                const isActive = i < player.hp;

                ctx.save();
                ctx.translate(shipX, shipY);
                ctx.scale(shipScale, shipScale);
                ctx.rotate(-Math.PI / 2);

                ctx.lineWidth = 3;
                drawShipPath(ctx, selectedStartingWeapon);

                if (isActive) {
                    ctx.strokeStyle = COLORS.PLAYER;
                    ctx.shadowColor = COLORS.PLAYER;
                    ctx.shadowBlur = 15;
                } else {
                    ctx.strokeStyle = COLORS.HUD_CYAN_DIM;
                    ctx.globalAlpha = 0.3;
                }
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.restore();
            }

            // ═══════════════════════════════════════
            // XP BAR (full width, below info row)
            // ═══════════════════════════════════════
            const xpBarWidth = barWidth;
            const xpBarHeight = 20;
            const xpProgress = playerXP / xpToNextLevel;

            // Bar track
            ctx.fillStyle = 'rgba(255, 255, 255, 0.04)';
            ctx.strokeStyle = 'rgba(0, 255, 170, 0.12)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(barX, xpBarY, xpBarWidth, xpBarHeight, 1);
            ctx.fill();
            ctx.stroke();

            // Bar fill
            if (xpProgress > 0) {
                const fillGrad = ctx.createLinearGradient(barX, 0, barX + xpBarWidth * xpProgress, 0);
                fillGrad.addColorStop(0, COLORS.HUD_GREEN_DIM);
                fillGrad.addColorStop(1, COLORS.HUD_GREEN);
                ctx.fillStyle = fillGrad;
                ctx.beginPath();
                ctx.roundRect(barX, xpBarY, xpBarWidth * xpProgress, xpBarHeight, 1);
                ctx.fill();

                if (ENABLE_GLOW_EFFECTS) {
                    ctx.shadowColor = 'rgba(0, 255, 170, 0.4)';
                    ctx.shadowBlur = 12;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            // Tick marks
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.04)';
            ctx.lineWidth = 1;
            for (let i = 1; i < 10; i++) {
                const tickX = barX + (xpBarWidth / 10) * i;
                ctx.beginPath();
                ctx.moveTo(tickX, xpBarY);
                ctx.lineTo(tickX, xpBarY + xpBarHeight);
                ctx.stroke();
            }

            // Level text inside bar (left side) — outline for readability over fill
            ctx.textAlign = 'left';
            ctx.font = 'bold 12px "Segoe UI", sans-serif';
            const lvlLabel = !isFullVersion ? 'Lv.' + playerLevel + '/' + DEMO_MAX_LEVEL : 'Lv.' + playerLevel;
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.lineWidth = 3;
            ctx.lineJoin = 'round';
            ctx.strokeText(lvlLabel, barX + 6, xpBarY + 14);
            ctx.fillStyle = '#FFFFFF';
            ctx.fillText(lvlLabel, barX + 6, xpBarY + 14);

            // XP text (right side inside bar)
            ctx.textAlign = 'right';
            ctx.font = '9px "Segoe UI", sans-serif';
            ctx.fillStyle = COLORS.HUD_TEXT_SECONDARY;
            ctx.fillText(playerXP + ' / ' + xpToNextLevel + ' XP', barX + xpBarWidth - 6, xpBarY + 14);

            // ═══════════════════════════════════════
            // WAVE ALERT (below XP bar, conditional)
            // ═══════════════════════════════════════
            if (waveAlertActive && waveAlertTimer < WAVE_ALERT_DURATION) {
                const alertProgress = waveAlertTimer / WAVE_ALERT_DURATION;
                const fadeIn = Math.min(1, alertProgress * 4);
                const fadeOut = alertProgress > 0.7 ? 1 - ((alertProgress - 0.7) / 0.3) : 1;
                const alpha = fadeIn * fadeOut;

                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.textAlign = 'center';

                ctx.font = 'bold 16px "Segoe UI", sans-serif';
                ctx.fillStyle = COLORS.HUD_RED;
                if (ENABLE_GLOW_EFFECTS) {
                    ctx.shadowColor = 'rgba(255, 107, 107, 0.5)';
                    ctx.shadowBlur = 20;
                }
                ctx.fillText('WAVE ' + waveAlertNumber, CANVAS_WIDTH / 2, 100);
                ctx.shadowBlur = 0;

                if (waveAlertSubtitle) {
                    ctx.font = '9px "Segoe UI", sans-serif';
                    ctx.fillStyle = 'rgba(255, 107, 107, 0.5)';
                    ctx.fillText(waveAlertSubtitle.toUpperCase(), CANVAS_WIDTH / 2, 115);
                }

                ctx.restore();
            }

            // ═══════════════════════════════════════
            // DESKTOP CONTROLS HINT (bottom center)
            // ═══════════════════════════════════════
            if (controlsHintVisible && !isMobile()) {
                let alpha = 0.4 + Math.sin(Date.now() / 400) * 0.2;
                if (controlsHintFadeStart > 0) {
                    const elapsed = (Date.now() - controlsHintFadeStart) / 1000;
                    if (elapsed >= 1) {
                        controlsHintVisible = false;
                    } else {
                        alpha *= (1 - elapsed);
                    }
                }
                if (controlsHintVisible) {
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.font = 'bold 13px "Segoe UI", sans-serif';

                    const ks = 28;       // key square size
                    const kg = 4;        // gap between keys
                    const groupGap = 24; // gap between WASD group and arrow group
                    const baseY = CANVAS_HEIGHT - 80;
                    const cx = CANVAS_WIDTH / 2;

                    // Helper: draw a single key cap
                    const drawKey = (x, y, label) => {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.06)';
                        ctx.strokeStyle = COLORS.HUD_TEXT_SECONDARY;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.roundRect(x - ks / 2, y - ks / 2, ks, ks, 5);
                        ctx.fill();
                        ctx.stroke();
                        ctx.fillStyle = COLORS.HUD_TEXT_SECONDARY;
                        ctx.fillText(label, x, y);
                    };

                    // WASD group — centered left of midpoint
                    //    [W]
                    // [A][S][D]
                    const wasdCx = cx - (ks * 1.5 + kg + groupGap / 2);
                    drawKey(wasdCx, baseY - ks / 2 - kg / 2, 'W');                          // W (top row, center)
                    drawKey(wasdCx - ks - kg, baseY + ks / 2 + kg / 2, 'A');                 // A
                    drawKey(wasdCx, baseY + ks / 2 + kg / 2, 'S');                           // S
                    drawKey(wasdCx + ks + kg, baseY + ks / 2 + kg / 2, 'D');                 // D

                    // Separator "/"
                    ctx.fillStyle = COLORS.HUD_TEXT_SECONDARY;
                    ctx.font = '16px "Segoe UI", sans-serif';
                    ctx.fillText('/', cx, baseY);

                    // Arrow group — centered right of midpoint
                    //    [↑]
                    // [←][↓][→]
                    ctx.font = 'bold 13px "Segoe UI", sans-serif';
                    const arrowCx = cx + (ks * 1.5 + kg + groupGap / 2);
                    drawKey(arrowCx, baseY - ks / 2 - kg / 2, '\u2191');                     // ↑
                    drawKey(arrowCx - ks - kg, baseY + ks / 2 + kg / 2, '\u2190');           // ←
                    drawKey(arrowCx, baseY + ks / 2 + kg / 2, '\u2193');                     // ↓
                    drawKey(arrowCx + ks + kg, baseY + ks / 2 + kg / 2, '\u2192');           // →

                    // "to move" label below
                    ctx.font = '12px "Segoe UI", sans-serif';
                    ctx.fillStyle = COLORS.HUD_TEXT_SECONDARY;
                    ctx.fillText('to move', cx, baseY + ks + kg + 14);

                    ctx.restore();
                }
            }

        }

        let currentTutorialButtons = [];
        let currentMenuButtons = [];
        let currentDemoEndButtons = [];

        function handleTutorialClick(clickX, clickY) {
            for (const btn of currentTutorialButtons) {
                if (clickX >= btn.x && clickX <= btn.x + btn.w &&
                    clickY >= btn.y && clickY <= btn.y + btn.h) {
                    selectTutorialWeapon(btn.id);
                    return true;
                }
            }
            return false;
        }

        function handleMenuClick(clickX, clickY) {
            for (const btn of currentMenuButtons) {
                if (clickX >= btn.x && clickX <= btn.x + btn.w &&
                    clickY >= btn.y && clickY <= btn.y + btn.h) {
                    if (btn.type === 'play' || btn.type === 'retry') {
                        startGame();
                        return true;
                    }
                    if (btn.type === 'exit') {
                        gameState = 'menu';
                        resetMenuAnimation();
                        return true;
                    }
                    if (btn.type === 'shop') {
                        menuMode = 'shop';
                        return true;
                    }
                    if (btn.type === 'settings') {
                        menuMode = 'settings';
                        return true;
                    }
                    if (btn.type === 'back') {
                        menuMode = 'main';
                        return true;
                    }
                    if (btn.type === 'mute_toggle') {
                        AudioManager.toggleMute();
                        return true;
                    }
                    if (btn.type === 'music_mute_toggle') {
                        MusicEngine.toggleMusicMute();
                        return true;
                    }
                    if (btn.type === 'upgrade') {
                        const prog = loadProgression();
                        const level = (prog.permanentUpgrades[btn.id]) || 0;
                        const cost = getUpgradeCost(btn.id, level);
                        if ((prog.crystals || 0) >= cost && level < PERMANENT_UPGRADES[btn.id].maxLevel) {
                            prog.crystals -= cost;
                            prog.permanentUpgrades[btn.id] = level + 1;
                            saveProgression(prog);
                        }
                        return true;
                    }
                    if (btn.type === 'prevWeapon') {
                        menuWeaponIndex = (menuWeaponIndex - 1 + STARTING_WEAPON_IDS.length) % STARTING_WEAPON_IDS.length;
                        applyWeaponTheme(STARTING_WEAPON_IDS[menuWeaponIndex]);
                        return true;
                    }
                    if (btn.type === 'nextWeapon') {
                        menuWeaponIndex = (menuWeaponIndex + 1) % STARTING_WEAPON_IDS.length;
                        applyWeaponTheme(STARTING_WEAPON_IDS[menuWeaponIndex]);
                        return true;
                    }
                }
            }
            return false;
        }

        function handleDemoEndClick(clickX, clickY) {
            for (const btn of currentDemoEndButtons) {
                if (clickX >= btn.x && clickX <= btn.x + btn.w &&
                    clickY >= btn.y && clickY <= btn.y + btn.h) {
                    if (btn.type === 'unlock') {
                        purchaseFullGame(); // async — handles the full billing flow
                        return true;
                    }
                    if (btn.type === 'back') {
                        gameState = 'menu';
                        resetMenuAnimation();
                        return true;
                    }
                }
            }
            return false;
        }

        function handlePauseClick(clickX, clickY) {
            for (const btn of currentPauseButtons) {
                if (clickX >= btn.x && clickX <= btn.x + btn.w &&
                    clickY >= btn.y && clickY <= btn.y + btn.h) {
                    if (btn.type === 'volume_slider') {
                        const rel = Math.max(0, Math.min(1, (clickX - btn.sliderX) / btn.sliderW));
                        AudioManager.setVolume(rel);
                        return true;
                    }
                    if (btn.type === 'mute_toggle') {
                        AudioManager.toggleMute();
                        return true;
                    }
                    if (btn.type === 'music_slider') {
                        const rel = Math.max(0, Math.min(1, (clickX - btn.sliderX) / btn.sliderW));
                        MusicEngine.setMusicVolume(rel);
                        return true;
                    }
                    if (btn.type === 'music_mute_toggle') {
                        MusicEngine.toggleMusicMute();
                        return true;
                    }
                    if (btn.type === 'resume') {
                        AudioManager.play('pauseOut');
                        gameState = 'playing';
                        return true;
                    }
                    if (btn.type === 'restart') {
                        startGame();
                        return true;
                    }
                    if (btn.type === 'exit') {
                        gameState = 'menu';
                        resetMenuAnimation();
                        return true;
                    }
                }
            }
            // Tap outside panel = resume (only when actually paused)
            if (gameState === 'paused' && pausePanelRect &&
                (clickX < pausePanelRect.x || clickX > pausePanelRect.x + pausePanelRect.w ||
                 clickY < pausePanelRect.y || clickY > pausePanelRect.y + pausePanelRect.h)) {
                AudioManager.play('pauseOut');
                gameState = 'playing';
                return true;
            }
            return false;
        }

        function renderPauseWeaponInventory(cx, y) {
            const slotSize = 60;
            const slotGap = 12;
            const numSlots = MAX_ACTIVE_WEAPONS;
            const totalW = numSlots * slotSize + (numSlots - 1) * slotGap;
            const startX = cx - totalW / 2;
            const slotY = y;

            for (let i = 0; i < numSlots; i++) {
                const sx = startX + i * (slotSize + slotGap);
                const weaponId = activeWeapons[i];
                const slotCx = sx + slotSize / 2;
                const slotCy = slotY + slotSize / 2;

                if (weaponId && WEAPONS[weaponId]) {
                    const weapon = WEAPONS[weaponId];
                    const lvl = upgradeLevels[weaponId] || 0;
                    const isShip = (i === 0);

                    ctx.strokeStyle = weapon.color;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.roundRect(sx, slotY, slotSize, slotSize, 8);
                    ctx.stroke();

                    if (isShip) {
                        drawShipUpgradeIcon(ctx, selectedStartingWeapon, slotCx, slotCy, 0.6, weapon.color);
                    } else {
                        ctx.save();
                        ctx.translate(slotCx, slotCy);
                        ctx.scale(1.5, 1.5);
                        drawSkillIcon(ctx, weapon.icon, 0, 0, weapon.color);
                        ctx.restore();
                    }

                    // Level text below slot
                    const lvlText = lvl >= 10 ? 'MAX' : 'Lv.' + (lvl + 1);
                    const lvlColor = lvl >= 10 ? COLORS.GOLD : weapon.color;
                    ctx.font = 'bold 11px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'top';
                    ctx.fillStyle = lvlColor;
                    ctx.fillText(lvlText, slotCx, slotY + slotSize + 4);
                    ctx.textBaseline = 'alphabetic';
                } else {
                    ctx.strokeStyle = 'rgba(100, 100, 140, 0.25)';
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.roundRect(sx, slotY, slotSize, slotSize, 8);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    ctx.fillStyle = 'rgba(100, 100, 140, 0.3)';
                    ctx.font = '18px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('+', slotCx, slotCy);
                    ctx.textBaseline = 'alphabetic';
                }
            }
        }

            // ─── Slider shared dimensions ───
            const mobile = isMobile();

            const sliderRadius = mobile ? 7 : 4;
            const thumbR = mobile ? 11 : 6;
            const hitPad = mobile ? 18 : 10;
            const muteHitW = mobile ? 44 : 30;
            const muteHitH = mobile ? 36 : 24;
            const muteScale = mobile ? 1.4 : 1;
            // Mobile: label row on top, slider full-width below with mute icon at end
            // Desktop: single row — label | pct | slider | mute
            const sliderMargin = panelX + 30;
            const muteIconW = mobile ? 40 : 30;
            const sliderW = mobile ? panelW - 60 - muteIconW - 16 : 200;
            const sliderX = mobile ? sliderMargin : cx - sliderW / 2;

            // Mobile rows are taller (label line + slider line + gap)
            const rowGap = mobile ? 76 : 36;

            // ─── SFX volume control ───
            const volLabelY = panelY + (mobile ? 200 : 170);
            const vol = AudioManager.getVolume();
            const muted = AudioManager.isMuted();

            if (mobile) {
                // Label row: "SFX" left, "100%" right
                ctx.textAlign = 'left';
                ctx.font = labelFont;
                ctx.fillStyle = COLORS.HUD_TEXT_SECONDARY;
                ctx.fillText('SFX', sliderMargin, volLabelY + 5);
                ctx.textAlign = 'right';
                ctx.font = pctFont;
                ctx.fillStyle = muted ? COLORS.HUD_TEXT_SECONDARY : COLORS.HUD_TEXT_PRIMARY;
                ctx.fillText(muted ? 'MUTED' : Math.round(vol * 100) + '%', panelX + panelW - 30, volLabelY + 5);
            } else {
                ctx.textAlign = 'left';
                ctx.font = labelFont;
                ctx.fillStyle = COLORS.HUD_TEXT_SECONDARY;
                ctx.fillText('SFX', panelX + 24, volLabelY + 8);
                ctx.textAlign = 'right';
                ctx.font = pctFont;
                ctx.fillStyle = muted ? COLORS.HUD_TEXT_SECONDARY : COLORS.HUD_TEXT_PRIMARY;
                ctx.fillText(muted ? 'MUTED' : Math.round(vol * 100) + '%', sliderX - 8, volLabelY + 9);
            }

            // Slider track (below label on mobile, same line on desktop)
            const sliderY = mobile ? volLabelY + 24 : volLabelY + 2;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.beginPath();
            ctx.roundRect(sliderX, sliderY, sliderW, sliderH, sliderRadius);
            ctx.fill();

            // Slider fill
            const fillW = muted ? 0 : sliderW * vol;
            if (fillW > 0) {
                ctx.fillStyle = hexToRGBA(COLORS.PLAYER, muted ? 0.2 : 0.6);
                ctx.beginPath();
                ctx.roundRect(sliderX, sliderY, fillW, sliderH, sliderRadius);
                ctx.fill();
            }

            // Slider thumb
            const thumbX = sliderX + fillW;
            ctx.fillStyle = muted ? COLORS.HUD_TEXT_SECONDARY : COLORS.PLAYER;
            ctx.beginPath();
            ctx.arc(thumbX, sliderY + sliderH / 2, thumbR, 0, Math.PI * 2);
            ctx.fill();

            currentPauseButtons.push({
                type: 'volume_slider', x: sliderX - thumbR, y: sliderY - hitPad,
                w: sliderW + thumbR * 2, h: sliderH + hitPad * 2, sliderX, sliderW
            });

            // Mute button (speaker icon) — right of slider
            const muteX = sliderX + sliderW + (mobile ? 14 : 16);
            const muteY = sliderY + sliderH / 2;
            ctx.save();
            ctx.translate(muteX, muteY);
            ctx.scale(muteScale, muteScale);
            ctx.strokeStyle = muted ? COLORS.HUD_RED : COLORS.HUD_TEXT_SECONDARY;
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(0, -4); ctx.lineTo(5, -4); ctx.lineTo(10, -8);
            ctx.lineTo(10, 8); ctx.lineTo(5, 4); ctx.lineTo(0, 4);
            ctx.closePath();
            ctx.stroke();
            if (muted) {
                ctx.beginPath(); ctx.moveTo(14, -5); ctx.lineTo(22, 5); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(22, -5); ctx.lineTo(14, 5); ctx.stroke();
            } else {
                ctx.beginPath(); ctx.arc(12, 0, 5, -0.6, 0.6); ctx.stroke();
                if (vol > 0.5) { ctx.beginPath(); ctx.arc(12, 0, 9, -0.5, 0.5); ctx.stroke(); }
            }
            ctx.restore();
            currentPauseButtons.push({
                type: 'mute_toggle', x: muteX - 4, y: muteY - muteHitH / 2,
                w: muteHitW, h: muteHitH

            const cy = CANVAS_HEIGHT / 2;
            const mobile = isMobile();
            const panelW = mobile ? Math.min(CANVAS_WIDTH - 40, 600) : 500;

            const codes = Object.keys(CHEAT_CODES).filter(c => c !== 'cheat');
            const descriptions = {
                'laser': 'Max laser + Nova Beam',
                'rocket': 'Max missiles + Armageddon',
                'orbit': 'Max orbital + Singularity',
                'chain': 'Max lightning + Storm Nexus',
                'plasma': 'Max plasma + Annihilation',
                'drone': 'Max drone + Hive Mind',
                'mines': 'Max mines + Black Hole',
                'blade': 'Max void blade + Dimensional Rift',
                'snare': 'Max warp snare + Temporal Cage',
                'beam': 'Max fusion beam + Siphon Nexus',
                'turret': 'Max sentry turret + Combat Station',
                'full': 'All weapons evolved',
                'reset': 'Reset current run',
                'wipe': 'Wipe shop progress',
                'unlock': 'Unlock full version',
                'demo': 'Enable demo mode',
                'level': 'Gain a level',
                'skip': 'Skip ahead +20 waves',
                'dead': 'Trigger game over'
            };

            const lineH = mobile ? 36 : 28;
            const panelH = 80 + codes.length * lineH + 30;
            const panelX = cx - panelW / 2;
            const panelY = cy - panelH / 2;

            ctx.fillStyle = COLORS.HUD_PANEL_BG;
            ctx.strokeStyle = COLORS.HUD_PANEL_BORDER;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(panelX, panelY, panelW, panelH, 12);
            ctx.fill();
            ctx.stroke();

            ctx.textAlign = 'center';
            ctx.font = 'bold 28px "Segoe UI", sans-serif';
            ctx.fillStyle = COLORS.HUD_GOLD;
            ctx.fillText('CHEAT CODES', cx, panelY + 40);

            let y = panelY + 70;
            for (const code of codes) {
                ctx.textAlign = 'left';
                ctx.font = mobile ? 'bold 20px monospace' : 'bold 16px monospace';
                ctx.fillStyle = COLORS.PLAYER;
                ctx.fillText(code, panelX + 30, y);

                ctx.textAlign = 'right';
                ctx.font = mobile ? '18px "Segoe UI", sans-serif' : '14px "Segoe UI", sans-serif';
                ctx.fillStyle = COLORS.UI_SECONDARY;
                ctx.fillText(descriptions[code] || '', panelX + panelW - 30, y);

                y += lineH;
            }

            ctx.textAlign = 'center';
            ctx.font = '12px "Segoe UI", sans-serif';
            ctx.fillStyle = COLORS.UI_SECONDARY;
            ctx.fillText(mobile ? 'TAP TO CLOSE' : 'PRESS ANY KEY TO CLOSE', cx, panelY + panelH - 14);
        }

        function renderGameOver() {
            const t = (Date.now() - gameOverAnimStart) / 1000;
            const cx = CANVAS_WIDTH / 2;
            const cy = CANVAS_HEIGHT / 2;
            const mobile = isMobile();

            // Blurred game background
            if (gameOverBgSnapshot) {
                const snapAlpha = Math.min(1, t * 2);
                ctx.globalAlpha = snapAlpha;
                ctx.drawImage(gameOverBgSnapshot, 0, 0);
                ctx.globalAlpha = 1;
            }

            // Panel dimensions (same size on mobile and desktop)
            const panelW = Math.min(CANVAS_WIDTH - 40, 680);
            const panelH = 520;
            const panelX = cx - panelW / 2;
            const panelY = cy - panelH / 2;

            // Panel entry animation
            const panelProgress = easeOutCubic(Math.min(1, t / 0.5));
            const panelScale = 0.95 + 0.05 * panelProgress;

            ctx.save();
            ctx.globalAlpha = panelProgress;
            ctx.translate(cx, cy);
            ctx.scale(panelScale, panelScale);
            ctx.translate(-cx, -cy);

            // Panel background
            ctx.fillStyle = 'rgba(5, 12, 30, 0.92)';
            ctx.beginPath();
            ctx.roundRect(panelX, panelY, panelW, panelH, 12);
            ctx.fill();
            ctx.strokeStyle = hexToRGBA(COLORS.PLAYER, 0.15);
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Corner accents
            const cornerLen = 22;
            ctx.strokeStyle = hexToRGBA(COLORS.PLAYER, 0.3);
            ctx.lineWidth = 1.5;
            const corners = [
                [panelX, panelY, 1, 1],
                [panelX + panelW, panelY, -1, 1],
                [panelX, panelY + panelH, 1, -1],
                [panelX + panelW, panelY + panelH, -1, -1]
            ];
            for (const [cxp, cyp, dx, dy] of corners) {
                ctx.beginPath();
                ctx.moveTo(cxp + cornerLen * dx, cyp);
                ctx.lineTo(cxp, cyp);
                ctx.lineTo(cxp, cyp + cornerLen * dy);
                ctx.stroke();
            }

            ctx.textAlign = 'center';
            let curY = panelY + 60;

            // === Title ===
            const titleAlpha = easeOutCubic(Math.min(1, Math.max(0, t - 0.2) / 0.4));
            const titleSlide = (1 - titleAlpha) * 15;
            ctx.save();
            ctx.globalAlpha = panelProgress * titleAlpha;
            ctx.font = '900 58px "Segoe UI", sans-serif';
            ctx.fillStyle = '#FF6B6B';
            setGlow(ctx, '#FF6B6B', 18);
            ctx.fillText('GAME OVER', cx, curY + titleSlide);
            clearGlow(ctx);
            ctx.restore();
            curY += 36;

            // Subtitle: wave + time
            const subAlpha = easeOutCubic(Math.min(1, Math.max(0, t - 0.3) / 0.3));
            const mins = Math.floor(gameTime / 60);
            const secs = Math.floor(gameTime % 60);
            const timeStr = (mins > 0 ? mins + 'm ' : '') + secs + 's';
            ctx.save();
            ctx.globalAlpha = panelProgress * subAlpha;
            ctx.font = '20px "Segoe UI", sans-serif';
            ctx.fillStyle = COLORS.UI_SECONDARY;
            ctx.fillText('WAVE ' + waveNumber + '  \u00B7  ' + timeStr + ' SURVIVED', cx, curY);
            ctx.restore();
            curY += 28;

            // Divider
            const divProgress = easeOutCubic(Math.min(1, Math.max(0, t - 0.4) / 0.2));
            const divW = (panelW * 0.6) * divProgress;
            ctx.strokeStyle = hexToRGBA(COLORS.PLAYER, 0.12);
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(cx - divW / 2, curY);
            ctx.lineTo(cx + divW / 2, curY);
            ctx.stroke();
            curY += 28;

            // === Hero stat: KILLS ===
            const countT = easeOutCubic(Math.min(1, Math.max(0, t - 0.5) / 1.0));
            const statsAlpha = easeOutCubic(Math.min(1, Math.max(0, t - 0.5) / 0.3));
            ctx.save();
            ctx.globalAlpha = panelProgress * statsAlpha;
            ctx.textAlign = 'center';

            // "KILLS" label
            ctx.font = '13px "Segoe UI", sans-serif';
            ctx.fillStyle = hexToRGBA(COLORS.PLAYER, 0.6);
            ctx.fillText('KILLS', cx, curY);

            // Giant kill count
            const displayKills = Math.floor(totalKills * countT);
            ctx.font = 'bold 54px "Segoe UI", sans-serif';
            ctx.fillStyle = COLORS.PLAYER;
            setGlow(ctx, COLORS.PLAYER, 15);
            ctx.fillText('' + displayKills, cx, curY + 50);
            clearGlow(ctx);

            // New record or best record
            curY += 68;
            if (lastRunIsNewRecord) {
                const recordPulse = Math.sin(Date.now() / 200) * 0.2 + 0.8;
                ctx.save();
                ctx.globalAlpha = panelProgress * statsAlpha * recordPulse;
                ctx.font = 'bold 20px "Segoe UI", sans-serif';
                ctx.fillStyle = COLORS.HUD_GOLD;
                setGlow(ctx, COLORS.HUD_GOLD, 12);
                ctx.fillText('\u2605 NEW RECORD! \u2605', cx, curY);
                clearGlow(ctx);
                ctx.restore();
            } else {
                ctx.font = '16px "Segoe UI", sans-serif';
                ctx.fillStyle = COLORS.UI_SECONDARY;
                ctx.fillText('BEST: ' + lastRunBestKills, cx, curY);
            }
            curY += 30;

            // Secondary stats row: Level | Wave | Crystals
            const crystalTotal = lastRunCrystals ? lastRunCrystals.total : 0;
            const statSpacing = panelW * 0.25;
            const stats3 = [
                { label: 'LEVEL', value: '' + Math.max(1, Math.floor(playerLevel * countT)), color: COLORS.PLAYER },
                { label: 'WAVE', value: '' + Math.max(1, Math.floor(waveNumber * countT)), color: COLORS.PLAYER },
                { label: 'CRYSTALS', value: '\u25C6 ' + Math.floor(crystalTotal * countT), color: COLORS.HUD_GOLD }
            ];
            for (let i = 0; i < 3; i++) {
                const sx = cx + (i - 1) * statSpacing;
                ctx.font = '11px "Segoe UI", sans-serif';
                ctx.fillStyle = hexToRGBA(stats3[i].color, 0.5);
                ctx.fillText(stats3[i].label, sx, curY);
                ctx.font = 'bold 26px "Segoe UI", sans-serif';
                ctx.fillStyle = stats3[i].color;
                ctx.fillText(stats3[i].value, sx, curY + 30);
            }

            ctx.restore();
            curY += 65;

            // Divider
            ctx.strokeStyle = hexToRGBA(COLORS.PLAYER, 0.12);
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(cx - divW / 2, curY);
            ctx.lineTo(cx + divW / 2, curY);
            ctx.stroke();
            curY += 20;

            // === Buttons ===
            const btnAlpha = easeOutCubic(Math.min(1, Math.max(0, t - 0.8) / 0.3));
            const btnSlide = (1 - btnAlpha) * 12;
            let goBtns = [];
            const btnW = Math.min(panelW - 60, 400);
            const btnH = 60;
            const btnGap = 16;

            ctx.save();
            ctx.globalAlpha = panelProgress * btnAlpha;

            // PLAY AGAIN button (pulsing cyan)
            const retryX = cx - btnW / 2;
            const retryY = curY + btnSlide;
            const pulse = Math.sin(Date.now() / 300) * 0.15 + 0.85;
            ctx.save();
            ctx.globalAlpha = panelProgress * btnAlpha * pulse;
            ctx.fillStyle = COLORS.PLAYER;
            ctx.beginPath();
            ctx.roundRect(retryX, retryY, btnW, btnH, 8);
            ctx.fill();
            ctx.restore();
            ctx.save();
            ctx.globalAlpha = panelProgress * btnAlpha;
            ctx.fillStyle = '#000';
            ctx.font = 'bold 24px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(mobile ? 'PLAY AGAIN' : 'PLAY AGAIN  (R)', cx, retryY + 39);
            ctx.restore();

            // EXIT button (outline)
            const exitY = retryY + btnH + btnGap;
            ctx.save();
            ctx.globalAlpha = panelProgress * btnAlpha;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.06)';
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(retryX, exitY, btnW, btnH, 8);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = COLORS.UI_SECONDARY;
            ctx.font = 'bold 22px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(mobile ? 'EXIT' : 'EXIT  (ESC)', cx, exitY + 38);
            ctx.restore();

            ctx.restore(); // end button section
            ctx.restore(); // end panel transform

            // Button hit areas (only active after animation)
            if (btnAlpha > 0.5) {
                goBtns.push({ type: 'retry', x: retryX, y: retryY, w: btnW, h: btnH });
                goBtns.push({ type: 'exit', x: retryX, y: exitY, w: btnW, h: btnH });
            }
            currentMenuButtons = goBtns;
        }
        
        // ============================================================
        // UTILITIES
        // ============================================================
        
        function normalizeAngle(angle) {
            while (angle > 180) angle -= 360;
            while (angle < -180) angle += 360;
            return angle;
        }

        // ============================================================
        // START GAME
        // ============================================================
        
        init();
        
    })();
    </script>
    <script>
        // Register Service Worker for PWA/TWA offline support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
