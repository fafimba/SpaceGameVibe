                        }
                    }
                    t.chainTargets = newChainTargets;
                } else {
                    t.chainTargets = [];
                }
            }

            // Clean dead targets
            beamState.targets = beamState.targets.filter(t => t.enemy.hp > 0 && !t.enemy.dead);

            // Update burn effects
            for (let i = beamState.burnEffects.length - 1; i >= 0; i--) {
                const burn = beamState.burnEffects[i];
                burn.duration -= deltaTime;
                burn.tickTimer += deltaTime;
                if (burn.tickTimer >= 0.5) {
                    burn.tickTimer -= 0.5;
                    if (burn.enemy.hp > 0 && !burn.enemy.dead) {
                        burn.enemy.hp -= burn.damagePerTick;
                        spawnFloatingText(burn.enemy.x, burn.enemy.y - 15, Math.round(burn.damagePerTick).toString(), '#FF8800');
                        if (burn.enemy.hp <= 0) killEnemy(burn.enemy);
                    }
                }
                if (burn.duration <= 0 || burn.enemy.hp <= 0 || burn.enemy.dead) {
                    beamState.burnEffects.splice(i, 1);
                }
            }

            // Update siphon beams (evolution)
            for (let i = beamState.siphonBeams.length - 1; i >= 0; i--) {
                const sb = beamState.siphonBeams[i];
                sb.duration -= deltaTime;

                // Mark dead targets every frame (before pool recycles them)
                for (const st of sb.targets) {
                    if (st.alive && (st.enemy.hp <= 0 || st.enemy.dead)) {
                        st.alive = false;
                    }
                }

                sb.tickTimer = (sb.tickTimer || 0) + deltaTime;
                if (sb.tickTimer >= 0.1) {
                    sb.tickTimer -= 0.1;
                    const tickDmg = sb.dps * 0.1;
                    for (const st of sb.targets) {
                        if (!st.alive) continue;
                        st.enemy.hp -= tickDmg;
                        if (st.enemy.hp <= 0) {
                            killEnemy(st.enemy);
                            st.alive = false;
                        }
                    }
                    sb.targets = sb.targets.filter(st => st.alive);
                }
                if (sb.duration <= 0 || sb.targets.length === 0) {
                    beamState.siphonBeams.splice(i, 1);
                }
            }
        }

        function handleBeamKill(enemy, stats) {
            // Siphon Nexus evolution: killed enemies emit beams to 3 nearby enemies
            if (stats.hasSiphonNexus) {
                const nearby = spatialGrid.queryRadius(enemy.x, enemy.y, 200);
                const siphonRangeSq = 200 * 200;
                const siphonTargets = [];
                for (const e of nearby) {
                    if (e !== enemy && e.hp > 0 && !e.dead && siphonTargets.length < 3) {
                        const sdx = e.x - enemy.x, sdy = e.y - enemy.y;
                        if (sdx * sdx + sdy * sdy <= siphonRangeSq) {
                            siphonTargets.push({ enemy: e, alive: true });
                        }
                    }
                }
                if (siphonTargets.length > 0) {
                    beamState.siphonBeams.push({
                        x: enemy.x, y: enemy.y,
                        targets: siphonTargets,
                        dps: stats.beamDPS * 0.5,
                        duration: 2.0,
                        tickTimer: 0
                    });
                }
            }
            killEnemy(enemy);
        }

        // ============================================================
        // ROCKET EXPLOSION (unified for all rocket death scenarios)
        // ============================================================

        function explodePlayerRocket(b) {
            if (b.type !== 'rocket' && b.type !== 'mini_rocket' && b.type !== 'armageddon_rocket' && b.type !== 'turret_rocket') return;
            const isArmageddon = b.type === 'armageddon_rocket';
            AudioManager.play(isArmageddon ? 'armageddonExplode' : 'rocketExplode', b.x, b.y);
            const isTurretRocket = b.type === 'turret_rocket';
            const explosionX = b.x;
            const explosionY = b.y;
            const explosionRadius = b.explosionRadius || 0;
            const explosionDamage = b.explosionDamage || 0;
            const explosionColor = isArmageddon ? '#FF6B00' : COLORS.PLAYER;

            // Visual explosion effect
            const visualSize = isArmageddon ? Math.max(explosionRadius * 4, 300) : Math.max(explosionRadius * 2.5, 40);
            spawnRing(explosionX, explosionY, explosionColor, visualSize);
            if (isArmageddon) {
                // Extra concentric rings for dramatic effect
                spawnRing(explosionX, explosionY, '#FFD700', visualSize * 0.7);
                spawnRing(explosionX, explosionY, '#FF4500', visualSize * 0.5);
                triggerFlash('#FF6B00', 0.25, 200);
                triggerShake(12, 400);
                triggerSlowmo(60);
            }

            if (explosionRadius > 0 && explosionDamage > 0) {
                // Damage enemies in blast radius
                const enemiesInBlast = spatialGrid.queryRadius(explosionX, explosionY, explosionRadius);
                for (const blastEnemy of enemiesInBlast) {
                    const dx = blastEnemy.x - explosionX;
                    const dy = blastEnemy.y - explosionY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist <= explosionRadius) {
                        const falloff = 1 - (dist / explosionRadius) * 0.5;
                        const dmg = Math.ceil(explosionDamage * falloff);
                        blastEnemy.hp -= dmg;
                        const config = ENEMY_TYPES[blastEnemy.type];
                        spawnFloatingText(blastEnemy.x, blastEnemy.y - config.radius, dmg.toString(), explosionColor);
                        spawnRing(blastEnemy.x, blastEnemy.y, explosionColor);
                        if (blastEnemy.hp <= 0) killEnemy(blastEnemy);
                    }
                }



            }

            // Ricochet: spawn mini rockets
            if (b.ricochetCount > 0 && (b.type === 'rocket' || b.type === 'armageddon_rocket')) {
                const ricochetTargets = spatialGrid.queryRadius(explosionX, explosionY, 400);
                let targetsFound = 0;
                for (const target of ricochetTargets) {
                    if (targetsFound >= b.ricochetCount) break;
                    if (target.hp <= 0) continue;

                    const angle = Math.atan2(target.y - explosionY, target.x - explosionX);
                    const spread = (Math.random() - 0.5) * 0.3;

                    const miniRocket = pools.bullet.acquire();
                    miniRocket.x = explosionX;
                    miniRocket.y = explosionY;
                    miniRocket.vx = Math.cos(angle + spread) * 550;
                    miniRocket.vy = Math.sin(angle + spread) * 550;
                    miniRocket.life = 1.5;
                    miniRocket.damage = Math.ceil(b.damage * 0.5);
                    miniRocket.explosionDamage = 0;
                    miniRocket.explosionRadius = 0;
                    miniRocket.ricochetCount = 0;
                    miniRocket.type = 'mini_rocket';
                    miniRocket.color = COLORS.PLAYER;
                    miniRocket.piercing = false;
                    miniRocket.turnRate = 250;
                    miniRocket.size = 0.6;
                    miniRocket.trail = [];
                    bullets.push(miniRocket);
                    targetsFound++;
                }
            }
        }

        // ============================================================
        // COLLISIONS
        // ============================================================

        // Swept collision: checks if line segment intersects circle
        // Returns true if the line from (x1,y1) to (x2,y2) passes through circle at (cx,cy) with radius r
        function lineCircleCollision(x1, y1, x2, y2, cx, cy, r) {
            // Vector from start to end of line
            const dx = x2 - x1;
            const dy = y2 - y1;

            // Vector from start to circle center
            const fx = x1 - cx;
            const fy = y1 - cy;

            // Quadratic equation coefficients: at^2 + bt + c = 0
            const a = dx * dx + dy * dy;
            const b = 2 * (fx * dx + fy * dy);
            const c = fx * fx + fy * fy - r * r;

            // If bullet didn't move (a ≈ 0), just check current position
            if (a < 0.0001) {
                return c <= 0;
            }

            const discriminant = b * b - 4 * a * c;

            if (discriminant < 0) {
                return false; // No intersection
            }

            const sqrtDisc = Math.sqrt(discriminant);
            const t1 = (-b - sqrtDisc) / (2 * a);
            const t2 = (-b + sqrtDisc) / (2 * a);

            // Check if intersection happens within the line segment (t between 0 and 1)
            return (t1 >= 0 && t1 <= 1) || (t2 >= 0 && t2 <= 1) || (t1 < 0 && t2 > 1);
        }

        function checkCollisions() {
            if (!player) return;
            
            // Bullet vs Enemy (using spatial grid for optimization)
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                let bulletDestroyed = false;

                // Use previous position for swept collision (fallback to current if first frame)
                const prevX = b.prevX !== undefined ? b.prevX : b.x;
                const prevY = b.prevY !== undefined ? b.prevY : b.y;

                // Query enemies along the bullet's path (expand search radius to cover movement)
                const moveDistSq = (b.x - prevX) * (b.x - prevX) + (b.y - prevY) * (b.y - prevY);
                const moveDist = Math.sqrt(moveDistSq);
                const searchRadius = 100 + moveDist;
                const midX = (b.x + prevX) / 2;
                const midY = (b.y + prevY) / 2;
                const nearbyEnemies = spatialGrid.queryRadius(midX, midY, searchRadius);

                for (const e of nearbyEnemies) {
                    const config = ENEMY_TYPES[e.type];
                    const hitRadius = config.radius * 0.9; // Shrink hitbox 10%
                    const collisionDist = hitRadius + 4;

                    // Use swept collision detection (line-circle intersection)
                    if (lineCircleCollision(prevX, prevY, b.x, b.y, e.x, e.y, collisionDist)) {
                        // Check if piercing bullet already hit this enemy
                        if (b.piercing && b.hitEnemies && b.hitEnemies.has(e)) {
                            continue;
                        }

                        let damage = b.damage || 1;
                        // Crit chance (rockets)
                        let isCrit = false;
                        if (b.critChance && Math.random() < b.critChance) {
                            damage = Math.round(damage * 2);
                            isCrit = true;
                        }

                        // Apply vulnerability bonus from snares/blade
                        const vulnMult = e.vulnerability || 0;
                        if (vulnMult > 0) {
                            damage = Math.round(damage * (1 + vulnMult));
                        }

                        e.hp -= damage;

                        // Show damage floating text
                        const dmgText = isCrit ? damage + '!' : damage.toString();
                        spawnFloatingText(e.x, e.y - config.radius, dmgText, isCrit ? '#FFD700' : (b.color || COLORS.BULLET));

                        // Hit effect
                        spawnRing(b.x, b.y, config.color);

                        if (e.hp <= 0) killEnemy(e);

                        // Handle bullet destruction/piercing
                        if (b.piercing) {
                            if (!b.hitEnemies) b.hitEnemies = new Set();
                            b.hitEnemies.add(e);
                            // Check pierce count limit
                            if (b.pierceCount && b.hitEnemies.size >= b.pierceCount) {
                                bulletDestroyed = true;
                                break;
                            }
                        } else {
                            bulletDestroyed = true;
                            break;
                        }
                    }
                }

                if (bulletDestroyed) {
                    explodePlayerRocket(b);
                    pools.bullet.release(b);
                    fastRemove(bullets, i);
                }
            }


            // Enemy vs Player (using spatial grid for nearby enemies only)
            const nearbyEnemiesForPlayer = spatialGrid.queryRadius(player.x, player.y, 100);
            for (const e of nearbyEnemiesForPlayer) {
                const config = ENEMY_TYPES[e.type];

                const dx = player.x - e.x;
                const dy = player.y - e.y;
                const distSq = dx * dx + dy * dy;
                const collisionDist = PLAYER_COLLISION_RADIUS + config.radius * 0.9;
                const collisionDistSq = collisionDist * collisionDist;
                const nearMissDistSq = (collisionDist + NEAR_MISS_RADIUS) * (collisionDist + NEAR_MISS_RADIUS);

                // Near-miss check
                if (distSq < nearMissDistSq && distSq > collisionDistSq) {
                    if (!e.nearMissTriggered) {
                        e.nearMissTriggered = true;
                        triggerNearMiss();
                    }
                }

                // Collision
                if (distSq < collisionDistSq && player.invulnerable <= 0) {
                    damagePlayer();

                    // Kamikaze/Berserker dies on contact
                    if (e.type === 'KAMIKAZE' || e.type === 'BERSERKER') {
                        spawnRing(e.x, e.y, config.color, e.type === 'BERSERKER' ? 60 : 50);
                        e.dead = true;
                    }
                }
            }
            
            // Enemy bullet vs Player
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const b = enemyBullets[i];

                const dx = player.x - b.x;
                const dy = player.y - b.y;
                const distSq = dx * dx + dy * dy;
                const collisionDistSq = PLAYER_COLLISION_RADIUS * PLAYER_COLLISION_RADIUS;
                const nearMissDistSq = (PLAYER_COLLISION_RADIUS + NEAR_MISS_RADIUS) * (PLAYER_COLLISION_RADIUS + NEAR_MISS_RADIUS);

                // Near-miss
                if (distSq < nearMissDistSq && distSq > collisionDistSq) {
                    if (!b.nearMissTriggered) {
                        b.nearMissTriggered = true;
                        triggerNearMiss();
                    }
                }

                if (distSq < collisionDistSq && player.invulnerable <= 0) {
                    damagePlayer();
                    pools.enemyBullet.release(b);
                    fastRemove(enemyBullets, i);
                }
            }


        }

        function damagePlayer() {
            AudioManager.play('playerHit');
            recentDamageEvents++;
            // Reset shield regen timer
            player.shieldRegenTimer = 0;

            // Small hit cooldown (no visual effect, just prevents frame-stacking)
            player.invulnerable = 0.05;

            // Shield absorbs damage
            player.shield = Math.max(0, player.shield - SHIELD_DAMAGE_ABSORPTION);
            player.shieldFlashTimer = 0.15;

            // Visual effects for shield hit
            triggerShake(SHAKE_INTENSITY_HIT * 0.5, SHAKE_DURATION_HIT * 0.6);
            // Shield depleted - consume hull and restore shield
            if (player.shield <= 0) {
                player.hp--;
                player.shield = 0;

                if (player.hp <= 0) {
                    if (!player.lastChance) {
                        // One extra chance — play with 0 lives shown
                        player.lastChance = true;
                        triggerShieldBreak();
                    } else {
                        player.shield = 0; // Stay at 0 for death
                        gameOver();
                    }
                } else {
                    // Trigger epic shield break sequence
                    triggerShieldBreak();
                }
            }
        }

        function triggerShieldBreak() {
            if (shieldBreakState) return;
            AudioManager.play('shieldBreak');

            shieldBreakState = {
                phase: 'freeze',
                freezeProgress: 0,
                shockwaveRadius: SHIELD_ARC_RADIUS + 5,
                shockwaveActive: true,
                hitEnemies: new Set(),
                phaseTimer: 0,
                invulnTimer: SHIELD_BREAK_INVULN_DURATION,
                lifeSlotAlpha: 0,
                lostSlotIndex: player.hp,
                lostSlotProgress: 0,
                resumeProgress: 0,
            };

            player.invulnerable = SHIELD_BREAK_INVULN_DURATION;
            slowmoTimer = 0;

            // Impact effects
            triggerShake(14, 350);
        }

        function updateShieldBreakSequence(rawDt) {
            if (!shieldBreakState || !player) return;
            const s = shieldBreakState;

            // Keep player invulnerable during the sequence
            s.invulnTimer -= rawDt;
            if (s.invulnTimer > 0) {
                player.invulnerable = Math.max(player.invulnerable, s.invulnTimer);
            }

            // ── PHASE: FREEZE (ease time from normal to stopped) ──
            if (s.phase === 'freeze') {
                s.freezeProgress += rawDt / SHIELD_BREAK_FREEZE_DURATION;
                if (s.freezeProgress >= 1) {
                    timeScale = 0;
                    s.phase = 'shockwave';
                    shakeDuration = 0;
                    shakeIntensity = 0;
                } else {
                    // Ease-out: decelerates to zero
                    const t = s.freezeProgress;
                    timeScale = (1 - t) * (1 - t);
                }
            }

            // ── PHASE: SHOCKWAVE (time frozen, ring expands at real speed) ──
            else if (s.phase === 'shockwave') {
                timeScale = 0;
                const prevRadius = s.shockwaveRadius;
                s.shockwaveRadius += SHOCKWAVE_EXPAND_SPEED * rawDt;

                // Damage enemies within the expanding ring
                const nearby = spatialGrid.queryRadius(player.x, player.y, s.shockwaveRadius + 50);
                for (const e of nearby) {
                    if (e.dead || s.hitEnemies.has(e)) continue;
                    const dx = e.x - player.x;
                    const dy = e.y - player.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist <= s.shockwaveRadius && dist >= prevRadius - 40) {
                        s.hitEnemies.add(e);
                        e.hp -= SHOCKWAVE_DAMAGE;
                        if (e.hp <= 0) killEnemy(e);
                    }
                }

                if (s.shockwaveRadius >= SHOCKWAVE_MAX_RADIUS) {
                    s.shockwaveActive = false;
                    s.phase = 'lifeslots';
                    s.phaseTimer = 0;
                }
            }

            // ── PHASE: LIFESLOTS (time frozen, life animation plays) ──
            else if (s.phase === 'lifeslots') {
                timeScale = 0;
                s.phaseTimer += rawDt;

                // 0.00–0.12s: fade in
                // 0.12–0.30s: hold
                // 0.30–0.65s: lost slot pop + break (0.35s)
                // 0.65–0.80s: hold remaining
                // 0.80–0.95s: fade out
                if (s.phaseTimer < 0.12) {
                    s.lifeSlotAlpha = s.phaseTimer / 0.12;
                } else if (s.phaseTimer < 0.30) {
                    s.lifeSlotAlpha = 1.0;
                    s.lostSlotProgress = 0;
                } else if (s.phaseTimer < 0.65) {
                    s.lifeSlotAlpha = 1.0;
                    s.lostSlotProgress = (s.phaseTimer - 0.30) / 0.35;
                } else if (s.phaseTimer < 0.80) {
                    s.lifeSlotAlpha = 1.0;
                    s.lostSlotProgress = 1.0;
                } else if (s.phaseTimer < 0.95) {
                    s.lifeSlotAlpha = 1.0 - (s.phaseTimer - 0.80) / 0.15;
                    s.lostSlotProgress = 1.0;
                } else {
                    s.phase = 'resume';
                    s.resumeProgress = 0;
                    shieldRechargeTimer = SHIELD_RECHARGE_DURATION;
                    player.shieldArcOpacity = SHIELD_ARC_REGEN_OPACITY;
                }
            }

            // ── PHASE: RESUME (ease time back to normal) ──
            else if (s.phase === 'resume') {
                s.resumeProgress += rawDt / SHIELD_BREAK_RESUME_DURATION;
                if (s.resumeProgress >= 1) {
                    timeScale = 1;
                    shieldBreakState = null;
                } else {
                    // Ease-in curve: starts slow, accelerates to full speed
                    timeScale = s.resumeProgress * s.resumeProgress;
                }
            }
        }

        function triggerLifeGain() {
            // gainedSlotIndex is the NEW slot that just filled (hp was already incremented)
            lifeGainState = {
                phaseTimer: 0,
                lifeSlotAlpha: 0,
                gainedSlotIndex: player.hp - 1,
                gainedSlotProgress: 0,
                totalHP: player.hp,
            };
            triggerShake(4, 150);
        }

        function updateLifeGainAnimation(rawDt) {
            if (!lifeGainState || !player) return;
            const s = lifeGainState;

            s.phaseTimer += rawDt;

            // Timeline (total ~0.7s, no slowmo):
            // 0.00–0.10s: fade in all slots
            // 0.10–0.25s: hold (all slots visible, new slot not yet popping)
            // 0.25–0.55s: new slot pops in (scale 0 → 1.4 → 1.0)
            // 0.55–0.70s: fade out
            if (s.phaseTimer < 0.10) {
                s.lifeSlotAlpha = s.phaseTimer / 0.10;
                s.gainedSlotProgress = 0;
            } else if (s.phaseTimer < 0.25) {
                s.lifeSlotAlpha = 1.0;
                s.gainedSlotProgress = 0;
            } else if (s.phaseTimer < 0.55) {
                s.lifeSlotAlpha = 1.0;
                s.gainedSlotProgress = (s.phaseTimer - 0.25) / 0.30;
            } else if (s.phaseTimer < 0.70) {
                s.lifeSlotAlpha = 1.0 - (s.phaseTimer - 0.55) / 0.15;
                s.gainedSlotProgress = 1.0;
            } else {
                lifeGainState = null;
            }
        }

        function triggerNearMiss() {
            AudioManager.play('nearMiss');
            triggerSlowmo(SLOWMO_DURATION);
            
            // Burst particles
            for (let i = 0; i < 8; i++) {
                const angle = (Math.PI * 2 / 8) * i;
                particles.push({
                    x: player.x + Math.cos(angle) * PLAYER_COLLISION_RADIUS,
                    y: player.y + Math.sin(angle) * PLAYER_COLLISION_RADIUS,
                    vx: Math.cos(angle) * 100,
                    vy: Math.sin(angle) * 100,
                    life: 0.3,
                    maxLife: 0.3,
                    size: 3,
                    color: COLORS.PLAYER,
                    type: 'nearmiss'
                });
            }
        }
        
        function gameOver() {
            // Prevent re-entry (player can keep getting hit after death)
            if (gameState === 'gameOver' || player._dead) return;
            player._dead = true;
            AudioManager.stopAllLoops();
            AudioManager.play('playerDeath');
            MusicEngine.stop();

            // Close upgrade panel if it was open (die during level-up)
            if (upgradeOverlay.active) {
                hideUpgradePanel();
            }

            // Crystal calculation
            const killBonus = Math.floor(totalKills / 50);
            const baseCrystals = crystalsThisRun + killBonus;
            const totalCrystals = Math.round(baseCrystals * permCrystalMulti * getDiffMultipliers().crystals);
            lastRunCrystals = {
                picked: crystalsThisRun,
                killBonus: killBonus,
                crystalMulti: permCrystalMulti,
                total: totalCrystals
            };

            // Save crystals and stats to progression
            try {
                const prog = loadProgression();
                prog.crystals = (prog.crystals || 0) + totalCrystals;
                prog.stats.totalKills = (prog.stats.totalKills || 0) + totalKills;
                prog.stats.totalCrystalsEarned = (prog.stats.totalCrystalsEarned || 0) + totalCrystals;

                // Best kills record
                lastRunBestKills = prog.stats.bestKills || 0;
                lastRunIsNewRecord = totalKills > lastRunBestKills;
                if (lastRunIsNewRecord) {
                    prog.stats.bestKills = totalKills;
                }

                // Run history tracking
                const deathCause = enemies.length > 30 ? 'overwhelm' : 'damage';
                prog.runHistory = prog.runHistory || [];
                prog.runHistory.push({
                    timestamp: Date.now(),
                    survivalTime: Math.floor(gameTime),
                    waveReached: waveNumber,
                    levelReached: playerLevel,
                    totalKills: totalKills,
                    weapon: selectedStartingWeapon,
                    deathCause: deathCause
                });
                if (prog.runHistory.length > 10) prog.runHistory = prog.runHistory.slice(-10);

                saveProgression(prog);
            } catch (e) {
                console.warn('Could not save crystals:', e);
            }

            // Death explosion
            spawnDeathExplosion();
            
            triggerShake(10, SHAKE_DURATION_DEATH);
            triggerSlowmo(240);
            
            setTimeout(() => {
                // Capture blurred snapshot for game over background
                gameOverBgSnapshot = blurCanvas(canvas);

                gameState = 'gameOver';
                gameOverAnimStart = Date.now();
                // Clear lingering effects
                shakeIntensity = 0;
                shakeDuration = 0;
                flashColor = null;
                flashDuration = 0;
                slowmoTimer = 0;
                timeScale = 1;
                shieldBreakState = null;
            }, 800);
        }
        
        function spawnDeathExplosion() {
            // Shards (use pool instead of inline objects)
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI * 2 / 6) * i + Math.random() * 0.5;
                const p = pools.particle.acquire();
                p.x = player.x;
                p.y = player.y;
                p.vx = Math.cos(angle) * (100 + Math.random() * 80) + player.vx * 0.3;
                p.vy = Math.sin(angle) * (100 + Math.random() * 80) + player.vy * 0.3;
                p.life = 0.9;
                p.maxLife = 0.9;
                p.size = 12;
                p.color = COLORS.PLAYER;
                p.type = 'spark';
                p.angle = angle * 180 / Math.PI;
                p.rotSpeed = (Math.random() - 0.5) * 400;
                particles.push(p);
            }

            // Small particles
            for (let i = 0; i < 18; i++) {
                const angle = Math.random() * Math.PI * 2;
                const p = pools.particle.acquire();
                p.x = player.x;
                p.y = player.y;
                p.vx = Math.cos(angle) * (50 + Math.random() * 150);
                p.vy = Math.sin(angle) * (50 + Math.random() * 150);
                p.life = 0.6 + Math.random() * 0.3;
                p.maxLife = 0.8;
                p.size = 3 + Math.random() * 4;
                p.color = Math.random() > 0.5 ? COLORS.PLAYER : COLORS.THRUSTER;
                p.type = 'debris';
                particles.push(p);
            }
        }

        // ============================================================
        // PARTICLES & EFFECTS
        // ============================================================
        
        const MAX_PARTICLES = 600;
        const MAX_FLOATING_TEXTS = 150;

        // Single ring effect - replaces all particle explosions for performance
        function spawnRing(x, y, color, maxSize = 15) {
            if (particles.length >= MAX_PARTICLES) return;
            const ring = pools.particle.acquire();
            ring.x = x;
            ring.y = y;
            ring.vx = 0;
            ring.vy = 0;
            ring.type = 'ring';
            ring.color = color;
            ring.size = maxSize * 0.25;
            ring.maxSize = maxSize;
            ring.life = 0.2;
            ring.maxLife = 0.2;
            particles.push(ring);
        }

        function spawnFloatingText(x, y, text, color) {
            if (floatingTexts.length >= MAX_FLOATING_TEXTS) return;
            const ft = pools.floatingText.acquire();
            ft.x = x;
            ft.y = y;
            ft.text = text;
            ft.color = color;
            ft.life = 0.7;
            ft.maxLife = 0.7;
            floatingTexts.push(ft);
        }
        
        function updateParticles(overrideDt) {
            const pDt = overrideDt || deltaTime;
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx * pDt;
                p.y += p.vy * pDt;
                p.life -= pDt;

                if (p.type === 'spark' && p.rotSpeed) {
                    p.angle += p.rotSpeed * pDt;
                }
                if (p.type === 'thruster' && p.rotationSpeed) {
                    p.rotation += p.rotationSpeed * pDt;
                }
                
                // Drag on particles (thruster uses exponential slowdown based on life)
                if (p.type === 'thruster') {
                    const lifeRatio = p.life / p.maxLife;
                    const drag = Math.pow(0.92, 1 + (1 - lifeRatio) * 4);
                    p.vx *= drag;
                    p.vy *= drag;
                } else {
                    p.vx *= 0.98;
                    p.vy *= 0.98;
                }
                
                if (p.life <= 0) {
                    pools.particle.release(p);
                    fastRemove(particles, i);
                }
            }
        }
        
        function updateFloatingTexts(overrideDt) {
            const fDt = overrideDt || deltaTime;
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                const t = floatingTexts[i];
                t.y -= 40 * fDt;
                t.life -= fDt;
                
                if (t.life <= 0) {
                    pools.floatingText.release(t);
                    fastRemove(floatingTexts, i);
                }
            }
        }

        function updateEffects() {
            // Shake
            if (shakeDuration > 0) {
                shakeTimer += deltaTime * 1000;
                if (shakeTimer >= shakeDuration) {
                    shakeDuration = 0;
                    shakeIntensity = 0;
                }
            }
            
            // Flash
            if (flashDuration > 0) {
                flashDuration -= deltaTime * 1000;
                if (flashDuration <= 0) {
                    flashColor = null;
                    flashOpacity = 0;
                }
            }
            
        }
        
        function triggerShake(intensity, duration) {
            shakeIntensity = intensity;
            shakeDuration = duration;
            shakeTimer = 0;
        }
        
        function triggerFlash(color, opacity, duration) {
            flashColor = color;
            flashOpacity = opacity;
            flashDuration = duration;
            flashMaxDuration = duration;
        }
        
        function triggerSlowmo(duration) {
            slowmoTimer = duration;
            slowmoDuration = duration;
        }
        


        // ============================================================
        // RENDERING
        // ============================================================

        function render() {
            // Apply shake
            ctx.save();
            if (shakeDuration > 0) {
                const progress = shakeTimer / shakeDuration;
                const currentIntensity = shakeIntensity * (1 - progress);
                ctx.translate(
                    (Math.random() - 0.5) * currentIntensity * 2,
                    (Math.random() - 0.5) * currentIntensity * 2
                );
            }

            // During skilltree, skip game rendering — CSS blur on canvas freezes last frame,
            // overlay draws on separate uCtx canvas
            if (gameState === 'skilltree') {
                ctx.restore(); // Restore shake transform
                renderUpgradeOverlay(); // draws on uCtx (overlay canvas)
                return;
            }

            // Background (rendered without camera offset)
            renderBackground();

            // *** APPLY CAMERA TRANSFORM FOR ALL GAME ENTITIES ***
            ctx.save();
            const cameraOffset = worldToScreen(0, 0);
            ctx.translate(cameraOffset.x, cameraOffset.y);

            // Game entities (all rendered in world coordinates)
            if (gameState === 'playing' || gameState === 'paused' || gameState === 'gameOver' || gameState === 'demoEnd') {
                renderMines();
                renderSnares();
                renderRiftZones();
                renderPickups();
                renderTurrets();
                renderEnemies();
                renderBullets();
                renderDrones();
                renderEnemyBullets();
                if (player && gameState !== 'gameOver') {
                    renderAura();
                    renderFusionBeam();
                    renderPlayer();
                    renderShieldArc();
                    renderShieldBreakEffects();
                    renderLifeGainEffects();
                    renderOrbitals();
                    renderLightning();
                    renderNovaBeam();
                    renderSlashEffects();
                }
                renderParticles();
                renderFloatingTexts();
            }


            ctx.restore(); // Restore camera transform

            ctx.restore(); // Restore shake transform

            // Flash overlay (screen space)
            if (flashColor && flashOpacity > 0) {
                ctx.fillStyle = flashColor;
                ctx.globalAlpha = flashOpacity * (flashDuration / flashMaxDuration);
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                ctx.globalAlpha = 1;
            }

            // UI
            renderUI();

            // Debug overlay (toggle with B key)
            if (showDebugOverlay) {
                perfMonitor.renderDebug();
            }
        }

        function renderBackground() {
            // 1. Base gradient (cached in initBackgroundCache)
            ctx.fillStyle = cachedBgGradient;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // 2. Skip fancy effects in low performance mode
            if (lowPerfMode) return;

            const isMenu = gameState === 'menu';

            // 4. Parallax grid (2 layers)
            // Helper to handle negative modulo correctly
            const mod = (n, m) => ((n % m) + m) % m;

            // Use menu virtual camera when on menu screen, apply offset for seamless transition
            const camX = isMenu ? 0 : camera.x + bgOffsetX;
            const camY = isMenu ? menuCameraY : camera.y + bgOffsetY;

            // Far layer: sparse grid, slow parallax (distant feel)
            const farSpacing = 120;
            const farSpeed = 0.15;
            const farOpacity = 0.035;
            const farLineWidth = 1;
            const farOffsetX = mod(camX * farSpeed, farSpacing);
            const farOffsetY = mod(camY * farSpeed, farSpacing);
            ctx.strokeStyle = `rgba(127, 219, 255, ${farOpacity})`;
            ctx.lineWidth = farLineWidth;
            ctx.beginPath();
            for (let x = -farOffsetX; x <= CANVAS_WIDTH + farSpacing; x += farSpacing) {
                ctx.moveTo(x, 0);
                ctx.lineTo(x, CANVAS_HEIGHT);
            }
            for (let y = -farOffsetY; y <= CANVAS_HEIGHT + farSpacing; y += farSpacing) {
                ctx.moveTo(0, y);
                ctx.lineTo(CANVAS_WIDTH, y);
            }
            ctx.stroke();

            // Near layer: larger grid, faster parallax (closer feel)
            const nearSpacing = 400;
            const nearSpeed = 0.4;
            const nearOpacity = 0.05;
            const nearLineWidth = 1.5;
            const nearOffsetX = mod(camX * nearSpeed, nearSpacing);
            const nearOffsetY = mod(camY * nearSpeed, nearSpacing);
            ctx.strokeStyle = `rgba(127, 219, 255, ${nearOpacity})`;
            ctx.lineWidth = nearLineWidth;
            ctx.beginPath();
            for (let x = -nearOffsetX; x <= CANVAS_WIDTH + nearSpacing; x += nearSpacing) {
                ctx.moveTo(x, 0);
                ctx.lineTo(x, CANVAS_HEIGHT);
            }
            for (let y = -nearOffsetY; y <= CANVAS_HEIGHT + nearSpacing; y += nearSpacing) {
                ctx.moveTo(0, y);
                ctx.lineTo(CANVAS_WIDTH, y);
            }
            ctx.stroke();

            // 5. CRT Scanlines (cached pattern) — reduced in low perf
            ctx.globalAlpha = lowPerfMode ? 0.1 : 0.3;
            ctx.fillStyle = cachedScanlinePattern;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            ctx.globalAlpha = 1;

            // 6. Vignette (cached gradient) — skip in low perf
            if (!lowPerfMode) {
                ctx.fillStyle = cachedVignetteGradient;
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            }
        }

        // ============================================================
        // SHIELD ARC (around player in world space)
        // ============================================================

        function renderShieldArc() {
            if (!player || (player.shield <= 0 && shieldRechargeTimer <= 0)) return;
            // Hide arc during shockwave phase (the shockwave IS the visual)
            if (shieldBreakState && shieldBreakState.phase === 'shockwave') return;

            const shieldPercent = player.shield / PLAYER_MAX_SHIELD;
            const filledCount = Math.ceil(shieldPercent * SHIELD_SEGMENT_COUNT);
            const isLow = shieldPercent <= SHIELD_ARC_LOW_THRESHOLD && shieldPercent > 0;
            const isRegenerating = player.shieldRegenTimer >= SHIELD_REGEN_DELAY &&
                                   player.shield < PLAYER_MAX_SHIELD;

            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.globalAlpha = player.shieldArcOpacity;

            // Determine segment color based on state
            let arcColor = COLORS.HUD_SHIELD;

            if (player.shieldArcFlashColor) {
                arcColor = player.shieldArcFlashColor;
            } else if (isLow) {
                const pulse = Math.sin(player.shieldArcPulsePhase * 2) * 0.3 + 0.7;
                ctx.globalAlpha = player.shieldArcOpacity * pulse;
                arcColor = COLORS.HUD_WARNING;
            } else if (isRegenerating) {
                const pulse = Math.sin(player.shieldArcPulsePhase) * 0.2 + 0.8;
                ctx.globalAlpha = player.shieldArcOpacity * pulse;
                arcColor = COLORS.HUD_SHIELD_REGEN;
            }

            const stepRad = (Math.PI * 2) / SHIELD_SEGMENT_COUNT;

            // Draw empty (dim track) bars
            ctx.lineWidth = SHIELD_BAR_WIDTH;
            ctx.lineCap = 'butt';
            ctx.strokeStyle = hexToRGBA(COLORS.HUD_SHIELD, 0.08);
            for (let i = 0; i < SHIELD_SEGMENT_COUNT; i++) {
                const angle = -Math.PI / 2 + i * stepRad;
                const cos = Math.cos(angle);
                const sin = Math.sin(angle);
                ctx.beginPath();
                ctx.moveTo(cos * SHIELD_BAR_INNER_R, sin * SHIELD_BAR_INNER_R);
                ctx.lineTo(cos * SHIELD_BAR_OUTER_R, sin * SHIELD_BAR_OUTER_R);
                ctx.stroke();
            }

            // Draw filled (lit) bars
            ctx.strokeStyle = arcColor;
            for (let i = 0; i < filledCount; i++) {
                const angle = -Math.PI / 2 + i * stepRad;
                const cos = Math.cos(angle);
                const sin = Math.sin(angle);
                ctx.beginPath();
                ctx.moveTo(cos * SHIELD_BAR_INNER_R, sin * SHIELD_BAR_INNER_R);
                ctx.lineTo(cos * SHIELD_BAR_OUTER_R, sin * SHIELD_BAR_OUTER_R);
                ctx.stroke();
            }

            ctx.globalAlpha = 1;
            ctx.restore();
        }

        function renderShieldBreakEffects() {
            if (!shieldBreakState || !player) return;
            const s = shieldBreakState;

            // ── SHOCKWAVE RING ──
            if (s.shockwaveActive) {
                const progress = s.shockwaveRadius / SHOCKWAVE_MAX_RADIUS;
                const ringAlpha = (1 - progress) * 0.9 + 0.1;
                const strokeWidth = SHOCKWAVE_RING_STROKE * (1 - progress * 0.5);

                ctx.save();
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = strokeWidth;
                ctx.globalAlpha = ringAlpha;
                ctx.beginPath();
                ctx.arc(player.x, player.y, s.shockwaveRadius, 0, Math.PI * 2);
                ctx.stroke();

                // Secondary cyan inner ring
                ctx.strokeStyle = COLORS.PLAYER;
                ctx.lineWidth = strokeWidth * 0.5;
                ctx.globalAlpha = ringAlpha * 0.6;
                ctx.beginPath();
                ctx.arc(player.x, player.y, s.shockwaveRadius * 0.88, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }

            // ── LIFE SLOTS OVERLAY ──
            if (s.phase === 'lifeslots' && s.lifeSlotAlpha > 0) {
                const slotsToShow = s.lostSlotIndex + 1;
                const totalWidth = (slotsToShow - 1) * LIFE_SLOT_SPACING;
                const startX = player.x - totalWidth / 2;
                const slotY = player.y + LIFE_SLOT_OFFSET_Y;

                ctx.save();
                ctx.lineCap = 'round';

                // Only show slots up to lostSlotIndex (already-lost slots beyond it are hidden)
                for (let i = 0; i <= s.lostSlotIndex; i++) {
                    const slotX = startX + i * LIFE_SLOT_SPACING;
                    const isLost = (i === s.lostSlotIndex);
                    const isActive = (i < player.hp);

                    let alpha = s.lifeSlotAlpha;
                    let scale = LIFE_SLOT_SCALE;

                    if (isLost) {
                        const p = s.lostSlotProgress;
                        if (p < 0.35) {
                            // Pop up — scale 1.0 → 1.6, white flash
                            const popT = easeOutCubic(p / 0.35);
                            scale *= (1.0 + 0.6 * popT);
                            ctx.strokeStyle = '#FFFFFF';
                        } else {
                            // Shrink away — scale 1.6 → 0, fade out, white → red
                            const shrinkT = easeOutCubic((p - 0.35) / 0.65);
                            scale *= 1.6 * (1 - shrinkT);
                            alpha *= (1 - shrinkT);
                            ctx.strokeStyle = lerpColor('#FFFFFF', COLORS.HUD_RED, shrinkT);
                        }
                    } else if (isActive) {
                        ctx.strokeStyle = COLORS.PLAYER;
                    } else {
                        ctx.strokeStyle = COLORS.HUD_CYAN_DIM;
                        alpha *= 0.3;
                    }

                    ctx.globalAlpha = alpha;
                    ctx.save();
                    ctx.translate(slotX, slotY);
                    ctx.scale(scale, scale);
                    ctx.rotate(-Math.PI / 2);

                    ctx.lineWidth = 3;
                    drawShipPath(ctx, selectedStartingWeapon);
                    if (isLost) {
                        ctx.shadowColor = ctx.strokeStyle;
                        ctx.shadowBlur = 20;
                    } else if (isActive) {
                        ctx.shadowColor = COLORS.PLAYER;
                        ctx.shadowBlur = 15;
                    }
                    ctx.stroke();
                    ctx.shadowBlur = 0;

                    ctx.restore();
                }

                ctx.globalAlpha = 1;
                ctx.restore();
            }
        }

        function renderLifeGainEffects() {
            if (!lifeGainState || !player) return;
            const s = lifeGainState;
            if (s.lifeSlotAlpha <= 0) return;

            const slotsToShow = s.totalHP;
            const totalWidth = (slotsToShow - 1) * LIFE_SLOT_SPACING;
            const startX = player.x - totalWidth / 2;
            const slotY = player.y + LIFE_SLOT_OFFSET_Y;

            ctx.save();
            ctx.lineCap = 'round';

            for (let i = 0; i < slotsToShow; i++) {
                const slotX = startX + i * LIFE_SLOT_SPACING;
                const isGained = (i === s.gainedSlotIndex);

                let alpha = s.lifeSlotAlpha;
                let scale = LIFE_SLOT_SCALE;

                if (isGained) {
                    const p = s.gainedSlotProgress;
                    if (p <= 0) {
                        // Not yet appearing — draw as empty
                        ctx.strokeStyle = COLORS.HUD_CYAN_DIM;
                        alpha *= 0.3;
                    } else if (p < 0.5) {
                        // Pop in — scale 0 → 1.4, green flash
                        const popT = easeOutCubic(p / 0.5);
                        scale *= 1.4 * popT;
                        ctx.strokeStyle = '#FFFFFF';
                    } else {
                        // Settle — scale 1.4 → 1.0, white → cyan
                        const settleT = easeOutCubic((p - 0.5) / 0.5);
                        scale *= 1.4 - 0.4 * settleT;
                        ctx.strokeStyle = lerpColor('#FFFFFF', COLORS.PLAYER, settleT);
                    }
                } else {
                    // Already-filled slots
                    ctx.strokeStyle = COLORS.PLAYER;
                }

                ctx.globalAlpha = alpha;
                ctx.save();
                ctx.translate(slotX, slotY);
                ctx.scale(scale, scale);
                ctx.rotate(-Math.PI / 2);

                ctx.lineWidth = 3;
                drawShipPath(ctx, selectedStartingWeapon);
                if (isGained && s.gainedSlotProgress > 0) {
                    ctx.shadowColor = ctx.strokeStyle;
                    ctx.shadowBlur = 20;
                } else {
                    ctx.shadowColor = COLORS.PLAYER;
                    ctx.shadowBlur = 15;
                }
                ctx.stroke();
                ctx.shadowBlur = 0;

                ctx.restore();
            }

            ctx.globalAlpha = 1;
            ctx.restore();
        }


        function renderPlayer() {
            const p = player;
            ctx.save();
            ctx.translate(p.x, p.y + p.bobOffset);
            ctx.rotate(p.angle * Math.PI / 180);
            ctx.translate(-PLAYER_PIVOT_OFFSET, 0);  // Aplica el offset del pivote

            
            // Thruster flame
            if (p.thrusterScale > 0) {
                ctx.fillStyle = COLORS.PLAYER;
                ctx.globalAlpha = 0.8;
                const flameLength = 10 + p.thrusterScale * (5 + p.thrustEffort * 25);
                if (selectedStartingWeapon === 'void_blade') {
                    const fl = flameLength * 0.8;
                    ctx.beginPath();
                    ctx.moveTo(-10, -19);
                    ctx.lineTo(-18 - fl, -16);
                    ctx.lineTo(-20, -12);
                    ctx.closePath();
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(-20, 12);
                    ctx.lineTo(-18 - fl, 16);
                    ctx.lineTo(-10, 19);
                    ctx.closePath();
                    ctx.fill();
                } else if (selectedStartingWeapon === 'fusion_beam') {
                    const fl = flameLength * 0.7;
                    const fls = flameLength * 0.4;
                    // Outer top
                    ctx.beginPath();
                    ctx.moveTo(-12, -12);
                    ctx.lineTo(-12 - fls, -10);
                    ctx.lineTo(-12, -8);
                    ctx.closePath();
                    ctx.fill();
                    // Inner top
                    ctx.beginPath();
                    ctx.moveTo(-12, -6);
                    ctx.lineTo(-12 - fl, -3);
                    ctx.lineTo(-12, 0);
                    ctx.closePath();
                    ctx.fill();
                    // Inner bottom
                    ctx.beginPath();
                    ctx.moveTo(-12, 0);
                    ctx.lineTo(-12 - fl, 3);
                    ctx.lineTo(-12, 6);
                    ctx.closePath();
                    ctx.fill();
                    // Outer bottom
                    ctx.beginPath();
                    ctx.moveTo(-12, 8);
                    ctx.lineTo(-12 - fls, 10);
                    ctx.lineTo(-12, 12);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.moveTo(-12, -6);
                    ctx.lineTo(-12 - flameLength, 0);
                    ctx.lineTo(-12, 6);
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }
            
            // Ship body - outline only style (shape varies by starting weapon)
            ctx.strokeStyle = COLORS.PLAYER;
            ctx.lineWidth = 3;
            ctx.shadowColor = COLORS.PLAYER;
            ctx.shadowBlur = 20;

            drawShipPath(ctx, selectedStartingWeapon);
            ctx.stroke();
            
            ctx.shadowBlur = 0;
            ctx.restore();
        }

        function renderAura() {
            if (!activeWeapons.includes('plasma_field') || !player) return;

            const stats = getWeaponStats();
            const auraColor = WEAPONS['plasma_field'].color;
            const currentRadius = stats.auraRadius;
            const isEvolved = stats.hasAnnihilation;

            ctx.save();

            // Outer glow ring
            ctx.strokeStyle = auraColor;
            ctx.lineWidth = isEvolved ? 4 : 3;
            ctx.globalAlpha = isEvolved ? 0.7 : 0.6;
            ctx.shadowColor = auraColor;
            ctx.shadowBlur = ENABLE_GLOW_EFFECTS ? 15 : 0;
            ctx.beginPath();
            ctx.arc(player.x, player.y, currentRadius, 0, Math.PI * 2);
            ctx.stroke();

            // Semi-transparent fill
            ctx.globalAlpha = isEvolved ? 0.12 : 0.1;
            ctx.fillStyle = auraColor;
            ctx.fill();

            // Inner ring
            ctx.globalAlpha = 0.3;
            ctx.lineWidth = 1.5;
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(player.x, player.y, currentRadius * 0.7, 0, Math.PI * 2);
            ctx.stroke();

            // Evolution: additional rings showing instability
            if (isEvolved) {
                // Second inner ring at 40% radius
                ctx.globalAlpha = 0.25;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(player.x, player.y, currentRadius * 0.4, 0, Math.PI * 2);
                ctx.stroke();

                // Rotating dashed outer ring
                ctx.globalAlpha = 0.35;
                ctx.lineWidth = 2;
                ctx.setLineDash([8, 12]);
                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.rotate(auraState.pulseAnimation * 0.3);
                ctx.beginPath();
                ctx.arc(0, 0, currentRadius + 4, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
                ctx.setLineDash([]);
            }

            ctx.restore();
        }

        function renderFusionBeam() {
            if (!activeWeapons.includes('fusion_beam') || !player) return;

            const stats = getWeaponStats();
            const hasTargets = beamState.targets.length > 0 || beamState.siphonBeams.length > 0 || beamState.burnEffects.length > 0;

            ctx.save();
            ctx.lineCap = 'round';

            // Origin circle around player (always visible when fusion beam equipped)
            const circlePulse = 0.25 + Math.sin(Date.now() / 600) * 0.1;
            ctx.strokeStyle = COLORS.PLAYER;
            ctx.lineWidth = stats.beamWidth;
            ctx.globalAlpha = hasTargets ? 0.6 : circlePulse;
            ctx.beginPath();
            ctx.arc(player.x, player.y, BEAM_ORIGIN_RADIUS, 0, Math.PI * 2);
            ctx.stroke();
            // Inner white core (matches beam visual)
            if (hasTargets) {
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = stats.beamWidth * 0.4;
                ctx.globalAlpha = 0.8;
                ctx.beginPath();
                ctx.arc(player.x, player.y, BEAM_ORIGIN_RADIUS, 0, Math.PI * 2);
                ctx.stroke();
            }

            if (!hasTargets) { ctx.restore(); return; }

            for (let i = 0; i < beamState.targets.length; i++) {
                const t = beamState.targets[i];
                if (!t.enemy || t.enemy.hp <= 0) continue;

                // Calculate beam origin on circle edge
                const dx = t.enemy.x - player.x;
                const dy = t.enemy.y - player.y;
                const angle = Math.atan2(dy, dx);
                const originX = player.x + Math.cos(angle) * BEAM_ORIGIN_RADIUS;
                const originY = player.y + Math.sin(angle) * BEAM_ORIGIN_RADIUS;

                const rampFactor = 1 + t.rampCurrent * 0.3;
                const width = stats.beamWidth * rampFactor;
                const alpha = 0.6;

                // Main beam line
                ctx.strokeStyle = COLORS.PLAYER;
                ctx.lineWidth = width;
                ctx.globalAlpha = alpha;
                ctx.beginPath();
                ctx.moveTo(originX, originY);
                ctx.lineTo(t.enemy.x, t.enemy.y);
                ctx.stroke();

                // Inner white core
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = width * 0.4;
                ctx.globalAlpha = 0.8;
                ctx.beginPath();
                ctx.moveTo(originX, originY);
                ctx.lineTo(t.enemy.x, t.enemy.y);
                ctx.stroke();

                // Traveling energy pulses along the beam
                const beamDx = t.enemy.x - originX;
                const beamDy = t.enemy.y - originY;
                const beamLen = Math.sqrt(beamDx * beamDx + beamDy * beamDy);
                if (beamLen > 1) {
                    const pulseRadius = width * 0.85;
                    const pulseSpacing = 40;
                    const speed = 300; // px/s
                    const offset = (Date.now() / 1000 * speed) % pulseSpacing;
                    const nx = beamDx / beamLen, ny = beamDy / beamLen;
                    ctx.strokeStyle = COLORS.PLAYER;
                    ctx.lineWidth = 1.5;
                    ctx.globalAlpha = 0.35;
                    ctx.beginPath();
                    for (let d = offset; d < beamLen; d += pulseSpacing) {
                        const px = originX + nx * d;
                        const py = originY + ny * d;
                        ctx.moveTo(px + pulseRadius, py);
                        ctx.arc(px, py, pulseRadius, 0, Math.PI * 2);
                    }
                    ctx.stroke();
                }

                // Impact point flash
                const flashSize = 4 + Math.sin(Date.now() / 80) * 2;
                ctx.globalAlpha = 0.7;
                ctx.fillStyle = COLORS.PLAYER;
                ctx.beginPath();
                ctx.arc(t.enemy.x, t.enemy.y, flashSize, 0, Math.PI * 2);
                ctx.fill();

                // Chain beams: sequential chain (A→B→C like lightning)
                // Uses snapshot {x, y} coords — immune to pool recycling
                if (t.chainTargets && t.chainTargets.length > 0) {
                    let prevX = t.enemy.x, prevY = t.enemy.y;
                    for (const ct of t.chainTargets) {
                        // Chain beam line (thinner, slightly dimmer)
                        ctx.strokeStyle = COLORS.PLAYER;
                        ctx.lineWidth = 3;
                        ctx.globalAlpha = 0.4;
                        ctx.beginPath();
                        ctx.moveTo(prevX, prevY);
                        ctx.lineTo(ct.x, ct.y);
                        ctx.stroke();

                        // Chain beam white core
                        ctx.strokeStyle = '#FFFFFF';
                        ctx.lineWidth = 1.2;
                        ctx.globalAlpha = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(prevX, prevY);
                        ctx.lineTo(ct.x, ct.y);
                        ctx.stroke();

                        prevX = ct.x;
                        prevY = ct.y;
                    }
                }
            }

            // Burn effects: pulsing orange glow
            for (const burn of beamState.burnEffects) {
                if (!burn.enemy || burn.enemy.hp <= 0 || burn.enemy.dead) continue;
                const pulse = 0.3 + Math.sin(Date.now() / 100) * 0.15;
                ctx.globalAlpha = pulse;
                ctx.strokeStyle = '#FF8800';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(burn.enemy.x, burn.enemy.y, 18, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Siphon Nexus beams (evolution)
            for (const sb of beamState.siphonBeams) {
                const lifeRatio = sb.duration / 2.0;
                for (const st of sb.targets) {
                    if (!st.alive) continue;
                    ctx.strokeStyle = COLORS.PLAYER;
                    ctx.lineWidth = 3;
                    ctx.globalAlpha = 0.4 * lifeRatio;
                    ctx.beginPath();
                    ctx.moveTo(sb.x, sb.y);
                    ctx.lineTo(st.enemy.x, st.enemy.y);
                    ctx.stroke();

                    ctx.strokeStyle = '#FFFFFF';
                    ctx.lineWidth = 1.2;
                    ctx.globalAlpha = 0.5 * lifeRatio;
                    ctx.beginPath();
                    ctx.moveTo(sb.x, sb.y);
                    ctx.lineTo(st.enemy.x, st.enemy.y);
                    ctx.stroke();
                }
            }

            ctx.globalAlpha = 1;
            ctx.restore();
        }

        function renderOrbitals() {
            if (!activeWeapons.includes('orbital_shield') || !player) return;

            const stats = getWeaponStats();
            const orbitalRadius = ORBITAL_RADIUS;
            let orbitalSize = ORBITAL_SIZE * stats.orbSizeMulti;

            // Outline style for orbitals (no glow for performance)
            ctx.strokeStyle = COLORS.PLAYER;
            ctx.lineWidth = 2.5;

            for (const orb of orbitals) {
                const orbX = player.x + Math.cos(orb.angle) * orbitalRadius;
                const orbY = player.y + Math.sin(orb.angle) * orbitalRadius;

                ctx.beginPath();
                ctx.arc(orbX, orbY, orbitalSize, 0, Math.PI * 2);
                ctx.stroke();

                // Inner detail stroke (like scout enemies)
                ctx.globalAlpha = 0.4;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(orbX, orbY, orbitalSize * 0.6, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
                ctx.lineWidth = 2.5;
            }
        }

        function renderLightning() {
            if (lightningEffects.length === 0) return;

            for (const effect of lightningEffects) {
                if (effect.points.length < 2) continue;

                const alpha = effect.life / effect.maxLife;

                // Render 3 layers: outer glow, mid glow, core
                for (let layer = 2; layer >= 0; layer--) {
                    ctx.beginPath();
                    ctx.moveTo(effect.points[0].x, effect.points[0].y);

                    // Draw through all pre-computed zigzag points
                    for (let i = 1; i < effect.points.length; i++) {
                        ctx.lineTo(effect.points[i].x, effect.points[i].y);
                    }

                    // Layer styling (narrow lightning)
                    if (layer === 0) {
                        // Core: bright white
                        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                        ctx.lineWidth = 1.5;
                    } else if (layer === 1) {
                        // Mid: purple
                        ctx.strokeStyle = hexToRGBA(COLORS.PLAYER, alpha * 0.8);
                        ctx.lineWidth = 3;
                    } else {
                        // Outer: blue glow
                        ctx.strokeStyle = hexToRGBA(COLORS.PLAYER, alpha * 0.5);
                        ctx.lineWidth = 6;
                    }

                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.stroke();
                }
            }
        }

        function renderNovaBeam() {
            if (novaBeamEffects.length === 0) return;

            for (const beam of novaBeamEffects) {
                const alpha = beam.life / beam.maxLife;

                // 3 layers: outer glow → mid → core
                for (let layer = 2; layer >= 0; layer--) {
                    ctx.beginPath();
                    ctx.moveTo(beam.x1, beam.y1);
                    ctx.lineTo(beam.x2, beam.y2);

                    if (layer === 0) {
                        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                        ctx.lineWidth = 4;
                    } else if (layer === 1) {
                        ctx.strokeStyle = `rgba(255, 228, 181, ${alpha * 0.7})`;
                        ctx.lineWidth = 12;
                    } else {
                        ctx.strokeStyle = `rgba(255, 215, 0, ${alpha * 0.3})`;
                        ctx.lineWidth = 24;
                    }

                    ctx.lineCap = 'round';
                    ctx.shadowColor = '#FFD700';
                    ctx.shadowBlur = ENABLE_GLOW_EFFECTS ? 20 * alpha : 0;
                    ctx.stroke();
                }
            }
            ctx.shadowBlur = 0;
        }

        function renderBullets() {
            // Sort bullets by type for batched rendering
            const byType = { laser: [], beam: [], rocket: [], spread: [], mini_rocket: [], armageddon_rocket: [], turret: [], turret_rocket: [] };

            for (const b of bullets) {
                if (shouldRenderEntity(b, CULLING_DISTANCES.bullets)) {
                    const type = b.type || 'laser';
                    if (byType[type]) byType[type].push(b);
                    else byType.laser.push(b);
                }
            }

            // Batch render lasers
            if (byType.laser.length > 0) {
                ctx.shadowBlur = ENABLE_GLOW_EFFECTS ? 8 : 0;

                for (const b of byType.laser) {
                    const color = b.color || COLORS.BULLET;
                    ctx.strokeStyle = color;
                    ctx.shadowColor = color;
                    const angle = Math.atan2(b.vy, b.vx);
                    ctx.lineWidth = 5;
                    const len = 24;
                    ctx.beginPath();
                    ctx.moveTo(b.x - Math.cos(angle) * len, b.y - Math.sin(angle) * len);
                    ctx.lineTo(b.x, b.y);
                    ctx.stroke();
                }
            }

            // Batch render beams
            if (byType.beam.length > 0) {
                ctx.shadowBlur = ENABLE_GLOW_EFFECTS ? 8 : 0;

                for (const b of byType.beam) {
                    const angle = Math.atan2(b.vy, b.vx);
                    ctx.strokeStyle = b.color || COLORS.BULLET;
                    ctx.shadowColor = b.color || COLORS.BULLET;
                    ctx.lineWidth = 5;

                    const len = 24;
                    ctx.beginPath();
                    ctx.moveTo(b.x - Math.cos(angle) * len, b.y - Math.sin(angle) * len);
                    ctx.lineTo(b.x, b.y);
                    ctx.stroke();
                }
            }

            // Batch render spread shots
            if (byType.spread.length > 0) {
                ctx.strokeStyle = COLORS.GOLD;
                ctx.shadowColor = COLORS.GOLD;
                ctx.shadowBlur = ENABLE_GLOW_EFFECTS ? 6 : 0;
                ctx.lineWidth = 2;

                for (const b of byType.spread) {
                    const angle = Math.atan2(b.vy, b.vx);
                    const len = 10;
                    ctx.beginPath();
                    ctx.moveTo(b.x - Math.cos(angle) * len, b.y - Math.sin(angle) * len);
                    ctx.lineTo(b.x, b.y);
                    ctx.stroke();
                }
            }


            // Batch render rockets with trail
            if (byType.rocket.length > 0) {
                ctx.shadowColor = COLORS.PLAYER;
                ctx.shadowBlur = ENABLE_GLOW_EFFECTS ? 10 : 0;

                for (const b of byType.rocket) {
                    // Draw trail with gap and width ramp
                    if (b.trail && b.trail.length > 1) {
                        const gap = 4, ramp = 6, maxW = 2.5, alphaMax = 0.6;
                        const lastDrawn = b.trail.length - 1 - gap;
                        if (lastDrawn >= 1) {
                            for (let t = 0; t < lastDrawn; t++) {
                                const baseFade = (t + 1) / lastDrawn;
                                const pointsFromEnd = lastDrawn - 1 - t;
                                const rampFactor = pointsFromEnd < ramp ? pointsFromEnd / ramp : 1.0;
                                const alpha = alphaMax * baseFade * rampFactor;
                                const width = maxW * baseFade * rampFactor;
                                if (alpha < 0.02) continue;
                                ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                                ctx.lineWidth = width;
                                ctx.beginPath();
                                ctx.moveTo(b.trail[t].x, b.trail[t].y);
                                ctx.lineTo(b.trail[t + 1].x, b.trail[t + 1].y);
                                ctx.stroke();
                            }
                        }
                    }

                    // Draw rocket — narrow capsule shape (rounded nose, flat back)
                    ctx.strokeStyle = COLORS.PLAYER;
                    ctx.lineWidth = 2;
                    const angle = Math.atan2(b.vy, b.vx);
                    ctx.save();
                    ctx.translate(b.x, b.y);
                    ctx.rotate(angle);
                    ctx.beginPath();
                    ctx.moveTo(-8, -1.8);
                    ctx.lineTo(6.2, -1.8);
                    ctx.arc(6.2, 0, 1.8, -Math.PI / 2, Math.PI / 2, false);
                    ctx.lineTo(-8, 1.8);
                    ctx.closePath();
                    ctx.stroke();
                    ctx.restore();
                }
            }

            // Batch render mini rockets with trail (same player color)
            if (byType.mini_rocket.length > 0) {
                ctx.shadowColor = COLORS.PLAYER;
                ctx.shadowBlur = ENABLE_GLOW_EFFECTS ? 6 : 0;

                for (const b of byType.mini_rocket) {
                    // Draw trail with gap and width ramp
                    if (b.trail && b.trail.length > 1) {
                        const gap = 3, ramp = 4, maxW = 1.8, alphaMax = 0.5;
                        const lastDrawn = b.trail.length - 1 - gap;
                        if (lastDrawn >= 1) {
                            for (let t = 0; t < lastDrawn; t++) {
                                const baseFade = (t + 1) / lastDrawn;
                                const pointsFromEnd = lastDrawn - 1 - t;
                                const rampFactor = pointsFromEnd < ramp ? pointsFromEnd / ramp : 1.0;
                                const alpha = alphaMax * baseFade * rampFactor;
                                const width = maxW * baseFade * rampFactor;
                                if (alpha < 0.02) continue;
                                ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                                ctx.lineWidth = width;
                                ctx.beginPath();
                                ctx.moveTo(b.trail[t].x, b.trail[t].y);
                                ctx.lineTo(b.trail[t + 1].x, b.trail[t + 1].y);
                                ctx.stroke();
                            }
                        }
                    }

                    // Draw mini rocket — narrow capsule shape
                    ctx.strokeStyle = COLORS.PLAYER;
                    ctx.lineWidth = 1.5;
                    const angle = Math.atan2(b.vy, b.vx);
                    const scale = b.size || 0.6;
                    ctx.save();
                    ctx.translate(b.x, b.y);
                    ctx.rotate(angle);
                    ctx.scale(scale, scale);
                    ctx.beginPath();
                    ctx.moveTo(-6.5, -1.5);
                    ctx.lineTo(5, -1.5);
                    ctx.arc(5, 0, 1.5, -Math.PI / 2, Math.PI / 2, false);
                    ctx.lineTo(-6.5, 1.5);
                    ctx.closePath();
                    ctx.stroke();
                    ctx.restore();
                }
            }

            // Batch render armageddon rockets with thick orange trail
            if (byType.armageddon_rocket.length > 0) {
                for (const b of byType.armageddon_rocket) {
                    // Draw thick orange trail with gap and width ramp
                    if (b.trail && b.trail.length > 1) {
                        const gap = 5, ramp = 8, maxW = 5, alphaMax = 0.7;
                        const lastDrawn = b.trail.length - 1 - gap;
                        if (lastDrawn >= 1) {
                            for (let t = 0; t < lastDrawn; t++) {
                                const baseFade = (t + 1) / lastDrawn;
                                const pointsFromEnd = lastDrawn - 1 - t;
                                const rampFactor = pointsFromEnd < ramp ? pointsFromEnd / ramp : 1.0;
                                const alpha = alphaMax * baseFade * rampFactor;
                                const width = maxW * baseFade * rampFactor;
                                if (alpha < 0.02) continue;
                                ctx.strokeStyle = `rgba(255, 107, 0, ${alpha})`;
                                ctx.lineWidth = width;
                                ctx.beginPath();
                                ctx.moveTo(b.trail[t].x, b.trail[t].y);
                                ctx.lineTo(b.trail[t + 1].x, b.trail[t + 1].y);
                                ctx.stroke();
                            }
                        }
                    }

                    // Draw mega rocket (2x scale) — narrow capsule shape
                    ctx.strokeStyle = '#FF6B00';
                    ctx.lineWidth = 3;
                    const angle = Math.atan2(b.vy, b.vx);
                    ctx.save();
                    ctx.translate(b.x, b.y);
                    ctx.rotate(angle);
                    ctx.scale(2, 2);
                    ctx.beginPath();
                    ctx.moveTo(-8, -1.8);
                    ctx.lineTo(6.2, -1.8);
                    ctx.arc(6.2, 0, 1.8, -Math.PI / 2, Math.PI / 2, false);
                    ctx.lineTo(-8, 1.8);
                    ctx.closePath();
                    ctx.stroke();
                    // Inner detail capsule
                    ctx.lineWidth = 1.5;
                    ctx.strokeStyle = '#FFD700';
                    ctx.beginPath();
                    ctx.moveTo(-5, -1);
                    ctx.lineTo(5.2, -1);
                    ctx.arc(5.2, 0, 1, -Math.PI / 2, Math.PI / 2, false);
                    ctx.lineTo(-5, 1);
                    ctx.closePath();
                    ctx.stroke();
                    ctx.restore();
                }
            }

            // Batch render turret bullets (small cyan circles, no glow)
            if (byType.turret.length > 0) {
                ctx.shadowBlur = 0;
                ctx.fillStyle = COLORS.PLAYER;
                for (const b of byType.turret) {
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Batch render turret rockets — capsule shape, no trail
            if (byType.turret_rocket.length > 0) {
                ctx.shadowBlur = 0;
                ctx.strokeStyle = COLORS.PLAYER;
                ctx.lineWidth = 2;
                for (const b of byType.turret_rocket) {
                    const angle = Math.atan2(b.vy, b.vx);
                    ctx.save();
                    ctx.translate(b.x, b.y);
                    ctx.rotate(angle);
                    ctx.beginPath();
                    ctx.moveTo(-6.5, -1.5);
                    ctx.lineTo(5, -1.5);
                    ctx.arc(5, 0, 1.5, -Math.PI / 2, Math.PI / 2, false);
                    ctx.lineTo(-6.5, 1.5);
                    ctx.closePath();
                    ctx.stroke();
                    ctx.restore();
                }
            }

            ctx.shadowBlur = 0;
        }

        function renderEnemyBullets() {
            ctx.strokeStyle = COLORS.ENEMY_BULLET;
            ctx.lineWidth = 2;
            ctx.shadowColor = COLORS.ENEMY_BULLET;
            ctx.shadowBlur = ENABLE_GLOW_EFFECTS ? 8 : 0;

            for (const b of enemyBullets) {
                // Skip rendering if too far from camera
                if (!shouldRenderEntity(b, CULLING_DISTANCES.enemyBullets)) continue;

                ctx.beginPath();
                ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
                ctx.stroke();
            }

            ctx.shadowBlur = 0;
        }

        function renderDrones() {
            if (drones.length === 0) return;

            const droneColor = COLORS.PLAYER;

            for (const d of drones) {
                // Skip rendering if too far from camera
                if (!shouldRenderEntity(d, CULLING_DISTANCES.drones)) continue;

                // Draw trail (trail[0]=oldest, trail[end]=newest)
                if (d.trail.length > 1) {
                    ctx.strokeStyle = droneColor;
                    ctx.lineWidth = 1;
                    ctx.globalAlpha = 0.4;
                    ctx.beginPath();
                    ctx.moveTo(d.trail[0].x, d.trail[0].y);
                    for (let i = 1; i < d.trail.length; i++) {
                        ctx.lineTo(d.trail[i].x, d.trail[i].y);
                    }
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }

                // Draw drone body
                ctx.save();
                ctx.translate(d.x, d.y);
                ctx.rotate(d.angle * Math.PI / 180);

                if (d.isHive) {
                    // === HIVE DRONE: outline-only with inner detail ===
                    const size = HIVE_DRONE_SIZE;
                    ctx.strokeStyle = droneColor;
                    ctx.lineWidth = 1.5;

                    // Outer hexagon (outline only)
                    ctx.beginPath();
                    for (let j = 0; j < 6; j++) {
                        const a = (j / 6) * Math.PI * 2 - Math.PI / 2;
                        const px = Math.cos(a) * size;
                        const py = Math.sin(a) * size;
                        if (j === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.stroke();

                    // Inner hexagon detail stroke
                    ctx.lineWidth = 1;
                    ctx.globalAlpha = 0.5;
                    const innerSize = size * 0.5;
                    ctx.beginPath();
                    for (let j = 0; j < 6; j++) {
                        const a = (j / 6) * Math.PI * 2 - Math.PI / 2;
                        const px = Math.cos(a) * innerSize;
                        const py = Math.sin(a) * innerSize;
                        if (j === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    ctx.globalAlpha = 1;

                    // Center dot
                    ctx.fillStyle = '#FFFFFF';
                    ctx.beginPath();
                    ctx.arc(0, 0, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // === KAMIKAZE DRONE: filled hexagon ===
                    ctx.strokeStyle = droneColor;
                    ctx.fillStyle = droneColor;
                    ctx.lineWidth = 1.5;
                    ctx.globalAlpha = 0.4;
                    ctx.beginPath();
                    for (let i = 0; i < 6; i++) {
                        const angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
                        const x = Math.cos(angle) * DRONE_SIZE;
                        const y = Math.sin(angle) * DRONE_SIZE;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    ctx.stroke();

                    // Inner glow dot
                    ctx.fillStyle = '#FFFFFF';
                    ctx.beginPath();
                    ctx.arc(0, 0, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            }
        }

        function renderEnemies() {
            // Sort enemies by type for batched rendering
            const byType = { SCOUT: [], KAMIKAZE: [], TANK: [], ALIEN: [], BERSERKER: [], LEVIATHAN: [] };

            for (const e of enemies) {
