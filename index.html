<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <title>Space Survivor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        
        #gameContainer {
            position: relative;
            background: #020617;
        }
        
        #game {
            display: block;
        }

        #upgradeCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            pointer-events: none;
        }

        /* Touch Controls */
        #touchControls {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .touch-zone {
            position: absolute;
            pointer-events: auto;
        }
        
        #joystickZone {
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
        }

        #joystickBase {
            position: fixed;
            width: 160px;
            height: 160px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 50%;
            display: none;
            pointer-events: none;
        }

        @media (pointer: coarse) {
            #joystickBase {
                left: 50%;
                bottom: 80px;
                transform: translateX(-50%);
            }
        }

        #joystickKnob {
            position: absolute;
            width: 56px;
            height: 56px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 50%;
            left: 52px;
            top: 52px;
            transition: none;
        }
        
        @media (pointer: coarse) {
            #touchControls {
                display: block;
            }
        }

        /* Landscape orientation blocker for mobile */
        #landscapeBlocker {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 99999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #7FDBFF;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
        }
        #landscapeBlocker svg {
            width: 80px; height: 80px;
            margin-bottom: 24px;
            animation: rotatePhone 1.5s ease-in-out infinite;
        }
        #landscapeBlocker p {
            font-size: 20px;
            opacity: 0.9;
        }
        @keyframes rotatePhone {
            0%, 100% { transform: rotate(90deg); }
            50% { transform: rotate(0deg); }
        }
        @media (pointer: coarse) and (orientation: landscape) {
            #landscapeBlocker { display: flex !important; }
            #gameContainer { display: none !important; }
        }

    </style>
</head>

            upgradeSelect: 9, gameStart: 9, waveAlert: 8, shieldRecharge: 8,
            nearMiss: 8, armageddonExplode: 7, annihilationPulse: 7,

        const AudioManager = {
            ctx: null,
            initialized: false,
            masterGain: null,
            sfxGain: null,
            _volume: 1.0,
            _muted: false,
            _cooldowns: {},
            _activeCounts: {},
            _ducked: false,
            _loops: {},
            DEFAULT_COOLDOWN: 0.03,
            MAX_TOTAL_SOUNDS: 12,
            _totalActive: 0,

            init() {
                if (this.initialized) return;
                try {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.masterGain = this.ctx.createGain();
                    this.sfxGain = this.ctx.createGain();
                    this.sfxGain.connect(this.masterGain);
                    this.masterGain.connect(this.ctx.destination);

                    // Load saved volume settings
                    const saved = localStorage.getItem('StellarSwarm_audio');
                    if (saved) {
                        try {
                            const s = JSON.parse(saved);
                            this._volume = s.volume ?? 1.0;
                            this._muted = s.muted ?? false;
                        } catch(e) {}
                    }

                    this.initialized = true;
                    if (this.ctx.state === 'suspended') this.ctx.resume();

                    // Web Audio not supported — audio silently disabled
                }
            },

            _applyVolume() {
                if (!this.masterGain) return;
                const base = this._muted ? 0 : this._volume;
                this.masterGain.gain.value = this._ducked ? base * 0.25 : base;
            },

            _saveSettings() {
                localStorage.setItem('StellarSwarm_audio', JSON.stringify({
                    volume: this._volume, muted: this._muted
                }));
            },

            setVolume(v) {
                this._volume = Math.max(0, Math.min(1, v));
                this._applyVolume();
                this._saveSettings();
            },

            getVolume() { return this._volume; },

            toggleMute() {
                this._muted = !this._muted;
                this._applyVolume();
                this._saveSettings();
                return this._muted;
            },

            isMuted() { return this._muted; },

            // Volume ducking for menus
            duck() {
                if (!this._ducked) { this._ducked = true; this._applyVolume(); }
            },
            unduck() {
                if (this._ducked) { this._ducked = false; this._applyVolume(); }
            },

            resume() {
                if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
            },

            setMusicVolume(v) { MusicEngine.setMusicVolume(v); },

            play(soundId, worldX, worldY) {
                if (!this.initialized || !this.ctx || this._muted) return;
                const def = SOUND_DEFS[soundId];
                if (!def) return;

                const now = this.ctx.currentTime;
                const priority = SOUND_PRIORITY[soundId] || 0;
                const cooldown = SOUND_COOLDOWNS[soundId] || this.DEFAULT_COOLDOWN;
                const isCritical = priority >= PRIORITY_BYPASS_THRESHOLD;

                // Cooldown check (critical sounds have reduced cooldown)
                const lastPlayed = this._cooldowns[soundId] || 0;
                if (now - lastPlayed < (isCritical ? cooldown * 0.5 : cooldown)) return;

                // Rate limit check (critical sounds bypass)
                if (!isCritical) {
                    const limit = SOUND_LIMITS[soundId];
                    const active = this._activeCounts[soundId] || 0;
                    if (limit && active >= limit) return;
                    if (this._totalActive >= this.MAX_TOTAL_SOUNDS) return;
                }

                this._cooldowns[soundId] = now;

                // Compute stereo pan and distance-based volume from world position
                let pan = 0;
                let distanceVol = 1.0;
                if (worldX !== undefined && typeof player !== 'undefined' && player) {
                    const dx = worldX - player.x;
                    const dy = (worldY !== undefined) ? (worldY - player.y) : 0;
                    pan = Math.max(-1, Math.min(1, dx / (CANVAS_WIDTH * 0.5)));

                    // Distance-based volume attenuation
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > 200) {
                        distanceVol = Math.max(0.1, 1.0 - (dist - 200) / 1000);
                    }
                }

                // Multi-note sound (levelUp fanfare)
                if (def.notes) {
                    for (const note of def.notes) {
                        this._synth({
                            wave: def.wave,
                            freq: note.freq,
                            duration: note.duration,
                            volume: def.volume,
                            decay: def.decay,
                            noise: def.noise || 0,
                            detune: def.detune || 0,
                            filter: def.filter
                        }, now + note.delay, soundId, pan, distanceVol);
                    }
                    return;
                }

                this._synth(def, now, soundId, pan, distanceVol);
            },

            _synth(def, startTime, soundId, pan, distanceVol) {
                const ctx = this.ctx;
                const t = startTime;
                const dur = def.duration;
                const endT = t + dur;
                const vol = def.volume * (distanceVol || 1.0);

                // Track active count
                if (soundId) {
                    this._activeCounts[soundId] = (this._activeCounts[soundId] || 0) + 1;
                    this._totalActive++;
                    const sid = soundId;
                    setTimeout(() => {
                        this._activeCounts[sid] = Math.max(0, (this._activeCounts[sid] || 1) - 1);
                        this._totalActive = Math.max(0, this._totalActive - 1);
                    }, dur * 1000 + 50);
                }

                // Oscillator
                const osc = ctx.createOscillator();
                osc.type = def.wave;
                const freqStart = Array.isArray(def.freq) ? def.freq[0] : def.freq;
                const freqEnd = Array.isArray(def.freq) ? def.freq[1] : def.freq;
                osc.frequency.setValueAtTime(freqStart, t);
                if (freqStart !== freqEnd) {
                    osc.frequency.linearRampToValueAtTime(freqEnd, endT);
                }

                // Random detune for variation
                if (def.detune) {
                    osc.detune.value = (Math.random() - 0.5) * def.detune;
                }

                // Gain envelope
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(vol, t);
                if (def.decay === 'exp') {
                    gain.gain.exponentialRampToValueAtTime(0.001, endT);
                } else {
                    gain.gain.linearRampToValueAtTime(0, endT);
                }

                // Optional filter
                if (def.filter) {
                    const filt = ctx.createBiquadFilter();
                    filt.type = def.filter.type;
                    const fFreqStart = Array.isArray(def.filter.freq) ? def.filter.freq[0] : def.filter.freq;
                    const fFreqEnd = Array.isArray(def.filter.freq) ? def.filter.freq[1] : def.filter.freq;
                    filt.frequency.setValueAtTime(fFreqStart, t);
                    if (fFreqStart !== fFreqEnd) filt.frequency.linearRampToValueAtTime(fFreqEnd, endT);
                    filt.Q.value = def.filter.Q || 1;
                    osc.connect(filt);
                    filt.connect(gain);
                } else {
                    osc.connect(gain);
                }

                // Noise mix
                if (def.noise > 0) {
                    const bufferSize = Math.max(1, Math.floor(ctx.sampleRate * dur));
                    const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = noiseBuffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = (Math.random() * 2 - 1) * def.noise;
                    }
                    const noiseSrc = ctx.createBufferSource();
                    noiseSrc.buffer = noiseBuffer;
                    const noiseGain = ctx.createGain();
                    noiseGain.gain.setValueAtTime(vol, t);
                    if (def.decay === 'exp') {
                        noiseGain.gain.exponentialRampToValueAtTime(0.001, endT);
                    } else {
                        noiseGain.gain.linearRampToValueAtTime(0, endT);
                    }
                    noiseSrc.connect(noiseGain);
                    noiseGain.connect(this.sfxGain);
                    noiseSrc.start(t);
                    noiseSrc.stop(endT);
                }

                // Stereo panner
                if (pan && pan !== 0) {
                    const panner = ctx.createStereoPanner();
                    panner.pan.value = pan;
                    gain.connect(panner);
                    panner.connect(this.sfxGain);
                } else {
                    gain.connect(this.sfxGain);
                }

                osc.start(t);
                osc.stop(endT);
            },

            // === LOOPING SOUNDS ===
            startLoop(loopId) {
                if (!this.initialized || !this.ctx || this._loops[loopId]) return;
                const ctx = this.ctx;
                const now = ctx.currentTime;

                // Master gain for this loop
                const loopGain = ctx.createGain();
                loopGain.gain.setValueAtTime(0, now);
                loopGain.gain.linearRampToValueAtTime(0.08, now + 0.15); // fade in

                // Lowpass filter — keeps the sound dark
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 180;
                filter.Q.value = 1;

                // Two detuned sine oscillators for a rich low hum
                const osc1 = ctx.createOscillator();
                osc1.type = 'sine';
                osc1.frequency.value = 82;
                osc1.detune.value = -5;

                const osc2 = ctx.createOscillator();
                osc2.type = 'sine';
                osc2.frequency.value = 86;
                osc2.detune.value = 7;

                // Subtle LFO for pulsing feel
                const lfo = ctx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 3.5;
                const lfoGain = ctx.createGain();
                lfoGain.gain.value = 0.02; // subtle volume modulation
                lfo.connect(lfoGain);
                lfoGain.connect(loopGain.gain);

                // Connect: oscs → filter → loopGain → sfxGain (master chain)
                osc1.connect(filter);
                osc2.connect(filter);
                filter.connect(loopGain);
                loopGain.connect(this.sfxGain);

                osc1.start(now);
                osc2.start(now);
                lfo.start(now);

                this._loops[loopId] = { osc1, osc2, lfo, lfoGain, filter, gain: loopGain };
            },

            stopLoop(loopId) {
                const loop = this._loops[loopId];
                if (!loop) return;
                delete this._loops[loopId];

                if (!this.ctx) { return; }
                const now = this.ctx.currentTime;
                // Fade out to avoid clicks
                loop.gain.gain.cancelScheduledValues(now);
                loop.gain.gain.setValueAtTime(loop.gain.gain.value, now);
                loop.gain.gain.linearRampToValueAtTime(0, now + 0.1);

                // Stop oscillators after fade
                const stopTime = now + 0.15;
                loop.osc1.stop(stopTime);
                loop.osc2.stop(stopTime);
                loop.lfo.stop(stopTime);
            },

            stopAllLoops() {
                for (const id of Object.keys(this._loops)) {
                    this.stopLoop(id);
                }
            }
        };

        function calculateSkillFactor(runHistory) {
            if (!runHistory || runHistory.length === 0) return 1.0;

            const avgSurvival = recent.reduce((s, r) => s + r.survivalTime, 0) / recent.length;

            const waveScore = Math.min(avgWave / 18, 1.0) * 30;
            const levelScore = Math.min(avgLevel / 12, 1.0) * 30;

            if (compositeScore < 30) {
                return 0.75 + (compositeScore / 30) * 0.15;
            } else if (compositeScore < 60) {
                return 0.90 + ((compositeScore - 30) / 30) * 0.20;

        function blurCanvas(srcCanvas) {
            // Multi-pass downscale + gradual upscale blur — works on all browsers
            const w = srcCanvas.width, h = srcCanvas.height;
            // Downscale in 4 steps: 1/2 → 1/4 → 1/8 → 1/16
            const steps = [srcCanvas];
            for (let i = 0; i < 4; i++) {
                const prev = steps[i];
                const s = document.createElement('canvas');
                s.width = Math.max(1, prev.width >> 1);
                s.height = Math.max(1, prev.height >> 1);
                const sc = s.getContext('2d');
                sc.imageSmoothingEnabled = true;
                sc.imageSmoothingQuality = 'high';
                sc.drawImage(prev, 0, 0, s.width, s.height);
                steps.push(s);
            }
            // Gradual upscale back through each step for smooth blur
            let cur = steps[steps.length - 1];
            for (let i = steps.length - 2; i >= 0; i--) {
                const target = document.createElement('canvas');
                target.width = steps[i].width;
                target.height = steps[i].height;
                const tc = target.getContext('2d');
                tc.imageSmoothingEnabled = true;
                tc.imageSmoothingQuality = 'high';
                tc.drawImage(cur, 0, 0, target.width, target.height);
                cur = target;
            }
            return cur;
        }

        // Spatial Grid for collision detection optimization
        const SPATIAL_GRID_CELL_SIZE = 250;

        const spatialGrid = {
            cellSize: SPATIAL_GRID_CELL_SIZE,
            cells: new Map(),
            _queryResults: [],
            _querySeen: new Set(),
            _clearCounter: 0,

            // Numeric key: no string allocation (supports ±50,000 cell range)
            _key(cx, cy) {
                return (cx + 50000) * 100000 + (cy + 50000);
            },

            clear() {
                this._clearCounter++;
                // Periodically rebuild Map to shed stale cells from old positions
                if (this._clearCounter >= 120) {
                    this._clearCounter = 0;
                    this.cells = new Map();
                } else {
                    for (const cell of this.cells.values()) {
                        cell.length = 0;
                    }
                }
            },

            insert(entity, radius = 50) {
                const minCellX = Math.floor((entity.x - radius) / this.cellSize);
                const maxCellX = Math.floor((entity.x + radius) / this.cellSize);
                const minCellY = Math.floor((entity.y - radius) / this.cellSize);
                const maxCellY = Math.floor((entity.y + radius) / this.cellSize);

                for (let cx = minCellX; cx <= maxCellX; cx++) {
                    for (let cy = minCellY; cy <= maxCellY; cy++) {
                        const key = this._key(cx, cy);
                        let cell = this.cells.get(key);
                        if (!cell) {
                            cell = [];
                            this.cells.set(key, cell);
                        }
                        cell.push(entity);
                    }
                }
            },

            queryRadius(x, y, radius) {
                const results = this._queryResults;
                const seen = this._querySeen;
                results.length = 0;
                seen.clear();

                const minCellX = Math.floor((x - radius) / this.cellSize);
                const maxCellX = Math.floor((x + radius) / this.cellSize);
                const minCellY = Math.floor((y - radius) / this.cellSize);
                const maxCellY = Math.floor((y + radius) / this.cellSize);

                for (let cx = minCellX; cx <= maxCellX; cx++) {
                    for (let cy = minCellY; cy <= maxCellY; cy++) {
                        const cell = this.cells.get(this._key(cx, cy));
                        if (cell) {
                            for (let i = 0; i < cell.length; i++) {
                                const entity = cell[i];
                                if (!seen.has(entity)) {
                                    seen.add(entity);
                                    results.push(entity);
                                }
                            }
                        }
                    }
                }
                return results;
            }

        // Object Pool for reducing garbage collection
        class ObjectPool {
            constructor(factory, resetFn, capacity) {
                this.factory = factory;
                this.resetFn = resetFn;
                this.capacity = capacity;
                this.available = [];

                for (let i = 0; i < capacity; i++) {
                    this.available.push(factory());
                }
            }

            acquire() {
                if (this.available.length > 0) {
                    return this.available.pop();
                }
                return this.factory();
            }

            release(obj) {
                if (this.available.length < this.capacity) {
                    this.resetFn(obj);
                    this.available.push(obj);
                }
            }

            releaseAll(array) {
                for (const obj of array) {
                    this.release(obj);
                }
                array.length = 0;
            }
        }

        function lerpColor(hex1, hex2, t) {
            const r1 = parseInt(hex1.slice(1, 3), 16), g1 = parseInt(hex1.slice(3, 5), 16), b1 = parseInt(hex1.slice(5, 7), 16);
            const r2 = parseInt(hex2.slice(1, 3), 16), g2 = parseInt(hex2.slice(3, 5), 16), b2 = parseInt(hex2.slice(5, 7), 16);
            const r = Math.round(r1 + (r2 - r1) * t), g = Math.round(g1 + (g2 - g1) * t), b = Math.round(b1 + (b2 - b1) * t);
            return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;

        function updateMenuAnimation(dt) {
            menuAnimTimer += dt;
            const cx = CANVAS_WIDTH / 2;
            const targetY = CANVAS_HEIGHT / 2;
            const startY = CANVAS_HEIGHT + 60;

            // Update particles (all phases)
            for (let i = menuParticles.length - 1; i >= 0; i--) {
                const p = menuParticles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life -= dt;
                p.rotation += p.rotationSpeed * dt;
                if (p.life <= 0) menuParticles.splice(i, 1);
            }

            if (menuAnimPhase === 'exit') {
                // --- Exit transition: decelerate to stop ---
                menuExitTimer += dt;
                const t = Math.min(1, menuExitTimer / MENU_EXIT_DURATION);
                const ease = (1 - t) * (1 - t); // easeIn reversed: smooth long tail to 0

                // Decelerate background scroll
                menuCameraY -= 600 * ease * dt;

                // Shrink thruster
                menuThrusterScale = ease;
                // Spawn particles only while thruster is visible
                if (menuThrusterScale > 0.1) {
                    menuParticleTimer -= dt;
                    if (menuParticleTimer <= 0) {
                        menuParticleTimer = 0.08;
                        spawnMenuThrusterParticle(cx, menuShipY);
                    }
                }

                // Fade out UI and weapon selector
                menuUIAlpha = 1 - t;
                menuWeaponAlpha = Math.max(0, 1 - t * 3); // fades out faster

                // Reduce bob to 0
                menuShipY = targetY + Math.sin(menuBobTimer * 5.2) * 2 * ease;

                if (t >= 1) {
                    finishMenuExit();
                }
                return;
            }

            // Background always scrolling at cruise speed (entry + idle)
            menuCameraY -= 600 * dt;
            // Thruster always on
            menuThrusterScale = 1;
            // Spawn thruster particles every 0.08s
            menuParticleTimer -= dt;
            if (menuParticleTimer <= 0) {
                menuParticleTimer = 0.08;
                spawnMenuThrusterParticle(cx, menuShipY);
            }

            if (menuAnimPhase === 'entry') {
                // easeOutSine: sin(t * PI/2)
                const t = Math.min(1, menuAnimTimer / MENU_ENTRY_DURATION);
                const eased = Math.sin(t * Math.PI / 2);
                menuShipY = startY + (targetY - startY) * eased;

                // Fade in UI after MENU_UI_FADE_START
                if (t > MENU_UI_FADE_START) {
                    const uiT = (t - MENU_UI_FADE_START) / (1 - MENU_UI_FADE_START);
                    menuUIAlpha = Math.min(1, uiT * 1.5);
                }

                if (t >= 1) {
                    menuAnimPhase = 'idle';
                    menuShipY = targetY;
                    menuUIAlpha = 1;
                }
            } else if (menuAnimPhase === 'idle') {
                // idle — ship cruising, gentle bob
                menuBobTimer += dt;
                menuShipY = targetY + Math.sin(menuBobTimer * 5.2) * 2;
                menuUIAlpha = 1;
                // Fade in weapon selector
                if (menuWeaponAlpha < 1) menuWeaponAlpha = Math.min(1, menuWeaponAlpha + dt * 2.5);
            }
        }

            temporalCageTimer = 0;
            trapHexes = [];
            mineDeployTimer = 0;
            blackHoleCooldown = 0;
            lastTurretX = player.x;
            lastTurretY = player.y;
            combatStationDmgTimer = 0;
            upgradeOptions = [];
            upgradeSelectionActive = false;
            upgradeOverlay.active = false;
            upgradeOverlay.animDone = false;


            // Load and cache progression, apply permanent upgrades
            const prog = loadProgression();
            prog.stats.totalRuns++;
            saveProgression(prog);
            cachedProgression = prog;
            playerSkillFactor = calculateSkillFactor(prog.runHistory);

            // Cache bestKills for adaptive difficulty
            const bestKills = prog.stats.bestKills || 0;
            isFirstRun = bestKills === 0 && (!prog.runHistory || prog.runHistory.length === 0);
            effectiveBestKills = isFirstRun
                ? FIRST_RUN_VIRTUAL_TARGET
                : Math.max(bestKills, MIN_EFFECTIVE_BEST_KILLS);
            // Apply permanent upgrades
            const pu = prog.permanentUpgrades || {};
            permDamageMulti = 1 + (pu.powerCore || 0) * 0.04;
            playerMaxHP = PLAYER_MAX_HP + Math.floor((pu.hullPlating || 0) / 2);
            player.hp = playerMaxHP;
            permSpeedMulti = 1 + (pu.engineBoost || 0) * 0.03;
            permXPMulti = 1 + (pu.xpAmplifier || 0) * 0.05;
            permCrystalMulti = 1;

            
            spawnTimer = 0;
            spawnInterval = INITIAL_SPAWN_INTERVAL_MAX;
            lastSpawnDecayTime = 0;
            waveNumber = 0;
            waveTimer = WAVE_INTERVAL_BASE + Math.random() * WAVE_INTERVAL_VARIANCE;
            waveCalm = 0;
            recentDamageEvents = 0;
            overwhelmReduction = 0;
            lastOverwhelmCheck = -1;

            shakeIntensity = 0;
            shakeDuration = 0;
            flashColor = null;
            slowmoTimer = 0;
            
            idleTimer = 0;
        }

        // ============================================================
        // INPUT HANDLING
        // ============================================================
        
        function _initAudioOnInteraction() {
            AudioManager.init();
            if (AudioManager.ctx && AudioManager.ctx.state === 'suspended') {
                AudioManager.ctx.resume();
            }
            if (AudioManager.initialized && !MusicEngine.ctx) {
                MusicEngine.init(AudioManager.ctx);
                if (gameState === 'menu') MusicEngine.play('menu');
            }
        }

        // ─── Volume slider drag state (shared between setupInput & setupTouchControls) ───
        let draggingVolume = false;
        let draggingMusic = false;
        function getVolumeSliderBtn() {
            return currentPauseButtons.find(b => b.type === 'volume_slider') ||
                   currentMenuButtons.find(b => b.type === 'volume_slider');
        }
        function getMusicSliderBtn() {
            return currentPauseButtons.find(b => b.type === 'music_slider') ||
                   currentMenuButtons.find(b => b.type === 'music_slider');
        }
        function canvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (CANVAS_WIDTH / rect.width),
                y: (e.clientY - rect.top) * (CANVAS_HEIGHT / rect.height)
            };
        }
        function touchCanvasCoords(touch) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (touch.clientX - rect.left) * (CANVAS_WIDTH / rect.width),
                y: (touch.clientY - rect.top) * (CANVAS_HEIGHT / rect.height)
            };
        }
        function tryStartSliderDrag(c) {
            const btn = getVolumeSliderBtn();
            if (btn && c.x >= btn.x && c.x <= btn.x + btn.w &&
                c.y >= btn.y && c.y <= btn.y + btn.h) {
                draggingVolume = true;
                AudioManager.setVolume(Math.max(0, Math.min(1, (c.x - btn.sliderX) / btn.sliderW)));
                return true;
            }
            const musBtn = getMusicSliderBtn();
            if (musBtn && c.x >= musBtn.x && c.x <= musBtn.x + musBtn.w &&
                c.y >= musBtn.y && c.y <= musBtn.y + musBtn.h) {
                draggingMusic = true;
                MusicEngine.setMusicVolume(Math.max(0, Math.min(1, (c.x - musBtn.sliderX) / musBtn.sliderW)));
                return true;
            }
            return false;
        }
        function updateSliderDrag(c) {
            if (draggingVolume) {
                const btn = getVolumeSliderBtn();
                if (btn) AudioManager.setVolume(Math.max(0, Math.min(1, (c.x - btn.sliderX) / btn.sliderW)));
            }
            if (draggingMusic) {
                const musBtn = getMusicSliderBtn();
                if (musBtn) MusicEngine.setMusicVolume(Math.max(0, Math.min(1, (c.x - musBtn.sliderX) / musBtn.sliderW)));
            }
        }
        function stopSliderDrag() { draggingVolume = false; draggingMusic = false; }

        function setupInput() {
            // Init audio on the lightest possible interaction (browsers block audio until user gesture)
            window.addEventListener('touchstart', _initAudioOnInteraction, { once: true });
            window.addEventListener('pointerdown', _initAudioOnInteraction, { once: true });
            window.addEventListener('mousemove', _initAudioOnInteraction, { once: true });

            window.addEventListener('keydown', (e) => {
                keys[e.code] = true;

                // Dismiss desktop controls hint on movement key
                if (controlsHintVisible && !controlsHintFadeStart &&
                    ['KeyW','KeyA','KeyS','KeyD','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) {
                    controlsHintFadeStart = Date.now();
                }

                // Init audio on first interaction
                _initAudioOnInteraction();

                // Dismiss cheat overlay on any key
                if (showCheatOverlay) {
                    showCheatOverlay = false;
                    return;
                }

                // Handle cheat codes (only when playing)
                if (gameState === 'playing' && e.key.length === 1) {
                    cheatCodeBuffer += e.key.toLowerCase();
                    cheatCodeTimer = 2.0; // clear buffer after 2s of inactivity

                    // Check if any cheat code matches the buffer
                    for (const [code, action] of Object.entries(CHEAT_CODES)) {
                        if (cheatCodeBuffer.includes(code)) {
                            action();
                            cheatCodeBuffer = '';
                            cheatCodeTimer = 0;
                            break;
                        }
                    }

                    // Keep buffer manageable
                    if (cheatCodeBuffer.length > 20) {
                        cheatCodeBuffer = cheatCodeBuffer.slice(-10);
                    }
                }
                
                if (e.code === 'Escape') {
                    if (gameState === 'playing') {
                        AudioManager.play('pauseIn');
                        capturePauseBg();
                        gameState = 'paused';
                    } else if (gameState === 'paused') {
                        AudioManager.play('pauseOut');
                        gameState = 'playing';
                    }
                    // skilltree: no ESC close - must choose an upgrade
                }

                // P key pauses the game (skip if cheat code buffer is active)
                if (e.code === 'KeyP' && !cheatCodeBuffer) {
                    if (gameState === 'playing') {
                        capturePauseBg();
                        gameState = 'paused';
                    } else if (gameState === 'paused') {
                        gameState = 'playing';
                    }
                }

                if (e.code === 'Enter' || e.code === 'Space') {
                    if (gameState === 'menu') {
                        startGame();
                    }
                }

                // Menu: left/right to cycle starting weapon
                if (gameState === 'menu') {
                    if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
                        menuWeaponIndex = (menuWeaponIndex - 1 + STARTING_WEAPON_IDS.length) % STARTING_WEAPON_IDS.length;
                        applyWeaponTheme(STARTING_WEAPON_IDS[menuWeaponIndex]);
                    } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
                        menuWeaponIndex = (menuWeaponIndex + 1) % STARTING_WEAPON_IDS.length;
                        applyWeaponTheme(STARTING_WEAPON_IDS[menuWeaponIndex]);
                    }
                }

                // Tutorial: 1 = Orbital Shield, 2 = Missile Launcher
                if (gameState === 'tutorial') {
                    if (e.code === 'Digit1') selectTutorialWeapon('orbital_shield');
                    else if (e.code === 'Digit2') selectTutorialWeapon('missile_launcher');
                }

                // Shop navigation
                if (gameState === 'menu' && (e.code === 'KeyS' || (e.code === 'Escape' && menuMode === 'shop'))) {
                    menuMode = menuMode === 'main' ? 'shop' : 'main';
                }
                // Settings navigation
                if (gameState === 'menu' && e.code === 'Escape' && menuMode === 'settings') {
                    menuMode = 'main';
                    currentPauseButtons = [];
                }

                if (e.code === 'KeyR' && gameState === 'gameOver') {
                    startGame();
                }
                if (e.code === 'Escape' && gameState === 'gameOver') {
                    gameState = 'menu';
                    resetMenuAnimation();
                }
                if (e.code === 'Escape' && gameState === 'demoEnd') {
                    gameState = 'menu';
                    resetMenuAnimation();
                }

                // Toggle debug overlay with B key
                if (e.code === 'KeyB') {
                    showDebugOverlay = !showDebugOverlay;
                }

                // Upgrade panel: select with 1, 2, 3 keys (only after animation completes)
                if (gameState === 'skilltree' && upgradeSelectionActive && upgradeOverlay.animDone) {
                    if (e.code === 'Digit1' && upgradeOptions[0]) {
                        selectUpgrade(upgradeOptions[0]);
                    } else if (e.code === 'Digit2' && upgradeOptions[1]) {
                        selectUpgrade(upgradeOptions[1]);
                    } else if (e.code === 'Digit3' && upgradeOptions[2]) {
                        selectUpgrade(upgradeOptions[2]);
                    }
                }
                
                e.preventDefault();
            });
            
            window.addEventListener('keyup', (e) => {
                keys[e.code] = false;
            });

            // Canvas click for shop + tutorial + menu
            canvas.addEventListener('click', (e) => {
                const rect = canvas.getBoundingClientRect();
                const scaleX = CANVAS_WIDTH / rect.width;
                const scaleY = CANVAS_HEIGHT / rect.height;
                const clickX = (e.clientX - rect.left) * scaleX;
                const clickY = (e.clientY - rect.top) * scaleY;
                _initAudioOnInteraction();
                AudioManager.play('uiClick');

                if (showCheatOverlay) {
                    showCheatOverlay = false;
                    return;
                }

                if (gameState === 'paused') {
                    handlePauseClick(clickX, clickY);
                } else if (gameState === 'playing') {
                    // Hamburger menu button
                    if (clickX >= HAMBURGER_BTN.x && clickX <= HAMBURGER_BTN.x + HAMBURGER_BTN.w &&
                        clickY >= HAMBURGER_BTN.y && clickY <= HAMBURGER_BTN.y + HAMBURGER_BTN.h) {
                        AudioManager.play('pauseIn');
                        capturePauseBg();
                        gameState = 'paused';
                    }
                } else if (gameState === 'skilltree') {
                    handleUpgradeClick(clickX, clickY);
                } else if (gameState === 'tutorial') {
                    handleTutorialClick(clickX, clickY);
                } else if (gameState === 'demoEnd') {
                    handleDemoEndClick(clickX, clickY);
                } else if (gameState === 'menu' || gameState === 'gameOver') {
                    handleMenuClick(clickX, clickY);
                }
            });

            // Mouse slider drag
            canvas.addEventListener('mousedown', (e) => {
                if (gameState !== 'paused' && !(gameState === 'menu' && menuMode === 'settings')) return;
                tryStartSliderDrag(canvasCoords(e));
            });
            canvas.addEventListener('mousemove', (e) => {
                if (!draggingVolume && !draggingMusic) return;
                updateSliderDrag(canvasCoords(e));
            });
            window.addEventListener('mouseup', stopSliderDrag);

        }
        
        function updateInput() {
            input.rotateLeft = keys['ArrowLeft'] || keys['KeyA'];
            input.rotateRight = keys['ArrowRight'] || keys['KeyD'];
            input.thrust = keys['ArrowUp'] || keys['KeyW'];
            input.reverse = keys['ArrowDown'] || keys['KeyS'];
            // Apply touch input
            if (joystickActive) {
                if (joystickMagnitude > JOYSTICK_THRUST_THRESHOLD) {
                    input.thrust = true;
                }
                // Joystick rotation handled directly in player update
            }
            
        }
        
        function setupTouchControls() {
            const joystickZone = document.getElementById('joystickZone');
            const joystickBase = document.getElementById('joystickBase');
            const joystickKnob = document.getElementById('joystickKnob');

            let joystickTouch = null;
            const baseRect = { x: 30, y: 0, cx: 90, cy: 0 };
            
            joystickZone.addEventListener('touchstart', (e) => {

                // Init audio on first touch
                _initAudioOnInteraction();

                // Helper to convert touch to canvas coordinates
                function touchToCanvas(touch) {
                    const rect = canvas.getBoundingClientRect();
                    return {
                        x: (touch.clientX - rect.left) * (CANVAS_WIDTH / rect.width),
                        y: (touch.clientY - rect.top) * (CANVAS_HEIGHT / rect.height)
                    };
                }

                if (gameState === 'paused') {
                    const coords = touchToCanvas(e.touches[0]);
                    // Try slider drag first, fall back to button tap
                    if (!tryStartSliderDrag(coords)) {
                        handlePauseClick(coords.x, coords.y);
                    }
                    e.preventDefault();
                    return;
                }

                if (gameState === 'playing') {
                    const coords = touchToCanvas(e.touches[0]);
                    if (coords.x >= HAMBURGER_BTN.x && coords.x <= HAMBURGER_BTN.x + HAMBURGER_BTN.w &&
                        coords.y >= HAMBURGER_BTN.y && coords.y <= HAMBURGER_BTN.y + HAMBURGER_BTN.h) {
                        AudioManager.play('pauseIn');
                        capturePauseBg();
                        gameState = 'paused';
                        e.preventDefault();
                        return;
                    }
                }

                if (gameState === 'demoEnd') {
                    const coords = touchToCanvas(e.touches[0]);
                    handleDemoEndClick(coords.x, coords.y);
                    return;
                }

                if (gameState === 'menu' || gameState === 'gameOver') {
                    const coords = touchToCanvas(e.touches[0]);
                    if (menuMode === 'settings') {
                        tryStartSliderDrag(coords);
                    }
                    handleMenuClick(coords.x, coords.y);
                    return;
                }

                if (gameState === 'tutorial') {
                    const coords = touchToCanvas(e.touches[0]);
                    handleTutorialClick(coords.x, coords.y);
                    return;
                }

                if (gameState === 'skilltree') {
                    const coords = touchToCanvas(e.touches[0]);
                    handleUpgradeClick(coords.x, coords.y);
                    return;
                }

                joystickTouch = e.touches[0];
                joystickActive = true;

                // Position joystick centered at touch point
                joystickBase.style.left = (joystickTouch.clientX - 80) + 'px';
                joystickBase.style.top = (joystickTouch.clientY - 80) + 'px';
                joystickBase.style.bottom = 'auto';
                joystickBase.style.transform = 'none';

                // Reset knob to center
                joystickKnob.style.left = '52px';
                joystickKnob.style.top = '52px';
                joystickMagnitude = 0;

                e.preventDefault();
            });

            joystickZone.addEventListener('touchmove', (e) => {
                if (draggingVolume || draggingMusic) {
                    const rect = canvas.getBoundingClientRect();
                    const c = {
                        x: (e.touches[0].clientX - rect.left) * (CANVAS_WIDTH / rect.width),
                        y: (e.touches[0].clientY - rect.top) * (CANVAS_HEIGHT / rect.height)
                    };
                    updateSliderDrag(c);
                    e.preventDefault();
                    return;
                }
                if (joystickActive) {
                    joystickTouch = e.touches[0];
                    updateJoystick(joystickTouch);
                }
                e.preventDefault();
            });

            joystickZone.addEventListener('touchend', () => {
                if (draggingVolume || draggingMusic) {
                    stopSliderDrag();
                    return;
                }
                joystickActive = false;
                joystickMagnitude = 0;
                joystickKnob.style.left = '52px';
                joystickKnob.style.top = '52px';

                // Reset joystick to default position (bottom center)
                joystickBase.style.left = '50%';
                joystickBase.style.top = 'auto';
                joystickBase.style.bottom = '80px';
                joystickBase.style.transform = 'translateX(-50%)';
            });
            
            function updateJoystick(touch) {
                const rect = joystickBase.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;

                let dx = touch.clientX - centerX;
                let dy = touch.clientY - centerY;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > JOYSTICK_MAX_DISTANCE) {
                    dx = (dx / dist) * JOYSTICK_MAX_DISTANCE;
                    dy = (dy / dist) * JOYSTICK_MAX_DISTANCE;
                }

                joystickKnob.style.left = (52 + dx) + 'px';
                joystickKnob.style.top = (52 + dy) + 'px';

                joystickMagnitude = Math.min(dist / JOYSTICK_MAX_DISTANCE, 1);
                joystickAngle = Math.atan2(dy, dx) * 180 / Math.PI;
            }

        }

        // ============================================================
        // COORDINATE SYSTEM
        // ============================================================

        // Convert world coordinates to screen coordinates
        function worldToScreen(worldX, worldY) {
            return {
                x: worldX - camera.x + CANVAS_WIDTH / 2,
                y: worldY - camera.y + CANVAS_HEIGHT / 2
            };
        }

        // Convert screen coordinates to world coordinates
        function screenToWorld(screenX, screenY) {
            return {
                x: screenX + camera.x - CANVAS_WIDTH / 2,
                y: screenY + camera.y - CANVAS_HEIGHT / 2
            };
        }

        // Check if position is within camera view (with padding)
        function isInView(worldX, worldY, padding = 100) {
            const screen = worldToScreen(worldX, worldY);
            return screen.x >= -padding &&
                   screen.x <= CANVAS_WIDTH + padding &&
                   screen.y >= -padding &&
                   screen.y <= CANVAS_HEIGHT + padding;
        }

        // Check if entity should be rendered based on distance from camera
        function shouldRenderEntity(entity, distanceThreshold) {
            const dx = entity.x - camera.x;
            const dy = entity.y - camera.y;
            const distSq = dx * dx + dy * dy;
            return distSq < distanceThreshold * distanceThreshold;
        }

        // ============================================================
        // SECTOR BOUNDARY SYSTEM
        // ============================================================

        function checkSectorBoundary() {
            if (!player) return;

            let transportX = 0;
            let transportY = 0;

            // Check X boundaries
            if (player.x > camera.x + SECTOR_BOUNDS.maxX) {
                // Player exited right side of center sector
                transportX = -3 * SECTOR_WIDTH;
                player.x += transportX;
            } else if (player.x < camera.x + SECTOR_BOUNDS.minX) {
                // Player exited left side of center sector
                transportX = 3 * SECTOR_WIDTH;
                player.x += transportX;
            }

            // Check Y boundaries
            if (player.y > camera.y + SECTOR_BOUNDS.maxY) {
                // Player exited bottom of center sector
                transportY = -3 * SECTOR_HEIGHT;
                player.y += transportY;
            } else if (player.y < camera.y + SECTOR_BOUNDS.minY) {
                // Player exited top of center sector
                transportY = 3 * SECTOR_HEIGHT;
                player.y += transportY;
            }

            // If transport occurred, transport all entities
            if (transportX !== 0 || transportY !== 0) {
                transportEntities(transportX, transportY);
            }
        }

        function transportEntities(offsetX, offsetY) {
            // Transport all entity types
            const entityPools = [
                enemies,
                bullets,
                enemyBullets,
                particles,
                pickups,
                drones
            ];

            for (const pool of entityPools) {
                for (const entity of pool) {
                    entity.x += offsetX;
                    entity.y += offsetY;
                }
            }

            // Transport floating texts
            for (const text of floatingTexts) {
                text.x += offsetX;
                text.y += offsetY;
            }

            // Transport lightning effects
            for (const effect of lightningEffects) {
                if (effect.points) {
                    for (const pt of effect.points) {
                        pt.x += offsetX;
                        pt.y += offsetY;
                    }
                }
            }

            // Transport nova beam effects
            for (const beam of novaBeamEffects) {
                beam.x1 += offsetX; beam.y1 += offsetY;
                beam.x2 += offsetX; beam.y2 += offsetY;
            }

            // Transport nebulas (for parallax consistency)
            for (const nebula of nebulas) {
                nebula.x += offsetX;
                nebula.y += offsetY;
            }

            // Transport snares
            for (const s of snares) {
                s.x += offsetX;
                s.y += offsetY;
            }

            // Transport slash effects and rift zones
            for (const s of slashEffects) {
                s.x += offsetX;
                s.y += offsetY;
            }
            for (const r of riftZones) {
                r.x += offsetX;
                r.y += offsetY;
            }

            // Transport mines and radiation fields
            for (const m of mines) {
                m.x += offsetX;
                m.y += offsetY;
            }
            for (const rf of radiationFields) {
                rf.x += offsetX;
                rf.y += offsetY;
            }

            // Transport turrets
            for (const t of turrets) {
                t.x += offsetX;
                t.y += offsetY;
            }
            lastTurretX += offsetX;
            lastTurretY += offsetY;

            // Transport trap hexes
            for (const th of trapHexes) {
                th.x += offsetX;
                th.y += offsetY;
            }

            // Transport siphon beam origins
            for (const sb of beamState.siphonBeams) {
                sb.x += offsetX;
                sb.y += offsetY;
            }

            // Update camera to follow player instantly (no lerp during transport)
            camera.x = player.x;
            camera.y = player.y;
            camera.targetX = player.x;
            camera.targetY = player.y;
        }

        // ============================================================
        // CAMERA UPDATE
        // ============================================================

        function updateCamera() {
            if (!player) return;

            // Camera fixed to player (no smoothing)
            camera.x = player.x;
            camera.y = player.y;
            camera.targetX = player.x;
            camera.targetY = player.y;
        }

        // ============================================================
        // GAME LOOP
        // ============================================================

        function gameLoop(timestamp) {
            _frameCounter++;

            // Calculate delta time
            if (lastTime === 0) lastTime = timestamp;
            const rawDt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            
            // Performance monitoring
            frameTimeAccum += rawDt * 1000;
            frameCount++;
            if (frameCount >= 30) {
                avgFrameTime = frameTimeAccum / frameCount;
                lowPerfMode = avgFrameTime > 40;
                frameTimeAccum = 0;
                frameCount = 0;
            }
            
            // Apply time scale (for slow-mo)
            deltaTime = Math.min(rawDt, 0.1) * timeScale;
            
            // Update time scale (shield break sequence controls timeScale directly)
            if (!shieldBreakState) {
                if (slowmoTimer > 0) {
                    slowmoTimer -= rawDt * 1000;
                    timeScale = currentSlowmoFactor;
                } else {
                    timeScale = 1;
                    currentSlowmoFactor = SLOWMO_FACTOR;
                }
            }
            
            // Show/hide joystick based on game state (mobile only)
            const showJoystick = gameState === 'playing';
            joystickBaseEl.style.display = showJoystick ? 'block' : 'none';

            // Volume ducking: lower SFX when not actively playing
            if (gameState === 'paused' || gameState === 'skilltree') {
                AudioManager.duck();
                AudioManager.stopAllLoops();
            } else {
                AudioManager.unduck();
            }

            // Sync music: menu song in menu/shop/tutorial, calm song during gameplay/pause/skilltree
            if (gameState === 'menu' || gameState === 'shop' || gameState === 'tutorial') {
                if ((!MusicEngine.playing || MusicEngine.currentSongId !== 'menu') && MusicEngine.ctx) MusicEngine.play('menu');
            } else if (gameState === 'playing' || gameState === 'paused' || gameState === 'skilltree') {
                if ((!MusicEngine.playing || MusicEngine.currentSongId !== 'calm') && MusicEngine.ctx) MusicEngine.play('calm');
            } else {
                if (MusicEngine.playing) MusicEngine.stop();
            }

            // Update based on game state
            if (gameState === 'menu') {
                updateMenuAnimation(Math.min(rawDt, 0.1));
            } else if (gameState === 'playing') {
                update(rawDt);
            } else if (gameState === 'skilltree' && upgradeOverlay.active) {
                upgradeOverlay.animTime += Math.min(rawDt, 0.1);
            }

            // Always render
            render();
            
            requestAnimationFrame(gameLoop);
        }
        
        function update(rawDt) {
            updateInput();

            gameTime += deltaTime;
            idleTimer += deltaTime;
            separationFrame++;


            // Auto-clear cheat code buffer after inactivity
            if (cheatCodeTimer > 0) {
                cheatCodeTimer -= deltaTime;
                if (cheatCodeTimer <= 0) {
                    cheatCodeBuffer = '';
                    cheatCodeTimer = 0;
                }
            }

            // Update wave alert timer
            if (waveAlertActive) {
                waveAlertTimer += deltaTime;
                if (waveAlertTimer >= WAVE_ALERT_DURATION) {
                    waveAlertActive = false;
                }
            }

            // Rebuild spatial grid for collision detection optimization
            spatialGrid.clear();
            for (const e of enemies) {
                if (e.dead) continue;
                const config = ENEMY_TYPES[e.type];
                spatialGrid.insert(e, config.radius + 100);
            }

            // Update performance monitor
            perfMonitor.update(deltaTime);

            // Update player FIRST (so camera can follow in same frame)
            updatePlayer();

            // Update camera immediately after player moves (prevents jitter)

        function updateShieldArcState(deltaTime) {
            if (!player) return;

            const shieldPercent = player.shield / PLAYER_MAX_SHIELD;
            const isRegenerating = player.shieldRegenTimer >= SHIELD_REGEN_DELAY &&
                                   player.shield < PLAYER_MAX_SHIELD;
            const isLow = shieldPercent <= SHIELD_ARC_LOW_THRESHOLD && shieldPercent > 0;

            // Detect shield damage (shield decreased)
            if (player.shield < player.shieldArcLastValue) {
                // Instant visibility on damage
                player.shieldArcTargetOpacity = SHIELD_ARC_HIT_OPACITY;
                player.shieldArcOpacity = SHIELD_ARC_HIT_OPACITY;
                player.shieldArcFlashTimer = SHIELD_ARC_FLASH_DURATION;
                player.shieldArcFlashColor = '#FFFFFF';
                player.shieldArcIdleTimer = 0;
            }
            player.shieldArcLastValue = player.shield;

            // Update flash timer
            if (player.shieldArcFlashTimer > 0) {
                player.shieldArcFlashTimer -= deltaTime;
                if (player.shieldArcFlashTimer <= 0) {
                    player.shieldArcFlashColor = null;
                }
            }

            // Determine target opacity based on state (priority order)
            if (isLow) {
                // LOW: Always visible with warning
                player.shieldArcTargetOpacity = SHIELD_ARC_HIT_OPACITY;
                player.shieldArcIdleTimer = 0;
            } else if (player.shieldArcFlashTimer > 0) {
                // HIT: Keep visible during flash
                player.shieldArcTargetOpacity = SHIELD_ARC_HIT_OPACITY;
            } else if (isRegenerating) {
                // REGEN: Semi-visible
                player.shieldArcTargetOpacity = SHIELD_ARC_REGEN_OPACITY;
                player.shieldArcIdleTimer = 0;
            } else if (shieldPercent >= 1.0) {
                // FULL: Fade to idle after delay
                player.shieldArcIdleTimer += deltaTime;
                if (player.shieldArcIdleTimer >= SHIELD_ARC_FADE_DELAY) {
                    player.shieldArcTargetOpacity = SHIELD_ARC_IDLE_OPACITY;
                }
            } else {
                // IDLE: Fade after inactivity
                player.shieldArcIdleTimer += deltaTime;
                if (player.shieldArcIdleTimer >= SHIELD_ARC_FADE_DELAY) {
                    player.shieldArcTargetOpacity = SHIELD_ARC_IDLE_OPACITY;
                }
            }

            // Animate opacity with lerp (fast on hit, slow otherwise)
            const opacitySpeed = player.shieldArcFlashTimer > 0 ? 20 : 3;
            player.shieldArcOpacity += (player.shieldArcTargetOpacity - player.shieldArcOpacity) *
                                       opacitySpeed * deltaTime;

            // Update pulse phase for regen/low animation
            player.shieldArcPulsePhase += deltaTime * 5;
        }

        // ============================================================
        // PLAYER
        // ============================================================

        function updatePlayer() {
            if (!player) return;
            
            // Rotation
            let targetRotation = 0;
            if (input.rotateLeft) targetRotation -= ROTATION_SPEED;
            if (input.rotateRight) targetRotation += ROTATION_SPEED;
            
            // Touch joystick rotation - almost instant rotation towards joystick direction
            if (joystickActive && joystickMagnitude > JOYSTICK_DEADZONE) {
                const angleDiff = normalizeAngle(joystickAngle - player.angle);
                if (Math.abs(angleDiff) > JOYSTICK_ROTATION_THRESHOLD) {
                    // Near-instant rotation: lerp 90% of the way each frame
                    player.angle = player.angle + angleDiff * 0.1;
                    targetRotation = 0; // Bypass normal rotation system
                }
            }
            
            player.angle += targetRotation * deltaTime;
            
            // Thrust
            const rad = player.angle * Math.PI / 180;
            let accel = 0;
            
            if (input.thrust) {
                accel = THRUST_ACCEL * permSpeedMulti;
                player.thrusterScale = Math.min(1, player.thrusterScale + deltaTime / 0.08);
                idleTimer = 0;
                // Thrust effort: how hard the engine works (1 = fighting velocity, 0 = cruising)
                const dot = player.vx * Math.cos(rad) + player.vy * Math.sin(rad);
                const maxSpd = MAX_SPEED * permSpeedMulti;
                const targetEffort = Math.max(0, Math.min(1, (1 - dot / maxSpd) * 0.5));
                player.thrustEffort += (targetEffort - player.thrustEffort) * Math.min(1, deltaTime / 0.15);
            } else if (input.reverse) {
                accel = -REVERSE_ACCEL * permSpeedMulti;
                idleTimer = 0;
            }

            if (!input.thrust) {
                player.thrusterScale = Math.max(0, player.thrusterScale - deltaTime / 0.12);
                player.thrustEffort += (0 - player.thrustEffort) * Math.min(1, deltaTime / 0.12);
            }
            
            player.vx += Math.cos(rad) * accel * deltaTime / PLAYER_MASS;
            player.vy += Math.sin(rad) * accel * deltaTime / PLAYER_MASS;
            
            // Apply drag
            const dragMult = Math.exp(-DRAG_FACTOR * deltaTime);
            player.vx *= dragMult;
            player.vy *= dragMult;
            
            // Clamp speed
            const speed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
            const effectiveMaxSpeed = MAX_SPEED * permSpeedMulti;
            if (speed > effectiveMaxSpeed) {
                player.vx = (player.vx / speed) * effectiveMaxSpeed;
                player.vy = (player.vy / speed) * effectiveMaxSpeed;
            }
            
            // Position update
            player.x += player.vx * deltaTime;
            player.y += player.vy * deltaTime;

            // Invulnerability
            player.invulnerable = Math.max(0, player.invulnerable - deltaTime);

            // Shield recharge animation (after shield break)
            if (shieldRechargeTimer > 0) {
                shieldRechargeTimer -= deltaTime;
                const rechargeProgress = 1 - Math.max(0, shieldRechargeTimer) / SHIELD_RECHARGE_DURATION;
                player.shield = PLAYER_MAX_SHIELD * rechargeProgress;
                if (shieldRechargeTimer <= 0) {
                    shieldRechargeTimer = 0;
                    player.shield = PLAYER_MAX_SHIELD;
                    AudioManager.play('shieldRecharge');
                }
            }

            // Shield regeneration (normal, skipped during recharge)
            player.shieldFlashTimer = Math.max(0, player.shieldFlashTimer - deltaTime);
            player.shieldRegenTimer += deltaTime;
            if (shieldRechargeTimer <= 0 && player.shieldRegenTimer >= SHIELD_REGEN_DELAY && player.shield < PLAYER_MAX_SHIELD) {
                player.shield = Math.min(PLAYER_MAX_SHIELD, player.shield + SHIELD_REGEN_RATE * deltaTime);
            }

            // Update shield arc visibility state
            updateShieldArcState(deltaTime);

            // Nova beam heat decay (cools down when not firing)
            if (novaBeamHeat > 0) {
                novaBeamHeat = Math.max(0, novaBeamHeat - deltaTime * 0.5);
            }

            // Auto-fire laser (only when enemy is in aim cone, only for laser cannon)
            player.fireTimer -= deltaTime;
            if (activeWeapons.includes('laser_cannon') && player.fireTimer <= 0 && hasEnemyInAimCone()) {
                fireBullet();
                player.fireTimer = getWeaponStats().fireRate;
            }

            // Auto-fire rockets (independent system, 360º detection)
            if (!player.rocketTimer) player.rocketTimer = 0;
            player.rocketTimer -= deltaTime;
            const stats = getWeaponStats();
            // Armageddon timer (counts down independently)
            if (stats.hasArmageddon) {
                armageddonTimer -= deltaTime;
            }
            if (stats.hasRockets && player.rocketTimer <= 0) {
                const nearbyEnemies = spatialGrid.queryRadius(player.x, player.y, 600);
                if (stats.hasArmageddon && armageddonTimer <= 0 && nearbyEnemies.length > 0) {
                    fireArmageddonMissile(nearbyEnemies, stats);
                    armageddonTimer = 8.0;
                } else {
                    fireRocket(nearbyEnemies, stats);
                }
                // Cooldown fijo de 1.0s (la habilidad ahora aumenta la ráfaga, no la cadencia)
                player.rocketTimer = 1.0;
            }

            // Auto-fire lightning (independent system, 360º detection)
            if (!player.lightningTimer) player.lightningTimer = 0;
            player.lightningTimer -= deltaTime;
            if (stats.hasLightning && player.lightningTimer <= 0) {
                const nearbyEnemies = spatialGrid.queryRadius(player.x, player.y, stats.lightningRange);
                const rangeSq = stats.lightningRange * stats.lightningRange;
                if (nearbyEnemies.length > 0) {
                    fireLightning(nearbyEnemies, stats);
                    player.lightningTimer = stats.lightningCadence;
                }
            }

            // Idle bob
            if (idleTimer > 2) {
                player.bobTimer += deltaTime;
                player.bobOffset = Math.sin(player.bobTimer * 5.2) * 2;
            } else {
                player.bobOffset *= 0.9;
            }
            
            // Spawn thruster particles at fixed interval
            if (player.thrusterScale > 0.3) {
                player.thrusterParticleTimer -= deltaTime;
                if (player.thrusterParticleTimer <= 0) {
                    spawnThrusterParticle();
                    player.thrusterParticleTimer = THRUSTER_PARTICLE_INTERVAL;
                }
            } else {
                player.thrusterParticleTimer = 0;
            }
        }
