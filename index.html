                if (shouldRenderEntity(e, CULLING_DISTANCES.enemies)) {
                    byType[e.type].push(e);
                }
            }

            // Batch render scouts (no shadowBlur for performance)
            if (byType.SCOUT.length > 0) {
                const config = ENEMY_TYPES['SCOUT'];
                ctx.strokeStyle = config.color;
                ctx.lineWidth = 3;

                for (const e of byType.SCOUT) {
                    ctx.save();
                    ctx.translate(e.x, e.y);
                    ctx.rotate(e.angle * Math.PI / 180);

                    ctx.beginPath();
                    ctx.arc(0, 0, config.radius, 0, Math.PI * 2);
                    ctx.stroke();

                    ctx.globalAlpha = 0.4;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(0, 0, config.radius * 0.6, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.globalAlpha = 1;

                    ctx.restore();
                }
            }

            // Batch render kamikazes with trail (no shadowBlur for performance)
            if (byType.KAMIKAZE.length > 0) {
                const config = ENEMY_TYPES['KAMIKAZE'];

                for (const e of byType.KAMIKAZE) {
                    // Draw trail as fading line (same as rocket trail)
                    if (e.trail && e.trail.length > 1) {
                        for (let t = 0; t < e.trail.length - 1; t++) {
                            const alpha = (t + 1) / e.trail.length;
                            const width = 2 * alpha;
                            ctx.strokeStyle = `rgba(255, 154, 107, ${alpha * 0.6})`;
                            ctx.lineWidth = width;
                            ctx.beginPath();
                            ctx.moveTo(e.trail[t].x, e.trail[t].y);
                            ctx.lineTo(e.trail[t + 1].x, e.trail[t + 1].y);
                            ctx.stroke();
                        }
                    }

                    // Draw kamikaze shape
                    ctx.strokeStyle = config.color;
                    ctx.lineWidth = 3;
                    ctx.save();
                    ctx.translate(e.x, e.y);
                    ctx.rotate(e.angle * Math.PI / 180);

                    ctx.beginPath();
                    ctx.moveTo(config.radius, 0);
                    ctx.lineTo(-config.radius, -config.radius * 0.7);
                    ctx.lineTo(-config.radius * 0.5, 0);
                    ctx.lineTo(-config.radius, config.radius * 0.7);
                    ctx.closePath();
                    ctx.stroke();

                    ctx.restore();
                }
            }

            // Batch render tanks (no shadowBlur for performance)
            if (byType.TANK.length > 0) {
                const config = ENEMY_TYPES['TANK'];
                ctx.strokeStyle = config.color;
                ctx.lineWidth = 3;

                for (const e of byType.TANK) {
                    ctx.save();
                    ctx.translate(e.x, e.y);
                    ctx.rotate(e.angle * Math.PI / 180);

                    ctx.beginPath();
                    ctx.arc(0, 0, config.radius, 0, Math.PI * 2);
                    ctx.stroke();

                    ctx.globalAlpha = 0.4;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(0, 0, config.radius * 0.6, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.globalAlpha = 1;

                    ctx.restore();
                }
            }

            // Batch render aliens (large enemies)
            if (byType.ALIEN.length > 0) {
                const config = ENEMY_TYPES['ALIEN'];

                for (const e of byType.ALIEN) {
                    ctx.save();
                    ctx.translate(e.x, e.y);
                    ctx.rotate(e.angle * Math.PI / 180);

                    // Outer circle
                    ctx.strokeStyle = config.color;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(0, 0, config.radius, 0, Math.PI * 2);
                    ctx.stroke();

                    // Inner detail circle (same style as scout/tank)
                    ctx.globalAlpha = 0.4;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(0, 0, config.radius * 0.6, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.globalAlpha = 1;

                    // Pulsing core
                    ctx.fillStyle = config.color;
                    ctx.globalAlpha = 0.3 + Math.sin(gameTime * 5) * 0.15;
                    ctx.beginPath();
                    ctx.arc(0, 0, config.radius * 0.3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;

                    ctx.restore();
                }
            }

            // Batch render berserkers with trail (no shadowBlur for performance)
            if (byType.BERSERKER.length > 0) {
                const config = ENEMY_TYPES['BERSERKER'];

                for (const e of byType.BERSERKER) {
                    // Draw trail (wider and more intense than kamikaze)
                    if (e.trail && e.trail.length > 1) {
                        for (let t = 0; t < e.trail.length - 1; t++) {
                            const alpha = (t + 1) / e.trail.length;
                            const width = 3.5 * alpha;
                            ctx.strokeStyle = `rgba(255, 68, 34, ${alpha * 0.7})`;
                            ctx.lineWidth = width;
                            ctx.beginPath();
                            ctx.moveTo(e.trail[t].x, e.trail[t].y);
                            ctx.lineTo(e.trail[t + 1].x, e.trail[t + 1].y);
                            ctx.stroke();
                        }
                    }

                    // Draw berserker diamond (same shape as kamikaze, bigger)
                    ctx.strokeStyle = config.color;
                    ctx.lineWidth = 3.5;
                    ctx.save();
                    ctx.translate(e.x, e.y);
                    ctx.rotate(e.angle * Math.PI / 180);

                    // Outer diamond
                    ctx.beginPath();
                    ctx.moveTo(config.radius, 0);
                    ctx.lineTo(-config.radius, -config.radius * 0.7);
                    ctx.lineTo(-config.radius * 0.5, 0);
                    ctx.lineTo(-config.radius, config.radius * 0.7);
                    ctx.closePath();
                    ctx.stroke();

                    // Inner detail diamond
                    ctx.strokeStyle = config.outline;
                    ctx.lineWidth = 1.5;
                    ctx.globalAlpha = 0.5;
                    const inner = 0.55;
                    ctx.beginPath();
                    ctx.moveTo(config.radius * inner, 0);
                    ctx.lineTo(-config.radius * inner, -config.radius * 0.7 * inner);
                    ctx.lineTo(-config.radius * 0.5 * inner, 0);
                    ctx.lineTo(-config.radius * inner, config.radius * 0.7 * inner);
                    ctx.closePath();
                    ctx.stroke();
                    ctx.globalAlpha = 1;

                    ctx.restore();
                }
            }

            // Batch render leviathans (largest circular enemy)
            if (byType.LEVIATHAN.length > 0) {
                const config = ENEMY_TYPES['LEVIATHAN'];

                for (const e of byType.LEVIATHAN) {
                    ctx.save();
                    ctx.translate(e.x, e.y);

                    // Outer circle
                    ctx.strokeStyle = config.color;
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.arc(0, 0, config.radius, 0, Math.PI * 2);
                    ctx.stroke();

                    // Middle detail ring
                    ctx.strokeStyle = config.outline;
                    ctx.lineWidth = 2;
                    ctx.globalAlpha = 0.5;
                    ctx.beginPath();
                    ctx.arc(0, 0, config.radius * 0.75, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.globalAlpha = 1;

                    // Inner detail circle
                    ctx.globalAlpha = 0.4;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(0, 0, config.radius * 0.5, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.globalAlpha = 1;

                    // Pulsing core
                    ctx.fillStyle = config.color;
                    ctx.globalAlpha = 0.25 + Math.sin(gameTime * 3) * 0.15;
                    ctx.beginPath();
                    ctx.arc(0, 0, config.radius * 0.25, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;

                    ctx.restore();
                }
            }

            ctx.shadowBlur = 0;
        }

        function renderPickups() {
            for (const p of pickups) {
                // Skip rendering if too far from camera
                if (!shouldRenderEntity(p, CULLING_DISTANCES.pickups)) continue;

                const bob = Math.sin(p.bobTimer * 4) * 3;
                const pulse = 1 + Math.sin(p.bobTimer * 6) * 0.1;
                
                ctx.save();
                ctx.translate(p.x, p.y + bob);
                ctx.scale(pulse, pulse);
                
                // Outline style
                if (p.type === 'health') {
                    ctx.strokeStyle = COLORS.POWERUP;
                    ctx.shadowColor = COLORS.POWERUP;
                } else {
                    ctx.strokeStyle = COLORS.GOLD;
                    ctx.shadowColor = COLORS.GOLD;
                }
                ctx.lineWidth = 2.5;
                ctx.shadowBlur = ENABLE_GLOW_EFFECTS ? 12 : 0;

                // Fade when about to expire
                if (p.life < 2) {
                    ctx.globalAlpha = p.life / 2;
                }

                if (p.type === 'health') {
                    // Diamond shape - outline only
                    ctx.beginPath();
                    ctx.moveTo(0, -10);
                    ctx.lineTo(8, 0);
                    ctx.lineTo(0, 10);
                    ctx.lineTo(-8, 0);
                    ctx.closePath();
                    ctx.stroke();
                }
                
                ctx.shadowBlur = 0;
                ctx.restore();
            }
        }
        
        function renderParticles() {
            for (const p of particles) {
                // Skip rendering if too far from camera
                if (!shouldRenderEntity(p, CULLING_DISTANCES.particles)) continue;

                const alpha = p.life / p.maxLife;
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = ENABLE_GLOW_EFFECTS ? 6 : 0;
                ctx.lineWidth = 2;

                if (p.type === 'shockwave') {
                    // Expanding ring effect
                    const progress = 1 - (p.life / p.maxLife);
                    const currentSize = p.size + (p.maxSize - p.size) * progress;
                    ctx.lineWidth = 3 * alpha;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, currentSize, 0, Math.PI * 2);
                    ctx.stroke();
                } else if (p.type === 'spark') {
                    // Line spark style
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle * Math.PI / 180);
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(p.size * 1.5, 0);
                    ctx.stroke();
                    ctx.restore();
                } else if (p.type === 'thruster') {
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation || 0);
                    ctx.fillStyle = p.color;
                    const s = p.size;
                    if (p.thrusterShape === 'square') {
                        const hs = s * 0.4;
                        ctx.fillRect(-hs, -hs, hs * 2, hs * 2);
                    } else if (p.thrusterShape === 'circle') {
                        ctx.beginPath();
                        ctx.arc(0, 0, s * 0.4, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.beginPath();
                        ctx.moveTo(0, -s * 0.6);
                        ctx.lineTo(s * 0.5, s * 0.4);
                        ctx.lineTo(-s * 0.5, s * 0.4);
                        ctx.closePath();
                        ctx.fill();
                    }
                    ctx.restore();
                } else if (p.type === 'ring') {
                    // Expanding ring for drone explosions (efficient)
                    const progress = 1 - (p.life / p.maxLife);
                    const radius = p.size + (p.maxSize - p.size) * progress;
                    ctx.lineWidth = 3 * alpha;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
                    ctx.stroke();
                } else if (p.type === 'sonic_ring') {
                    // Sonic shockwave ring for piercing bullets (ellipse = circle seen from side)
                    const progress = 1 - (p.life / p.maxLife);
                    const radius = p.size + (p.maxSize - p.size) * progress;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle);
                    ctx.scale(0.25, 1);
                    ctx.lineWidth = (2.5 - progress * 2) * alpha;
                    ctx.beginPath();
                    ctx.arc(0, 0, radius, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                } else {
                    // Small line spark
                    const angle = Math.atan2(p.vy || 0, p.vx || 0);
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x + Math.cos(angle) * p.size * 2, p.y + Math.sin(angle) * p.size * 2);
                    ctx.stroke();
                }
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }
        
        function renderFloatingTexts() {
            ctx.textAlign = 'center';
            ctx.font = 'bold 16px "Segoe UI", sans-serif';

            for (const t of floatingTexts) {
                // Skip rendering if too far from camera
                if (!shouldRenderEntity(t, CULLING_DISTANCES.floatingTexts)) continue;

                const alpha = t.life / t.maxLife;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = t.color;
                ctx.shadowColor = t.color;
                ctx.shadowBlur = ENABLE_GLOW_EFFECTS ? 4 : 0;
                ctx.fillText(t.text, t.x, t.y);
            }
            
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }
        
        // ============================================================
        // GRAVITY MINES RENDERING
        // ============================================================

        function renderTurrets() {
            if (turrets.length === 0) return;
            const stats = getWeaponStats();

            for (const t of turrets) {
                if (!shouldRenderEntity(t, CULLING_DISTANCES.enemies)) continue;

                const lifeRatio = t.life / t.maxLife;
                const baseAlpha = 0.4 + lifeRatio * 0.6;

                // Range circle (skip in low perf)
                if (!lowPerfMode) {
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, stats.turretRange, 0, Math.PI * 2);
                    ctx.strokeStyle = COLORS.PLAYER;
                    ctx.globalAlpha = 0.08;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }

                // Hexagonal base
                ctx.save();
                ctx.translate(t.x, t.y);

                ctx.beginPath();
                for (let j = 0; j < 6; j++) {
                    const a = (j / 6) * Math.PI * 2 - Math.PI / 2;
                    const hx = Math.cos(a) * 24;
                    const hy = Math.sin(a) * 24;
                    if (j === 0) ctx.moveTo(hx, hy);
                    else ctx.lineTo(hx, hy);
                }
                ctx.closePath();
                ctx.fillStyle = '#1a1a2e';
                ctx.fill();
                ctx.strokeStyle = COLORS.PLAYER;
                ctx.globalAlpha = baseAlpha;
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.globalAlpha = 1;

                // Cannon (rotated rectangle)
                ctx.save();
                ctx.rotate(t.angle);
                ctx.fillStyle = COLORS.PLAYER;
                ctx.globalAlpha = baseAlpha;
                ctx.fillRect(4, -3, 20, 6);

                // Muzzle flash — pre-rendered glow sprite at cannon tip
                const flashProgress = t.fireTimer / stats.turretFireRate;
                if (flashProgress > 0.7) {
                    const flashAlpha = (flashProgress - 0.7) / 0.3; // 1→0 fade
                    const flashSize = 10 + flashAlpha * 8; // 18→10 shrink
                    ctx.globalAlpha = flashAlpha * 0.9;
                    ctx.drawImage(turretMuzzleSprite, 26 - flashSize, -flashSize, flashSize * 2, flashSize * 2);
                }
                ctx.globalAlpha = 1;
                ctx.restore();

                // Center dot
                ctx.beginPath();
                ctx.arc(0, 0, 6, 0, Math.PI * 2);
                ctx.fillStyle = COLORS.PLAYER;
                ctx.globalAlpha = baseAlpha;
                ctx.fill();
                ctx.globalAlpha = 1;

                ctx.restore(); // Restore from translate
            }

            // Combat Station beams between turrets
            if (stats.hasCombatStation && turrets.length >= 2) {
                const pulseAlpha = 0.2 + 0.1 * Math.sin(gameTime * 4);
                ctx.strokeStyle = COLORS.PLAYER;
                ctx.lineWidth = 2;

                for (let a = 0; a < turrets.length - 1; a++) {
                    for (let b = a + 1; b < turrets.length; b++) {
                        const tA = turrets[a];
                        const tB = turrets[b];
                        const dx = tB.x - tA.x;
                        const dy = tB.y - tA.y;
                        if (dx * dx + dy * dy > 500 * 500) continue;

                        ctx.globalAlpha = pulseAlpha;
                        ctx.beginPath();
                        ctx.moveTo(tA.x, tA.y);
                        ctx.lineTo(tB.x, tB.y);
                        ctx.stroke();
                    }
                }
                ctx.globalAlpha = 1;
            }
        }

        function renderMines() {
            if (mines.length === 0 && radiationFields.length === 0) return;
            const stats = getWeaponStats();

            // Render radiation fields first (underneath everything)
            for (const field of radiationFields) {
                if (!shouldRenderEntity(field, CULLING_DISTANCES.particles)) continue;
                const fieldAlpha = Math.min(1, field.timer / 0.5) * 0.12;
                const pulse = 1 + Math.sin(gameTime * 3) * 0.05;
                ctx.save();
                ctx.globalAlpha = fieldAlpha;
                ctx.fillStyle = COLORS.PLAYER;
                ctx.beginPath();
                ctx.arc(field.x, field.y, field.radius * pulse, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            // Render mines
            for (const mine of mines) {
                if (!shouldRenderEntity(mine, CULLING_DISTANCES.particles)) continue;

                const gravRadius = mine.isBlackHole ? 500 : stats.mineGravityRadius;
                const ringColor = mine.isBlackHole ? '#8B00FF' : COLORS.PLAYER;

                if (!lowPerfMode) {
                    // Gravity field boundary (dashed circle)
                    ctx.save();
                    ctx.globalAlpha = mine.isBlackHole ? 0.15 : 0.08;
                    ctx.strokeStyle = ringColor;
                    ctx.setLineDash([6, 8]);
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(mine.x, mine.y, gravRadius, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    // Gravity pull rings — slow shrink from edge to center
                    const ringCount = 3;
                    const ringSpeed = 3.0;
                    ctx.lineWidth = 1;
                    ctx.strokeStyle = ringColor;
                    for (let r = 0; r < ringCount; r++) {
                        const phase = ((mine.pulsePhase / 4 / ringSpeed) + r / ringCount) % 1;
                        const radius = gravRadius * (1 - phase);
                        const alpha = Math.sin(phase * Math.PI) * 0.12;
                        if (radius > 14) {
                            ctx.globalAlpha = alpha;
                            ctx.beginPath();
                            ctx.arc(mine.x, mine.y, radius, 0, Math.PI * 2);
                            ctx.stroke();
                        }
                    }

                    // Event horizon ring
                    if (stats.mineEventHorizon > 0) {
                        ctx.globalAlpha = 0.2;
                        ctx.strokeStyle = COLORS.PLAYER;
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.arc(mine.x, mine.y, stats.mineEventHorizon, 0, Math.PI * 2);
                        ctx.stroke();
                    }

                    // Gravity pull lines — thin lines from affected enemies to mine
                    const pullNearby = spatialGrid.queryRadius(mine.x, mine.y, gravRadius);
                    ctx.strokeStyle = ringColor;
                    ctx.lineWidth = 1;
                    for (const e of pullNearby) {
                        const dx = e.x - mine.x;
                        const dy = e.y - mine.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist > gravRadius || dist < 5) continue;
                        const proxFactor = 1 - dist / gravRadius;
                        ctx.globalAlpha = 0.04 + proxFactor * 0.14;
                        ctx.beginPath();
                        ctx.moveTo(e.x, e.y);
                        ctx.lineTo(mine.x, mine.y);
                        ctx.stroke();
                    }
                    ctx.restore();
                } else {
                    // Low perf: simple solid gravity circle
                    ctx.globalAlpha = 0.06;
                    ctx.strokeStyle = ringColor;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(mine.x, mine.y, gravRadius, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }

                // Mine body
                const pulseR = mine.armed ? 14 + Math.sin(mine.pulsePhase) * 4 : 14;
                const mineColor = mine.isBlackHole ? '#8B00FF' : COLORS.PLAYER;
                ctx.save();
                ctx.globalAlpha = mine.armed ? 1.0 : 0.4;
                ctx.strokeStyle = mineColor;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(mine.x, mine.y, pulseR, 0, Math.PI * 2);
                ctx.stroke();

                // Inner detail: spikes
                for (let j = 0; j < 6; j++) {
                    const a = (j / 6) * Math.PI * 2 + mine.pulsePhase * 0.3;
                    ctx.beginPath();
                    ctx.moveTo(mine.x + Math.cos(a) * pulseR, mine.y + Math.sin(a) * pulseR);
                    ctx.lineTo(mine.x + Math.cos(a) * (pulseR + 6), mine.y + Math.sin(a) * (pulseR + 6));
                    ctx.stroke();
                }

                // Center dot
                ctx.globalAlpha = mine.armed ? 0.9 : 0.3;
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(mine.x, mine.y, 4, 0, Math.PI * 2);
                ctx.fill();

                // Arming progress arc
                if (mine.armTimer > 0 && mine.maxLife > 0) {
                    const armingDelay = stats.mineArmingDelay;
                    const progress = 1 - (mine.armTimer / armingDelay);
                    ctx.globalAlpha = 0.6;
                    ctx.strokeStyle = '#FFFFFF';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(mine.x, mine.y, pulseR + 4, -Math.PI / 2, -Math.PI / 2 + progress * Math.PI * 2);
                    ctx.stroke();
                }

                // Black hole indicator
                if (mine.isBlackHole && mine.armed) {
                    ctx.globalAlpha = 0.3 + Math.sin(mine.pulsePhase * 2) * 0.15;
                    ctx.strokeStyle = '#8B00FF';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(mine.x, mine.y, pulseR + 10 + Math.sin(mine.pulsePhase) * 4, 0, Math.PI * 2);
                    ctx.stroke();
                }

                ctx.restore();
            }
        }

        // ============================================================
        // NEW WEAPON RENDERING
        // ============================================================

        function renderSnares() {
            if (snares.length === 0) return;

            // Pass 1: Collect normal snares for global hex grid (lowPerf renders individually)
            let maxAlpha = 0;
            let gridCellSize = 0;
            const normalSnares = [];

            for (const s of snares) {
                if (!shouldRenderEntity(s, CULLING_DISTANCES.particles)) continue;
                const alpha = Math.min(1, s.life / Math.min(2, s.maxLife));

                if (lowPerfMode) {
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.strokeStyle = COLORS.PLAYER;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                } else {
                    // Scale animation: quick scale-up on appear, scale-down on disappear
                    const SCALE_IN_DURATION = 0.15;
                    const SCALE_OUT_DURATION = 0.25;
                    const timeSinceSpawn = s.maxLife - s.life;
                    const scaleIn = Math.min(1, timeSinceSpawn / SCALE_IN_DURATION);
                    const scaleOut = Math.min(1, s.life / SCALE_OUT_DURATION);
                    s._scale = Math.min(scaleIn, scaleOut);
                    if (s._scale <= 0.01) continue;
                    normalSnares.push(s);
                    if (alpha > maxAlpha) maxAlpha = alpha;
                    if (gridCellSize === 0) gridCellSize = s.radius * 0.18;
                }
            }

            // Pass 2: Global hex grid revealed by normal snares
            if (normalSnares.length === 0) return;

            const innerSize = gridCellSize * 0.6;
            const colStep = gridCellSize * 1.5;
            const rowStep = gridCellSize * 1.732050808; // sqrt(3)
            const margin = gridCellSize * 0.3;

            // Precompute hex vertex offsets
            const hexCos = [], hexSin = [];
            for (let v = 0; v < 6; v++) {
                const a = (v / 6) * 6.283185307;
                hexCos[v] = Math.cos(a);
                hexSin[v] = Math.sin(a);
            }

            // Collect unique global grid cells visible through any snare
            // Store: wx, wy, hexScale (3 values per cell)
            const EDGE_ZONE = 0.2; // outer 20% of radius = scale transition
            const seen = new Set();
            const cellData = []; // flat array: wx, wy, hexScale, ...
            for (const s of normalSnares) {
                const r = s.radius * s._scale - margin;
                if (r <= 0) continue;
                const rSq = r * r;
                const minCol = Math.floor((s.x - r) / colStep);
                const maxCol = Math.ceil((s.x + r) / colStep);
                for (let ci = minCol; ci <= maxCol; ci++) {
                    const wx = ci * colStep;
                    const yOff = (ci & 1) ? rowStep * 0.5 : 0;
                    const minRow = Math.floor((s.y - r - yOff) / rowStep);
                    const maxRow = Math.ceil((s.y + r - yOff) / rowStep);
                    for (let ri = minRow; ri <= maxRow; ri++) {
                        const wy = ri * rowStep + yOff;
                        const dx = wx - s.x;
                        const dy = wy - s.y;
                        const distSq = dx * dx + dy * dy;
                        if (distSq > rSq) continue;
                        const dist = Math.sqrt(distSq);
                        // proximity: 1 at center, 0 at edge
                        const proximity = 1 - dist / r;
                        const hexScale = proximity < EDGE_ZONE ? proximity / EDGE_ZONE : 1;
                        const key = ci + ',' + ri;
                        if (seen.has(key)) {
                            // Keep the largest scale (most interior)
                            const idx = cellData._keyMap[key];
                            if (hexScale > cellData[idx + 2]) cellData[idx + 2] = hexScale;
                            continue;
                        }
                        seen.add(key);
                        if (!cellData._keyMap) cellData._keyMap = {};
                        cellData._keyMap[key] = cellData.length;
                        cellData.push(wx, wy, hexScale);
                    }
                }
            }

            // Draw all visible hex cells with per-hex scale
            ctx.save();
            ctx.strokeStyle = COLORS.PLAYER;

            // Outer strokes
            ctx.lineWidth = 0.8;
            for (let i = 0; i < cellData.length; i += 3) {
                const wx = cellData[i];
                const wy = cellData[i + 1];
                const hs = cellData[i + 2];
                const outerR = gridCellSize * hs;
                ctx.globalAlpha = maxAlpha * hs;
                ctx.beginPath();
                for (let v = 0; v < 6; v++) {
                    const vx = wx + hexCos[v] * outerR;
                    const vy = wy + hexSin[v] * outerR;
                    if (v === 0) ctx.moveTo(vx, vy);
                    else ctx.lineTo(vx, vy);
                }
                ctx.closePath();
                ctx.stroke();
            }

            // Inner detail hexagons
            ctx.lineWidth = 0.5;
            for (let i = 0; i < cellData.length; i += 3) {
                const wx = cellData[i];
                const wy = cellData[i + 1];
                const hs = cellData[i + 2];
                const innerR = innerSize * hs;
                ctx.globalAlpha = maxAlpha * 0.4 * hs;
                ctx.beginPath();
                for (let v = 0; v < 6; v++) {
                    const vx = wx + hexCos[v] * innerR;
                    const vy = wy + hexSin[v] * innerR;
                    if (v === 0) ctx.moveTo(vx, vy);
                    else ctx.lineTo(vx, vy);
                }
                ctx.closePath();
                ctx.stroke();
            }
            ctx.restore();

            // Trap hexes (Temporal Cage evolution) — filled hexagons that root enemies
            if (trapHexes.length > 0) {
                ctx.save();
                ctx.strokeStyle = COLORS.PLAYER;
                ctx.fillStyle = COLORS.PLAYER;
                for (const th of trapHexes) {
                    if (!shouldRenderEntity(th, CULLING_DISTANCES.particles)) continue;
                    const alpha = Math.min(1, th.life / 1.5);
                    const sz = th.size;
                    // Filled hex with low opacity + brighter stroke
                    ctx.globalAlpha = alpha * 0.15;
                    ctx.beginPath();
                    for (let v = 0; v < 6; v++) {
                        const vx = th.x + hexCos[v] * sz;
                        const vy = th.y + hexSin[v] * sz;
                        if (v === 0) ctx.moveTo(vx, vy);
                        else ctx.lineTo(vx, vy);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.globalAlpha = alpha * 0.7;
                    ctx.lineWidth = 1.2;
                    ctx.stroke();
                }
                ctx.restore();
            }
        }

        function renderSlashEffects() {
            if (slashEffects.length === 0) return;
            for (const s of slashEffects) {
                const progress = 1 - (s.life / s.maxLife); // 0 at start, 1 at end
                if (progress < 0 || progress > 1) continue;

                // easeOutQuart: fast start, decelerates at the end
                const eased = 1 - Math.pow(1 - progress, 4);
                const currentR = s.radius * (0.05 + eased * 0.95);
                const alpha = 1 - progress * progress;
                if (alpha <= 0) continue;

                ctx.save();

                // Continuous gradient trail — filled sector fading from center outward
                const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, currentR);
                grad.addColorStop(0, hexToRGBA(COLORS.PLAYER, 0));
                grad.addColorStop(0.5, hexToRGBA(COLORS.PLAYER, alpha * 0.06));
                grad.addColorStop(0.85, hexToRGBA(COLORS.PLAYER, alpha * 0.18));
                grad.addColorStop(1, hexToRGBA(COLORS.PLAYER, alpha * 0.3));
                ctx.globalAlpha = 1;
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.moveTo(s.x, s.y);
                ctx.arc(s.x, s.y, currentR, s.angle - s.arc, s.angle + s.arc);
                ctx.closePath();
                ctx.fill();

                // Leading arc wavefront — thick with glow
                ctx.globalAlpha = alpha * 0.9;
                ctx.strokeStyle = s.color;
                ctx.lineWidth = 8 + (1 - progress) * 3;
                ctx.shadowColor = s.color;
                ctx.shadowBlur = 18;
                ctx.beginPath();
                ctx.arc(s.x, s.y, currentR, s.angle - s.arc, s.angle + s.arc);
                ctx.stroke();
                ctx.shadowBlur = 0;

                // Inner white flash
                ctx.globalAlpha = alpha * 0.5 * (1 - progress);
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(s.x, s.y, currentR * 0.92, s.angle - s.arc * 0.85, s.angle + s.arc * 0.85);
                ctx.stroke();

                ctx.restore();
            }
        }

        function renderRiftZones() {
            if (riftZones.length === 0) return;
            for (const rift of riftZones) {
                if (!shouldRenderEntity(rift, CULLING_DISTANCES.particles)) continue;
                const alpha = Math.min(1, rift.life / 0.5) * 0.5;

                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = COLORS.PLAYER;
                ctx.setLineDash([8, 6]);
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(rift.x, rift.y, rift.radius, rift.angle - rift.arc, rift.angle + rift.arc);
                ctx.stroke();
                ctx.setLineDash([]);

                // Fill area
                ctx.globalAlpha = alpha * 0.08;
                ctx.fillStyle = COLORS.PLAYER;
                ctx.beginPath();
                ctx.moveTo(rift.x, rift.y);
                ctx.arc(rift.x, rift.y, rift.radius, rift.angle - rift.arc, rift.angle + rift.arc);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        function drawUpgradeIcon(ctx, upgradeKey, cx, cy, color, size) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.save();
            ctx.translate(cx, cy);
            const s = size;
            if (upgradeKey === 'powerCore') {
                // Circle + 6 energy spikes (like mine body style)
                ctx.beginPath();
                ctx.arc(0, 0, s * 0.5, 0, Math.PI * 2);
                ctx.stroke();
                for (let i = 0; i < 6; i++) {
                    const a = (i / 6) * Math.PI * 2 - Math.PI / 2;
                    ctx.beginPath();
                    ctx.moveTo(Math.cos(a) * s * 0.5, Math.sin(a) * s * 0.5);
                    ctx.lineTo(Math.cos(a) * s * 0.9, Math.sin(a) * s * 0.9);
                    ctx.stroke();
                }
                // Inner detail circle
                ctx.globalAlpha = 0.4;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(0, 0, s * 0.25, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
            } else if (upgradeKey === 'hullPlating') {
                // Hexagon + inner hex detail + center dot (turret-shield style)
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const a = (i / 6) * Math.PI * 2 - Math.PI / 2;
                    if (i === 0) ctx.moveTo(Math.cos(a) * s * 0.9, Math.sin(a) * s * 0.9);
                    else ctx.lineTo(Math.cos(a) * s * 0.9, Math.sin(a) * s * 0.9);
                }
                ctx.closePath();
                ctx.stroke();
                // Inner hex detail
                ctx.globalAlpha = 0.4;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const a = (i / 6) * Math.PI * 2 - Math.PI / 2;
                    if (i === 0) ctx.moveTo(Math.cos(a) * s * 0.5, Math.sin(a) * s * 0.5);
                    else ctx.lineTo(Math.cos(a) * s * 0.5, Math.sin(a) * s * 0.5);
                }
                ctx.closePath();
                ctx.stroke();
                ctx.globalAlpha = 1;
                // Center dot
                ctx.beginPath();
                ctx.arc(0, 0, s * 0.15, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
            } else if (upgradeKey === 'engineBoost') {
                // Circle with 3 thrust lines (directional, like orbital style)
                ctx.beginPath();
                ctx.arc(0, 0, s * 0.55, 0, Math.PI * 2);
                ctx.stroke();
                // 3 exhaust lines pointing down (thrust direction)
                for (let i = -1; i <= 1; i++) {
                    const ox = i * s * 0.25;
                    ctx.beginPath();
                    ctx.moveTo(ox, s * 0.55);
                    ctx.lineTo(ox, s * 0.9);
                    ctx.stroke();
                }
                // Inner detail circle
                ctx.globalAlpha = 0.4;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(0, 0, s * 0.3, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
                // Top arrow indicator
                ctx.beginPath();
                ctx.moveTo(-s * 0.2, -s * 0.3);
                ctx.lineTo(0, -s * 0.6);
                ctx.lineTo(s * 0.2, -s * 0.3);
                ctx.stroke();
            } else if (upgradeKey === 'xpAmplifier') {
                // Dashed outer ring + inner ring + center dot (snare/field style)
                ctx.setLineDash([4, 4]);
                ctx.beginPath();
                ctx.arc(0, 0, s * 0.85, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.beginPath();
                ctx.arc(0, 0, s * 0.5, 0, Math.PI * 2);
                ctx.stroke();
                // Inner detail ring
                ctx.globalAlpha = 0.4;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(0, 0, s * 0.25, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
                // Center dot
                ctx.beginPath();
                ctx.arc(0, 0, s * 0.1, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
            }
            ctx.restore();
        }

        function drawVerticalProgressBars(ctx, x, y, width, height, level, maxLevel, color) {
            const gap = 2;
            const barW = (width - (maxLevel - 1) * gap) / maxLevel;
            for (let i = 0; i < maxLevel; i++) {
                ctx.fillStyle = i < level ? color : 'rgba(255,255,255,0.1)';
                ctx.fillRect(x + i * (barW + gap), y, barW, height);
            }
        }

        function drawWeaponIconAt(cx, cy, icon, color, size) {
            ctx.fillStyle = color;
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.save();
            ctx.translate(cx, cy);
            const s = size;
            switch (icon) {
                case 'laser':
                    ctx.beginPath();
                    ctx.moveTo(-s, 0);
                    ctx.lineTo(s, 0);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.3, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                case 'rocket':
                    ctx.beginPath();
                    ctx.moveTo(0, -s);
                    ctx.lineTo(s * 0.3, -s * 0.4);
                    ctx.lineTo(s * 0.3, s * 0.3);
                    ctx.lineTo(s * 0.65, s * 0.8);
                    ctx.lineTo(s * 0.2, s * 0.5);
                    ctx.lineTo(s * 0.2, s * 0.7);
                    ctx.lineTo(-s * 0.2, s * 0.7);
                    ctx.lineTo(-s * 0.2, s * 0.5);
                    ctx.lineTo(-s * 0.65, s * 0.8);
                    ctx.lineTo(-s * 0.3, s * 0.3);
                    ctx.lineTo(-s * 0.3, -s * 0.4);
                    ctx.closePath();
                    ctx.fill();
                    break;
                case 'orbital':
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.6, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(s * 0.6, 0, s * 0.2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(-s * 0.6, 0, s * 0.2, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                case 'lightning':
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(s * 0.3, -s);
                    ctx.lineTo(-s * 0.2, -s * 0.1);
                    ctx.lineTo(s * 0.3, s * 0.1);
                    ctx.lineTo(-s * 0.3, s);
                    ctx.stroke();
                    break;
                case 'aura':
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.35, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.7, 0, Math.PI * 2);
                    ctx.stroke();
                    break;
                case 'drone':
                    ctx.beginPath();
                    ctx.moveTo(0, -s * 0.8);
                    ctx.lineTo(s * 0.6, 0);
                    ctx.lineTo(0, s * 0.8);
                    ctx.lineTo(-s * 0.6, 0);
                    ctx.closePath();
                    ctx.fill();
                    break;
                case 'shard':
                    // Diamond shape
                    ctx.beginPath();
                    ctx.moveTo(0, -s * 0.9);
                    ctx.lineTo(s * 0.6, 0);
                    ctx.lineTo(0, s * 0.9);
                    ctx.lineTo(-s * 0.6, 0);
                    ctx.closePath();
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, -s * 0.4);
                    ctx.lineTo(s * 0.25, 0);
                    ctx.lineTo(0, s * 0.4);
                    ctx.lineTo(-s * 0.25, 0);
                    ctx.closePath();
                    ctx.stroke();
                    break;
                case 'blade':
                    // Crescent arc
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.8, -Math.PI * 0.7, Math.PI * 0.7);
                    ctx.stroke();
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.5, -Math.PI * 0.5, Math.PI * 0.5);
                    ctx.stroke();
                    break;
                case 'snare':
                    // Dashed circles
                    ctx.setLineDash([3, 3]);
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.8, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.4, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.15, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                case 'fusionbeam':
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(-s, 0);
                    ctx.lineTo(s, 0);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(s, 0, s * 0.25, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(-s, 0, s * 0.2, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                case 'mine':
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.4, 0, Math.PI * 2);
                    ctx.stroke();
                    for (let i = 0; i < 6; i++) {
                        const a = (i / 6) * Math.PI * 2;
                        ctx.beginPath();
                        ctx.moveTo(Math.cos(a) * s * 0.4, Math.sin(a) * s * 0.4);
                        ctx.lineTo(Math.cos(a) * s * 0.8, Math.sin(a) * s * 0.8);
                        ctx.stroke();
                    }
                    break;
                case 'turret':
                    // Hexagon base (outline, like in-game)
                    ctx.beginPath();
                    for (let j = 0; j < 6; j++) {
                        const a = (j / 6) * Math.PI * 2 - Math.PI / 2;
                        ctx.lineTo(Math.cos(a) * s * 0.7, Math.sin(a) * s * 0.7);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    // Barrel pointing up-right
                    ctx.save();
                    ctx.rotate(-Math.PI / 4);
                    ctx.fillRect(s * 0.1, -s * 0.12, s * 0.6, s * 0.24);
                    ctx.restore();
                    // Center dot
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.22, 0, Math.PI * 2);
                    ctx.fill();
                    break;
            }
            ctx.restore();
        }


        function renderUI() {
            if (gameState === 'menu') {
                renderMenu();
            } else if (gameState === 'playing' || gameState === 'paused' || gameState === 'skilltree') {
                renderHUD();
                if (gameState === 'paused') {
                    renderPauseOverlay();
                }
                if (gameState === 'skilltree') {
                    renderUpgradeOverlay();
                }
            } else if (gameState === 'gameOver') {
                renderHUD();
                renderGameOver();
            } else if (gameState === 'demoEnd') {
                renderHUD();
                renderDemoEnd();
            } else if (gameState === 'tutorial') {
                renderTutorial();
            }
            if (showCheatOverlay) renderCheatOverlay();
        }

        function renderMenu() {
            const cx = CANVAS_WIDTH / 2;
            const mobile = isMobile();

            // --- Render menu thruster particles (behind ship) ---
            for (const p of menuParticles) {
                const alpha = p.life / p.maxLife;
                ctx.globalAlpha = alpha;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation || 0);
                ctx.fillStyle = COLORS.PLAYER;
                const s = p.size;
                if (p.thrusterShape === 'square') {
                    const hs = s * 0.4;
                    ctx.fillRect(-hs, -hs, hs * 2, hs * 2);
                } else if (p.thrusterShape === 'circle') {
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.4, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.moveTo(0, -s * 0.6);
                    ctx.lineTo(s * 0.5, s * 0.4);
                    ctx.lineTo(-s * 0.5, s * 0.4);
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.restore();
            }
            ctx.globalAlpha = 1;

            // --- Render ship ---
            ctx.save();
            ctx.translate(cx, menuShipY);
            ctx.rotate(-90 * Math.PI / 180); // Point upward
            ctx.translate(-(0), 0); // PLAYER_PIVOT_OFFSET = 0

            // Thruster flame
            if (menuThrusterScale > 0) {
                const menuWeaponId = STARTING_WEAPON_IDS[menuWeaponIndex];
                ctx.fillStyle = COLORS.PLAYER;
                ctx.globalAlpha = 0.8 * menuThrusterScale;
                const flameLength = menuThrusterScale * 35;
                if (menuWeaponId === 'void_blade') {
                    const fl = flameLength * 0.8;
                    const ts = menuThrusterScale;
                    ctx.beginPath();
                    ctx.moveTo(-10, -19 * ts);
                    ctx.lineTo(-18 - fl, -16 * ts);
                    ctx.lineTo(-20, -12 * ts);
                    ctx.closePath();
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(-20, 12 * ts);
                    ctx.lineTo(-18 - fl, 16 * ts);
                    ctx.lineTo(-10, 19 * ts);
                    ctx.closePath();
                    ctx.fill();
                } else if (menuWeaponId === 'fusion_beam') {
                    const fl = flameLength * 0.7;
                    const fls = flameLength * 0.4;
                    const ts = menuThrusterScale;
                    ctx.beginPath();
                    ctx.moveTo(-12, -12 * ts);
                    ctx.lineTo(-12 - fls, -10 * ts);
                    ctx.lineTo(-12, -8 * ts);
                    ctx.closePath();
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(-12, -6 * ts);
                    ctx.lineTo(-12 - fl, -3 * ts);
                    ctx.lineTo(-12, 0);
                    ctx.closePath();
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(-12, 0);
                    ctx.lineTo(-12 - fl, 3 * ts);
                    ctx.lineTo(-12, 6 * ts);
                    ctx.closePath();
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(-12, 8 * ts);
                    ctx.lineTo(-12 - fls, 10 * ts);
                    ctx.lineTo(-12, 12 * ts);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.moveTo(-12, -6 * menuThrusterScale);
                    ctx.lineTo(-12 - flameLength, 0);
                    ctx.lineTo(-12, 6 * menuThrusterScale);
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            // Ship body (outline - shape varies by starting weapon)
            ctx.strokeStyle = COLORS.PLAYER;
            ctx.lineWidth = 3;
            ctx.shadowColor = COLORS.PLAYER;
            ctx.shadowBlur = 20;
            drawShipPath(ctx, STARTING_WEAPON_IDS[menuWeaponIndex]);
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.restore();

            // --- UI elements (fade in) ---
            if (menuUIAlpha <= 0) {
                currentMenuButtons = [];
                return;
            }

            ctx.textAlign = 'center';
            ctx.globalAlpha = menuUIAlpha;

            // Title — two lines: SPACE (white) + SURVIVOR (cyan)
            const titleY = mobile ? CANVAS_HEIGHT * 0.08 : CANVAS_HEIGHT * 0.10;
            const titleSize1 = mobile ? 90 : 80;
            const titleSize2 = mobile ? 100 : 90;
            const titleGap = mobile ? 8 : 4;

            // "SPACE" in white
            ctx.font = `900 ${titleSize1}px "Segoe UI", Arial, sans-serif`;
            ctx.fillStyle = '#FFFFFF';
            ctx.shadowColor = 'rgba(200, 220, 255, 0.5)';
            ctx.shadowBlur = 15;
            ctx.fillText('SPACE', cx, titleY);
            ctx.shadowBlur = 0;

            // "SURVIVOR" in cyan
            ctx.font = `900 ${titleSize2}px "Segoe UI", Arial, sans-serif`;
            ctx.fillStyle = COLORS.PLAYER;
            ctx.shadowColor = COLORS.PLAYER;
            ctx.shadowBlur = 25;
            ctx.fillText('SURVIVOR', cx, titleY + titleSize1 + titleGap);
            ctx.shadowBlur = 0;

            // Version indicator
            if (!isFullVersion) {
                ctx.font = mobile ? 'bold 16px "Segoe UI", sans-serif' : 'bold 12px "Segoe UI", sans-serif';
                ctx.fillStyle = 'rgba(255, 221, 87, 0.5)';
                ctx.fillText('FREE VERSION', cx, titleY + titleSize1 + titleGap + (mobile ? 35 : 30));
            }

            // --- Weapon selector (only after ship arrives) ---
            const selWeapon = WEAPONS[STARTING_WEAPON_IDS[menuWeaponIndex]];
            const arrowOffX = mobile ? 160 : 140;
            const arrowSize = mobile ? 22 : 18;
            const arrowY = menuShipY;

            // Buttons (at the bottom, near joystick zone)
            let menuBtns = [];
            const prog = loadProgression();

            if (menuAnimPhase === 'idle' && menuWeaponAlpha > 0) {
                ctx.globalAlpha = menuUIAlpha * menuWeaponAlpha;

                // Left arrow
                ctx.strokeStyle = selWeapon.color;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(cx - arrowOffX + arrowSize, arrowY - arrowSize);
                ctx.lineTo(cx - arrowOffX, arrowY);
                ctx.lineTo(cx - arrowOffX + arrowSize, arrowY + arrowSize);
                ctx.stroke();

                // Right arrow
                ctx.beginPath();
                ctx.moveTo(cx + arrowOffX - arrowSize, arrowY - arrowSize);
                ctx.lineTo(cx + arrowOffX, arrowY);
                ctx.lineTo(cx + arrowOffX - arrowSize, arrowY + arrowSize);
                ctx.stroke();

                // Weapon name below ship
                const weaponDisplayY = menuShipY + (mobile ? 90 : 80);
                ctx.font = mobile ? 'bold 24px "Segoe UI", sans-serif' : 'bold 18px "Segoe UI", sans-serif';
                ctx.fillStyle = selWeapon.color;
                ctx.fillText(selWeapon.name, cx, weaponDisplayY);

                // Weapon description
                ctx.font = mobile ? '18px "Segoe UI", sans-serif' : '14px "Segoe UI", sans-serif';
                ctx.fillStyle = COLORS.UI_SECONDARY;
                ctx.fillText(selWeapon.description, cx, weaponDisplayY + (mobile ? 28 : 22));


                ctx.globalAlpha = menuUIAlpha;

                // Arrow hitboxes
                const arrowHitW = mobile ? 80 : 60;
                const arrowHitH = mobile ? 80 : 60;
                menuBtns.push({ type: 'prevWeapon', x: cx - arrowOffX - arrowHitW / 2, y: arrowY - arrowHitH / 2, w: arrowHitW, h: arrowHitH });
                menuBtns.push({ type: 'nextWeapon', x: cx + arrowOffX - arrowHitW / 2, y: arrowY - arrowHitH / 2, w: arrowHitW, h: arrowHitH });
            }

            if (menuMode === 'main') {
                // Gem button + gear button, centered together
                const gemH = mobile ? 50 : 40;
                const playW = mobile ? 420 : 300;
                const gearBtnGap = mobile ? 12 : 8;
                const gearBtnSize = gemH;
                const gemW = playW - gearBtnGap - gearBtnSize;
                const gemX = cx - playW / 2;
                const gemY = mobile ? (CANVAS_HEIGHT - gemH - 20) : (CANVAS_HEIGHT - gemH - 20);

                // PLAY button sits directly above gem button
                const playH = mobile ? 80 : 56;
                const playX = cx - playW / 2;
                const btnGap = mobile ? 16 : 12;
                const playY = gemY - btnGap - playH;
                const pulse = Math.sin(Date.now() / 300) * 0.1 + 0.9;

                // Best kills record (above play button)
                if (prog.stats && prog.stats.bestKills > 0) {
                    ctx.globalAlpha = menuUIAlpha;
                    ctx.font = mobile ? 'bold 22px "Segoe UI", sans-serif' : 'bold 16px "Segoe UI", sans-serif';
                    ctx.fillStyle = hexToRGBA(COLORS.PLAYER, 0.7);
                    ctx.fillText('BEST: ' + prog.stats.bestKills + ' KILLS', cx, playY - (mobile ? 12 : 8));
                }

                ctx.globalAlpha = menuUIAlpha * pulse;
                ctx.fillStyle = COLORS.PLAYER;
                ctx.beginPath();
                ctx.roundRect(playX, playY, playW, playH, mobile ? 14 : 10);
                ctx.fill();

                // Play triangle inside button
                ctx.globalAlpha = menuUIAlpha;
                ctx.fillStyle = '#0a1628';
                const tSize = mobile ? 20 : 14;
                const tCy = playY + playH / 2;
                ctx.beginPath();
                ctx.moveTo(cx - tSize * 0.8, tCy - tSize);
                ctx.lineTo(cx - tSize * 0.8, tCy + tSize);
                ctx.lineTo(cx + tSize * 1.1, tCy);
                ctx.closePath();
                ctx.fill();

                menuBtns.push({ type: 'play', x: playX, y: playY, w: playW, h: playH });

                // --- Gems button ---
                ctx.globalAlpha = menuUIAlpha * 0.9;
                ctx.fillStyle = 'rgba(224, 240, 255, 0.08)';
                ctx.strokeStyle = 'rgba(224, 240, 255, 0.25)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.roundRect(gemX, gemY, gemW, gemH, mobile ? 10 : 7);
                ctx.fill();
                ctx.stroke();

                ctx.globalAlpha = menuUIAlpha;
                ctx.font = mobile ? 'bold 24px "Segoe UI", sans-serif' : 'bold 17px "Segoe UI", sans-serif';
                ctx.fillStyle = '#E0F0FF';
                ctx.fillText('\u25C6 ' + (prog.crystals || 0), gemX + gemW / 2, gemY + (mobile ? 34 : 27));

                menuBtns.push({ type: 'shop', x: gemX, y: gemY, w: gemW, h: gemH });

                // --- Settings (gear) button ---
                const gearX = gemX + gemW + gearBtnGap;
                const gearY = gemY;

                ctx.globalAlpha = menuUIAlpha * 0.9;
                ctx.fillStyle = 'rgba(224, 240, 255, 0.08)';
                ctx.strokeStyle = 'rgba(224, 240, 255, 0.25)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.roundRect(gearX, gearY, gearBtnSize, gearBtnSize, mobile ? 10 : 7);
                ctx.fill();
                ctx.stroke();

                // Draw gear icon
                ctx.globalAlpha = menuUIAlpha;
                const gearCx = gearX + gearBtnSize / 2;
                const gearCy = gearY + gearBtnSize / 2;
                const gr = mobile ? 10 : 8;
                const toothCount = 6;
                ctx.save();
                ctx.translate(gearCx, gearCy);
                ctx.strokeStyle = '#E0F0FF';
                ctx.lineWidth = 2;
                ctx.beginPath();
                for (let i = 0; i < toothCount; i++) {
                    const a = (i / toothCount) * Math.PI * 2;
                    const innerR = gr * 0.6;
                    const outerR = gr;
                    const halfTooth = Math.PI / toothCount * 0.5;
                    ctx.lineTo(Math.cos(a - halfTooth) * innerR, Math.sin(a - halfTooth) * innerR);
                    ctx.lineTo(Math.cos(a - halfTooth * 0.6) * outerR, Math.sin(a - halfTooth * 0.6) * outerR);
                    ctx.lineTo(Math.cos(a + halfTooth * 0.6) * outerR, Math.sin(a + halfTooth * 0.6) * outerR);
                    ctx.lineTo(Math.cos(a + halfTooth) * innerR, Math.sin(a + halfTooth) * innerR);
                }
                ctx.closePath();
                ctx.stroke();
                // Center circle
                ctx.beginPath();
                ctx.arc(0, 0, gr * 0.28, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();

                menuBtns.push({ type: 'settings', x: gearX, y: gearY, w: gearBtnSize, h: gearBtnSize });

            } else if (menuMode === 'settings') {
                // --- Inline settings (same layout as shop: replaces play area) ---
                currentPauseButtons = [];

                // Use same bottom row position as gem button in main menu
                const backH = mobile ? 50 : 40;
                const backW = mobile ? 300 : 200;
                const backX = cx - backW / 2;
                const backY = mobile ? (CANVAS_HEIGHT - backH - 20) : (CANVAS_HEIGHT - backH - 20);

                // Slider area sits above BACK, same as play button sits above gem
                const btnGap = mobile ? 16 : 12;
                const sliderAreaW = mobile ? Math.min(CANVAS_WIDTH - 80, 520) : 380;
                const sliderAreaX = cx - sliderAreaW / 2;

                // ─── Slider shared dimensions ───
                const sliderH = mobile ? 14 : 8;
                const sliderRadius = mobile ? 7 : 4;
                const thumbR = mobile ? 11 : 6;
                const hitPad = mobile ? 18 : 10;
                const muteHitW = mobile ? 44 : 30;
                const muteHitH = mobile ? 36 : 24;
                const muteScale = mobile ? 1.4 : 1;
                const muteIconW = mobile ? 40 : 30;
                const sliderW = mobile ? sliderAreaW - muteIconW - 16 : 200;
                const sliderX = mobile ? sliderAreaX : cx - sliderW / 2;
                const labelFont = mobile ? '14px "Segoe UI", sans-serif' : '11px "Segoe UI", sans-serif';
                const pctFont = mobile ? '14px "Segoe UI", sans-serif' : '12px "Segoe UI", sans-serif';
                const rowGap = mobile ? 76 : 36;

                // Position: music slider row bottom edge well above BACK button
                const musSliderBottomY = backY - (mobile ? 50 : 36);
                const musLabelY = mobile ? musSliderBottomY - 24 - 14 : musSliderBottomY - sliderH - 4;
                const volLabelY = musLabelY - rowGap;

                // ─── SFX volume control ───
                ctx.globalAlpha = menuUIAlpha;
                const vol = AudioManager.getVolume();
                const muted = AudioManager.isMuted();

                if (mobile) {
                    ctx.textAlign = 'left'; ctx.font = labelFont; ctx.fillStyle = COLORS.HUD_TEXT_SECONDARY;
                    ctx.fillText('SFX', sliderAreaX, volLabelY + 5);
                    ctx.textAlign = 'right'; ctx.font = pctFont;
                    ctx.fillStyle = muted ? COLORS.HUD_TEXT_SECONDARY : COLORS.HUD_TEXT_PRIMARY;
                    ctx.fillText(muted ? 'MUTED' : Math.round(vol * 100) + '%', sliderAreaX + sliderAreaW, volLabelY + 5);
                } else {
                    ctx.textAlign = 'left'; ctx.font = labelFont; ctx.fillStyle = COLORS.HUD_TEXT_SECONDARY;
                    ctx.fillText('SFX', sliderAreaX, volLabelY + 8);
                    ctx.textAlign = 'right'; ctx.font = pctFont;
                    ctx.fillStyle = muted ? COLORS.HUD_TEXT_SECONDARY : COLORS.HUD_TEXT_PRIMARY;
                    ctx.fillText(muted ? 'MUTED' : Math.round(vol * 100) + '%', sliderX - 8, volLabelY + 9);
                }

                const sliderY = mobile ? volLabelY + 24 : volLabelY + 2;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
                ctx.beginPath(); ctx.roundRect(sliderX, sliderY, sliderW, sliderH, sliderRadius); ctx.fill();
                const fillW = muted ? 0 : sliderW * vol;
                if (fillW > 0) {
                    ctx.fillStyle = hexToRGBA(COLORS.PLAYER, muted ? 0.2 : 0.6);
                    ctx.beginPath(); ctx.roundRect(sliderX, sliderY, fillW, sliderH, sliderRadius); ctx.fill();
                }
                const thumbX = sliderX + fillW;
                ctx.fillStyle = muted ? COLORS.HUD_TEXT_SECONDARY : COLORS.PLAYER;
                ctx.beginPath(); ctx.arc(thumbX, sliderY + sliderH / 2, thumbR, 0, Math.PI * 2); ctx.fill();

                menuBtns.push({
                    type: 'volume_slider', x: sliderX - thumbR, y: sliderY - hitPad,
                    w: sliderW + thumbR * 2, h: sliderH + hitPad * 2, sliderX, sliderW
                });

                // SFX mute button
                const muteX = sliderX + sliderW + (mobile ? 14 : 16);
                const muteY = sliderY + sliderH / 2;
                ctx.save(); ctx.translate(muteX, muteY); ctx.scale(muteScale, muteScale);
                ctx.strokeStyle = muted ? COLORS.HUD_RED : COLORS.HUD_TEXT_SECONDARY;
                ctx.lineWidth = 2; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(0, -4); ctx.lineTo(5, -4); ctx.lineTo(10, -8);
                ctx.lineTo(10, 8); ctx.lineTo(5, 4); ctx.lineTo(0, 4); ctx.closePath(); ctx.stroke();
                if (muted) {
                    ctx.beginPath(); ctx.moveTo(14, -5); ctx.lineTo(22, 5); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(22, -5); ctx.lineTo(14, 5); ctx.stroke();
                } else {
                    ctx.beginPath(); ctx.arc(12, 0, 5, -0.6, 0.6); ctx.stroke();
                    if (vol > 0.5) { ctx.beginPath(); ctx.arc(12, 0, 9, -0.5, 0.5); ctx.stroke(); }
                }
                ctx.restore();
                menuBtns.push({
                    type: 'mute_toggle', x: muteX - 4, y: muteY - muteHitH / 2, w: muteHitW, h: muteHitH
                });

                // ─── Music volume control ───
                const musVol = MusicEngine.getMusicVolume();
                const musMuted = MusicEngine.isMusicMuted();

                if (mobile) {
                    ctx.textAlign = 'left'; ctx.font = labelFont; ctx.fillStyle = COLORS.HUD_TEXT_SECONDARY;
                    ctx.fillText('MUSIC', sliderAreaX, musLabelY + 5);
                    ctx.textAlign = 'right'; ctx.font = pctFont;
                    ctx.fillStyle = musMuted ? COLORS.HUD_TEXT_SECONDARY : COLORS.HUD_TEXT_PRIMARY;
                    ctx.fillText(musMuted ? 'MUTED' : Math.round(musVol * 100) + '%', sliderAreaX + sliderAreaW, musLabelY + 5);
                } else {
                    ctx.textAlign = 'left'; ctx.font = labelFont; ctx.fillStyle = COLORS.HUD_TEXT_SECONDARY;
                    ctx.fillText('MUSIC', sliderAreaX, musLabelY + 8);
                    ctx.textAlign = 'right'; ctx.font = pctFont;
                    ctx.fillStyle = musMuted ? COLORS.HUD_TEXT_SECONDARY : COLORS.HUD_TEXT_PRIMARY;
                    ctx.fillText(musMuted ? 'MUTED' : Math.round(musVol * 100) + '%', sliderX - 8, musLabelY + 9);
                }

                const musSliderY = mobile ? musLabelY + 24 : musLabelY + 2;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
                ctx.beginPath(); ctx.roundRect(sliderX, musSliderY, sliderW, sliderH, sliderRadius); ctx.fill();
                const musFillW = musMuted ? 0 : sliderW * musVol;
                if (musFillW > 0) {
                    ctx.fillStyle = hexToRGBA(COLORS.HUD_GOLD, musMuted ? 0.2 : 0.6);
                    ctx.beginPath(); ctx.roundRect(sliderX, musSliderY, musFillW, sliderH, sliderRadius); ctx.fill();
                }
                const musThumbX = sliderX + musFillW;
                ctx.fillStyle = musMuted ? COLORS.HUD_TEXT_SECONDARY : COLORS.HUD_GOLD;
                ctx.beginPath(); ctx.arc(musThumbX, musSliderY + sliderH / 2, thumbR, 0, Math.PI * 2); ctx.fill();

                menuBtns.push({
                    type: 'music_slider', x: sliderX - thumbR, y: musSliderY - hitPad,
                    w: sliderW + thumbR * 2, h: sliderH + hitPad * 2, sliderX, sliderW
                });

                // Music mute button
                const musMuteX = sliderX + sliderW + (mobile ? 14 : 16);
                const musMuteY = musSliderY + sliderH / 2;
                ctx.save(); ctx.translate(musMuteX, musMuteY); ctx.scale(muteScale, muteScale);
                ctx.strokeStyle = musMuted ? COLORS.HUD_RED : COLORS.HUD_TEXT_SECONDARY;
                ctx.lineWidth = 2; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.arc(2, 3, 3, 0, Math.PI * 2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(5, 3); ctx.lineTo(5, -7); ctx.lineTo(10, -9); ctx.stroke();
                if (musMuted) {
                    ctx.beginPath(); ctx.moveTo(14, -5); ctx.lineTo(22, 5); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(22, -5); ctx.lineTo(14, 5); ctx.stroke();
                }
                ctx.restore();
                menuBtns.push({
                    type: 'music_mute_toggle', x: musMuteX - 4, y: musMuteY - muteHitH / 2, w: muteHitW, h: muteHitH
                });

                // ─── BACK button (same position as gem button in main) ───
                ctx.globalAlpha = menuUIAlpha * 0.9;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.roundRect(backX, backY, backW, backH, mobile ? 10 : 7);
                ctx.fill();
                ctx.stroke();
                ctx.globalAlpha = menuUIAlpha;
                ctx.textAlign = 'center';
                ctx.font = mobile ? 'bold 24px "Segoe UI", sans-serif' : 'bold 16px "Segoe UI", sans-serif';
                ctx.fillStyle = COLORS.UI_SECONDARY;
                ctx.fillText('BACK', cx, backY + (mobile ? 34 : 27));

                menuBtns.push({ type: 'back', x: backX, y: backY, w: backW, h: backH });

            } else if (menuMode === 'shop') {
                // --- Inline shop: upgrade cards + BACK ---
                const puKeys = Object.keys(PERMANENT_UPGRADES);

                // Crystal balance
                ctx.font = mobile ? 'bold 28px "Segoe UI", sans-serif' : 'bold 26px "Segoe UI", sans-serif';
                ctx.fillStyle = '#E0F0FF';
                const crystalY = mobile ? CANVAS_HEIGHT - 480 : CANVAS_HEIGHT - 350;
                ctx.fillText('\u25C6 ' + (prog.crystals || 0), cx, crystalY);

                if (mobile) {
                    // Mobile: 2 rows (3 + 2 centered)
                    const puCols = 3;
                    const puCardGap = 14;
                    const puCardW = (CANVAS_WIDTH - 80 - (puCols - 1) * puCardGap) / puCols;
                    const puCardH = 170;
                    const puY = crystalY + 12;
                    const uColor = COLORS.PLAYER;

                    for (let i = 0; i < puKeys.length; i++) {
                        const key = puKeys[i];
                        const def = PERMANENT_UPGRADES[key];
                        const level = (prog.permanentUpgrades && prog.permanentUpgrades[key]) || 0;
                        const cost = getUpgradeCost(key, level);
                        const canAfford = (prog.crystals || 0) >= cost && level < def.maxLevel;
                        const isMaxed = level >= def.maxLevel;

                        const col = i < puCols ? i : (i - puCols);
                        const row = i < puCols ? 0 : 1;
                        let rowStartX = 40;
                        if (row === 1) {
                            const itemsInRow = puKeys.length - puCols;
                            const rowW = itemsInRow * puCardW + (itemsInRow - 1) * puCardGap;
                            rowStartX = (CANVAS_WIDTH - rowW) / 2;
                        }
                        const x = rowStartX + col * (puCardW + puCardGap);
                        const y = puY + row * (puCardH + puCardGap);

                        // Card background
                        ctx.fillStyle = 'rgba(20, 25, 40, 0.8)';
                        ctx.strokeStyle = isMaxed ? 'rgba(57, 255, 20, 0.4)' : (canAfford ? uColor : 'rgba(255,255,255,0.15)');
                        ctx.lineWidth = canAfford ? 2 : 1;
                        ctx.beginPath();
                        ctx.roundRect(x, y, puCardW, puCardH, 8);
                        ctx.fill();
                        if (canAfford) {
                            ctx.save();
                            ctx.globalAlpha = 0.05;
                            ctx.fillStyle = uColor;
                            ctx.fill();
                            ctx.restore();
                        }
                        ctx.stroke();

                        const ccx = x + puCardW / 2;

                        // Icon
                        drawUpgradeIcon(ctx, key, ccx, y + 32, uColor, 20);

                        // Name
                        ctx.textAlign = 'center';
                        ctx.font = 'bold 14px "Segoe UI", sans-serif';
                        ctx.fillStyle = '#E0F0FF';
                        ctx.fillText(def.name, ccx, y + 68);

                        // Description
                        ctx.font = '12px "Segoe UI", sans-serif';
                        ctx.fillStyle = 'rgba(224, 240, 255, 0.5)';
                        ctx.fillText(def.description, ccx, y + 86);

                        // Vertical progress bars
                        const barsW = puCardW - 40;
                        const barsX = x + 20;
                        const barsY = y + 104;
                        drawVerticalProgressBars(ctx, barsX, barsY, barsW, 24, level, def.maxLevel, uColor);

                        // Cost or MAX
                        if (isMaxed) {
                            ctx.font = 'bold 16px "Segoe UI", sans-serif';
                            ctx.fillStyle = '#39FF14';
                            ctx.fillText('MAX', ccx, y + puCardH - 10);
                        } else {
                            ctx.font = 'bold 15px "Segoe UI", sans-serif';
                            ctx.fillStyle = canAfford ? '#E0F0FF' : 'rgba(224, 240, 255, 0.4)';
                            ctx.fillText('\u25C6 ' + cost, ccx, y + puCardH - 10);
                            if (canAfford) {
                                menuBtns.push({ type: 'upgrade', id: key, x: x, y: y, w: puCardW, h: puCardH });
                            }
                        }
                    }

                    // BACK button (mobile)
                    const backW = 300;
                    const backH = 50;
                    const backX = cx - backW / 2;
                    const backY = CANVAS_HEIGHT - backH - 20;
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.roundRect(backX, backY, backW, backH, 8);
                    ctx.fill();
                    ctx.stroke();
                    ctx.font = 'bold 24px "Segoe UI", sans-serif';
                    ctx.fillStyle = COLORS.UI_SECONDARY;
                    ctx.fillText('BACK', cx, backY + 34);
                    menuBtns.push({ type: 'back', x: backX, y: backY, w: backW, h: backH });

                } else {
                    // Desktop: 5 cards in a single row
                    const puCardGap = 12;
                    const totalW = CANVAS_WIDTH - 160;
                    const puCardW = (totalW - (puKeys.length - 1) * puCardGap) / puKeys.length;
                    const puCardH = 240;
                    const puY = crystalY + 14;
                    const uColor = COLORS.PLAYER;

                    for (let i = 0; i < puKeys.length; i++) {
                        const key = puKeys[i];
                        const def = PERMANENT_UPGRADES[key];
                        const level = (prog.permanentUpgrades && prog.permanentUpgrades[key]) || 0;
                        const cost = getUpgradeCost(key, level);
                        const canAfford = (prog.crystals || 0) >= cost && level < def.maxLevel;
                        const isMaxed = level >= def.maxLevel;
                        const x = 80 + i * (puCardW + puCardGap);

                        // Card background
                        ctx.fillStyle = 'rgba(20, 25, 40, 0.8)';
                        ctx.strokeStyle = isMaxed ? 'rgba(57, 255, 20, 0.4)' : (canAfford ? uColor : 'rgba(255,255,255,0.15)');
                        ctx.lineWidth = canAfford ? 2 : 1;
                        ctx.beginPath();
                        ctx.roundRect(x, puY, puCardW, puCardH, 8);
                        ctx.fill();
                        if (canAfford) {
                            ctx.save();
                            ctx.globalAlpha = 0.05;
                            ctx.fillStyle = uColor;
                            ctx.fill();
                            ctx.restore();
                        }
                        ctx.stroke();

                        const ccx = x + puCardW / 2;

                        // Icon
                        drawUpgradeIcon(ctx, key, ccx, puY + 44, uColor, 30);

                        // Name
                        ctx.textAlign = 'center';
                        ctx.font = 'bold 22px "Segoe UI", sans-serif';
                        ctx.fillStyle = '#E0F0FF';
                        ctx.fillText(def.name, ccx, puY + 94);

                        // Description
                        ctx.font = '18px "Segoe UI", sans-serif';
                        ctx.fillStyle = 'rgba(224, 240, 255, 0.55)';
                        ctx.fillText(def.description, ccx, puY + 122);

                        // Vertical progress bars
                        const barsW = puCardW - 40;
                        const barsX = x + 20;
                        const barsY = puY + 148;
                        drawVerticalProgressBars(ctx, barsX, barsY, barsW, 22, level, def.maxLevel, uColor);

                        // Cost or MAX
                        if (isMaxed) {
                            ctx.font = 'bold 26px "Segoe UI", sans-serif';
                            ctx.fillStyle = '#39FF14';
