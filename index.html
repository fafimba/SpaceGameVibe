                    ctx.arc(0, 0, s * 0.22, 0, Math.PI * 2);
                    ctx.fill();
                    break;
            }
            ctx.restore();
        }


        function renderUI() {
            if (gameState === 'menu') {
                renderMenu();
            } else if (gameState === 'playing' || gameState === 'paused' || gameState === 'skilltree') {
                renderHUD();
                if (gameState === 'paused') {
                    renderPauseOverlay();
                }
                if (gameState === 'skilltree') {
                    renderUpgradeOverlay();
                }
            } else if (gameState === 'gameOver') {
                renderHUD();
                renderGameOver();
            } else if (gameState === 'demoEnd') {
                renderHUD();
                renderDemoEnd();
            } else if (gameState === 'tutorial') {
                renderTutorial();
            }
        }

        function renderMenu() {
            const cx = CANVAS_WIDTH / 2;
            const mobile = isMobile();

            // --- Render menu thruster particles (behind ship) ---
            for (const p of menuParticles) {
                const alpha = p.life / p.maxLife;
                ctx.globalAlpha = alpha;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation || 0);
                ctx.fillStyle = COLORS.PLAYER;
                const s = p.size;
                if (p.thrusterShape === 'square') {
                    const hs = s * 0.4;
                    ctx.fillRect(-hs, -hs, hs * 2, hs * 2);
                } else if (p.thrusterShape === 'circle') {
                    ctx.beginPath();
                    ctx.arc(0, 0, s * 0.4, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.moveTo(0, -s * 0.6);
                    ctx.lineTo(s * 0.5, s * 0.4);
                    ctx.lineTo(-s * 0.5, s * 0.4);
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.restore();
            }
            ctx.globalAlpha = 1;

            // --- Render ship ---
            ctx.save();
            ctx.translate(cx, menuShipY);
            ctx.rotate(-90 * Math.PI / 180); // Point upward
            ctx.translate(-(0), 0); // PLAYER_PIVOT_OFFSET = 0

            // Thruster flame
            if (menuThrusterScale > 0) {
                const menuWeaponId = STARTING_WEAPON_IDS[menuWeaponIndex];
                ctx.fillStyle = COLORS.PLAYER;
                ctx.globalAlpha = 0.8 * menuThrusterScale;
                const flameLength = menuThrusterScale * 35;
                if (menuWeaponId === 'void_blade') {
                    const fl = flameLength * 0.8;
                    const ts = menuThrusterScale;
                    ctx.beginPath();
                    ctx.moveTo(-10, -19 * ts);
                    ctx.lineTo(-18 - fl, -16 * ts);
                    ctx.lineTo(-20, -12 * ts);
                    ctx.closePath();
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(-20, 12 * ts);
                    ctx.lineTo(-18 - fl, 16 * ts);
                    ctx.lineTo(-10, 19 * ts);
                    ctx.closePath();
                    ctx.fill();
                } else if (menuWeaponId === 'fusion_beam') {
                    const fl = flameLength * 0.7;
                    const fls = flameLength * 0.4;
                    const ts = menuThrusterScale;
                    ctx.beginPath();
                    ctx.moveTo(-12, -12 * ts);
                    ctx.lineTo(-12 - fls, -10 * ts);
                    ctx.lineTo(-12, -8 * ts);
                    ctx.closePath();
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(-12, -6 * ts);
                    ctx.lineTo(-12 - fl, -3 * ts);
                    ctx.lineTo(-12, 0);
                    ctx.closePath();
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(-12, 0);
                    ctx.lineTo(-12 - fl, 3 * ts);
                    ctx.lineTo(-12, 6 * ts);
                    ctx.closePath();
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(-12, 8 * ts);
                    ctx.lineTo(-12 - fls, 10 * ts);
                    ctx.lineTo(-12, 12 * ts);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.moveTo(-12, -6 * menuThrusterScale);
                    ctx.lineTo(-12 - flameLength, 0);
                    ctx.lineTo(-12, 6 * menuThrusterScale);
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            // Ship body (outline - shape varies by starting weapon)
            ctx.strokeStyle = COLORS.PLAYER;
            ctx.lineWidth = 3;
            ctx.shadowColor = COLORS.PLAYER;
            ctx.shadowBlur = 20;
            drawShipPath(ctx, STARTING_WEAPON_IDS[menuWeaponIndex]);
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.restore();

            // --- UI elements (fade in) ---
            if (menuUIAlpha <= 0) {
                currentMenuButtons = [];
                return;
            }

            ctx.textAlign = 'center';
            ctx.globalAlpha = menuUIAlpha;

            // Title — two lines: SPACE (white) + SURVIVOR (cyan)
            const titleY = mobile ? CANVAS_HEIGHT * 0.08 : CANVAS_HEIGHT * 0.10;
            const titleSize1 = mobile ? 90 : 80;
            const titleSize2 = mobile ? 100 : 90;
            const titleGap = mobile ? 8 : 4;

            // "SPACE" in white
            ctx.font = `900 ${titleSize1}px "Segoe UI", Arial, sans-serif`;
            ctx.fillStyle = '#FFFFFF';
            ctx.shadowColor = 'rgba(200, 220, 255, 0.5)';
            ctx.shadowBlur = 15;
            ctx.fillText('SPACE', cx, titleY);
            ctx.shadowBlur = 0;

            // "SURVIVOR" in cyan
            ctx.font = `900 ${titleSize2}px "Segoe UI", Arial, sans-serif`;
            ctx.fillStyle = COLORS.PLAYER;
            ctx.shadowColor = COLORS.PLAYER;
            ctx.shadowBlur = 25;
            ctx.fillText('SURVIVOR', cx, titleY + titleSize1 + titleGap);
            ctx.shadowBlur = 0;

            // Version indicator
            if (!isFullVersion) {
                ctx.font = mobile ? 'bold 16px "Segoe UI", sans-serif' : 'bold 12px "Segoe UI", sans-serif';
                ctx.fillStyle = 'rgba(255, 221, 87, 0.5)';
                ctx.fillText('FREE VERSION', cx, titleY + titleSize1 + titleGap + (mobile ? 35 : 30));
            }

            // --- Weapon selector (only after ship arrives) ---
            const selWeapon = WEAPONS[STARTING_WEAPON_IDS[menuWeaponIndex]];
            const arrowOffX = mobile ? 160 : 140;
            const arrowSize = mobile ? 22 : 18;
            const arrowY = menuShipY;

            // Buttons (at the bottom, near joystick zone)
            let menuBtns = [];
            const prog = loadProgression();

            if (menuAnimPhase === 'idle' && menuWeaponAlpha > 0) {
                ctx.globalAlpha = menuUIAlpha * menuWeaponAlpha;

                // Left arrow
                ctx.strokeStyle = selWeapon.color;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(cx - arrowOffX + arrowSize, arrowY - arrowSize);
                ctx.lineTo(cx - arrowOffX, arrowY);
                ctx.lineTo(cx - arrowOffX + arrowSize, arrowY + arrowSize);
                ctx.stroke();

                // Right arrow
                ctx.beginPath();
                ctx.moveTo(cx + arrowOffX - arrowSize, arrowY - arrowSize);
                ctx.lineTo(cx + arrowOffX, arrowY);
                ctx.lineTo(cx + arrowOffX - arrowSize, arrowY + arrowSize);
                ctx.stroke();

                // Weapon name below ship
                const weaponDisplayY = menuShipY + (mobile ? 90 : 80);
                ctx.font = mobile ? 'bold 24px "Segoe UI", sans-serif' : 'bold 18px "Segoe UI", sans-serif';
                ctx.fillStyle = selWeapon.color;
                ctx.fillText(selWeapon.name, cx, weaponDisplayY);

                // Weapon description
                ctx.font = mobile ? '18px "Segoe UI", sans-serif' : '14px "Segoe UI", sans-serif';
                ctx.fillStyle = COLORS.UI_SECONDARY;
                ctx.fillText(selWeapon.description, cx, weaponDisplayY + (mobile ? 28 : 22));

                ctx.globalAlpha = menuUIAlpha;

                // Arrow hitboxes
                const arrowHitW = mobile ? 80 : 60;
                const arrowHitH = mobile ? 80 : 60;
                menuBtns.push({ type: 'prevWeapon', x: cx - arrowOffX - arrowHitW / 2, y: arrowY - arrowHitH / 2, w: arrowHitW, h: arrowHitH });
                menuBtns.push({ type: 'nextWeapon', x: cx + arrowOffX - arrowHitW / 2, y: arrowY - arrowHitH / 2, w: arrowHitW, h: arrowHitH });
            }

            if (menuMode === 'main') {
                // Gem button matches BACK button position in shop
                const gemH = mobile ? 50 : 40;
                const gemW = mobile ? 200 : 150;
                const gemX = cx - gemW / 2;
                const gemY = mobile ? (CANVAS_HEIGHT - gemH - 20) : (CANVAS_HEIGHT - gemH - 20);

                // PLAY button sits directly above gem button
                const playW = mobile ? 420 : 300;
                const playH = mobile ? 80 : 56;
                const playX = cx - playW / 2;
                const btnGap = mobile ? 16 : 12;
                const playY = gemY - btnGap - playH;
                const pulse = Math.sin(Date.now() / 300) * 0.1 + 0.9;

                ctx.globalAlpha = menuUIAlpha * pulse;
                ctx.fillStyle = COLORS.PLAYER;
                ctx.beginPath();
                ctx.roundRect(playX, playY, playW, playH, mobile ? 14 : 10);
                ctx.fill();

                // Play triangle inside button
                ctx.globalAlpha = menuUIAlpha;
                ctx.fillStyle = '#0a1628';
                const tSize = mobile ? 20 : 14;
                const tCy = playY + playH / 2;
                ctx.beginPath();
                ctx.moveTo(cx - tSize * 0.8, tCy - tSize);
                ctx.lineTo(cx - tSize * 0.8, tCy + tSize);
                ctx.lineTo(cx + tSize * 1.1, tCy);
                ctx.closePath();
                ctx.fill();

                menuBtns.push({ type: 'play', x: playX, y: playY, w: playW, h: playH });

                // --- Gems button ---
                ctx.globalAlpha = menuUIAlpha * 0.9;
                ctx.fillStyle = 'rgba(224, 240, 255, 0.08)';
                ctx.strokeStyle = 'rgba(224, 240, 255, 0.25)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.roundRect(gemX, gemY, gemW, gemH, mobile ? 10 : 7);
                ctx.fill();
                ctx.stroke();

                ctx.globalAlpha = menuUIAlpha;
                ctx.font = mobile ? 'bold 24px "Segoe UI", sans-serif' : 'bold 17px "Segoe UI", sans-serif';
                ctx.fillStyle = '#E0F0FF';
                ctx.fillText('\u25C6 ' + (prog.crystals || 0), cx, gemY + (mobile ? 34 : 27));

                menuBtns.push({ type: 'shop', x: gemX, y: gemY, w: gemW, h: gemH });

            } else if (menuMode === 'shop') {
                // --- Inline shop: upgrade cards + BACK ---
                const puKeys = Object.keys(PERMANENT_UPGRADES);

                // Crystal balance
                ctx.font = mobile ? 'bold 28px "Segoe UI", sans-serif' : 'bold 20px "Segoe UI", sans-serif';
                ctx.fillStyle = '#E0F0FF';
                const crystalY = mobile ? CANVAS_HEIGHT - 480 : CANVAS_HEIGHT - 310;
                ctx.fillText('\u25C6 ' + (prog.crystals || 0), cx, crystalY);

                if (mobile) {
                    // Mobile: 2 rows (3 + 2 centered)
                    const puCols = 3;
                    const puCardGap = 14;
                    const puCardW = (CANVAS_WIDTH - 80 - (puCols - 1) * puCardGap) / puCols;
                    const puCardH = 170;
                    const puY = crystalY + 12;
                    const uColor = COLORS.PLAYER;

                    for (let i = 0; i < puKeys.length; i++) {
                        const key = puKeys[i];
                        const def = PERMANENT_UPGRADES[key];
                        const level = (prog.permanentUpgrades && prog.permanentUpgrades[key]) || 0;
                        const cost = getUpgradeCost(key, level);
                        const canAfford = (prog.crystals || 0) >= cost && level < def.maxLevel;
                        const isMaxed = level >= def.maxLevel;

                        const col = i < puCols ? i : (i - puCols);
                        const row = i < puCols ? 0 : 1;
                        let rowStartX = 40;
                        if (row === 1) {
                            const itemsInRow = puKeys.length - puCols;
                            const rowW = itemsInRow * puCardW + (itemsInRow - 1) * puCardGap;
                            rowStartX = (CANVAS_WIDTH - rowW) / 2;
                        }
                        const x = rowStartX + col * (puCardW + puCardGap);
                        const y = puY + row * (puCardH + puCardGap);

                        // Card background
                        ctx.fillStyle = 'rgba(20, 25, 40, 0.8)';
                        ctx.strokeStyle = isMaxed ? 'rgba(57, 255, 20, 0.4)' : (canAfford ? uColor : 'rgba(255,255,255,0.15)');
                        ctx.lineWidth = canAfford ? 2 : 1;
                        ctx.beginPath();
                        ctx.roundRect(x, y, puCardW, puCardH, 8);
                        ctx.fill();
                        if (canAfford) {
                            ctx.save();
                            ctx.globalAlpha = 0.05;
                            ctx.fillStyle = uColor;
                            ctx.fill();
                            ctx.restore();
                        }
                        ctx.stroke();

                        const ccx = x + puCardW / 2;

                        // Icon
                        drawUpgradeIcon(ctx, key, ccx, y + 34, uColor, 20);

                        // Name
                        ctx.textAlign = 'center';
                        ctx.font = 'bold 13px "Segoe UI", sans-serif';
                        ctx.fillStyle = '#E0F0FF';
                        ctx.fillText(def.name, ccx, y + 66);

                        // Description
                        ctx.font = '11px "Segoe UI", sans-serif';
                        ctx.fillStyle = 'rgba(224, 240, 255, 0.5)';
                        ctx.fillText(def.description, ccx, y + 82);

                        // Vertical progress bars
                        const barsW = puCardW - 40;
                        const barsX = x + 20;
                        const barsY = y + 94;
                        drawVerticalProgressBars(ctx, barsX, barsY, barsW, 24, level, def.maxLevel, uColor);

                        // Cost or MAX
                        if (isMaxed) {
                            ctx.font = 'bold 16px "Segoe UI", sans-serif';
                            ctx.fillStyle = '#39FF14';
                            ctx.fillText('MAX', ccx, y + puCardH - 14);
                        } else {
                            ctx.font = 'bold 14px "Segoe UI", sans-serif';
                            ctx.fillStyle = canAfford ? '#E0F0FF' : 'rgba(224, 240, 255, 0.4)';
                            ctx.fillText('\u25C6 ' + cost, ccx, y + puCardH - 14);
                            if (canAfford) {
                                menuBtns.push({ type: 'upgrade', id: key, x: x, y: y, w: puCardW, h: puCardH });
                            }
                        }
                    }

                    // BACK button (mobile)
                    const backW = 300;
                    const backH = 50;
                    const backX = cx - backW / 2;
                    const backY = CANVAS_HEIGHT - backH - 20;
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.roundRect(backX, backY, backW, backH, 8);
                    ctx.fill();
                    ctx.stroke();
                    ctx.font = 'bold 24px "Segoe UI", sans-serif';
                    ctx.fillStyle = COLORS.UI_SECONDARY;
                    ctx.fillText('BACK', cx, backY + 34);
                    menuBtns.push({ type: 'back', x: backX, y: backY, w: backW, h: backH });

                } else {
                    // Desktop: 5 cards in a single row
                    const puCardGap = 12;
                    const totalW = CANVAS_WIDTH - 160;
                    const puCardW = (totalW - (puKeys.length - 1) * puCardGap) / puKeys.length;
                    const puCardH = 200;
                    const puY = crystalY + 14;
                    const uColor = COLORS.PLAYER;

                    for (let i = 0; i < puKeys.length; i++) {
                        const key = puKeys[i];
                        const def = PERMANENT_UPGRADES[key];
                        const level = (prog.permanentUpgrades && prog.permanentUpgrades[key]) || 0;
                        const cost = getUpgradeCost(key, level);
                        const canAfford = (prog.crystals || 0) >= cost && level < def.maxLevel;
                        const isMaxed = level >= def.maxLevel;
                        const x = 80 + i * (puCardW + puCardGap);

                        // Card background
                        ctx.fillStyle = 'rgba(20, 25, 40, 0.8)';
                        ctx.strokeStyle = isMaxed ? 'rgba(57, 255, 20, 0.4)' : (canAfford ? uColor : 'rgba(255,255,255,0.15)');
                        ctx.lineWidth = canAfford ? 2 : 1;
                        ctx.beginPath();
                        ctx.roundRect(x, puY, puCardW, puCardH, 8);
                        ctx.fill();
                        if (canAfford) {
                            ctx.save();
                            ctx.globalAlpha = 0.05;
                            ctx.fillStyle = uColor;
                            ctx.fill();
                            ctx.restore();
                        }
                        ctx.stroke();

                        const ccx = x + puCardW / 2;

                        // Icon
                        drawUpgradeIcon(ctx, key, ccx, puY + 38, uColor, 24);

                        // Name
                        ctx.textAlign = 'center';
                        ctx.font = 'bold 13px "Segoe UI", sans-serif';
                        ctx.fillStyle = '#E0F0FF';
                        ctx.fillText(def.name, ccx, puY + 72);

                        // Description
                        ctx.font = '11px "Segoe UI", sans-serif';
                        ctx.fillStyle = 'rgba(224, 240, 255, 0.5)';
                        ctx.fillText(def.description, ccx, puY + 90);

                        // Vertical progress bars
                        const barsW = puCardW - 40;
                        const barsX = x + 20;
                        const barsY = puY + 104;
                        drawVerticalProgressBars(ctx, barsX, barsY, barsW, 28, level, def.maxLevel, uColor);

                        // Cost or MAX
                        if (isMaxed) {
                            ctx.font = 'bold 14px "Segoe UI", sans-serif';
                            ctx.fillStyle = '#39FF14';
                            ctx.fillText('MAX', ccx, puY + puCardH - 20);
                        } else {
                            ctx.font = '13px "Segoe UI", sans-serif';
                            ctx.fillStyle = canAfford ? '#E0F0FF' : 'rgba(224, 240, 255, 0.4)';
                            ctx.fillText('\u25C6 ' + cost, ccx, puY + puCardH - 20);
                            if (canAfford) {
                                menuBtns.push({ type: 'upgrade', id: key, x: x, y: puY, w: puCardW, h: puCardH });
                            }
                        }
                    }

                    // BACK button (desktop) — aligned to same Y as gem button in main menu
                    const backW = 200;
                    const backH = 40;

        function renderHUD() {
            if (!player) return;

            // ═══════════════════════════════════════
            // BAR GEOMETRY — full mobile width, capped on desktop
            // ═══════════════════════════════════════
            const barMaxWidth = 640;
            const barWidth = Math.min(CANVAS_WIDTH - 32, barMaxWidth);
            const barX = (CANVAS_WIDTH - barWidth) / 2;
            const infoY = 28;   // row for kills, level hex, lives
            const xpBarY = 48;  // XP bar below info row

            // ═══════════════════════════════════════
            // KILLS (left-aligned above bar)
            // ═══════════════════════════════════════
            ctx.textAlign = 'left';
            ctx.font = '10px "Segoe UI", sans-serif';
            ctx.fillStyle = COLORS.HUD_TEXT_SECONDARY;
            ctx.fillText('KILLS', barX, infoY - 12);

            ctx.font = 'bold 20px "Segoe UI", sans-serif';
            ctx.fillStyle = COLORS.HUD_TEXT_PRIMARY;
            if (ENABLE_GLOW_EFFECTS) {
                ctx.shadowColor = COLORS.HUD_CYAN_GLOW;
                ctx.shadowBlur = 20;
            }
            ctx.fillText(totalKills.toLocaleString(), barX + 40, infoY - 12);
            ctx.shadowBlur = 0;

            // Crystal counter (next to kills)
            if (crystalsThisRun > 0) {
                const killsTextWidth = ctx.measureText(totalKills.toLocaleString()).width;
                ctx.fillStyle = '#E0F0FF';
                ctx.font = 'bold 12px "Segoe UI", sans-serif';
                ctx.fillText('\u25C6 ' + crystalsThisRun, barX + 40 + killsTextWidth + 16, infoY - 12);
            }

            // ═══════════════════════════════════════
            // LEVEL HEXAGON (centered above bar)
            // ═══════════════════════════════════════
            const hexX = CANVAS_WIDTH / 2;
            const hexY = infoY - 6;
            const hexSize = 16;
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i - Math.PI / 2;
                const px = hexX + Math.cos(angle) * hexSize;
                const py = hexY + Math.sin(angle) * hexSize;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fillStyle = 'rgba(0, 255, 170, 0.04)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(0, 255, 170, 0.4)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Level number inside hexagon
            ctx.textAlign = 'center';
            ctx.font = 'bold 13px "Segoe UI", sans-serif';
            ctx.fillStyle = COLORS.HUD_GREEN;
            if (ENABLE_GLOW_EFFECTS) {
                ctx.shadowColor = 'rgba(0, 255, 170, 0.5)';
                ctx.shadowBlur = 10;
            }
            if (!isFullVersion) {
                ctx.font = 'bold 10px "Segoe UI", sans-serif';
                ctx.fillText(playerLevel + '/' + DEMO_MAX_LEVEL, hexX, hexY + 4);
            } else {
                ctx.fillText(playerLevel.toString(), hexX, hexY + 4);
            }
            ctx.shadowBlur = 0;

            // ═══════════════════════════════════════
            // LIVES (right-aligned above bar)
            // ═══════════════════════════════════════
            const shipScale = LIFE_SLOT_SCALE;
            const shipSpacing = LIFE_SLOT_SPACING;
            const hullEndX = barX + barWidth;
            const hullStartX = hullEndX - (playerMaxHP * shipSpacing) + 10;

            ctx.lineCap = 'round';
            for (let i = 0; i < playerMaxHP; i++) {
                const shipX = hullStartX + i * shipSpacing;
                const shipY = infoY - 4;
                const isActive = i < player.hp;

                ctx.save();
                ctx.translate(shipX, shipY);
                ctx.scale(shipScale, shipScale);
                ctx.rotate(-Math.PI / 2);

                ctx.lineWidth = 3;
                drawShipPath(ctx, selectedStartingWeapon);

                if (isActive) {
                    ctx.strokeStyle = COLORS.PLAYER;
                } else {
                    ctx.strokeStyle = COLORS.HUD_CYAN_DIM;
                    ctx.globalAlpha = 0.3;
                }
                ctx.stroke();
                ctx.restore();
            }

            // ═══════════════════════════════════════
            // XP BAR (full width, below info row)
            // ═══════════════════════════════════════
            const xpBarWidth = barWidth;
            const xpBarHeight = 6;
            const xpProgress = playerXP / xpToNextLevel;

            // Bar track
            ctx.fillStyle = 'rgba(255, 255, 255, 0.04)';
            ctx.strokeStyle = 'rgba(0, 255, 170, 0.12)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(barX, xpBarY, xpBarWidth, xpBarHeight, 1);
            ctx.fill();
            ctx.stroke();

            // Bar fill
            if (xpProgress > 0) {
                const fillGrad = ctx.createLinearGradient(barX, 0, barX + xpBarWidth * xpProgress, 0);
                fillGrad.addColorStop(0, COLORS.HUD_GREEN_DIM);
                fillGrad.addColorStop(1, COLORS.HUD_GREEN);
                ctx.fillStyle = fillGrad;
                ctx.beginPath();
                ctx.roundRect(barX, xpBarY, xpBarWidth * xpProgress, xpBarHeight, 1);
                ctx.fill();

                if (ENABLE_GLOW_EFFECTS) {
                    ctx.shadowColor = 'rgba(0, 255, 170, 0.4)';
                    ctx.shadowBlur = 12;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            // Tick marks
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.04)';
            ctx.lineWidth = 1;
            for (let i = 1; i < 10; i++) {
                const tickX = barX + (xpBarWidth / 10) * i;
                ctx.beginPath();
                ctx.moveTo(tickX, xpBarY);
                ctx.lineTo(tickX, xpBarY + xpBarHeight);
                ctx.stroke();
            }

            // XP text
            ctx.textAlign = 'right';
            ctx.font = '9px "Segoe UI", sans-serif';
            ctx.fillStyle = COLORS.HUD_TEXT_SECONDARY;
            ctx.fillText(playerXP + ' / ' + xpToNextLevel + ' XP', barX + xpBarWidth, xpBarY + xpBarHeight + 12);

            // ═══════════════════════════════════════
            // WAVE ALERT (below XP bar, conditional)
            // ═══════════════════════════════════════
            if (waveAlertActive && waveAlertTimer < WAVE_ALERT_DURATION) {
                const alertProgress = waveAlertTimer / WAVE_ALERT_DURATION;
                const fadeIn = Math.min(1, alertProgress * 4);
                const fadeOut = alertProgress > 0.7 ? 1 - ((alertProgress - 0.7) / 0.3) : 1;
                const alpha = fadeIn * fadeOut;

                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.textAlign = 'center';

                ctx.font = 'bold 16px "Segoe UI", sans-serif';
                ctx.fillStyle = COLORS.HUD_RED;
                if (ENABLE_GLOW_EFFECTS) {
                    ctx.shadowColor = 'rgba(255, 107, 107, 0.5)';
                    ctx.shadowBlur = 20;
                }
                ctx.fillText('WAVE ' + waveAlertNumber, CANVAS_WIDTH / 2, 100);
                ctx.shadowBlur = 0;

                if (waveAlertSubtitle) {
                    ctx.font = '9px "Segoe UI", sans-serif';
                    ctx.fillStyle = 'rgba(255, 107, 107, 0.5)';
                    ctx.fillText(waveAlertSubtitle.toUpperCase(), CANVAS_WIDTH / 2, 115);
                }

                ctx.restore();
            }

            // ═══════════════════════════════════════
            // SKILL POINTS INDICATOR
            // ═══════════════════════════════════════
            if (skillPoints > 0) {
                ctx.textAlign = 'center';
                ctx.fillStyle = COLORS.HUD_GOLD;
                ctx.font = 'bold 14px "Segoe UI", sans-serif';
                ctx.fillText('SKILL POINTS: ' + skillPoints + ' (Press TAB)', CANVAS_WIDTH / 2, CANVAS_HEIGHT - 55);
            }

        }

        let currentTutorialButtons = [];
        let currentMenuButtons = [];

        function handleTutorialClick(clickX, clickY) {
            for (const btn of currentTutorialButtons) {
                if (clickX >= btn.x && clickX <= btn.x + btn.w &&
                    clickY >= btn.y && clickY <= btn.y + btn.h) {
                    selectTutorialWeapon(btn.id);
                    return true;
                }
            }
            return false;
        }

        function handleMenuClick(clickX, clickY) {
            for (const btn of currentMenuButtons) {
                if (clickX >= btn.x && clickX <= btn.x + btn.w &&
                    clickY >= btn.y && clickY <= btn.y + btn.h) {
                    if (btn.type === 'play' || btn.type === 'retry') {
                        startGame();
                        return true;
                    }
                    if (btn.type === 'exit') {
                        gameState = 'menu';
                        resetMenuAnimation();
                        return true;
                    }
                    if (btn.type === 'shop') {
                        menuMode = 'shop';
                        return true;
                    }
                    if (btn.type === 'back') {
                        menuMode = 'main';
                        return true;
                    }
                    if (btn.type === 'upgrade') {
                        const prog = loadProgression();
                        const level = (prog.permanentUpgrades[btn.id]) || 0;
                        const cost = getUpgradeCost(btn.id, level);
                        if ((prog.crystals || 0) >= cost && level < PERMANENT_UPGRADES[btn.id].maxLevel) {
                            prog.crystals -= cost;
                            prog.permanentUpgrades[btn.id] = level + 1;
                            saveProgression(prog);
                        }
                        return true;
                    }
                    if (btn.type === 'prevWeapon') {
                        menuWeaponIndex = (menuWeaponIndex - 1 + STARTING_WEAPON_IDS.length) % STARTING_WEAPON_IDS.length;
                        applyWeaponTheme(STARTING_WEAPON_IDS[menuWeaponIndex]);
                        return true;
                    }
                    if (btn.type === 'nextWeapon') {
                        menuWeaponIndex = (menuWeaponIndex + 1) % STARTING_WEAPON_IDS.length;
                        applyWeaponTheme(STARTING_WEAPON_IDS[menuWeaponIndex]);
                        return true;
                    }
                }
            }
            return false;
        }

            ctx.shadowBlur = 0;

            // Run stats
            let sy = CANVAS_HEIGHT / 2 - 30;
            const lineGap = mobile ? 42 : 36;

            // Crystals earned
            const crystalTotal = lastRunCrystals ? lastRunCrystals.total : 0;
            ctx.font = mobile ? 'bold 30px "Segoe UI", sans-serif' : 'bold 24px "Segoe UI", sans-serif';
            ctx.fillStyle = '#E0F0FF';
            ctx.shadowColor = '#E0F0FF';
            ctx.shadowBlur = ENABLE_GLOW_EFFECTS ? 6 : 0;
            ctx.fillText('\u25C6 ' + crystalTotal + ' CRYSTALS', cx, sy);
            ctx.shadowBlur = 0;
            sy += lineGap;

            // Kills
            ctx.font = mobile ? 'bold 28px "Segoe UI", sans-serif' : 'bold 22px "Segoe UI", sans-serif';
            ctx.fillStyle = COLORS.UI_SECONDARY;
            ctx.fillText(totalKills + ' KILLS', cx, sy);
            sy += lineGap;

            // Level reached
            ctx.fillText('LEVEL ' + playerLevel, cx, sy);
            sy += lineGap + 20;

            // Buttons
            let goBtns = [];
            const btnW = mobile ? 400 : 300;
            const btnH = mobile ? 65 : 50;
            const btnGap = mobile ? 20 : 16;

            // PLAY AGAIN button (cyan, pulsing)
            const retryX = cx - btnW / 2;
            const retryY = sy;
            const pulse = Math.sin(Date.now() / 300) * 0.15 + 0.85;
            ctx.globalAlpha = pulse;
            ctx.fillStyle = COLORS.PLAYER;
            ctx.beginPath();
            ctx.roundRect(retryX, retryY, btnW, btnH, 8);
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.fillStyle = '#000';
            ctx.font = mobile ? 'bold 28px "Segoe UI", sans-serif' : 'bold 20px "Segoe UI", sans-serif';
            ctx.fillText(mobile ? 'PLAY AGAIN' : 'PLAY AGAIN  (R)', cx, retryY + (mobile ? 43 : 33));
            goBtns.push({ type: 'retry', x: retryX, y: retryY, w: btnW, h: btnH });

            // EXIT button (subtle)
            const exitY = retryY + btnH + btnGap;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(retryX, exitY, btnW, btnH, 8);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = COLORS.UI_SECONDARY;
            ctx.font = mobile ? 'bold 26px "Segoe UI", sans-serif' : 'bold 18px "Segoe UI", sans-serif';
            ctx.fillText(mobile ? 'EXIT' : 'EXIT  (ESC)', cx, exitY + (mobile ? 42 : 33));
            goBtns.push({ type: 'exit', x: retryX, y: exitY, w: btnW, h: btnH });

            currentMenuButtons = goBtns;
        }
        
        // ============================================================
        // UTILITIES
        // ============================================================
        
        function normalizeAngle(angle) {
            while (angle > 180) angle -= 360;
            while (angle < -180) angle += 360;
            return angle;
        }

        // ============================================================
        // START GAME
        // ============================================================
        
        init();
        
    })();
    </script>
    <script>
        // Register Service Worker for PWA/TWA offline support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
