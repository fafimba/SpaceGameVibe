const totalBeats=Math.max(...Object.values(V).map(v=>v.length?Math.max(...v.map(n=>n[2]+n[1])):0));
const totalSec=totalBeats*BD;
let ac=null,masterG=null,an=null;
let playing=false,startT=0,pauseOff=0,schTimer=null;
let en={harp:true,strings:true,koto:true};
let vol={harp:0.7,strings:0.6,koto:0.65};
let vi={harp:0,strings:0,koto:0};
let scheduled=[];

function init(){if(ac)return;ac=new(window.AudioContext||window.webkitAudioContext)();masterG=ac.createGain();masterG.gain.value=0.55;an=ac.createAnalyser();an.fftSize=2048;masterG.connect(an);an.connect(ac.destination);}
function mtf(m){return 440*Math.pow(2,(m-69)/12);}

function tone(midi,dur,vel,voice,when){
  if(!en[voice])return;
  const v=vel*vol[voice],ds=dur*BD,t=when,freq=mtf(midi);

  if(voice==='harp'){
    const o=ac.createOscillator(),g=ac.createGain();
    o.type='sine';o.frequency.value=freq;
    const o2=ac.createOscillator(),g2=ac.createGain();
    o2.type='sine';o2.frequency.value=freq*0.5;
    g2.gain.setValueAtTime(midi<50?v*0.2:0,t);
    g2.gain.exponentialRampToValueAtTime(0.001,t+ds);
    o.connect(g);g.connect(masterG);o2.connect(g2);g2.connect(masterG);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(v*0.45,t+0.008);
    g.gain.exponentialRampToValueAtTime(v*0.15,t+Math.max(0.02,ds*0.4));
    g.gain.exponentialRampToValueAtTime(0.001,t+ds);
    o.start(t);o.stop(t+ds+0.02);o2.start(t);o2.stop(t+ds+0.02);
    scheduled.push(o,o2);
  }else if(voice==='strings'){
    const o=ac.createOscillator(),g=ac.createGain();
    o.type='sine';o.frequency.value=freq;
    const o2=ac.createOscillator(),g2=ac.createGain();
    o2.type='sine';o2.frequency.value=freq*1.002;
    o.connect(g);o2.connect(g2);g.connect(masterG);g2.connect(masterG);
    const att=Math.min(0.3,ds*0.25);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v*0.3,t+att);
    g.gain.setValueAtTime(v*0.28,t+ds*0.7);g.gain.linearRampToValueAtTime(0,t+ds);
    g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(v*0.15,t+att);
    g2.gain.setValueAtTime(v*0.12,t+ds*0.7);g2.gain.linearRampToValueAtTime(0,t+ds);
    o.start(t);o.stop(t+ds+0.05);o2.start(t);o2.stop(t+ds+0.05);
    scheduled.push(o,o2);
  }else{
    const o=ac.createOscillator(),g=ac.createGain();
    o.type='sine';o.frequency.value=freq;
    const fl=ac.createBiquadFilter();
    fl.type='peaking';fl.frequency.value=freq*2;fl.gain.value=3;fl.Q.value=2;
    o.connect(fl);fl.connect(g);g.connect(masterG);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(v*0.4,t+0.005);
    g.gain.exponentialRampToValueAtTime(v*0.12,t+Math.max(0.02,ds*0.3));
    g.gain.exponentialRampToValueAtTime(0.001,t+ds);
    o.start(t);o.stop(t+ds+0.02);
    scheduled.push(o);
  }
}

function sched(){
  if(!playing)return;
  const now=ac.currentTime,el=now-startT,la=0.5,st=el+la;
  for(const vc of ['harp','strings','koto']){
    const notes=V[vc];let idx=vi[vc];
    while(idx<notes.length){
      const[m,d,sb,vl]=notes[idx];
      const nt=sb*BD;
      if(nt>st)break;
      if(nt>=el-0.01)tone(m,d,vl,vc,startT+nt);
      idx++;
    }
    vi[vc]=idx;
  }
}

function togglePlay(){init();if(ac.state==='suspended')ac.resume();if(playing){pause();return;}
  playing=true;startT=ac.currentTime-pauseOff;
  for(const vc of ['harp','strings','koto']){
    let idx=0;while(idx<V[vc].length&&V[vc][idx][2]*BD<pauseOff)idx++;vi[vc]=idx;
  }
  document.getElementById('playBtn').textContent='Pause';document.getElementById('playBtn').classList.add('active');
  schTimer=setInterval(sched,80);sched();drawViz();
}

function pause(){playing=false;clearInterval(schTimer);pauseOff=ac.currentTime-startT;
  scheduled.forEach(n=>{try{n.stop()}catch(e){}});scheduled=[];
  document.getElementById('playBtn').textContent='Play';document.getElementById('playBtn').classList.remove('active');
}

function fullStop(){if(playing)pause();pauseOff=0;updateProg();}

function seek(e){const r=e.target.closest('.progress').getBoundingClientRect(),p=(e.clientX-r.left)/r.width,wp=playing;
  if(playing)pause();pauseOff=p*totalSec;if(wp)togglePlay();updateProg();}

function tog(n,el){en[n]=!en[n];el.classList.toggle('off');}

function updateProg(){const el=playing?ac.currentTime-startT:pauseOff;
  document.getElementById('pFill').style.width=Math.min(100,el/totalSec*100)+'%';
  const f=s=>Math.floor(s/60)+':'+(Math.floor(s%60)<10?'0':'')+Math.floor(s%60);
  document.getElementById('pText').textContent=f(el)+' / '+f(totalSec);
  if(el>=totalSec&&playing)pause();
}

const cv=document.getElementById('viz'),cx=cv.getContext('2d'),da=new Uint8Array(1024);
function drawViz(){if(!playing)return;requestAnimationFrame(drawViz);updateProg();
  an.getByteTimeDomainData(da);cx.fillStyle='#0a0a1a';cx.fillRect(0,0,800,180);
  cx.strokeStyle='#00e5ff';cx.lineWidth=1.5;cx.beginPath();
  const sw=800/1024;for(let i=0;i<1024;i++){const y=(da[i]/128)*90;if(i===0)cx.moveTo(0,y);else cx.lineTo(i*sw,y);}
  cx.stroke();
  const beat=(ac.currentTime-startT)/BD;
  cx.fillStyle='#00e5ff22';cx.fillRect(0,170,(beat%4)/4*800,10);
}
setInterval(()=>{if(!playing)updateProg();},500);
